name: Add new essay banner
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-banner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add banner to index.html
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          let html = fs.readFileSync('index.html','utf8');

          // Find the "Search the Bible" label area - insert banner before it
          // The marker is the div with SEARCH THE BIBLE text
          const marker = "Pesquisar na";
          const idx = html.indexOf(marker);
          if(idx === -1){ console.log('Marker not found'); process.exit(1); }

          // Go back to find the container div for the search section
          // Look for the div with marginBottom:16,position:'relative'
          const searchBack = html.lastIndexOf("marginBottom:16,position:'relative'", idx);
          if(searchBack === -1){ console.log('Search container not found'); process.exit(1); }
          // Find the opening <div of that container
          const divStart = html.lastIndexOf('<div', searchBack);
          if(divStart === -1){ console.log('Div not found'); process.exit(1); }

          // Also add a state variable for banner dismissal
          // Find the ESSAY_CATALOG to add state near it
          const essayCat = html.indexOf('ESSAY_CATALOG');
          if(essayCat === -1){ console.log('ESSAY_CATALOG not found'); process.exit(1); }
          // Find the line with useState for selectedEssay
          const selEssay = html.indexOf("[selectedEssay,setSelectedEssay]", essayCat);
          if(selEssay === -1){ console.log('selectedEssay not found'); process.exit(1); }

          // Insert banner dismiss state before selectedEssay state
          const bannerState = "const [bannerDismissed,setBannerDismissed]=useState(()=>{try{return localStorage.getItem('dw_banner_essay1')==='1'}catch(e){return false}});\n    const dismissBanner=()=>{setBannerDismissed(true);try{localStorage.setItem('dw_banner_essay1','1')}catch(e){}};\n    ";
          html = html.substring(0, selEssay) + bannerState + html.substring(selEssay);

          // Recalculate divStart after insertion
          const newMarker = html.indexOf("Pesquisar na");
          const newSearchBack = html.lastIndexOf("marginBottom:16,position:'relative'", newMarker);
          const newDivStart = html.lastIndexOf('<div', newSearchBack);

          // The banner JSX
          const banner = `{!bannerDismissed&&(
          <div style={{margin:'0 0 16px',padding:'16px 18px',background:'linear-gradient(135deg, #3d5a3e 0%, #4a6b4b 100%)',borderRadius:14,position:'relative',cursor:'pointer',boxShadow:'0 2px 12px rgba(61,90,62,0.18)'}} onClick={()=>{requireEmail(()=>{setSelectedEssay('knocking-on-the-door');setMoreSection('essays');loadEssayToc('knocking-on-the-door')})}}>
            <div style={{position:'absolute',top:8,right:12,color:'rgba(255,255,255,0.6)',fontSize:18,cursor:'pointer',padding:'4px 8px',zIndex:2}} onClick={(e)=>{e.stopPropagation();dismissBanner()}}>\u00D7</div>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
              <span style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:2,color:'#c9a96e'}}>NEW ESSAY</span>
            </div>
            <div style={{fontSize:17,fontWeight:700,color:'#fff',marginBottom:4}}>Knocking on the Door</div>
            <div style={{fontSize:13,color:'rgba(255,255,255,0.8)',lineHeight:1.4}}>A Room-by-Room Guide to the Seven Conflict Personas</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.5)',marginTop:6}}>by Pastor Ashley Evans \u2022 6 sections \u2022 Read now \u2192</div>
          </div>
          )}`;

          html = html.substring(0, newDivStart) + banner + '\n          ' + html.substring(newDivStart);

          fs.writeFileSync('index.html', html);
          console.log('Banner added successfully');
          console.log('State inserted at:', selEssay);
          console.log('Banner inserted before search section');
          SCRIPT
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add new essay announcement banner to home screen"
          git push
      - name: Remove this workflow
        run: |
          git rm .github/workflows/add-banner.yml
          git commit -m "Remove add-banner workflow"
          git push
