name: Fix fontSize in essay reader
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix fontSize references
        run: |
          node -e "
          const fs = require('fs');
          let html = fs.readFileSync('index.html','utf8');
          const marker = 'selectedEssaySection!==null';
          const pos = html.indexOf(marker);
          if(pos===-1){ console.log('Marker not found'); process.exit(1); }
          const before = html.substring(0, pos);
          let after = html.substring(pos);
          after = after.replace(/fontSize:fontSize,/g, 'fontSize:17,');
          after = after.replace(/fontSize:fontSize-1/g, 'fontSize:16');
          after = after.replace(/fontSize:fontSize\+2/g, 'fontSize:19');
          html = before + after;
          fs.writeFileSync('index.html', html);
          console.log('Fixed fontSize references in essay reader');
          "
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Fix fontSize variable references in essay reader"
          git push
      - name: Remove this workflow
        run: |
          git rm .github/workflows/fix-fontsize.yml
          git commit -m "Remove fix-fontsize workflow"
          git push
