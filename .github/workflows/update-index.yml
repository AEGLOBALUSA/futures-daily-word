name: Update index.html with Ps Essays
on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update index.html
        run: |
          node -e "
          const fs = require('fs');
          let c = fs.readFileSync('index.html', 'utf8');
          
          // Fix broken head tag
          c = c.replace('<hea\n', '<head>\n');
          // Also fix if it has extra space
          c = c.replace('<hea ', '<head>');
          if (!c.includes('<head>')) {
            c = c.replace('<hea\r\n', '<head>\r\n');
          }
          
          const lines = c.split('\n');
          
          // Decode insertions from base64
          const ins1 = Buffer.from('', 'base64').toString('utf8');
          const ins2 = Buffer.from('', 'base64').toString('utf8');
          const ins3 = Buffer.from('', 'base64').toString('utf8');
          
          // Find insertion points
          let ip1 = -1, ip2 = -1, ip3 = -1;
          
          // IP1: after BOOK_CATALOG closing };
          let braceCount = 0, inCatalog = false;
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('BOOK_CATALOG = {')) inCatalog = true;
            if (inCatalog) {
              for (const ch of lines[i]) {
                if (ch === '{') braceCount++;
                if (ch === '}') braceCount--;
              }
              if (braceCount === 0 && lines[i].includes('};')) {
                ip1 = i;
                break;
              }
            }
          }
          
          // IP2: after psJane Fragment closing in hub
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('BOOK_CATALOG.psJane.map')) {
              for (let j = i; j < i + 50; j++) {
                if (lines[j] && lines[j].includes('</React.Fragment>')) {
                  if (lines[j+1] && lines[j+1].trim() === ')}') {
                    ip2 = j + 1;
                    break;
                  }
                }
              }
              if (ip2 > -1) break;
            }
          }
          
          // IP3: line with page==='settings'
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes(\"page==='settings'\")) {
              ip3 = i;
              break;
            }
          }
          
          console.log('IP1:', ip1, 'IP2:', ip2, 'IP3:', ip3);
          
          if (ip1 < 0 || ip2 < 0 || ip3 < 0) {
            console.error('Could not find all insertion points!');
            process.exit(1);
          }
          
          // Insert backwards to preserve line numbers
          const ins3Lines = ins3.split('\n');
          lines.splice(ip3, 0, ...ins3Lines);
          
          const ins2Lines = ins2.split('\n');
          lines.splice(ip2 + 1, 0, ...ins2Lines);
          
          const ins1Lines = ins1.split('\n');
          lines.splice(ip1 + 1, 0, ...ins1Lines);
          
          fs.writeFileSync('index.html', lines.join('\n'));
          console.log('Done! Total lines:', lines.length);
          "
          
      - name: Commit changes
        run: |
          git config user.name "AEGLOBALUSA"
          git config user.email "noreply@github.com"
          git add index.html
          git diff --cached --stat
          git commit -m "Add Ps Essays section with Knocking on the Door essay"
          git push
          
      - name: Clean up workflow
        run: |
          git rm .github/workflows/update-index.yml
          git commit -m "Remove temporary update workflow"
          git push
