name: Fix emoji escapes
on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Fix unicode escapes in index.html
        run: |
          node -e "
          const fs = require('fs');
          let c = fs.readFileSync('index.html', 'utf8');
          c = c.replace(/\\\\u\{1F6AA\}/g, String.fromCodePoint(0x1F6AA));
          c = c.replace(/\\\\u\{1F4DD\}/g, String.fromCodePoint(0x1F4DD));
          fs.writeFileSync('index.html', c);
          console.log('Fixed emoji escapes');
          "
          
      - name: Commit
        run: |
          git config user.name "AEGLOBALUSA"
          git config user.email "noreply@github.com"
          git add index.html
          git diff --cached --stat
          git commit -m "Fix emoji unicode escapes in Ps Essays section" || echo "No changes"
          git push
          
      - name: Clean up
        run: |
          git rm .github/workflows/fix-emoji.yml
          git commit -m "Remove fix-emoji workflow"
          git push
