<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Daily Word</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#FAFAF8;color:#0D0D0D;font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
    .c{max-width:400px}
    h1{font-family:Georgia,serif;font-size:64px;color:#4A6340;margin-bottom:8px}

    .v{margin-top:32px;font-family:Georgia,serif;font-style:italic;color:#9A7B2E;font-size:14px;line-height:1.6}

<body>
  <div class="c">
    <h1>404</h1>

    <a href="/">Go to Daily Word</a>
    <div class="v">"Your word is a lamp to my feet and a light to my path."<br>— Psalm 119:105</div>
