[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

# API proxy to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache hashed assets for 1 year (Vite fingerprints them)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache icons for 1 year
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache data files for 1 week
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Cache Bible JSON files for 1 year (immutable content)
[[headers]]
  for = "/bible/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache book JSON files for 1 year
[[headers]]
  for = "/books/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Manifest — 1 day
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Service worker — must always be fresh
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
