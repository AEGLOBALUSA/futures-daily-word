[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# API function redirects - MUST come before SPA fallback
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback - last redirect
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: https://www.google-analytics.com https://www.googletagmanager.com; media-src 'self' blob: data: https://audio.esv.org https://*.amazonaws.com https://4.dbt.io https://*.dbt.io https://api.scripture.api.bible; connect-src 'self' https://*.supabase.co https://audio.esv.org https://api.esv.org https://*.amazonaws.com https://www.google-analytics.com https://www.googletagmanager.com https://*.google-analytics.com https://analytics.google.com https://4.dbt.io https://api.scripture.api.bible; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'"

# HTML - never cache (so iPhone picks up new JS bundles immediately)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Hashed assets - immutable cache (1 year)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker - no cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Manifest - short cache
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Icons - long cache
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Bible data - long cache (offline KJV)
[[headers]]
  for = "/bible/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Book data - long cache
[[headers]]
  for = "/books/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# Data files - moderate cache
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
