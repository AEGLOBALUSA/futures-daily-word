<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Daily Word</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#FAFAF8;color:#0D0D0D;font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
    .c{max-width:400px}
    .icon{font-size:48px;margin-bottom:16px}
    h2{font-family:Georgia,serif;font-size:22px;color:#4A6340;font-weight:400;margin-bottom:16px}
    p{color:#666;line-height:1.6;margin-bottom:24px}
    button{padding:14px 32px;background:#4A6340;color:white;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s}
    button:hover{background:#5a7a3a}
    .v{margin-top:32px;font-family:Georgia,serif;font-style:italic;color:#9A7B2E;font-size:14px;line-height:1.6}
  </style>
</head>
<body>
  <div class="c">
    <div class="icon">&#x1F4F6;</div>
    <h2>You're Offline</h2>
    <p>It looks like you've lost your internet connection. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
    <div class="v">"Be still, and know that I am God."<br>— Psalm 46:10</div>
  </div>
</body>
</html>
