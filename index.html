      <h1>Futures Daily Word</h1>
      <p>Your daily Bible reading companion from Futures Church. Read, listen, and study scripture every day with guided reading plans, audio Bible, and personal notes.</p>
      <p>Features: Daily Bible readings, multiple reading plans, audio playback, personal notes, and more.</p>

    <script>
      // ?reset — nuke everything and reload fresh
      (function(){
        if(location.search.indexOf('reset')===-1) return;
        if('serviceWorker' in navigator){
          navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(s){s.unregister();});});
        }
        if('caches' in window){caches.keys().then(function(k){k.forEach(function(c){caches.delete(c);});});}
        localStorage.clear(); sessionStorage.clear();
        history.replaceState(null,'',location.pathname);
        setTimeout(function(){location.reload(true);},300);
      })();
    </script>
    <script>
      // One-time cache reset — keyed by version. Clears stale app caches only,
      // preserves offline Bible (fdw-bible-v1) and font cache (fdw-fonts-v1).
      (function(){
        var V='v63';
        if(localStorage.getItem('fdw_nuked')===V) return;
        var KEEP=['fdw-bible-v1','fdw-fonts-v1'];
        if('serviceWorker' in navigator){
          navigator.serviceWorker.getRegistrations().then(function(regs){
            regs.forEach(function(r){r.unregister();});
          });
        }
        if('caches' in window){
          caches.keys().then(function(keys){
            keys.forEach(function(k){
              if(KEEP.indexOf(k)===-1) caches.delete(k);
            });
          });
        }
        localStorage.setItem('fdw_nuked',V);
        setTimeout(function(){location.reload(true);},500);
      })();
    </script>
