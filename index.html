<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ===== DATA =====
const QUOTES = [
  {text:"Be not afraid of tomorrow. God is already there.",textEs:"No tengas miedo del mañana. Dios ya está ahí.",textPt:"Não tenha medo do amanhã. Deus já está lá.",author:"Charles Spurgeon"},
  {text:"What comes into our minds when we think about God is the most important thing about us.",textEs:"Lo que viene a nuestra mente cuando pensamos en Dios es lo más importante de nosotros.",textPt:"O que vem à nossa mente quando pensamos em Deus é a coisa mais importante sobre nós.",author:"A.W. Tozer"},
  {text:"Prayer does not change God, but it changes him who prays.",textEs:"La oración no cambia a Dios, pero cambia al que ora.",textPt:"A oração não muda a Deus, mas transforma aquele que ora.",author:"S\u00f8ren Kierkegaard"},
  {text:"Faith is taking the first step even when you don't see the whole staircase.",textEs:"La fe es dar el primer paso aun cuando no ves toda la escalera.",textPt:"A fé é dar o primeiro passo mesmo quando você não consegue ver toda a escadaria.",author:"Martin Luther King Jr."},
  {text:"God does not give us everything we want, but He does fulfill His promises.",textEs:"Dios no nos da todo lo que queremos, pero sí cumple Sus promesas.",textPt:"Deus não nos dá tudo o que queremos, mas Ele cumpre as Suas promessas.",author:"Dietrich Bonhoeffer"},
  {text:"The Bible is alive, it speaks to me; it has feet, it runs after me.",textEs:"La Biblia está viva, me habla; tiene pies, corre tras de mí.",textPt:"A Bíblia é viva, ela fala comigo; ela tem pés, ela corre atrás de mim.",author:"Martin Luther"},
  {text:"God never said the journey would be easy, but He did say the arrival would be worthwhile.",textEs:"Dios nunca dijo que el camino sería fácil, pero sí dijo que la llegada valdría la pena.",textPt:"Deus nunca disse que a jornada seria fácil, mas Ele prometeu que a chegada valeria a pena.",author:"Max Lucado"},
  {text:"Where God guides, He provides.",textEs:"Donde Dios guía, Él provee.",textPt:"Onde Deus guia, Ele provê.",author:"Frank Buchman"},
  {text:"God loves each of us as if there were only one of us.",textEs:"Dios ama a cada uno de nosotros como si solo existiera uno de nosotros.",textPt:"Deus ama cada um de nós como se fôssemos únicos no mundo.",author:"Augustine of Hippo"},
  {text:"He is no fool who gives what he cannot keep to gain what he cannot lose.",textEs:"No es necio el que da lo que no puede retener para ganar lo que no puede perder.",textPt:"Não é tolo aquele que entrega o que não pode conservar para conquistar o que não pode perder.",author:"Jim Elliot"},
  {text:"God will meet you where you are in order to take you where He wants you to go.",textEs:"Dios te encontrará donde estés para llevarte a donde Él quiere que vayas.",textPt:"Deus encontrará você onde você está para te levar aonde Ele quer que você vá.",author:"Tony Evans"},
  {text:"You can give without loving, but you cannot love without giving.",textEs:"Puedes dar sin amar, pero no puedes amar sin dar.",textPt:"Você pode dar sem amar, mas não pode amar sem dar.",author:"Amy Carmichael"},
  {text:"Let God transform you into a new person by changing the way you think.",textEs:"Deja que Dios te transforme en una nueva persona cambiando tu manera de pensar.",textPt:"Deixe Deus te transformar em uma nova pessoa, mudando sua forma de pensar.",author:"Billy Graham"},
  {text:"Worry does not empty tomorrow of its sorrow, it empties today of its strength.",textEs:"La preocupación no vacía el mañana de su tristeza, vacía el hoy de su fuerza.",textPt:"A preocupação não esvazia o amanhã de suas tristezas, ela esvazia o hoje de sua força.",author:"Corrie ten Boom"},
  {text:"The will of God will not take us where the grace of God cannot sustain us.",textEs:"La voluntad de Dios no nos llevará donde la gracia de Dios no pueda sostenernos.",textPt:"A vontade de Deus não nos levará onde a graça de Deus não pode nos sustentar.",author:"Billy Graham"},
  {text:"True faith means holding nothing back. It means putting every hope in God's fidelity to His promises.",textEs:"La verdadera fe significa no retener nada. Significa poner toda esperanza en la fidelidad de Dios a Sus promesas.",textPt:"A verdadeira fé significa não guardar nada para si. Significa depositar toda esperança na fidelidade de Deus às Suas promessas.",author:"Francis Chan"},
  {text:"We are not cisterns made for hoarding; we are channels made for sharing.",textEs:"No somos cisternas hechas para acumular; somos canales hechos para compartir.",textPt:"Não somos cisternas feitas para acumular; somos canais feitos para compartilhar.",author:"Billy Graham"},
  {text:"When you go through a trial, the sovereignty of God is the pillow upon which you lay your head.",textEs:"Cuando pasas por una prueba, la soberanía de Dios es la almohada sobre la que apoyas tu cabeza.",textPt:"Quando você passa por uma provação, a soberania de Deus é o travesseiro sobre o qual você repousa sua cabeça.",author:"Charles Spurgeon"},
  {text:"Discontent dries up the soul; gratitude waters it.",textEs:"El descontento seca el alma; la gratitud la riega.",textPt:"O descontentamento resseca a alma; a gratidão a rega.",author:"John Piper"},
  {text:"If you look at the world, you'll be distressed. If you look within, you'll be depressed. If you look at God, you'll be at rest.",textEs:"Si miras al mundo, estarás angustiado. Si miras dentro de ti, estarás deprimido. Si miras a Dios, estarás en paz.",textPt:"Se você olhar para o mundo, ficará angustiado. Se olhar para dentro de si, ficará deprimido. Se olhar para Deus, encontrará descanso.",author:"Corrie ten Boom"},
  {text:"God is most glorified in us when we are most satisfied in Him.",textEs:"Dios es más glorificado en nosotros cuando estamos más satisfechos en Él.",textPt:"Deus é mais glorificado em nós quando encontramos nossa maior satisfação nEle.",author:"John Piper"},
  {text:"Never be afraid to trust an unknown future to a known God.",textEs:"Nunca tengas miedo de confiar un futuro desconocido a un Dios conocido.",textPt:"Nunca tenha medo de confiar um futuro incerto a um Deus conhecido.",author:"Corrie ten Boom"},
  {text:"There are far, far better things ahead than any we leave behind.",textEs:"Hay cosas mucho, mucho mejores adelante que cualquiera que dejemos atrás.",textPt:"Há coisas muito, muito melhores pela frente do que qualquer coisa que deixamos para trás.",author:"C.S. Lewis"},
  {text:"You don't have to be great to start, but you have to start to be great.",textEs:"No tienes que ser grande para empezar, pero tienes que empezar para ser grande.",textPt:"Você não precisa ser grandioso para começar, mas precisa começar para se tornar grandioso.",author:"Rick Warren"},
  {text:"The measure of a life is not its duration but its donation.",textEs:"La medida de una vida no es su duración sino su donación.",textPt:"A medida de uma vida não está em sua duração, mas em sua doação.",author:"Peter Marshall"},
  {text:"We can be tired, weary, and emotionally distraught, but after spending time alone with God, we find that He injects into our bodies energy, power, and strength.",textEs:"Podemos estar cansados, agotados y emocionalmente angustiados, pero después de pasar tiempo a solas con Dios, descubrimos que Él inyecta en nuestros cuerpos energía, poder y fuerza.",textPt:"Podemos estar cansados, exaustos e emocionalmente abalados, mas depois de passar um tempo a sós com Deus, descobrimos que Ele injeta em nossos corpos energia, poder e força.",author:"Charles Stanley"},
  {text:"God doesn't call the qualified. He qualifies the called.",textEs:"Dios no llama a los capacitados. Él capacita a los llamados.",textPt:"Deus não chama os capacitados. Ele capacita os chamados.",author:"Mark Batterson"},
  {text:"Relying on God has to begin all over again every day as if nothing had yet been done.",textEs:"Depender de Dios tiene que comenzar de nuevo cada día como si nada se hubiera hecho aún.",textPt:"Confiar em Deus precisa recomeçar a cada novo dia como se nada ainda tivesse sido feito.",author:"C.S. Lewis"},
  {text:"To fall in love with God is the greatest romance; to seek Him the greatest adventure; to find Him the greatest achievement.",textEs:"Enamorarse de Dios es el mayor romance; buscarlo, la mayor aventura; encontrarlo, el mayor logro.",textPt:"Apaixonar-se por Deus é o maior romance; buscá-Lo é a maior aventura; encontrá-Lo é a maior conquista.",author:"Augustine of Hippo"},
  {text:"Nearness to God brings likeness to God. The more you see God the more of God will be seen in you.",textEs:"La cercanía a Dios trae semejanza a Dios. Cuanto más ves a Dios, más de Dios se verá en ti.",textPt:"A proximidade de Deus nos torna semelhantes a Ele. Quanto mais você contempla a Deus, mais de Deus será visto em você.",author:"Charles Spurgeon"},
  {text:"When a train goes through a tunnel and it gets dark, you don't throw away the ticket and jump off. You sit still and trust the engineer.",textEs:"Cuando un tren pasa por un túnel y se oscurece, no tiras el boleto y saltas. Te quedas quieto y confías en el maquinista.",textPt:"Quando um trem passa por um túnel e tudo fica escuro, você não joga fora a passagem e pula do vagão. Você permanece no seu lugar e confia no maquinista.",author:"Corrie ten Boom"},
  {text:"A man who was merely a man and said the sort of things Jesus said would not be a great moral teacher.",textEs:"Un hombre que fuera simplemente un hombre y dijera el tipo de cosas que Jesús dijo no sería un gran maestro moral.",textPt:"Um homem que fosse apenas um homem e dissesse o tipo de coisas que Jesus disse não seria um grande mestre moral.",author:"C.S. Lewis"},
  {text:"The greatest single cause of atheism in the world today is Christians who acknowledge Jesus with their lips and walk out the door and deny Him by their lifestyle.",textEs:"La mayor causa de ateísmo en el mundo hoy son cristianos que reconocen a Jesús con sus labios y salen por la puerta y lo niegan con su estilo de vida.",textPt:"A maior causa do ateísmo no mundo hoje são os cristãos que reconhecem Jesus com os lábios, mas ao sair pela porta O negam através do seu modo de viver.",author:"Brennan Manning"},
  {text:"This life was not intended to be the place of our perfection, but the preparation for it.",textEs:"Esta vida no fue destinada a ser el lugar de nuestra perfección, sino la preparación para ella.",textPt:"Esta vida não foi feita para ser o lugar da nossa perfeição, mas sim a preparação para ela.",author:"Richard Baxter"},
  {text:"Our God is the God of the hills and the valleys. He is the God of mountaintop blessings and the God of deep-valley trials.",textEs:"Nuestro Dios es el Dios de las colinas y los valles. Es el Dios de las bendiciones en la cima y el Dios de las pruebas en el valle profundo.",textPt:"Nosso Deus é o Deus dos montes e dos vales. Ele é o Deus das bênçãos no alto da montanha e o Deus das provações no fundo do vale.",author:"Charles Stanley"},
  {text:"Preach the Gospel at all times. When necessary, use words.",textEs:"Predica el Evangelio en todo momento. Cuando sea necesario, usa palabras.",textPt:"Pregue o Evangelho o tempo todo. Quando necessário, use palavras.",author:"Francis of Assisi"},
  {text:"The Christian does not think God will love us because we are good, but that God will make us good because He loves us.",textEs:"El cristiano no piensa que Dios nos amará porque somos buenos, sino que Dios nos hará buenos porque nos ama.",textPt:"O cristão não pensa que Deus nos amará porque somos bons, mas que Deus nos fará bons porque Ele nos ama.",author:"C.S. Lewis"},
  {text:"Every experience God gives us, every person He puts in our lives, is the perfect preparation for a future only He can see.",textEs:"Cada experiencia que Dios nos da, cada persona que pone en nuestras vidas, es la preparación perfecta para un futuro que solo Él puede ver.",textPt:"Cada experiência que Deus nos dá, cada pessoa que Ele coloca em nossas vidas, é a preparação perfeita para um futuro que só Ele pode enxergar.",author:"Corrie ten Boom"},
  {text:"Humility is not thinking less of yourself, it is thinking of yourself less.",textEs:"La humildad no es pensar menos de ti mismo, es pensar menos en ti mismo.",textPt:"A humildade não é pensar que você vale menos, é pensar menos em si mesmo.",author:"C.S. Lewis"},
  {text:"Has it ever occurred to you that one hundred pianos all tuned to the same fork are automatically tuned to each other?",textEs:"¿Se te ha ocurrido alguna vez que cien pianos afinados con el mismo diapasón están automáticamente afinados entre sí?",textPt:"Já parou para pensar que cem pianos afinados com o mesmo diapasão ficam automaticamente afinados entre si?",author:"A.W. Tozer"},
  {text:"God has not been trying an experiment on my faith or love in order to find out their quality. He knew it already. It was I who didn't.",textEs:"Dios no ha estado experimentando con mi fe o amor para descubrir su calidad. Él ya lo sabía. Era yo quien no.",textPt:"Deus não estava fazendo um experimento com minha fé ou amor para descobrir sua qualidade. Ele já sabia. Quem não sabia era eu.",author:"C.S. Lewis"},
  {text:"The purpose of prayer is not to get man's will done in heaven, but to get God's will done on earth.",textEs:"El propósito de la oración no es que la voluntad del hombre se haga en el cielo, sino que la voluntad de Dios se haga en la tierra.",textPt:"O propósito da oração não é fazer com que a vontade do homem seja feita no céu, mas sim que a vontade de Deus seja feita na terra.",author:"Warren Wiersbe"},
  {text:"Faith does not eliminate questions. But faith knows where to take them.",textEs:"La fe no elimina las preguntas. Pero la fe sabe a dónde llevarlas.",textPt:"A fé não elimina as dúvidas. Mas a fé sabe onde levá-las.",author:"Elisabeth Elliot"},
  {text:"Grace is the voice that calls us to change and then gives us the power to pull it off.",textEs:"La gracia es la voz que nos llama a cambiar y luego nos da el poder para lograrlo.",textPt:"A graça é a voz que nos chama à transformação e depois nos dá o poder para realizá-la.",author:"Max Lucado"},
  {text:"The world behind me, the cross before me, no turning back.",textEs:"El mundo detrás de mí, la cruz delante de mí, sin volver atrás.",textPt:"O mundo às minhas costas, a cruz à minha frente, não há volta.",author:"Watchman Nee"},
  {text:"God is not disillusioned with us. He never had any illusions to begin with.",textEs:"Dios no está desilusionado con nosotros. Nunca tuvo ilusiones para empezar.",textPt:"Deus não está desiludido conosco. Ele nunca teve ilusões desde o princípio.",author:"Luis Palau"},
  {text:"If you want to walk on water, you've got to get out of the boat.",textEs:"Si quieres caminar sobre el agua, tienes que salir de la barca.",textPt:"Se você quer caminhar sobre as águas, precisa sair do barco.",author:"John Ortberg"},
  {text:"Faithfulness is not doing something right once but doing something right over and over.",textEs:"La fidelidad no es hacer algo bien una vez, sino hacer algo bien una y otra vez.",textPt:"A fidelidade não é fazer algo certo uma vez, mas fazer algo certo repetidas vezes.",author:"Joyce Meyer"},
  {text:"You were made by God and for God, and until you understand that, life will never make sense.",textEs:"Fuiste hecho por Dios y para Dios, y hasta que entiendas eso, la vida nunca tendrá sentido.",textPt:"Você foi criado por Deus e para Deus, e enquanto não compreender isso, a vida nunca fará sentido.",author:"Rick Warren"},
  {text:"When we work, we work. When we pray, God works.",textEs:"Cuando trabajamos, trabajamos. Cuando oramos, Dios trabaja.",textPt:"Quando nós trabalhamos, nós trabalhamos. Quando oramos, Deus trabalha.",author:"Hudson Taylor"}
];

// ===== ASHLEY & JANE'S DEVOTIONS OF THE DAY =====
const DEVOTIONS = [
{title:"Rooted in His Presence",titleEs:"Arraigados en Su Presencia",titlePt:"Enraizados em Sua Presença",verse:"Jeremiah 17:7-8",body:"When life pulls you in a thousand directions, remember — you weren't designed to thrive on hustle. You were designed to thrive near the water. A tree planted by the stream doesn't panic in the drought because its roots run deep. Today, let your roots reach further into His presence. Not your performance. Not your plans. His presence.",bodyEs:"Cuando la vida te jala en mil direcciones, recuerda — no fuiste diseñado para prosperar en el ajetreo. Fuiste diseñado para prosperar cerca del agua. Un árbol plantado junto al arroyo no se asusta en la sequía porque sus raíces son profundas. Hoy, deja que tus raíces lleguen más hondo en Su presencia. No tu rendimiento. No tus planes. Su presencia.",bodyPt:"Quando a vida te puxa para mil direções diferentes, lembre-se — você não foi criado para prosperar na correria. Você foi criado para prosperar perto das águas. Uma árvore plantada junto à corrente não entra em pânico na seca porque suas raízes são profundas. Hoje, deixe suas raízes se aprofundarem ainda mais na presença dEle. Não no seu desempenho. Não nos seus planos. Na presença dEle.",author:"Ashley"},
{title:"The God Who Sees You",titleEs:"El Dios Que Te Ve",titlePt:"O Deus Que Te Vê",verse:"Genesis 16:13",body:"Hagar was alone in the desert, cast out and forgotten by everyone — except God. She gave Him a name no one else had: El Roi, the God who sees. If you feel invisible today, hear this: He sees you. Not just your situation, but your heart. You are never hidden from the One who formed you.",bodyEs:"Agar estaba sola en el desierto, rechazada y olvidada por todos — excepto por Dios. Ella le dio un nombre que nadie más le había dado: El Roi, el Dios que ve. Si te sientes invisible hoy, escucha esto: Él te ve. No solo tu situación, sino tu corazón. Nunca estás oculto del que te formó.",bodyPt:"Agar estava sozinha no deserto, rejeitada e esquecida por todos — exceto por Deus. Ela O chamou por um nome que ninguém mais havia usado: El Roi, o Deus que vê. Se você se sente invisível hoje, escute isto: Ele te vê. Não apenas a sua situação, mas o seu coração. Você jamais está escondido dAquele que te formou.",author:"Jane"},
{title:"Strength in the Waiting",titleEs:"Fuerza en la Espera",titlePt:"Força na Espera",verse:"Isaiah 40:31",body:"Waiting isn't weakness — it's warfare. The enemy wants you to believe that nothing is happening. But God is building something in the silence that noise could never produce. Those who wait on the Lord don't just survive — they soar. Keep holding on. Your wings are forming.",bodyEs:"Esperar no es debilidad — es guerra espiritual. El enemigo quiere que creas que nada está pasando. Pero Dios está construyendo algo en el silencio que el ruido jamás podría producir. Los que esperan en el Señor no solo sobreviven — se elevan. Sigue aguantando. Tus alas se están formando.",bodyPt:"Esperar não é fraqueza — é guerra espiritual. O inimigo quer que você acredite que nada está acontecendo. Mas Deus está construindo algo no silêncio que o barulho jamais poderia produzir. Aqueles que esperam no Senhor não apenas sobrevivem — eles voam alto como águias. Continue se agarrando em Deus. Suas asas estão se formando.",author:"Ashley"},
{title:"Let Grace Rewrite the Story",titleEs:"Deja Que la Gracia Reescriba la Historia",titlePt:"Deixe a Graça Reescrever Sua História",verse:"2 Corinthians 5:17",body:"You are not the sum of your worst moments. Grace doesn't just forgive — it rewrites. The old version of you had its chapter, but the Author of your life has turned the page. Walk into today knowing that the new creation isn't coming — it's already here.",bodyEs:"No eres la suma de tus peores momentos. La gracia no solo perdona — reescribe. La versión antigua de ti tuvo su capítulo, pero el Autor de tu vida ya pasó la página. Camina hoy sabiendo que la nueva creación no viene — ya está aquí.",bodyPt:"Você não é a soma dos seus piores momentos. A graça não apenas perdoa — ela reescreve tudo. A versão antiga de você teve o seu capítulo, mas o Autor da sua vida já virou a página. Entre neste dia sabendo que a nova criação não está chegando — ela já está aqui.",author:"Jane"},
{title:"Don't Despise the Small Things",titleEs:"No Desprecies lo Pequeño",titlePt:"Não Despreze as Pequenas Coisas",verse:"Zechariah 4:10",body:"We live in a culture that celebrates the big and the loud. But God has always been in the business of small beginnings — a shepherd boy, a borrowed manger, five loaves and two fish. Don't look down on what feels small in your life right now. In God's hands, small is just the starting line.",bodyEs:"Vivimos en una cultura que celebra lo grande y lo ruidoso. Pero Dios siempre ha estado en el negocio de los comienzos pequeños — un pastorcito, un pesebre prestado, cinco panes y dos peces. No menosprecies lo que se siente pequeño en tu vida ahora. En las manos de Dios, lo pequeño es solo la línea de salida.",bodyPt:"Vivemos numa cultura que celebra o grande e o barulhento. Mas Deus sempre trabalhou através de pequenos começos — um garoto pastor, uma manjedoura emprestada, cinco pães e dois peixes. Não despreze aquilo que parece pequeno na sua vida agora. Nas mãos de Deus, o pequeno é apenas a linha de largada.",author:"Ashley"},
{title:"Peace That Doesn't Make Sense",titleEs:"Paz Que No Tiene Sentido",titlePt:"Paz Que Não Tem Explicação",verse:"Philippians 4:7",body:"This peace isn't logical. It doesn't add up on paper. It guards your heart when the numbers don't work, when the diagnosis is heavy, when the future is unclear. That's the whole point — it surpasses understanding. Stop trying to figure out peace and start receiving it. He's offering it right now.",bodyEs:"Esta paz no es lógica. No cuadra en el papel. Guarda tu corazón cuando los números no funcionan, cuando el diagnóstico es pesado, cuando el futuro es incierto. Ese es el punto — sobrepasa el entendimiento. Deja de tratar de entender la paz y empieza a recibirla. Él la está ofreciendo ahora mismo.",bodyPt:"Esta paz não é lógica. Ela não faz sentido no papel. Ela guarda o seu coração quando as contas não fecham, quando o diagnóstico é pesado, quando o futuro é incerto. É exatamente isso - ela excede todo entendimento. Pare de tentar entender a paz e comece a recebê-la. Ele está oferecendo ela agora mesmo.",author:"Jane"},
{title:"You Were Made for More",titleEs:"Fuiste Hecho Para Más",titlePt:"Você Foi Criado para Mais",verse:"Ephesians 2:10",body:"You aren't an accident. You aren't Plan B. You are God's masterpiece — handcrafted, intentionally designed, and placed in this exact moment for a reason. The world will try to mass-produce you. God already made you one of a kind. Walk in that today.",bodyEs:"No eres un accidente. No eres un Plan B. Eres la obra maestra de Dios — hecho a mano, diseñado intencionalmente y colocado en este momento exacto por una razón. El mundo intentará producirte en serie. Dios ya te hizo único. Camina en eso hoy.",bodyPt:"Você não é um acidente. Você não é o plano B. Você é a obra-prima de Deus — criado com as próprias mãos, intencionalmente projetado e colocado neste momento exato por um propósito. O mundo vai tentar te padronizar. Mas Deus já te fez único. Caminhe nessa verdade hoje.",author:"Ashley"},
{title:"When the Night Feels Long",titleEs:"Cuando la Noche Se Siente Larga",titlePt:"Quando a Noite Parece Não Ter Fim",verse:"Psalm 30:5",body:"Weeping may stay for the night, but joy — real, unshakeable, morning-light joy — is on its way. The darkness doesn't get the final word. It never has. If tonight feels heavy, hold on. Morning is closer than you think, and God is already preparing your breakthrough.",bodyEs:"El llanto puede durar toda la noche, pero el gozo — real, inquebrantable, gozo de amanecer — está en camino. La oscuridad no tiene la última palabra. Nunca la ha tenido. Si esta noche se siente pesada, aguanta. La mañana está más cerca de lo que piensas, y Dios ya está preparando tu avance.",bodyPt:"O choro pode durar a noite toda, mas a alegria — uma alegria verdadeira, inabalável, brilhante como a luz da manhã — está a caminho. As trevas não têm a palavra final. Nunca tiveram. Se esta noite parece pesada demais, resista. A manhã está mais perto do que você imagina, e Deus já está preparando o seu milagre.",author:"Jane"},
{title:"Courage Over Comfort",titleEs:"Valentía Sobre Comodidad",titlePt:"Coragem em Vez de Comodidade",verse:"Joshua 1:9",body:"Comfort zones are beautiful places, but nothing grows there. God didn't call you to play it safe — He called you to be strong and courageous. Not because you have it all figured out, but because He goes with you. Wherever today takes you, take courage. He's already there.",bodyEs:"Las zonas de confort son lugares hermosos, pero nada crece ahí. Dios no te llamó a jugar a lo seguro — te llamó a ser fuerte y valiente. No porque lo tengas todo resuelto, sino porque Él va contigo. A donde te lleve el día de hoy, ten valor. Él ya está ahí.",bodyPt:"Zonas de conforto são lugares lindos, mas nada cresce ali. Deus não te chamou para viver na segurança — Ele te chamou para ser forte e corajoso. Não porque você tem tudo sob controle, mas porque Ele caminha contigo. Para onde quer que este dia te leve, tenha coragem. Ele já está lá te esperando.",author:"Ashley"},
{title:"The Anchor Holds",titleEs:"El Ancla Sostiene",titlePt:"A Âncora Permanece Firme",verse:"Hebrews 6:19",body:"Waves will come. The wind will howl. Life will shake things you thought were steady. But your hope is not tied to circumstances — it's anchored to the throne room of heaven. When everything around you shifts, the anchor holds. It always holds. Rest in that today.",bodyEs:"Las olas vendrán. El viento rugirá. La vida sacudirá cosas que creías firmes. Pero tu esperanza no está atada a las circunstancias — está anclada al salón del trono del cielo. Cuando todo a tu alrededor cambie, el ancla sostiene. Siempre sostiene. Descansa en eso hoy.",bodyPt:"As ondas vão chegar. O vento vai rugir. A vida vai abalar aquilo que você pensava estar firme. Mas a sua esperança não está amarrada às circunstâncias — ela está ancorada no trono celestial. Quando tudo ao seu redor balança, a âncora se mantém firme. Ela sempre se mantém firme. Descanse nessa verdade hoje.",author:"Jane"},
{title:"His Mercy Is New Today",titleEs:"Su Misericordia Es Nueva Hoy",titlePt:"Sua Misericórdia Se Renova Hoje",verse:"Lamentations 3:22-23",body:"Yesterday's failures don't carry over. Yesterday's shame has no receipt. Every single morning, God slides a brand-new portion of mercy across the table — no questions asked. You don't have to earn it. You just have to receive it. So breathe deep. His mercy showed up before your alarm did.",bodyEs:"Los fracasos de ayer no se transfieren. La vergüenza de ayer no tiene recibo. Cada mañana, Dios desliza una porción nueva de misericordia sobre la mesa — sin preguntas. No tienes que ganártela. Solo tienes que recibirla. Así que respira profundo. Su misericordia llegó antes que tu alarma.",bodyPt:"Os fracassos de ontem não se acumulam. A vergonha de ontem não tem cobrança. Toda manhã, Deus desliza uma porção fresquinha de misericórdia sobre a mesa — sem fazer perguntas. Você não precisa merecer. Só precisa receber. Então respire fundo. A misericórdia d'Ele chegou antes mesmo do seu despertador tocar.",author:"Ashley"},
{title:"Surrender Isn't Losing",titleEs:"Rendirse No Es Perder",titlePt:"Render-se Não É Perder",verse:"Proverbs 3:5-6",body:"We grip so tightly to our plans, our timelines, our expectations. But surrender isn't giving up — it's giving over. When you release control to the One who sees every twist and turn ahead, you're not losing direction. You're finally finding it.",bodyEs:"Nos aferramos tan fuerte a nuestros planes, nuestros tiempos, nuestras expectativas. Pero rendirse no es darse por vencido — es entregar. Cuando sueltas el control al que ve cada giro y vuelta por delante, no estás perdiendo dirección. Finalmente la estás encontrando.",bodyPt:"Nos agarramos tão firmemente aos nossos planos, aos nossos prazos, às nossas expectativas. Mas render-se não é desistir — é entregar. Quando você entrega o controle àquele que enxerga cada curva e cada desvio à frente, você não está perdendo a direção. Você finalmente está encontrando-a.",author:"Jane"},
{title:"Built for the Battle",titleEs:"Construido Para la Batalla",titlePt:"Criado para a Batalha",verse:"Ephesians 6:10-11",body:"The armour of God isn't decorative — it's designed for real war. There's a reason Paul didn't say 'if the battle comes.' He said stand. Stand firm. The enemy may be strategic, but you are equipped. Suit up today. You're not fighting for victory — you're fighting from it.",bodyEs:"La armadura de Dios no es decorativa — está diseñada para guerra real. Hay una razón por la que Pablo no dijo 'si viene la batalla'. Dijo permanece. Permanece firme. El enemigo puede ser estratégico, pero tú estás equipado. Prepárate hoy. No estás peleando por la victoria — estás peleando desde ella.",bodyPt:"A armadura de Deus não é decorativa — ela foi projetada para a guerra real. Há uma razão pela qual Paulo não disse 'se a batalha vier.' Ele disse permaneça firme. Mantenha-se de pé. O inimigo pode ser estratégico, mas você está equipado. Vista sua armadura hoje. Você não está lutando pela vitória — você está lutando a partir dela.",author:"Ashley"},
{title:"The Father's Voice",titleEs:"La Voz del Padre",titlePt:"A Voz do Pai",verse:"John 10:27",body:"In a world of a million voices — social media, opinions, fear, comparison — His sheep know His voice. Not the loudest voice. Not the most popular voice. His voice. The one that calls you by name, leads you beside still waters, and whispers 'you are Mine.' Tune in today.",bodyEs:"En un mundo de un millón de voces — redes sociales, opiniones, miedo, comparación — Sus ovejas conocen Su voz. No la voz más fuerte. No la más popular. Su voz. La que te llama por nombre, te guía junto a aguas tranquilas y susurra 'eres Mío'. Sintoniza hoy.",bodyPt:"Num mundo de milhões de vozes — redes sociais, opiniões, medo, comparações — as Suas ovelhas conhecem a Sua voz. Não a voz mais alta. Não a voz mais popular. A voz d'Ele. Aquela que te chama pelo nome, te conduz às águas tranquilas e sussurra 'você é Meu'. Sintonize-se hoje.",author:"Jane"},
{title:"Planted, Not Buried",titleEs:"Plantado, No Enterrado",titlePt:"Plantado, Não Enterrado",verse:"John 12:24",body:"Sometimes it feels like you've been buried — buried in grief, in confusion, in a season that makes no sense. But seeds get buried too. And what looks like an ending is actually the Christ-like pattern: death to self, then resurrection life. You're not buried. You're planted.",bodyEs:"A veces se siente como si te hubieran enterrado — enterrado en dolor, en confusión, en una temporada que no tiene sentido. Pero las semillas también se entierran. Y lo que parece un final es en realidad el patrón de Cristo: muerte a uno mismo, luego vida de resurrección. No estás enterrado. Estás plantado.",bodyPt:"Às vezes parece que você foi enterrado — enterrado na dor, na confusão, numa temporada que não faz sentido algum. Mas as sementes também são enterradas. E o que parece um fim na verdade é o padrão de Cristo: morte para o eu, depois vida de ressurreição. Você não foi enterrado. Você foi plantado.",author:"Ashley"},
{title:"Rest Is Not a Reward",titleEs:"El Descanso No Es un Premio",titlePt:"Descanso Não É Uma Recompensa",verse:"Matthew 11:28-30",body:"You don't have to earn rest. Jesus didn't say 'come to Me after you've got it all sorted.' He said come. Weary and burdened — come. Overwhelmed and running on empty — come. Rest isn't the prize for finishing. It's the gift for trusting.",bodyEs:"No tienes que ganarte el descanso. Jesús no dijo 'ven a Mí después de que lo tengas todo resuelto'. Dijo ven. Cansado y cargado — ven. Abrumado y sin fuerzas — ven. El descanso no es el premio por terminar. Es el regalo por confiar.",bodyPt:"Você não precisa merecer descanso. Jesus não disse 'venha a Mim depois que você resolver tudo'. Ele disse venha. Cansado e sobrecarregado — venha. Esgotado e sem forças — venha. O descanso não é o prêmio por terminar. É o presente por confiar.",author:"Jane"},
{title:"God's Timing Is Undefeated",titleEs:"El Tiempo de Dios Es Invicto",titlePt:"O Tempo de Deus é Invencível",verse:"Ecclesiastes 3:11",body:"He makes everything beautiful in its time. Not your time. Not their time. His time. The delay isn't a denial. The wait isn't a waste. He's working with a precision that your calendar can't contain. Trust the timing of the One who holds time itself.",bodyEs:"Él hace todo hermoso en su tiempo. No tu tiempo. No el de ellos. Su tiempo. La demora no es una negación. La espera no es desperdicio. Él está trabajando con una precisión que tu calendario no puede contener. Confía en el tiempo del que sostiene el tiempo mismo.",bodyPt:"Ele faz todas as coisas belas no tempo dEle. Não no seu tempo. Não no tempo dos outros. No tempo dEle. A demora não é uma negativa. A espera não é desperdício. Ele está trabalhando com uma precisão que a sua agenda não consegue conter. Confie no tempo dAquele que tem o tempo todo em Suas mãos.",author:"Ashley"},
{title:"Known and Loved",titleEs:"Conocido y Amado",titlePt:"Conhecido e Amado",verse:"Psalm 139:1-4",body:"He knows when you sit and when you rise. He knows the words before they leave your lips. He knows the hidden doubts, the secret fears, the midnight prayers you've never told a soul. And knowing all of that — He loves you completely. Not in spite of who you are, but as who you are.",bodyEs:"Él sabe cuándo te sientas y cuándo te levantas. Conoce las palabras antes de que salgan de tus labios. Conoce las dudas escondidas, los miedos secretos, las oraciones de medianoche que nunca le has contado a nadie. Y sabiendo todo eso — te ama completamente. No a pesar de quién eres, sino como quien eres.",bodyPt:"Ele sabe quando você se senta e quando se levanta. Ele conhece suas palavras antes mesmo delas saírem dos seus lábios. Ele conhece as dúvidas escondidas, os medos secretos, as orações da madrugada que você nunca contou para ninguém. E sabendo de tudo isso — Ele te ama completamente. Não apesar de quem você é, mas exatamente por quem você é.",author:"Jane"},
{title:"Joy Is a Weapon",titleEs:"El Gozo Es un Arma",titlePt:"Alegria É Uma Arma",verse:"Nehemiah 8:10",body:"The joy of the Lord isn't a feeling — it's a force. It's the strength that shows up when everything says you should be falling apart. The enemy hates your praise because it proves his lies didn't land. Choose joy today. Not because life is perfect, but because your God is.",bodyEs:"El gozo del Señor no es un sentimiento — es una fuerza. Es la fortaleza que aparece cuando todo dice que deberías estar derrumbándote. El enemigo odia tu alabanza porque prueba que sus mentiras no aterrizaron. Elige el gozo hoy. No porque la vida sea perfecta, sino porque tu Dios lo es.",bodyPt:"A alegria do Senhor não é um sentimento — é uma força! É a força que se manifesta quando tudo diz que você deveria estar desmoronando. O inimigo odeia o seu louvor porque isso prova que as mentiras dele não conseguiram te atingir. Escolha a alegria hoje. Não porque a vida está perfeita, mas porque o seu Deus é perfeito.",author:"Ashley"},
{title:"He Finishes What He Starts",titleEs:"Él Termina Lo Que Empieza",titlePt:"Ele Completa o Que Começa",verse:"Philippians 1:6",body:"The One who began a good work in you is not the type to leave things half-done. He doesn't abandon projects. He doesn't lose interest. What He started in your life, He will bring to completion. You are a work in progress — and the Artist never puts the brush down.",bodyEs:"El que comenzó la buena obra en ti no es del tipo que deja las cosas a medias. No abandona proyectos. No pierde interés. Lo que comenzó en tu vida, lo llevará hasta completarlo. Eres una obra en progreso — y el Artista nunca suelta el pincel.",bodyPt:"Aquele que começou uma boa obra em você não é do tipo que deixa as coisas pela metade. Ele não abandona projetos. Ele não perde o interesse. O que Ele iniciou na sua vida, Ele levará até o fim. Você é uma obra em andamento — e o Artista nunca larga o pincel.",author:"Jane"},
{title:"Walking on Water Requires Leaving the Boat",titleEs:"Caminar Sobre el Agua Requiere Dejar la Barca",titlePt:"Caminhar Sobre as Águas Exige Sair do Barco",verse:"Matthew 14:29",body:"Peter didn't walk on water by playing it safe. He walked on water by stepping out when everything in him screamed to stay put. Faith isn't the absence of fear — it's moving despite it. What's the boat you need to step out of today? He's calling you onto the waves.",bodyEs:"Pedro no caminó sobre el agua jugando a lo seguro. Caminó sobre el agua dando un paso cuando todo en él gritaba que se quedara quieto. La fe no es la ausencia de miedo — es moverse a pesar de él. ¿Cuál es la barca de la que necesitas salir hoy? Él te está llamando a las olas.",bodyPt:"Pedro não caminhou sobre as águas ficando na zona de conforto. Ele caminhou sobre as águas saindo do barco quando tudo dentro dele gritava para ficar parado. Fé não é a ausência do medo — é se mover apesar dele. Qual é o barco que você precisa deixar hoje? Ele está te chamando para as ondas.",author:"Ashley"},
{title:"Grace Upon Grace",titleEs:"Gracia Sobre Gracia",titlePt:"Graça Sobre Graça",verse:"John 1:16",body:"It's not a single helping. It's not a one-time deal. From His fullness, we have all received grace upon grace — wave after wave, layer after layer, morning after morning. You'll never out-sin His grace. You'll never exhaust His supply. Lean into it today with everything you've got.",bodyEs:"No es una sola porción. No es algo de una vez. De Su plenitud, todos hemos recibido gracia sobre gracia — ola tras ola, capa tras capa, mañana tras mañana. Nunca superarás Su gracia con tu pecado. Nunca agotarás Su provisión. Apóyate en ella hoy con todo lo que tienes.",bodyPt:"Não é uma porção única. Não é algo que acontece uma vez só. Da Sua plenitude, todos nós recebemos graça sobre graça — onda após onda, camada sobre camada, manhã após manhã. Você nunca vai pecar mais do que a graça dEle pode cobrir. Você nunca vai esgotar o suprimento dEle. Mergulhe nisso hoje com tudo o que você tem.",author:"Jane"},
{title:"A Table in the Wilderness",titleEs:"Una Mesa en el Desierto",titlePt:"Uma Mesa no Deserto",verse:"Psalm 78:19",body:"Can God set a table in the wilderness? The answer is yes — He always has. In every barren season, every empty place, every moment where provision seemed impossible, God laid out a feast. Your wilderness isn't where God is absent. It's where He reveals Himself as Provider.",bodyEs:"¿Puede Dios poner una mesa en el desierto? La respuesta es sí — siempre lo ha hecho. En cada temporada árida, cada lugar vacío, cada momento donde la provisión parecía imposible, Dios preparó un banquete. Tu desierto no es donde Dios está ausente. Es donde se revela como Proveedor.",bodyPt:"Pode Deus preparar uma mesa no deserto? A resposta é sim — Ele sempre pode. Em cada estação árida, cada lugar vazio, cada momento onde a provisão parecia impossível, Deus preparou um banquete. Seu deserto não é onde Deus está ausente. É onde Ele se revela como o seu Provedor.",author:"Ashley"},
{title:"The Still, Small Voice",titleEs:"La Voz Apacible y Delicada",titlePt:"A Voz Suave e Serena",verse:"1 Kings 19:12",body:"God wasn't in the earthquake. He wasn't in the fire. He wasn't in the wind. He was in the whisper. If you're straining to hear Him in the chaos, try getting quiet. He speaks loudest in the stillness. And what He has to say is worth more than any noise the world can offer.",bodyEs:"Dios no estaba en el terremoto. No estaba en el fuego. No estaba en el viento. Estaba en el susurro. Si te esfuerzas por escucharlo en el caos, intenta quedarte en silencio. Él habla más fuerte en la quietud. Y lo que tiene que decir vale más que cualquier ruido que el mundo pueda ofrecer.",bodyPt:"Deus não estava no terremoto. Ele não estava no fogo. Ele não estava no vento. Ele estava no sussurro. Se você está se esforçando para ouvi-Lo no meio do caos, tente ficar quieto. Ele fala mais alto no silêncio. E o que Ele tem a dizer vale mais do que qualquer barulho que este mundo pode oferecer.",author:"Jane"},
{title:"Identity Before Activity",titleEs:"Identidad Antes Que Actividad",titlePt:"Identidade Antes da Ação",verse:"Ephesians 1:4-5",body:"Before you did a single thing — before your first breath, your first prayer, your first good deed — He chose you. He adopted you. He called you His own. Your identity was settled before your activity ever began. Stop trying to do enough to become who you already are.",bodyEs:"Antes de que hicieras una sola cosa — antes de tu primer respiro, tu primera oración, tu primera buena obra — Él te eligió. Te adoptó. Te llamó suyo. Tu identidad fue establecida antes de que tu actividad comenzara. Deja de intentar hacer lo suficiente para convertirte en quien ya eres.",bodyPt:"Antes de você fazer qualquer coisa — antes do seu primeiro suspiro, da sua primeira oração, da sua primeira boa ação — Ele te escolheu. Ele te adotou. Ele te chamou de Seu. Sua identidade foi estabelecida antes mesmo de você começar a agir. Pare de tentar fazer o suficiente para se tornar quem você já é.",author:"Ashley"},
{title:"The Word That Stands Forever",titleEs:"La Palabra Que Permanece Para Siempre",titlePt:"A Palavra Que Permanece Para Sempre",verse:"Isaiah 40:8",body:"Headlines shift. Opinions change. Trends rise and fall. But the Word of God stands forever. In a world that rebrands truth every season, anchor yourself to the one thing that never moves. Open it today — not as a textbook, but as a love letter from the One who knows your name.",bodyEs:"Los titulares cambian. Las opiniones cambian. Las tendencias suben y bajan. Pero la Palabra de Dios permanece para siempre. En un mundo que reinventa la verdad cada temporada, ancla tu vida a lo único que nunca se mueve. Ábrela hoy — no como un libro de texto, sino como una carta de amor del que sabe tu nombre.",bodyPt:"As manchetes mudam. As opiniões se transformam. As tendências sobem e descem. Mas a Palavra de Deus permanece para sempre. Num mundo que reinventa a verdade a cada estação, ancore-se naquilo que nunca se move. Abra-a hoje — não como um livro didático, mas como uma carta de amor Daquele que conhece o seu nome.",author:"Jane"},
{title:"Faith Over Fear",titleEs:"Fe Sobre Miedo",titlePt:"Fé Acima do Medo",verse:"2 Timothy 1:7",body:"Fear is loud, but it's a liar. God didn't hand you a spirit of timidity — He gave you power, love, and a sound mind. The next time fear knocks at your door, let faith answer. You were not created to cower. You were created to conquer — through Him who loves you.",bodyEs:"El miedo es ruidoso, pero es un mentiroso. Dios no te dio un espíritu de timidez — te dio poder, amor y dominio propio. La próxima vez que el miedo toque tu puerta, deja que la fe responda. No fuiste creado para acobardarte. Fuiste creado para vencer — a través del que te ama.",bodyPt:"O medo faz muito barulho, mas é mentiroso. Deus não te deu um espírito de covardia — Ele te deu poder, amor e mente sã. Na próxima vez que o medo bater à sua porta, deixe a fé abrir. Você não foi criado para se acovardar. Você foi criado para vencer — através dAquele que te ama.",author:"Ashley"},
{title:"Rivers in the Desert",titleEs:"Ríos en el Desierto",titlePt:"Rios no Deserto",verse:"Isaiah 43:19",body:"God doesn't just work within your circumstances — He works against the impossible. He carves rivers through deserts. He makes roads through oceans. Whatever feels dry, dead, or done in your life, listen closely: He's doing a new thing. Do you perceive it? Open your eyes. It's already springing up.",bodyEs:"Dios no solo trabaja dentro de tus circunstancias — trabaja contra lo imposible. Talla ríos en los desiertos. Hace caminos en los océanos. Lo que se sienta seco, muerto o terminado en tu vida, escucha bien: Él está haciendo algo nuevo. ¿Lo percibes? Abre tus ojos. Ya está brotando.",bodyPt:"Deus não trabalha apenas dentro das suas circunstâncias — Ele trabalha contra o impossível! Ele abre rios no meio do deserto. Ele faz caminhos através dos oceanos. Seja lá o que pareça seco, morto ou acabado na sua vida, escute bem de perto: Ele está fazendo algo novo! Você consegue perceber? Abra os seus olhos. Já está brotando!",author:"Jane"},
{title:"United in Purpose",titleEs:"Unidos en Propósito",titlePt:"Unidos em Propósito",verse:"Ecclesiastes 4:9-10",body:"Two are better than one — not just in marriage, but in mission, in ministry, in the everyday grind of following Jesus. We were never meant to walk this road alone. Find your people. Lock arms. Lift each other up. The journey is sweeter and the load is lighter when you walk it together.",bodyEs:"Dos son mejor que uno — no solo en el matrimonio, sino en la misión, en el ministerio, en el día a día de seguir a Jesús. Nunca fuimos diseñados para caminar solos. Encuentra a tu gente. Únete a ellos. Levántense mutuamente. El camino es más dulce y la carga más ligera cuando lo caminan juntos.",bodyPt:"Dois são melhores que um — não apenas no casamento, mas na missão, no ministério, na caminhada diária de seguir Jesus. Nunca fomos criados para trilhar esse caminho sozinhos. Encontre suas pessoas. Unam os braços. Levantem uns aos outros. A jornada é mais doce e o fardo é mais leve quando vocês caminham juntos.",author:"Ashley & Jane"}
];

// Parse any passage name like "Genesis 1", "1 Corinthians 13", "Song of Solomon 4" into {book, ch}
const parsePassage=(pName)=>{
  const m=pName.match(/^(.+?)\s+(\d+)$/);
  if(!m)return null;
  return{book:m[1],ch:parseInt(m[2],10)};
};

"Psalms 23":{book:"Psalms",ch:23,verses:["The Lord is my shepherd; I shall not want.","He maketh me to lie down in green pastures: he leadeth me beside the still waters.","He restoreth my soul: he leadeth me in the paths of righteousness for his name's sake.","Yea, though I walk through the valley of the shadow of death, I will fear no evil: for thou art with me; thy rod and thy staff they comfort me.","Thou preparest a table before me in the presence of mine enemies: thou anointest my head with oil; my cup runneth over.","Surely goodness and mercy shall follow me all the days of my life: and I will dwell in the house of the Lord for ever."]},
"Psalms 91":{book:"Psalms",ch:91,verses:["He that dwelleth in the secret place of the most High shall abide under the shadow of the Almighty.","I will say of the Lord, He is my refuge and my fortress: my God; in him will I trust.","Surely he shall deliver thee from the snare of the fowler, and from the noisome pestilence.","He shall cover thee with his feathers, and under his wings shalt thou trust: his truth shall be thy shield and buckler.","Thou shalt not be afraid for the terror by night; nor for the arrow that flieth by day;","Nor for the pestilence that walketh in darkness; nor for the destruction that wasteth at noonday.","A thousand shall fall at thy side, and ten thousand at thy right hand; but it shall not come nigh thee.","Only with thine eyes shalt thou behold and see the reward of the wicked.","Because thou hast made the Lord, which is my refuge, even the most High, thy habitation;","There shall no evil befall thee, neither shall any plague come nigh thy dwelling.","For he shall give his angels charge over thee, to keep thee in all thy ways.","They shall bear thee up in their hands, lest thou dash thy foot against a stone.","Thou shalt tread upon the lion and adder: the young lion and the dragon shalt thou trample under feet.","Because he hath set his love upon me, therefore will I deliver him: I will set him on high, because he hath known my name.","He shall call upon me, and I will answer him: I will be with him in trouble; I will deliver him, and honour him.","With long life will I satisfy him, and shew him my salvation."]},
"Psalms 119":{book:"Psalms",ch:119,verses:["Blessed are the undefiled in the way, who walk in the law of the Lord.","Blessed are they that keep his testimonies, and that seek him with the whole heart.","They also do no iniquity: they walk in his ways.","Thou hast commanded us to keep thy precepts diligently.","O that my ways were directed to keep thy statutes!","Then shall I not be ashamed, when I have respect unto all thy commandments.","I will praise thee with uprightness of heart, when I shall have learned thy righteous judgments.","I will keep thy statutes: O forsake me not utterly.","Wherewithal shall a young man cleanse his way? by taking heed thereto according to thy word.","With my whole heart have I sought thee: O let me not wander from thy commandments.","Thy word have I hid in mine heart, that I might not sin against thee.","Blessed art thou, O Lord: teach me thy statutes.","With my lips have I declared all the judgments of thy mouth.","I have rejoiced in the way of thy testimonies, as much as in all riches.","I will meditate in thy precepts, and have respect unto thy ways.","I will delight myself in thy statutes: I will not forget thy word.","Deal bountifully with thy servant, that I may live, and keep thy word.","Open thou mine eyes, that I may behold wondrous things out of thy law.","I am a stranger in the earth: hide not thy commandments from me.","My soul breaketh for the longing that it hath unto thy judgments at all times.","Thou hast rebuked the proud that are cursed, which do err from thy commandments.","Remove from me reproach and contempt; for I have kept thy testimonies.","Princes also did sit and speak against me: but thy servant did meditate in thy statutes.","Thy testimonies also are my delight and my counsellors.","My soul cleaveth unto the dust: quicken thou me according to thy word.","I have declared my ways, and thou heardest me: teach me thy statutes.","Make me to understand the way of thy precepts: so shall I talk of thy wondrous works.","My soul melteth for heaviness: strengthen thou me according unto thy word.","Remove from me the way of lying: and grant me thy law graciously.","I have chosen the way of truth: thy judgments have I laid before me."]},
"Proverbs 3":{book:"Proverbs",ch:3,verses:["My son, forget not my law; but let thine heart keep my commandments:","For length of days, and long life, and peace, shall they add to thee.","Let not mercy and truth forsake thee: bind them about thy neck; write them upon the table of thine heart:","So shalt thou find favour and good understanding in the sight of God and man.","Trust in the Lord with all thine heart; and lean not unto thine own understanding.","In all thy ways acknowledge him, and he shall direct thy paths.","Be not wise in thine own eyes: fear the Lord, and depart from evil.","It shall be health to thy navel, and marrow to thy bones.","Honour the Lord with thy substance, and with the firstfruits of all thine increase:","So shall thy barns be filled with plenty, and thy presses shall burst out with new wine."]},
"Isaiah 40":{book:"Isaiah",ch:40,verses:["Comfort ye, comfort ye my people, saith your God.","Speak ye comfortably to Jerusalem, and cry unto her, that her warfare is accomplished, that her iniquity is pardoned.","The voice of him that crieth in the wilderness, Prepare ye the way of the Lord, make straight in the desert a highway for our God.","Every valley shall be exalted, and every mountain and hill shall be made low: and the crooked shall be made straight, and the rough places plain:","And the glory of the Lord shall be revealed, and all flesh shall see it together: for the mouth of the Lord hath spoken it.","The voice said, Cry. And he said, What shall I cry? All flesh is grass, and all the goodliness thereof is as the flower of the field:","The grass withereth, the flower fadeth: because the spirit of the Lord bloweth upon it: surely the people is grass.","The grass withereth, the flower fadeth: but the word of our God shall stand for ever.","O Zion, that bringest good tidings, get thee up into the high mountain; O Jerusalem, that bringest good tidings, lift up thy voice with strength.","Behold, the Lord God will come with strong hand, and his arm shall rule for him: behold, his reward is with him, and his work before him.","He shall feed his flock like a shepherd: he shall gather the lambs with his arm, and carry them in his bosom.","Who hath measured the waters in the hollow of his hand, and meted out heaven with the span, and comprehended the dust of the earth in a measure?","Who hath directed the Spirit of the Lord, or being his counsellor hath taught him?","With whom took he counsel, and who instructed him, and taught him in the path of judgment?","Behold, the nations are as a drop of a bucket, and are counted as the small dust of the balance.","All nations before him are as nothing; and they are counted to him less than nothing, and vanity.","To whom then will ye liken God? or what likeness will ye compare unto him?","Hast thou not known? hast thou not heard, that the everlasting God, the Lord, the Creator of the ends of the earth, fainteth not, neither is weary?","There is no searching of his understanding.","He giveth power to the faint; and to them that have no might he increaseth strength.","Even the youths shall faint and be weary, and the young men shall utterly fall:","But they that wait upon the Lord shall renew their strength; they shall mount up with wings as eagles; they shall run, and not be weary; and they shall walk, and not faint."]},
"Isaiah 55":{book:"Isaiah",ch:55,verses:["Ho, every one that thirsteth, come ye to the waters, and he that hath no money; come ye, buy, and eat.","Wherefore do ye spend money for that which is not bread? and your labour for that which satisfieth not?","Incline your ear, and come unto me: hear, and your soul shall live; and I will make an everlasting covenant with you.","Behold, I have given him for a witness to the people, a leader and commander to the people.","Thou shalt call a nation that thou knowest not, and nations that knew not thee shall run unto thee.","Seek ye the Lord while he may be found, call ye upon him while he is near:","Let the wicked forsake his way, and the unrighteous man his thoughts: and let him return unto the Lord.","For my thoughts are not your thoughts, neither are your ways my ways, saith the Lord.","For as the heavens are higher than the earth, so are my ways higher than your ways, and my thoughts than your thoughts.","For as the rain cometh down, and the snow from heaven, and returneth not thither, but watereth the earth:","So shall my word be that goeth forth out of my mouth: it shall not return unto me void.","For ye shall go out with joy, and be led forth with peace: the mountains and the hills shall break forth before you into singing.","Instead of the thorn shall come up the fir tree, and instead of the brier shall come up the myrtle tree."]},
"Genesis 1":{book:"Genesis",ch:1,verses:["In the beginning God created the heaven and the earth.","And the earth was without form, and void; and darkness was upon the face of the deep.","And God said, Let there be light: and there was light.","And God saw the light, that it was good: and God divided the light from the darkness.","And God called the light Day, and the darkness he called Night. And the evening and the morning were the first day.","And God said, Let there be a firmament in the midst of the waters, and let it divide the waters from the waters.","And God made the firmament, and divided the waters which were under the firmament from the waters which were above the firmament.","And God called the firmament Heaven. And the evening and the morning were the second day.","And God said, Let the waters under the heaven be gathered together unto one place, and let the dry land appear.","And God called the dry land Earth; and the gathering together of the waters called he Seas: and God saw that it was good."]},
"Matthew 5":{book:"Matthew",ch:5,verses:["And seeing the multitudes, he went up into a mountain: and when he was set, his disciples came unto him:","And he opened his mouth, and taught them, saying,","Blessed are the poor in spirit: for theirs is the kingdom of heaven.","Blessed are they that mourn: for they shall be comforted.","Blessed are the meek: for they shall inherit the earth.","Blessed are they which do hunger and thirst after righteousness: for they shall be filled.","Blessed are the merciful: for they shall obtain mercy.","Blessed are the pure in heart: for they shall see God.","Blessed are the peacemakers: for they shall be called the children of God.","Blessed are they which are persecuted for righteousness' sake: for theirs is the kingdom of heaven."]},
"Matthew 6":{book:"Matthew",ch:6,verses:["Take heed that ye do not your alms before men, to be seen of them: otherwise ye have no reward of your Father which is in heaven.","Therefore when thou doest thine alms, do not sound a trumpet before thee, as the hypocrites do.","But when thou doest alms, let not thy left hand know what thy right hand doeth:","That thine alms may be in secret: and thy Father which seeth in secret himself shall reward thee openly.","And when thou prayest, thou shalt not be as the hypocrites are: for they love to pray standing in the synagogues.","But thou, when thou prayest, enter into thy closet, and when thou hast shut thy door, pray to thy Father which is in secret.","After this manner therefore pray ye: Our Father which art in heaven, Hallowed be thy name.","Thy kingdom come, Thy will be done in earth, as it is in heaven.","Give us this day our daily bread.","And forgive us our debts, as we forgive our debtors."]},
"John 1":{book:"John",ch:1,verses:["In the beginning was the Word, and the Word was with God, and the Word was God.","The same was in the beginning with God.","All things were made by him; and without him was not any thing made that was made.","In him was life; and the life was the light of men.","And the light shineth in darkness; and the darkness comprehended it not.","There was a man sent from God, whose name was John.","The same came for a witness, to bear witness of the Light, that all men through him might believe.","He was not that Light, but was sent to bear witness of that Light.","That was the true Light, which lighteth every man that cometh into the world.","He was in the world, and the world was made by him, and the world knew him not."]},
"John 3":{book:"John",ch:3,verses:["There was a man of the Pharisees, named Nicodemus, a ruler of the Jews:","The same came to Jesus by night, and said unto him, Rabbi, we know that thou art a teacher come from God.","Jesus answered and said unto him, Verily, verily, I say unto thee, Except a man be born again, he cannot see the kingdom of God.","Nicodemus saith unto him, How can a man be born when he is old?","Jesus answered, Verily, verily, I say unto thee, Except a man be born of water and of the Spirit, he cannot enter into the kingdom of God.","That which is born of the flesh is flesh; and that which is born of the Spirit is spirit.","Marvel not that I said unto thee, Ye must be born again.","The wind bloweth where it listeth, and thou hearest the sound thereof, but canst not tell whence it cometh.","For God so loved the world, that he gave his only begotten Son, that whosoever believeth in him should not perish, but have everlasting life.","For God sent not his Son into the world to condemn the world; but that the world through him might be saved."]},
"John 14":{book:"John",ch:14,verses:["Let not your heart be troubled: ye believe in God, believe also in me.","In my Father's house are many mansions: if it were not so, I would have told you. I go to prepare a place for you.","And if I go and prepare a place for you, I will come again, and receive you unto myself; that where I am, there ye may be also.","And whither I go ye know, and the way ye know.","Thomas saith unto him, Lord, we know not whither thou goest; and how can we know the way?","Jesus saith unto him, I am the way, the truth, and the life: no man cometh unto the Father, but by me.","If ye had known me, ye should have known my Father also: and from henceforth ye know him, and have seen him.","Philip saith unto him, Lord, show us the Father, and it sufficeth us.","Jesus saith unto him, Have I been so long time with you, and yet hast thou not known me, Philip?","He that hath seen me hath seen the Father; and how sayest thou then, Show us the Father?"]},
"John 15":{book:"John",ch:15,verses:["I am the true vine, and my Father is the husbandman.","Every branch in me that beareth not fruit he taketh away: and every branch that beareth fruit, he purgeth it.","Now ye are clean through the word which I have spoken unto you.","Abide in me, and I in you. As the branch cannot bear fruit of itself, except it abide in the vine; no more can ye, except ye abide in me.","I am the vine, ye are the branches: He that abideth in me, and I in him, the same bringeth forth much fruit.","If a man abide not in me, he is cast forth as a branch, and is withered.","If ye abide in me, and my words abide in you, ye shall ask what ye will, and it shall be done unto you.","Herein is my Father glorified, that ye bear much fruit; so shall ye be my disciples.","As the Father hath loved me, so have I loved you: continue ye in my love.","If ye keep my commandments, ye shall abide in my love; even as I have kept my Father's commandments, and abide in his love."]},
"Romans 8":{book:"Romans",ch:8,verses:["There is therefore now no condemnation to them which are in Christ Jesus, who walk not after the flesh, but after the Spirit.","For the law of the Spirit of life in Christ Jesus hath made me free from the law of sin and death.","For what the law could not do, in that it was weak through the flesh, God sending his own Son in the likeness of sinful flesh.","For they that are after the flesh do mind the things of the flesh; but they that are after the Spirit the things of the Spirit.","For to be carnally minded is death; but to be spiritually minded is life and peace.","Because the carnal mind is enmity against God: for it is not subject to the law of God, neither indeed can be.","So then they that are in the flesh cannot please God.","But ye are not in the flesh, but in the Spirit, if so be that the Spirit of God dwell in you.","But if the Spirit of him that raised up Jesus from the dead dwell in you, he that raised up Christ from the dead shall also quicken your mortal bodies.","And we know that all things work together for good to them that love God, to them who are the called according to his purpose."]},
"1 Corinthians 13":{book:"1 Corinthians",ch:13,verses:["Though I speak with the tongues of men and of angels, and have not charity, I am become as sounding brass, or a tinkling cymbal.","And though I have the gift of prophecy, and understand all mysteries, and all knowledge; and though I have all faith, so that I could remove mountains, and have not charity, I am nothing.","And though I bestow all my goods to feed the poor, and though I give my body to be burned, and have not charity, it profiteth me nothing.","Charity suffereth long, and is kind; charity envieth not; charity vaunteth not itself, is not puffed up,","Doth not behave itself unseemly, seeketh not her own, is not easily provoked, thinketh no evil;","Rejoiceth not in iniquity, but rejoiceth in the truth;","Beareth all things, believeth all things, hopeth all things, endureth all things.","Charity never faileth: but whether there be prophecies, they shall fail; whether there be tongues, they shall cease.","For we know in part, and we prophesy in part.","But when that which is perfect is come, then that which is in part shall be done away.","When I was a child, I spake as a child, I understood as a child, I thought as a child: but when I became a man, I put away childish things.","For now we see through a glass, darkly; but then face to face: now I know in part; but then shall I know even as also I am known.","And now abideth faith, hope, charity, these three; but the greatest of these is charity."]},
"Ephesians 6":{book:"Ephesians",ch:6,verses:["Children, obey your parents in the Lord: for this is right.","Honour thy father and mother; which is the first commandment with promise;","That it may be well with thee, and thou mayest live long on the earth.","And, ye fathers, provoke not your children to wrath: but bring them up in the nurture and admonition of the Lord.","Servants, be obedient to them that are your masters according to the flesh, with fear and trembling.","Not with eyeservice, as menpleasers; but as the servants of Christ, doing the will of God from the heart;","With good will doing service, as to the Lord, and not to men:","Knowing that whatsoever good thing any man doeth, the same shall he receive of the Lord.","And, ye masters, do the same things unto them, forbearing threatening.","Finally, my brethren, be strong in the Lord, and in the power of his might.","Put on the whole armour of God, that ye may be able to stand against the wiles of the devil.","For we wrestle not against flesh and blood, but against principalities, against powers, against the rulers of the darkness of this world."]},
"Philippians 4":{book:"Philippians",ch:4,verses:["Therefore, my brethren dearly beloved and longed for, my joy and crown, so stand fast in the Lord, my dearly beloved.","I beseech Euodias, and beseech Syntyche, that they be of the same mind in the Lord.","Rejoice in the Lord always: and again I say, Rejoice.","Let your moderation be known unto all men. The Lord is at hand.","Be careful for nothing; but in every thing by prayer and supplication with thanksgiving let your requests be made known unto God.","And the peace of God, which passeth all understanding, shall keep your hearts and minds through Christ Jesus.","Finally, brethren, whatsoever things are true, whatsoever things are honest, whatsoever things are just, whatsoever things are pure, whatsoever things are lovely, whatsoever things are of good report; if there be any virtue, and if there be any praise, think on these things.","Those things, which ye have both learned, and received, and heard, and seen in me, do: and the God of peace shall be with you.","But I rejoiced in the Lord greatly, that now at the last your care of me hath flourished again.","Not that I speak in respect of want: for I have learned, in whatsoever state I am, therewith to be content.","I can do all things through Christ which strengtheneth me.","Notwithstanding ye have well done, that ye did communicate with my affliction.","But my God shall supply all your need according to his riches in glory by Christ Jesus."]},
"Hebrews 11":{book:"Hebrews",ch:11,verses:["Now faith is the substance of things hoped for, the evidence of things not seen.","For by it the elders obtained a good report.","Through faith we understand that the worlds were framed by the word of God, so that things which are seen were not made of things which do appear.","By faith Abel offered unto God a more excellent sacrifice than Cain, by which he obtained witness that he was righteous.","By faith Enoch was translated that he should not see death; and was not found, because God had translated him.","But without faith it is impossible to please him: for he that cometh to God must believe that he is, and that he is a rewarder of them that diligently seek him.","By faith Noah, being warned of God of things not seen as yet, moved with fear, prepared an ark to the saving of his house.","By faith Abraham, when he was called to go out into a place which he should after receive for an inheritance, obeyed.","Through faith also Sara herself received strength to conceive seed, and was delivered of a child when she was past age.","Therefore sprang there even of one, and him as good as dead, so many as the stars of the sky in multitude."]},
"James 1":{book:"James",ch:1,verses:["James, a servant of God and of the Lord Jesus Christ, to the twelve tribes which are scattered abroad, greeting.","My brethren, count it all joy when ye fall into divers temptations;","Knowing this, that the trying of your faith worketh patience.","But let patience have her perfect work, that ye may be perfect and entire, wanting nothing.","If any of you lack wisdom, let him ask of God, that giveth to all men liberally, and upbraideth not; and it shall be given him.","But let him ask in faith, nothing wavering. For he that wavereth is like a wave of the sea driven with the wind and tossed.","For let not that man think that he shall receive any thing of the Lord.","A double minded man is unstable in all his ways.","Let the brother of low degree rejoice in that he is exalted:","But the rich, in that he is made low: because as the flower of the grass he shall pass away."]},
"Revelation 1":{book:"Revelation",ch:1,verses:["The Revelation of Jesus Christ, which God gave unto him, to shew unto his servants things which must shortly come to pass.","Blessed is he that readeth, and they that hear the words of this prophecy, and keep those things which are written therein.","John to the seven churches which are in Asia: Grace be unto you, and peace, from him which is, and which was, and which is to come.","And from Jesus Christ, who is the faithful witness, and the first begotten of the dead, and the prince of the kings of the earth.","And hath made us kings and priests unto God and his Father; to him be glory and dominion for ever and ever.","Behold, he cometh with clouds; and every eye shall see him, and they also which pierced him: and all kindreds of the earth shall wail because of him.","I am Alpha and Omega, the beginning and the ending, saith the Lord, which is, and which was, and which is to come, the Almighty.","I John, who also am your brother, and companion in tribulation, and in the kingdom and patience of Jesus Christ.","I was in the Spirit on the Lord's day, and heard behind me a great voice, as of a trumpet.","And when I saw him, I fell at his feet as dead. And he laid his right hand upon me, saying unto me, Fear not; I am the first and the last."]}

"Psalms 23":{book:"Psalms",ch:23,verses:["Yahweh is my shepherd:\nI shall lack nothing.", "He makes me lie down in green pastures.\nHe leads me beside still waters.", "He restores my soul.\nHe guides me in the paths of righteousness for his name\u2019s sake.", "Even though I walk through the valley of the shadow of death,\nI will fear no evil, for you are with me.\nYour rod and your staff,\nthey comfort me.", "You prepare a table before me\nin the presence of my enemies.\nYou anoint my head with oil.\nMy cup runs over.", "Surely goodness and loving kindness shall follow me all the days of my life,\nand I will dwell in Yahweh\u2019s house forever."]},
"Psalms 91":{book:"Psalms",ch:91,verses:["He who dwells in the secret place of the Most High\nwill rest in the shadow of the Almighty.", "I will say of Yahweh, \u201cHe is my refuge and my fortress;\nmy God, in whom I trust.\u201d", "For he will deliver you from the snare of the fowler,\nand from the deadly pestilence.", "He will cover you with his feathers.\nUnder his wings you will take refuge.\nHis faithfulness is your shield and rampart.", "You shall not be afraid of the terror by night,\nnor of the arrow that flies by day;", "nor of the pestilence that walks in darkness,\nnor of the destruction that wastes at noonday.", "A thousand may fall at your side,\nand ten thousand at your right hand;\nbut it will not come near you.", "You will only look with your eyes,\nand see the recompense of the wicked.", "Because you have made Yahweh your refuge,\nand the Most High your dwelling place,", "no evil shall happen to you,\nneither shall any plague come near your dwelling.", "For he will put his angels in charge of you,\nto guard you in all your ways.", "They will bear you up in their hands,\nso that you won\u2019t dash your foot against a stone.", "You will tread on the lion and cobra.\nYou will trample the young lion and the serpent underfoot.", "\u201cBecause he has set his love on me, therefore I will deliver him.\nI will set him on high, because he has known my name.", "He will call on me, and I will answer him.\nI will be with him in trouble.\nI will deliver him, and honor him.", "I will satisfy him with long life,\nand show him my salvation.\u201d"]},
"Psalms 119":{book:"Psalms",ch:119,verses:["Blessed are those whose ways are blameless,\nwho walk according to Yahweh\u2019s law.", "Blessed are those who keep his statutes,\nwho seek him with their whole heart.", "Yes, they do nothing wrong.\nThey walk in his ways.", "You have commanded your precepts,\nthat we should fully obey them.", "Oh that my ways were steadfast\nto obey your statutes!", "Then I wouldn\u2019t be disappointed,\nwhen I consider all of your commandments.", "I will give thanks to you with uprightness of heart,\nwhen I learn your righteous judgments.", "I will observe your statutes.\nDon\u2019t utterly forsake me.", "How can a young man keep his way pure?\nBy living according to your word.", "With my whole heart, I have sought you.\nDon\u2019t let me wander from your commandments.", "I have hidden your word in my heart,\nthat I might not sin against you.", "Blessed are you, Yahweh.\nTeach me your statutes.", "With my lips,\nI have declared all the ordinances of your mouth.", "I have rejoiced in the way of your testimonies,\nas much as in all riches.", "I will meditate on your precepts,\nand consider your ways.", "I will delight myself in your statutes.\nI will not forget your word.", "Do good to your servant.\nI will live and I will obey your word.", "Open my eyes,\nthat I may see wondrous things out of your law.", "I am a stranger on the earth.\nDon\u2019t hide your commandments from me.", "My soul is consumed with longing for your ordinances at all times.", "You have rebuked the proud who are cursed,\nwho wander from your commandments.", "Take reproach and contempt away from me,\nfor I have kept your statutes.", "Though princes sit and slander me,\nyour servant will meditate on your statutes.", "Indeed your statutes are my delight,\nand my counselors.", "My soul is laid low in the dust.\nRevive me according to your word!", "I declared my ways, and you answered me.\nTeach me your statutes.", "Let me understand the teaching of your precepts!\nThen I will meditate on your wondrous works.", "My soul is weary with sorrow:\nstrengthen me according to your word.", "Keep me from the way of deceit.\nGrant me your law graciously!", "I have chosen the way of truth.\nI have set your ordinances before me.", "I cling to your statutes, Yahweh.\nDon\u2019t let me be disappointed.", "I run in the path of your commandments,\nfor you have set my heart free.", "Teach me, Yahweh, the way of your statutes.\nI will keep them to the end.", "Give me understanding, and I will keep your law.\nYes, I will obey it with my whole heart.", "Direct me in the path of your commandments,\nfor I delight in them.", "Turn my heart toward your statutes,\nnot toward selfish gain.", "Turn my eyes away from looking at worthless things.\nRevive me in your ways.", "Fulfill your promise to your servant,\nthat you may be feared.", "Take away my disgrace that I dread,\nfor your ordinances are good.", "Behold, I long for your precepts!\nRevive me in your righteousness.", "Let your loving kindness also come to me, Yahweh,\nyour salvation, according to your word.", "So I will have an answer for him who reproaches me,\nfor I trust in your word.", "Don\u2019t snatch the word of truth out of my mouth,\nfor I put my hope in your ordinances.", "So I will obey your law continually,\nforever and ever.", "I will walk in liberty,\nfor I have sought your precepts.", "I will also speak of your statutes before kings,\nand will not be disappointed.", "I will delight myself in your commandments,\nbecause I love them.", "I reach out my hands for your commandments, which I love.\nI will meditate on your statutes.", "Remember your word to your servant,\nbecause you gave me hope.", "This is my comfort in my affliction,\nfor your word has revived me.", "The arrogant mock me excessively,\nbut I don\u2019t swerve from your law.", "I remember your ordinances of old, Yahweh,\nand have comforted myself.", "Indignation has taken hold on me,\nbecause of the wicked who forsake your law.", "Your statutes have been my songs,\nin the house where I live.", "I have remembered your name, Yahweh, in the night,\nand I obey your law.", "This is my way,\nthat I keep your precepts.", "Yahweh is my portion.\nI promised to obey your words.", "I sought your favor with my whole heart.\nBe merciful to me according to your word.", "I considered my ways,\nand turned my steps to your statutes.", "I will hurry, and not delay,\nto obey your commandments.", "The ropes of the wicked bind me,\nbut I won\u2019t forget your law.", "At midnight I will rise to give thanks to you,\nbecause of your righteous ordinances.", "I am a friend of all those who fear you,\nof those who observe your precepts.", "The earth is full of your loving kindness, Yahweh.\nTeach me your statutes.", "Do good to your servant,\naccording to your word, Yahweh.", "Teach me good judgment and knowledge,\nfor I believe in your commandments.", "Before I was afflicted, I went astray;\nbut now I observe your word.", "You are good, and do good.\nTeach me your statutes.", "The proud have smeared a lie upon me.\nWith my whole heart, I will keep your precepts.", "Their heart is as callous as the fat,\nbut I delight in your law.", "It is good for me that I have been afflicted,\nthat I may learn your statutes.", "The law of your mouth is better to me than thousands of pieces of gold and silver.", "Your hands have made me and formed me.\nGive me understanding, that I may learn your commandments.", "Those who fear you will see me and be glad,\nbecause I have put my hope in your word.", "Yahweh, I know that your judgments are righteous,\nthat in faithfulness you have afflicted me.", "Please let your loving kindness be for my comfort,\naccording to your word to your servant.", "Let your tender mercies come to me, that I may live;\nfor your law is my delight.", "Let the proud be disappointed, for they have overthrown me wrongfully.\nI will meditate on your precepts.", "Let those who fear you turn to me.\nThey will
