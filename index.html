                <div className="sp-icon" style={{background:'#25D366'}}><svg viewBox="0 0 24 24" fill="white" style={{width:26,height:26}}><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></div>
                <div className="sp-label">WhatsApp</div>
              </button>
              <button className="sp-btn" onClick={shareToSMS}>
                <div className="sp-icon" style={{background:'#34C759'}}><svg viewBox="0 0 24 24" fill="white" style={{width:24,height:24}}><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/><path d="M7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg></div>
                <div className="sp-label">iMessage</div>
              </button>
              <button className="sp-btn" onClick={shareToEmail}>
                <div className="sp-icon" style={{background:'#007AFF'}}><svg viewBox="0 0 24 24" fill="white" style={{width:24,height:24}}><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></div>
                <div className="sp-label">Email</div>
              </button>
              <button className="sp-btn" onClick={shareToTelegram}>
                <div className="sp-icon" style={{background:'#0088cc'}}><svg viewBox="0 0 24 24" fill="white" style={{width:24,height:24}}><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg></div>
                <div className="sp-label">Telegram</div>
              </button>
            </div>
            <div className="sp-grid" style={{marginBottom:8}}>
              <button className="sp-btn" onClick={shareCopyLink}>
                <div className="sp-icon" style={{background:'var(--sage)'}}><svg viewBox="0 0 24 24" fill="white" style={{width:22,height:22}}><rect x="9" y="9" width="13" height="13" rx="2" fill="none" stroke="white" strokeWidth="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" fill="none" stroke="white" strokeWidth="2"/></svg></div>
                <div className="sp-label">{L.copy}</div>
              </button>
              {navigator.share&&(
                <button className="sp-btn" onClick={shareNative}>
                  <div className="sp-icon" style={{background:'var(--gold)'}}><svg viewBox="0 0 24 24" fill="white" style={{width:22,height:22}}><circle cx="18" cy="5" r="3" fill="none" stroke="white" strokeWidth="2"/><circle cx="6" cy="12" r="3" fill="none" stroke="white" strokeWidth="2"/><circle cx="18" cy="19" r="3" fill="none" stroke="white" strokeWidth="2"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49" stroke="white" strokeWidth="2"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49" stroke="white" strokeWidth="2"/></svg></div>
                  <div className="sp-label">{lang==='es'?'Más':lang==='pt'?'Mais':'More'}</div>
                </button>
              )}
            </div>
            <button className="sp-cancel" onClick={()=>setShowSharePicker(false)}>{L.cancel}</button>
          </div>
        </div>
      )}

      {/* CHAPTER SOURCE PICKER */}
      {showSourcePicker&&(
        <div className="source-picker-overlay" onClick={()=>setShowSourcePicker(false)}>
          <div className="source-picker" onClick={e=>e.stopPropagation()}>
            <h2>{lang==='es'?'Fuentes de los Capítulos':lang==='pt'?'Fontes dos Capítulos':'Chapter Sources'}</h2>
            <p className="sp-sub">{lang==='es'?`Selecciona de dónde quieres tus ${setup?.chapters||2} capítulos`:lang==='pt'?`Escolha de onde você quer seus ${setup?.chapters||2} capítulos`:`Pick where you want your ${setup?.chapters||2} chapters from`}</p>
            {Object.entries(BIBLE_SECTIONS).map(([key,sec])=>{
              const sources=setup?.chapterSources||[];
              const isSelected=sources.includes(key);
              return(
                <div key={key} className={`sp-section ${isSelected?'selected':''}`} onClick={()=>{
                  const cur=setup?.chapterSources||[];
                  const numCh=setup?.chapters||2;
                  if(isSelected){
                    setSetup(p=>({...p,chapterSources:cur.filter(s=>s!==key)}));
                  }else{
                    if(cur.length<numCh){
                      setSetup(p=>({...p,chapterSources:[...cur,key]}));
                    }else{
                      // Replace last one
                      setSetup(p=>({...p,chapterSources:[...cur.slice(0,-1),key]}));
                    }
                  }
                  setSettingsSaved(false);
                }}>
                  <div className="sp-emoji">{sec.emoji}</div>
                  <div className="sp-info">
                    <div className="sp-name">{lang==='es'?sec.labelEs:lang==='pt'?(sec.labelPt||sec.label):sec.label}</div>
                    <div className="sp-count">{sec.passages.length} {lang==='es'?'pasajes':lang==='pt'?'passagens':'passages'}</div>
                  </div>
                  <div className="sp-check">
                    {isSelected&&<svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" style={{width:14,height:14}}><path d="M5 13l4 4L19 7"/></svg>}
                  </div>
                </div>
              );
            })}
            <div style={{textAlign:'center',fontSize:13,color:'var(--sage)',margin:'12px 0'}}>
              {lang==='es'?`${(setup?.chapterSources||[]).length} de ${setup?.chapters||2} seleccionados`:lang==='pt'?`${(setup?.chapterSources||[]).length} de ${setup?.chapters||2} selecionados`:`${(setup?.chapterSources||[]).length} of ${setup?.chapters||2} selected`}
            </div>
            <button onClick={()=>setShowSourcePicker(false)} style={{width:'100%',padding:'14px 0',background:'var(--sage)',color:'white',border:'none',borderRadius:12,fontSize:16,fontWeight:600,cursor:'pointer',marginTop:4}}>
              {lang==='es'?'Listo':lang==='pt'?'Pronto':'Done'}
            </button>
          </div>
        </div>
      )}

      {/* NOTIFICATION OPT-IN PROMPT */}
      {showNotifPrompt&&!pushEnabled&&(
        <div className="notif-prompt-overlay" onClick={()=>{setShowNotifPrompt(false);try{localStorage.setItem('dw_notif_dismissed','later')}catch(e){}}}>
          <div className="notif-prompt" onClick={e=>e.stopPropagation()}>
            <button className="notif-prompt-close" onClick={()=>{setShowNotifPrompt(false);try{localStorage.setItem('dw_notif_dismissed','later')}catch(e){}}}>×</button>
            <div className="notif-prompt-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="var(--sage)" strokeWidth="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            </div>
            <h3>{lang==='es'?'Recordatorio Diario':lang==='pt'?'Lembrete de Leitura Diária':'Daily Reading Reminder'}</h3>
            <p>{lang==='es'?'Recibe un mensaje tranquilo cada mañana con la lectura del día. Una notificación al día, nada más.':lang==='pt'?'Nunca perca sua leitura diária. Definiremos um lembrete suave.':'Get a quiet morning reminder with your daily reading. One notification per day, nothing more.'}</p>
            <div className="notif-prompt-time">
              <label>{lang==='es'?'Hora del recordatorio':lang==='pt'?'Hora do lembrete':'Reminder time'}</label>
              <select value={notifHour} onChange={e=>setNotifHour(parseInt(e.target.value))}>
                {Array.from({length:24},(_,i)=>i).map(h=>(
                  <option key={h} value={h}>{h===0?'12:00 AM':h<12?h+':00 AM':h===12?'12:00 PM':(h-12)+':00 PM'}</option>
                ))}
              </select>
            </div>
            <button className="notif-prompt-yes" onClick={subscribePush} disabled={pushLoading}>
              {pushLoading?(lang==='es'?'Activando...':lang==='pt'?'Ativando...':'Enabling...'):(lang==='es'?'Sí, recuérdame':lang==='pt'?'Sim, me lembre':'Yes, remind me')}
            </button>
            <button className="notif-prompt-no" onClick={()=>{setShowNotifPrompt(false);try{localStorage.setItem('dw_notif_dismissed','later')}catch(e){}}}>
              {lang==='es'?'Quizás después':lang==='pt'?'Talvez depois':'Maybe later'}
            </button>
          </div>
        </div>
      )}

      {/* REPORT ISSUE MODAL */}
      {showReportModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:9999,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={()=>setShowReportModal(false)}>
          <div style={{background:'var(--bg)',borderRadius:'20px 20px 0 0',padding:'24px 20px',width:'100%',maxWidth:500,boxShadow:'0 -4px 24px rgba(0,0,0,0.15)'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <h2 style={{fontSize:18,fontFamily:'Georgia,serif',margin:0,color:'var(--text)'}}>{L.reportIssueTitle}</h2>
              <button onClick={()=>setShowReportModal(false)} style={{background:'none',border:'none',fontSize:22,color:'var(--sage)',cursor:'pointer',lineHeight:1}}>×</button>
            </div>
            <textarea
              value={reportText}
              onChange={e=>setReportText(e.target.value)}
              placeholder={L.reportIssuePlaceholder}
              style={{width:'100%',minHeight:120,padding:'12px',borderRadius:10,border:'1.5px solid var(--border)',background:'var(--light)',color:'var(--text)',fontSize:14,fontFamily:'inherit',resize:'vertical',boxSizing:'border-box',outline:'none'}}
            />
            <div style={{display:'flex',gap:10,marginTop:12}}>
              <button onClick={()=>setShowReportModal(false)} style={{flex:1,padding:'12px',borderRadius:10,border:'1.5px solid var(--border)',background:'none',color:'var(--sage)',fontSize:14,fontWeight:600,cursor:'pointer'}}>{L.reportIssueCancel}</button>
              <button onClick={async()=>{
                try{
                  await fetch('/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
                    body:new URLSearchParams({'form-name':'issue-report',message:reportText,language:lang,date:new Date().toISOString()}).toString()});
                }catch(e){}
                setShowReportModal(false);
                setReportText('');
                alert(L.reportIssueThanks);
              }} style={{flex:2,padding:'12px',borderRadius:10,border:'none',background:'var(--sage)',color:'white',fontSize:14,fontWeight:600,cursor:'pointer',opacity:reportText.trim()?1:0.5}} disabled={!reportText.trim()}>{L.reportIssueSend}</button>
            </div>
          </div>
        </div>
      )}

      {/* VIDEO RECORDING MODAL */}
      {showVideoModal&&(
        <div className="video-modal">
          <button className="vm-close" onClick={closeVideoModal}>×</button>

          {!recordedBlob?(
            <React.Fragment>
              <div className={`vm-preview ${videoOrientation}`}>
                <video ref={videoPreviewRef} autoPlay playsInline muted style={{transform:facingMode==='user'?'scaleX(-1)':'none'}}/>
                {!isRecording&&(
                  <button className="vm-switch-btn" onClick={switchCamera}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 16v4a2 2 0 01-2 2h-4m-4 0H6a2 2 0 01-2-2v-4m0-4V4a2 2 0 012-2h4m4 0h4a2 2 0 012 2v4"/><polyline points="14 2 18 2 18 6"/><polyline points="10 22 6 22 6 18"/></svg>
                  </button>
                )}
              </div>
              <div className={`vm-timer ${isRecording?'recording':''}`}>{formatTime(recordTime)}</div>
              <div className="vm-limit">{L.maxDuration}</div>
              <div className="vm-controls">
                <button className={`vm-record-btn ${isRecording?'is-recording':''}`} onClick={isRecording?stopRecording:startRecording}>
                  <div className="vm-rec-inner"/>
                </button>
              </div>
            </React.Fragment>
          ):(
            <React.Fragment>
              <div className={`vm-preview ${videoOrientation}`}>
                <video src={URL.createObjectURL(recordedBlob)} controls playsInline style={{width:'100%',height:'100%',objectFit:'contain'}}/>
              </div>
              <div className="vm-timer">{formatTime(recordTime)}</div>
              <div className="vm-controls">
                <button className="vm-secondary-btn" onClick={()=>{setRecordedBlob(null);setRecordTime(0);chunksRef.current=[];startCamera(facingMode)}}>{L.retake}</button>
                <button className="vm-secondary-btn save" onClick={saveVideoDevotion}>{L.saveDevotion}</button>
              </div>
            </React.Fragment>
          )}
        </div>
      )}

      {/* NAV */}
      <nav className="nav" role="navigation" aria-label="Main navigation">
        <button aria-label="Home" aria-current={page==='home'?'page':undefined} className={page==='home'?'active':''} onClick={()=>{setPage('home');gaEvent('navigate',{page:'home'})}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          {L.home}
        </button>
        <button aria-label="Journal" aria-current={page==='journal'?'page':undefined} className={page==='journal'?'active':''} onClick={()=>{setPage('journal');gaEvent('navigate',{page:'journal'})}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
          {L.journal}
        </button>
        <button aria-label="Messages" aria-current={page==='sermons'?'page':undefined} className={page==='sermons'?'active':''} onClick={()=>{setPage('sermons');gaEvent('navigate',{page:'messages'})}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" aria-hidden="true"><path d="M15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707A1 1 0 0112 5v14a1 1 0 01-1.707.707L5.586 15z"/></svg>
          {L.messages}
        </button>
        <button aria-label="Plans and More" aria-current={page==='plans'?'page':undefined} className={page==='plans'?'active':''} onClick={()=>{
          setPage('plans');setMoreSection(null);setSelectedBook(null);setSelectedChapter(null);gaEvent('navigate',{page:'plans'});
        }}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" aria-hidden="true"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12l2 2 4-4"/></svg>
          {L.plansMore}
        </button>
        <button aria-label="Settings" aria-current={page==='settings'?'page':undefined} className={page==='settings'?'active':''} onClick={()=>{setPage('settings');gaEvent('navigate',{page:'settings'})}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          {L.settings}
        </button>
      </nav>
    </div>
  );
}

// ===== ONBOARDING COMPONENT =====
function Onboarding({onComplete,lang,setLang}){
  const L=LANG[lang]||LANG.en;
  const [persona,setPersona]=useState('');
  const [custom,setCustom]=useState('');
  const [chapters,setChapters]=useState(1);
  const [versesPerPassage,setVPP]=useState(10);
  const [chapterSources,setChapterSources]=useState([]);
  const [step,setStep]=useState(1);

  const personas=[
    {id:'new_believer',label:"I'm a new believer"},
    {id:'returning',label:"I'm returning to faith"},
    {id:'pastor',label:"I'm a pastor / minister"},
    {id:'difficult',label:"I'm going through a difficult season"},
    {id:'deeper',label:"I'm studying for deeper understanding"},
    {id:'worship',label:"I'm a worship leader"}
  ];

  if(step===1)return(
    <div className="onboard">
      <div className="lang-toggle" style={{justifyContent:'center',marginBottom:20}}>
        <button className={`lang-btn ${lang==='en'?'active':''}`} onClick={()=>{setLang('en');try{localStorage.setItem('dw_lang','en')}catch(e){}gaEvent('change_language',{language:'en'})}}>English</button>
        <button className={`lang-btn ${lang==='es'?'active':''}`} onClick={()=>{setLang('es');try{localStorage.setItem('dw_lang','es')}catch(e){}gaEvent('change_language',{language:'es'})}}>Español</button>
        <button className={`lang-btn ${lang==='pt'?'active':''}`} onClick={()=>{setLang('pt');try{localStorage.setItem('dw_lang','pt')}catch(e){}gaEvent('change_language',{language:'pt'})}}>Português</button>
      </div>
      <h1>{L.dailyWord}</h1>
      <p>{L.welcome}</p>
      {personas.map(p=>(
        <button key={p.id} className={`persona-btn ${persona===p.id?'selected':''}`} onClick={()=>{setPersona(p.id);setCustom('')}}>{p.id==='new_believer'?L.imNewBeliever:p.id==='returning'?L.imReturning:p.id==='pastor'?L.imPastor:p.id==='difficult'?L.imDifficult:p.id==='deeper'?L.imDeeper:p.id==='worship'?L.imWorship:''}</button>
      ))}
      <textarea className="custom-input" rows="2" placeholder={L.orDescribe} value={custom} onChange={e=>{setCustom(e.target.value);setPersona('')}}/>
      <button className="primary-btn" disabled={!persona&&!custom} onClick={()=>setStep(2)} style={{opacity:persona||custom?1:0.4}}>{L.continue}</button>
    </div>
  );

  return(
    <div className="onboard">
      <h1>{L.customizeReading}</h1>
      <p>{L.howMuch}</p>
      <div className="pref-card">
        <div><div className="pref-label">{L.chaptersPerDay}</div><div className="pref-desc">{L.chaptersDesc}</div></div>
        <input type="text" inputMode="numeric" pattern="[0-9]*" value={chapters===''?'':chapters} onFocus={e=>e.target.select()} onChange={e=>{const v=e.target.value;if(v==='')setChapters('');else{const n=parseInt(v);if(!isNaN(n))setChapters(Math.min(10,Math.max(1,n)));}}} onBlur={()=>{if(chapters===''||!chapters)setChapters(1)}}/>
      </div>
      {chapters>1&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:14,fontWeight:600,color:'var(--text)',marginBottom:8}}>{lang==='es'?'Elige de dónde':lang==='pt'?'Escolha de onde':'Choose where from'}:</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {Object.entries(BIBLE_SECTIONS).map(([key,sec])=>{
              const isSelected=chapterSources.includes(key);
              return(
                <button key={key} onClick={()=>{
                  if(isSelected){setChapterSources(cs=>cs.filter(s=>s!==key))}
                  else if(chapterSources.length<chapters){setChapterSources(cs=>[...cs,key])}
                  else{setChapterSources(cs=>[...cs.slice(0,-1),key])}
                }} style={{padding:'8px 14px',borderRadius:20,border:isSelected?'2px solid var(--gold)':'2px solid var(--border)',background:isSelected?'rgba(196,169,98,0.1)':'var(--light)',color:isSelected?'var(--gold)':'var(--text)',fontSize:13,fontWeight:isSelected?600:400,cursor:'pointer',display:'flex',alignItems:'center',gap:6,transition:'all 0.2s'}}>
                  <span>{sec.emoji}</span>
                  <span>{lang==='es'?sec.labelEs:lang==='pt'?(sec.labelPt||sec.label):sec.label}</span>
                </button>
              );
            })}
          </div>
          <div style={{fontSize:12,color:'var(--sage)',marginTop:6}}>{lang==='es'?`${chapterSources.length} de ${chapters} seleccionados`:lang==='pt'?`${chapterSources.length} de ${chapters} selecionados`:`${chapterSources.length} of ${chapters} selected`}</div>
        </div>
      )}
      <div className="pref-card">
        <div><div className="pref-label">{L.versesPerPassage}</div><div className="pref-desc">{L.versesDesc}</div></div>
        <input type="text" inputMode="numeric" pattern="[0-9]*" value={versesPerPassage===''?'':versesPerPassage} onFocus={e=>e.target.select()} onChange={e=>{const v=e.target.value;if(v==='')setVPP('');else{const n=parseInt(v);if(!isNaN(n))setVPP(Math.min(30,Math.max(1,n)));}}} onBlur={()=>{if(versesPerPassage===''||!versesPerPassage)setVPP(10)}}/>
      </div>
      <button className="primary-btn" onClick={()=>onComplete({persona:persona||custom||'new_believer',chapters,versesPerPassage,chapterSources:chapterSources.length>0?chapterSources:undefined})}>{L.begin}</button>
    </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null}}
  static getDerivedStateFromError(error){return{hasError:true,error}}
  componentDidCatch(error,info){console.error('App crash:',error,info)}
  render(){
    if(this.state.hasError){
      return React.createElement('div',{style:{padding:'40px',textAlign:'center',fontFamily:'Georgia,serif'}},
        React.createElement('h2',null,'Something went wrong'),
        React.createElement('p',{style:{color:'#666',margin:'16px 0'}},'The app hit an unexpected error.'),
        React.createElement('button',{onClick:()=>window.location.reload(),style:{padding:'12px 32px',fontSize:'16px',background:'#5a7a3a',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer'}},'Reload App')
      )
    }
    return this.props.children
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ErrorBoundary,null,React.createElement(App)));
</script>
<script>
// Global error safety net — prevent silent failures + log to GA
window.addEventListener('unhandledrejection', function(e) {
  console.warn('Unhandled promise rejection:', e.reason);
  if(window.gaEvent)gaEvent('js_error',{type:'unhandled_rejection',message:String(e.reason).slice(0,200)});
  e.preventDefault();
});
window.onerror = function(msg, src, line, col, err) {
  console.warn('Global error caught:', msg, 'at', src, line);
  if(window.gaEvent)gaEvent('js_error',{type:'global',message:String(msg).slice(0,200),source:src,line:line});
  return true;
};
// Track Core Web Vitals if supported
if(window.PerformanceObserver){
  try{
    new PerformanceObserver(function(list){
      list.getEntries().forEach(function(entry){
        if(window.gaEvent)gaEvent('web_vital',{name:entry.name,value:Math.round(entry.startTime),metric:entry.entryType});
      });
    }).observe({type:'largest-contentful-paint',buffered:true});
  }catch(e){}
}
</script>
<script>
// Service Worker Registration
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>{
    console.log('Service Worker registered, scope:',reg.scope);
    reg.update().catch(()=>{});
    // Check for updates every 30 minutes
    setInterval(()=>{reg.update().catch(()=>{})},30*60*1000);
  }).catch(err=>console.log('SW registration failed:',err));
}
</script>
