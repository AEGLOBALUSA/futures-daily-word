  };

  // Fetch interlinear data from Claude for a single verse
  const fetchInterlinear=async(verseKey,verseText,pName)=>{
    if(ilData[verseKey]||ilLoading[verseKey])return;
    if(!checkClaudeRate()){return}
    setIlLoading(p=>({...p,[verseKey]:true}));
    try{
      const pData=BIBLE[pName]||parsePassage(pName);if(!pData)return;
      const OT_BOOKS=['Genesis','Exodus','Leviticus','Numbers','Deuteronomy','Joshua','Judges','Ruth','1 Samuel','2 Samuel','1 Kings','2 Kings','1 Chronicles','2 Chronicles','Ezra','Nehemiah','Esther','Job','Psalms','Proverbs','Ecclesiastes','Song of Solomon','Isaiah','Jeremiah','Lamentations','Ezekiel','Daniel','Hosea','Joel','Amos','Obadiah','Jonah','Micah','Nahum','Habakkuk','Zephaniah','Haggai','Zechariah','Malachi'];
      const isOT=OT_BOOKS.includes(pData.book);
      const origLang=isOT?'Hebrew':'Greek';
      const sysPrompt=`You are a biblical languages expert. Given a Bible verse, return a JSON object mapping each unique English word (lowercased, letters only) to its primary ${origLang} equivalent. Format: {"word":{"o":"original_script","t":"transliteration","s":"Strong's number","d":"brief definition (under 15 words)"}}. Include EVERY word - nouns, verbs, adjectives, prepositions, articles, conjunctions, pronouns, everything. Use actual ${origLang} Unicode characters. Return ONLY valid JSON, no markdown, no explanation.`;
      const resp=await fetchWithTimeout('/.netlify/functions/claude',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2048,system:sysPrompt,messages:[{role:'user',content:`${verseKey} (${lang==='es'?'Reina Valera':lang==='pt'?'João Ferreira':translation}):\n${verseText}`}]})
      },25000);
      if(resp.ok){
        const data=await resp.json();
        const text=data.content?data.content.map(c=>c.text).join(''):'';
        const jsonMatch=text.match(/\{[\s\S]*\}/);
        if(jsonMatch){
          let parsed;try{parsed=JSON.parse(jsonMatch[0])}catch(e){console.log('Interlinear JSON parse error',e);parsed=null}
          if(parsed){setIlData(p=>({...p,[verseKey]:parsed}));
          try{localStorage.setItem('dw_il_'+verseKey,JSON.stringify(parsed))}catch(e){}}
        }
      }
    }catch(e){console.log('Interlinear fetch failed',e)}
    setIlLoading(p=>({...p,[verseKey]:false}));
  };

  // Auto-fetch interlinear when a verse is highlighted
  const triggerInterlinear=(verseKey,verseText,pName)=>{
    const cached=localStorage.getItem('dw_il_'+verseKey);
    if(cached&&!ilData[verseKey]){
      try{setIlData(p=>({...p,[verseKey]:JSON.parse(cached)}))}catch(e){}
      return;
    }
    if(!ilData[verseKey]&&!cached){
      fetchInterlinear(verseKey,verseText,pName);
    }
  };

  // Render interlinear verse with full Greek/Hebrew from API
  const renderInterlinearVerse=(text,verseKey)=>{
    const pWords=ilData[verseKey]||{};
    return text.split(/(\s+)/).map((w,i)=>{
      if(/^\s+$/.test(w))return <span key={i}> </span>;
      const clean=w.toLowerCase().replace(/[^a-z]/g,'');
      const entry=pWords[clean]||WORDS[clean];
      if(entry){
        const origText=entry.o.includes('(')?entry.o.split('(')[1].replace(')',''):entry.o;
        return(
          <span key={i} className="il-word" onClick={(e)=>{e.stopPropagation();setIlPopup({word:w,original:entry.o,origText,transliteration:entry.t,strongs:entry.s,definition:entry.d,verseKey})}}>
            <span className="il-orig">{origText}</span>
            <span className="il-eng">{w}</span>
          </span>
        );
      }
      return <span key={i} className="il-word il-no-orig"><span className="il-eng">{w}</span></span>;
    });
  };

  // Add journal entry
  const addJournalEntry=()=>{
    if(!newJournalText.trim())return;
    setJournal(p=>[{id:Date.now(),date:new Date().toISOString(),ref:'',text:newJournalText,type:'revelation'},...p]);
    setNewJournalText('');setShowJournalForm(false);
  };

  // ===== VIDEO DEVOTION FUNCTIONS =====
  const MAX_RECORD_SECS=600; // 10 minutes

  const startCamera=async(mode)=>{
    try{
      if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop())}
      // Don't constrain dimensions — let the device pick native resolution
      // This allows portrait on phones held upright, landscape otherwise
      const stream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:mode||facingMode},
        audio:true
      });
      streamRef.current=stream;
      // Detect orientation from actual video track dimensions
      const vTrack=stream.getVideoTracks()[0];
      if(vTrack){
        const settings=vTrack.getSettings();
        const w=settings.width||1280;
        const h=settings.height||720;
        setVideoOrientation(h>w?'portrait':'landscape');
      }
      if(videoPreviewRef.current){
        videoPreviewRef.current.srcObject=stream;
        videoPreviewRef.current.play().catch(()=>{});
      }
    }catch(err){
      console.error('Camera access denied:',err);
      alert(lang==='es'?'Se requiere acceso a la cámara para grabar un devocional. Por favor habilita los permisos de cámara.':lang==='pt'?'O acesso à câmera é necessário para gravar um devocional. Por favor, habilite as permissões da câmera.':'Camera access is required to record a devotion. Please enable camera permissions.');
      closeVideoModal();
    }
  };

  const closeVideoModal=()=>{

    if(recordTimerRef.current)clearInterval(recordTimerRef.current);
    if(mediaRecorderRef.current&&mediaRecorderRef.current.state!=='inactive'){
      try{mediaRecorderRef.current.stop()}catch(e){}
    }
    setShowVideoModal(false);
    setIsRecording(false);
    setRecordedBlob(null);
    setRecordTime(0);
  };

  const switchCamera=()=>{

    setFacingMode(newMode);
    if(!isRecording)startCamera(newMode);

  const startRecording=()=>{
    if(!streamRef.current)return;
    chunksRef.current=[];
    // Prefer MP4 first — produces H.264+AAC which iMessage/WhatsApp/all apps accept
    // Safari/iOS supports mp4 natively. Chrome/Android falls back to webm.
    const mimeType=MediaRecorder.isTypeSupported('video/mp4;codecs=avc1,mp4a.40.2')?'video/mp4;codecs=avc1,mp4a.40.2':
      MediaRecorder.isTypeSupported('video/mp4')?'video/mp4':
      MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')?'video/webm;codecs=vp9,opus':
      MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')?'video/webm;codecs=vp8,opus':'video/webm';
    const recorder=new MediaRecorder(streamRef.current,{mimeType,videoBitsPerSecond:2000000});
    recorder.ondataavailable=(e)=>{if(e.data.size>0)chunksRef.current.push(e.data)};
    recorder.onstop=()=>{
      const blob=new Blob(chunksRef.current,{type:mimeType});
      setRecordedBlob(blob);
      // Stop camera preview
      if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null}
    };
    recorder.start(1000); // collect data every second
    mediaRecorderRef.current=recorder;
    setIsRecording(true);
    setRecordTime(0);
    recordTimerRef.current=setInterval(()=>{
      setRecordTime(prev=>{
        if(prev>=MAX_RECORD_SECS-1){
          stopRecording();
          return MAX_RECORD_SECS;
        }
        return prev+1;
      });
    },1000);
  };

  const stopRecording=()=>{

  const shareVideo=async(id)=>{
    try{
      const record=await VideoDB.get(id);
      if(!record){setCopyMsg('Video not found');setTimeout(()=>setCopyMsg(''),2000);return}
      setCopyMsg('Preparing...');
      const dateStr=new Date().toISOString().split('T')[0];
      // CRITICAL: extension MUST match actual container or apps reject/fail to deliver
      const realType=record.blob.type||'video/webm';
      const isRealMp4=realType.includes('mp4');
      const ext=isRealMp4?'mp4':'webm';
      const fileName='Daily-Word-Devotion-'+dateStr+'.'+ext;
      // Strategy 1: Share with file (mobile)
      if(navigator.share){
        const file=new File([record.blob],fileName,{type:realType});
        // Check if this browser can share files
        let canShareFiles=false;
        try{canShareFiles=navigator.canShare&&navigator.canShare({files:[file]})}catch(e){}
        if(canShareFiles){
          try{
            await navigator.share({files:[file],title:lang==='es'?'Mi Video Devocional':lang==='pt'?'Meu Vídeo Devocional':'My Video Devotion',text:lang==='es'?'¡Mira mi video devocional de Palabra Diaria!':lang==='pt'?'Assista meu vídeo devocional do Daily Word!':'Watch my video devotion from Daily Word!'});
            setCopyMsg(lang==='es'?'¡Compartido!':lang==='pt'?'Compartilhado!':'Shared!');setTimeout(()=>setCopyMsg(''),2000);
            return;
          }catch(shareErr){
            if(shareErr.name==='AbortError'){setCopyMsg('');return}
            // File share failed — try text-only share below
          }
        }
        // Strategy 2: Share text with link (fallback for browsers that don't support file sharing)
        try{
          // Save to a temp blob URL user can share
          await navigator.share({title:lang==='es'?'Mi Video Devocional':lang==='pt'?'Meu Vídeo Devocional':'My Video Devotion',text:lang==='es'?'¡Mira mi video devocional grabado en Palabra Diaria! https://futures-daily-word.netlify.app':lang==='pt'?'Confira meu vídeo devocional gravado no Daily Word! https://futures-daily-word.netlify.app':'Check out my video devotion recorded on Daily Word! https://futures-daily-word.netlify.app'});
          // Also auto-download the file so they can attach it
          triggerVideoDownload(record.blob,fileName);
          setCopyMsg(lang==='es'?'Video guardado — adjúntalo a tu mensaje!':lang==='pt'?'Vídeo salvo — anexe à sua mensagem!':'Video saved — attach it to your message!');setTimeout(()=>setCopyMsg(''),3000);
          return;
        }catch(e2){

      }

      triggerVideoDownload(record.blob,fileName);
      setCopyMsg(lang==='es'?'¡Video guardado en el dispositivo!':lang==='pt'?'Vídeo salvo no dispositivo!':'Video saved to device!');setTimeout(()=>setCopyMsg(''),2000);
    }catch(err){
      console.error('Share error:',err);
      setCopyMsg('');

      try{

      }catch(e){alert(lang==='es'?'No se pudo compartir o guardar el video. Intenta de nuevo.':lang==='pt'?'Não foi possível compartilhar ou salvar o vídeo. Tente novamente.':'Could not share or save video. Please try again.')}
    }

  const formatTime=(secs)=>{
    const m=Math.floor(secs/60);
    const s=secs%60;
    return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  };

  // Load video devotion metadata from localStorage
  useEffect(()=>{
    const saved=localStorage.getItem('dw_video_devotions');
    if(saved)try{setVideoDevotions(JSON.parse(saved))}catch(e){}
  },[]);
  useEffect(()=>{try{localStorage.setItem('dw_video_devotions',JSON.stringify(videoDevotions))}catch(e){}},[videoDevotions]);

  // Sermon CRUD
  const saveSermon=()=>{
    if(!sermonForm.title.trim())return;
    const cleaned={
      title:sanitize(sermonForm.title,200),
      scripture:sanitize(sermonForm.scripture,200),
      theme:sanitize(sermonForm.theme,200),
      notes:sanitize(sermonForm.notes,10000),
      audioUrl:sermonForm.audioUrl?sermonForm.audioUrl.substring(0,500):'',
      date:sermonForm.date||''
    };
    if(editSermonId){
      setSermons(p=>p.map(s=>s.id===editSermonId?{...cleaned,id:editSermonId}:s));
      setEditSermonId(null);
    }else{
      setSermons(p=>[{...cleaned,id:Date.now()},...p]);
    }
    setSermonForm({title:'',scripture:'',theme:'',notes:'',audioUrl:'',date:''});setShowSermonForm(false);
  };

  const editSermon=(s)=>{setSermonForm({title:s.title,scripture:s.scripture,theme:s.theme,notes:s.notes||'',audioUrl:s.audioUrl||'',date:s.date||''});setEditSermonId(s.id);setShowSermonForm(true)};

  const renderAudioPlayer=(url)=>{
    if(!url)return null;
    // Spotify link - convert to embed
    if(url.includes('spotify.com')){
      let embedUrl=url;
      if(url.includes('/episode/')){
        const id=url.split('/episode/')[1].split('?')[0];
        embedUrl='https://open.spotify.com/embed/episode/'+id+'?utm_source=generator&theme=0';
      }else if(url.includes('/show/')){
        const id=url.split('/show/')[1].split('?')[0];
        embedUrl='https://open.spotify.com/embed/show/'+id+'?utm_source=generator&theme=0';
      }else if(url.includes('/playlist/')){
        const id=url.split('/playlist/')[1].split('?')[0];
        embedUrl='https://open.spotify.com/embed/playlist/'+id+'?utm_source=generator&theme=0';
      }
      return React.createElement('div',{className:'sc-player'},
        React.createElement('iframe',{src:embedUrl,width:'100%',height:'152',frameBorder:'0',allow:'autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture',loading:'lazy',style:{borderRadius:12}})
      );
    }
    // YouTube link
    if(url.includes('youtube.com')||url.includes('youtu.be')){
      let videoId='';
      if(url.includes('youtu.be/'))videoId=url.split('youtu.be/')[1].split('?')[0];
      else if(url.includes('v='))videoId=url.split('v=')[1].split('&')[0];
      if(videoId){
        return React.createElement('div',{className:'sc-player'},
          React.createElement('iframe',{src:'https://www.youtube.com/embed/'+videoId,width:'100%',height:'180',frameBorder:'0',allow:'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope',allowFullScreen:true,style:{borderRadius:12}})
        );
      }
    }
    // Direct audio file (mp3, wav, etc.)
    return React.createElement('div',{className:'sc-player'},
      React.createElement('audio',{controls:true,src:url,preload:'none',style:{width:'100%'}})
    );
  };

  // ===== ONBOARDING =====
  if(!setup){
    return <Onboarding onComplete={(s)=>setSetup(s)} lang={lang} setLang={setLang}/>;
  }

  // Render word-tappable verse text
  const renderVerse=(text,verseKey,pName,vi)=>{
    const allNames=[...charNames,...locNames];
    let wordIdx=0;
    const wrapWord=(word,ki)=>{
      const wi=wordIdx++;
      const hlColor=getWordHlColor(verseKey,wi);
      const isSel=isWordSelected(verseKey,wi);
      const cls=['word-tap'];
      if(hlColor)cls.push('whl-'+hlColor);
      if(isSel)cls.push('word-selected');
      return <span key={ki} className={cls.join(' ')}
        data-widx={wi} data-vkey={verseKey}
        onClick={(e)=>{
          if(wordDragRef.current&&wordDragRef.current.engaged)return;
          wordTapRef.current=true;
          if(wordSelection&&wordSelection.verseKey===verseKey){
            onWordTapExtend(e,verseKey,wi);
          }else{
            lookupWord(word);
          }
        }}
        onDoubleClick={(e)=>onWordDoubleTap(e,verseKey,wi,pName,vi,text)}
        onTouchStart={(e)=>onWordTouchStart(e,verseKey,wi,pName,vi,text)}
        onTouchMove={(e)=>onWordTouchMove(e)}
        onTouchEnd={(e)=>onWordTouchEnd(e)}
      >{word}</span>;
    };

    if(allNames.length===0){
      return text.split(/(\s+)/).map((w,i)=>{
        if(/^\s+$/.test(w))return <span key={i}>{w}</span>;
        return wrapWord(w,i);
      });
    }
    const regex=new RegExp('\\b('+allNames.map(n=>n.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')\\b','g');
    const parts=[];let lastIdx=0;let m;
    while((m=regex.exec(text))!==null){
      if(m.index>lastIdx)parts.push({type:'text',val:text.slice(lastIdx,m.index)});
      const matched=m[1];
      parts.push({type:CHARACTERS[matched]?'char':'loc',val:matched});
      lastIdx=regex.lastIndex;
    }
    if(lastIdx<text.length)parts.push({type:'text',val:text.slice(lastIdx)});
    let ki=0;
    return parts.map((p,pi)=>{
      if(p.type==='char'){wordIdx++;return <span key={ki++} className="char-name" onClick={(e)=>{wordTapRef.current=true;openCharProfile(p.val)}}>{p.val}</span>}
      if(p.type==='loc'){wordIdx++;return <span key={ki++} className="loc-name" onClick={(e)=>{wordTapRef.current=true;openLocProfile(p.val)}}>{p.val}</span>}
      return p.val.split(/(\s+)/).map((w)=>{
        if(/^\s+$/.test(w))return <span key={ki++}>{w}</span>;
        return wrapWord(w,ki++);
      });
    });
  };

  // ===== WORD-LEVEL HIGHLIGHTING =====
  const hlWords=(color)=>{
    if(!wordSelection)return;
    const {verseKey,startWord,endWord}=wordSelection;
    setWordHighlights(p=>{
      const existing=(p[verseKey]||[]).filter(h=>!(h.start<=endWord&&h.end>=startWord)); // remove overlapping
      return {...p,[verseKey]:[...existing,{start:startWord,end:endWord,color}]};
    });
    setWordSelection(null);setShowActions(false);setSelectedVerse(null);
  };

  const clearWordHl=()=>{
    if(!wordSelection)return;
    const {verseKey,startWord,endWord}=wordSelection;
    setWordHighlights(p=>{
      const existing=(p[verseKey]||[]).filter(h=>!(h.start<=endWord&&h.end>=startWord));
      if(existing.length===0){const n={...p};delete n[verseKey];return n}
      return {...p,[verseKey]:existing};
    });
    setWordSelection(null);setShowActions(false);setSelectedVerse(null);
  };

  const getWordHlColor=(verseKey,wordIdx)=>{
    const ranges=wordHighlights[verseKey];
    if(!ranges)return null;
    for(const r of ranges){
      if(wordIdx>=r.start&&wordIdx<=r.end)return r.color;
    }
    return null;
  };

  const isWordSelected=(verseKey,wordIdx)=>{
    if(!wordSelection||wordSelection.verseKey!==verseKey)return false;
    const lo=Math.min(wordSelection.startWord,wordSelection.endWord);
    const hi=Math.max(wordSelection.startWord,wordSelection.endWord);
    return wordIdx>=lo&&wordIdx<=hi;
  };

  const onWordDoubleTap=(e,verseKey,wordIdx,pName,vi,verseText)=>{
    e.stopPropagation();
    wordTapRef.current=true;
    const words=verseText.split(/\s+/).filter(w=>w.length>0);
    const selectedText=words[wordIdx]||'';
    setWordSelection({verseKey,pName,vi,startWord:wordIdx,endWord:wordIdx,verseText});
    setSelectedVerse({key:verseKey,ref:`${pName}:${vi+1}`,text:selectedText,isWordLevel:true});
    setShowActions(true);setShowNote(false);setShowComment(false);
  };

  const onWordTapExtend=(e,verseKey,wordIdx)=>{
    e.stopPropagation();
    wordTapRef.current=true;
    if(!wordSelection||wordSelection.verseKey!==verseKey)return false;
    const words=wordSelection.verseText.split(/\s+/).filter(w=>w.length>0);
    const lo=Math.min(wordSelection.startWord,wordIdx);
    const hi=Math.max(wordSelection.startWord,wordIdx);
    const selectedWords=words.slice(lo,hi+1).join(' ');
    setWordSelection(p=>({...p,endWord:wordIdx}));
    setSelectedVerse(p=>({...p,text:selectedWords}));
    return true;
  };

  // Touch-drag word selection: press-hold a word, slide finger across to select range
  const onWordTouchStart=(e,verseKey,wordIdx,pName,vi,verseText)=>{
    // Start a hold timer — if held 300ms, enter word-drag mode
    const timer=setTimeout(()=>{
      if(!wordDragRef.current)return;
      wordDragRef.current.engaged=true;
      wordTapRef.current=true;
      // Prevent verse-level drag
      if(dragRef.current){clearTimeout(dragRef.current.timer);dragRef.current=null}
      const words=verseText.split(/\s+/).filter(w=>w.length>0);
      const selectedText=words[wordIdx]||'';
      setWordSelection({verseKey,pName,vi,startWord:wordIdx,endWord:wordIdx,verseText});
      setSelectedVerse({key:verseKey,ref:`${pName}:${vi+1}`,text:selectedText,isWordLevel:true});
      // Vibrate for haptic feedback if available
      if(navigator.vibrate)navigator.vibrate(30);
    },300);
    wordDragRef.current={verseKey,pName,vi,startWord:wordIdx,verseText,engaged:false,timer};
  };

  const onWordTouchMove=(e)=>{
    if(!wordDragRef.current||!wordDragRef.current.engaged)return;
    e.preventDefault(); // prevent scroll while dragging words
    const touch=e.touches[0];
    const el=document.elementFromPoint(touch.clientX,touch.clientY);
    if(!el)return;
    const wordEl=el.closest('[data-widx]');
    if(!wordEl)return;
    const wi=parseInt(wordEl.getAttribute('data-widx'));
    if(isNaN(wi))return;
    // Only extend within same verse
    const vk=wordEl.getAttribute('data-vkey');
    if(vk&&vk!==wordDragRef.current.verseKey)return;
    const d=wordDragRef.current;
    const words=d.verseText.split(/\s+/).filter(w=>w.length>0);
    const lo=Math.min(d.startWord,wi);
    const hi=Math.max(d.startWord,wi);
    const selectedWords=words.slice(lo,hi+1).join(' ');
    setWordSelection(p=>p?{...p,endWord:wi}:{verseKey:d.verseKey,pName:d.pName,vi:d.vi,startWord:d.startWord,endWord:wi,verseText:d.verseText});
    setSelectedVerse(p=>p?{...p,text:selectedWords}:{key:d.verseKey,ref:`${d.pName}:${d.vi+1}`,text:selectedWords,isWordLevel:true});
  };

  const onWordTouchEnd=(e)=>{
    if(!wordDragRef.current)return;
    if(wordDragRef.current.timer){clearTimeout(wordDragRef.current.timer)}
    const wasEngaged=wordDragRef.current.engaged;
    wordDragRef.current=null;
    if(wasEngaged){
      e.preventDefault();
      e.stopPropagation();
      wordTapRef.current=true;
      lastDragWasMove.current=true;
      // Open actions panel (selection already set via touchmove/touchstart)
      setShowActions(true);setShowNote(false);setShowComment(false);
    }
  };

  // ===== BOOK PARAGRAPH ACTIONS =====
  const bookParaKey=(bookId,chIdx,pIdx)=>`${bookId}_${chIdx}_${pIdx}`;

  const hlBookPara=(color)=>{
    if(!selectedBookPara)return;
    const key=bookParaKey(selectedBookPara.bookId,selectedBookPara.chIdx,selectedBookPara.pIdx);
    setBookHighlights(p=>({...p,[key]:color}));
    setShowBookActions(false);setSelectedBookPara(null);
  };

  const clearBookHl=()=>{
    if(!selectedBookPara)return;
    const key=bookParaKey(selectedBookPara.bookId,selectedBookPara.chIdx,selectedBookPara.pIdx);
    setBookHighlights(p=>{const n={...p};delete n[key];return n});
    setShowBookActions(false);setSelectedBookPara(null);
  };

  const copyBookPara=()=>{
    if(!selectedBookPara)return;
    navigator.clipboard.writeText(selectedBookPara.text).then(()=>{
      setCopyMsg(L.copied);setTimeout(()=>setCopyMsg(''),2000);
    }).catch(()=>{});
  };

  const shareBookPara=()=>{
    if(!selectedBookPara)return;
    const book=selectedBookPara.bookTitle||'';
    const ch=selectedBookPara.chTitle||'';
    const text=`"${selectedBookPara.text}"\n\n— ${book}, ${ch}\n${lang==='es'?'Compartido desde Daily Word':lang==='pt'?'Compartilhado do Palavra Diária':'Shared from Daily Word'}`;
    if(navigator.share){navigator.share({text}).catch(()=>{})}
    else{navigator.clipboard.writeText(text).then(()=>{setCopyMsg(L.copied);setTimeout(()=>setCopyMsg(''),2000)}).catch(()=>{})}
  };

  const saveBookNote=()=>{
    if(!selectedBookPara||!noteText.trim())return;
    const entry={id:Date.now(),type:'verse_note',ref:`${selectedBookPara.bookTitle} — ${selectedBookPara.chTitle}`,text:noteText,date:new Date().toISOString()};
    setJournal(p=>[entry,...p]);
    setNoteText('');setShowNote(false);setShowBookActions(false);setSelectedBookPara(null);
    setCopyMsg(L.savedToJournal);setTimeout(()=>setCopyMsg(''),2000);
  };

  const saveBookComment=()=>{
    if(!selectedBookPara||!noteText.trim())return;
    const entry={id:Date.now(),type:'verse_comment',ref:`${selectedBookPara.bookTitle} — ${selectedBookPara.chTitle}`,text:noteText,date:new Date().toISOString()};
    setJournal(p=>[entry,...p]);
    setNoteText('');setShowComment(false);setShowBookActions(false);setSelectedBookPara(null);
    setCopyMsg(L.savedToJournal);setTimeout(()=>setCopyMsg(''),2000);
  };


  // ===== BOOK CHAPTER AUDIO =====

  // Fetch Spanish/Portuguese audio via Amazon Polly (with caching)
  const fetchPollyAudio=async(text,cacheKey)=>{
    if(bookAudioQueueRef.current.prefetched[cacheKey]){
      return bookAudioQueueRef.current.prefetched[cacheKey];
    }
    const url=await getPollyAudio(text);
    bookAudioQueueRef.current.prefetched[cacheKey]=url;
    return url;
  };

  // Read book chapter aloud — tries ElevenLabs first, falls back to Polly, then browser TTS
  const fetchParaAudio=async(text,voiceId,cacheKey)=>{
    if(bookAudioQueueRef.current.prefetched[cacheKey]){
      return bookAudioQueueRef.current.prefetched[cacheKey];
    }
    // Try ElevenLabs first
    try{
      const url=await getElevenLabsAudio(text,voiceId);
      bookAudioQueueRef.current.prefetched[cacheKey]=url;
      return url;
    }catch(e){
      console.log('ElevenLabs failed, trying Polly:',e.message);
      // Fall back to Polly (Matthew for English)
      const url=await getPollyAudio(text,'Matthew');
      bookAudioQueueRef.current.prefetched[cacheKey]=url;
      return url;
    }
  };

  // Browser TTS fallback — reads paragraphs one by one using SpeechSynthesis
  const playBookWithBrowserTTS=(chunks,speakKey)=>{
    const q=bookAudioQueueRef.current;
    let idx=0;
    const speakNext=()=>{
      if(q.cancelled||idx>=chunks.length){
        setSpeaking(null);setAudioLoading(null);audioRef.current=null;
        q.active=false;
        return;
      }
      const utter=new SpeechSynthesisUtterance(chunks[idx]);
      utter.lang=lang==='es'?'es-ES':lang==='pt'?'pt-BR':'en-GB';
      utter.rate=audioSpeed;
      // Try to pick a good voice
      const voices=window.speechSynthesis.getVoices();
      if(lang==='es'){
        const v=voices.find(v=>v.lang.startsWith('es')&&v.name.toLowerCase().includes('mónica'))||
                voices.find(v=>v.lang.startsWith('es'))||null;
        if(v)utter.voice=v;
      }else if(lang==='pt'){
        const v=voices.find(v=>v.lang.startsWith('pt')&&v.name.toLowerCase().includes('vitória'))||
                voices.find(v=>v.lang.startsWith('pt'))||null;
        if(v)utter.voice=v;
      }else{
        const v=voices.find(v=>v.lang.startsWith('en')&&v.name.toLowerCase().includes('daniel'))||
                voices.find(v=>v.lang.startsWith('en-GB'))||
                voices.find(v=>v.lang.startsWith('en')&&!v.name.toLowerCase().includes('google'))||
                voices.find(v=>v.lang.startsWith('en'))||null;
        if(v)utter.voice=v;
      }
      utter.onstart=()=>{setAudioLoading(null);setSpeaking(speakKey)};
      utter.onend=()=>{idx++;speakNext()};
      utter.onerror=()=>{idx++;speakNext()};
      utter._isTTS=true;
      audioRef.current=utter;
      window.speechSynthesis.speak(utter);
    };
    speakNext();
  };

  // Polly queue for Spanish/Portuguese — tries Polly first, falls back to browser TTS
  const playPollyQueue=async(idx)=>{
    const q=bookAudioQueueRef.current;
    if(q.cancelled||idx>=q.paragraphs.length){
      setSpeaking(null);setAudioLoading(null);audioRef.current=null;
      q.active=false;
      Object.values(q.prefetched).forEach(u=>{try{URL.revokeObjectURL(u)}catch(e){}});
      q.prefetched={};
      return;
    }
    const para=q.paragraphs[idx];
    const cacheKey='polly_'+q.speakKey+'_'+idx;
    try{
      const url=await fetchPollyAudio(para,cacheKey);
      if(q.cancelled)return;
      // Prefetch next 2 chunks
      for(let n=1;n<=2;n++){
        if(idx+n<q.paragraphs.length){
          const nk='polly_'+q.speakKey+'_'+(idx+n);
          fetchPollyAudio(q.paragraphs[idx+n],nk).catch(()=>{});
        }
      }
      playAudioUrl(url,audioSpeed,
        ()=>{setAudioLoading(null);setSpeaking(q.speakKey)},
        ()=>{if(!q.cancelled)playPollyQueue(idx+1)},
        ()=>{if(!q.cancelled)playPollyQueue(idx+1)}
      );
    }catch(e){
      console.log('Polly unavailable, falling back to browser TTS:',e.message);
      const remaining=q.paragraphs.slice(idx);
      playBookWithBrowserTTS(remaining,q.speakKey);
    }
  };

  // ElevenLabs queue for English — tries ElevenLabs → Polly → browser TTS
  const playParaQueue=async(idx)=>{
    const q=bookAudioQueueRef.current;
    if(q.cancelled||idx>=q.paragraphs.length){
      setSpeaking(null);setAudioLoading(null);audioRef.current=null;
      q.active=false;
      Object.values(q.prefetched).forEach(u=>{try{URL.revokeObjectURL(u)}catch(e){}});
      q.prefetched={};
      return;
    }
    const para=q.paragraphs[idx];
    const cacheKey='ep_'+q.speakKey+'_'+idx;
    try{
      const url=await fetchParaAudio(para,q.voiceId,cacheKey);
      if(q.cancelled)return;
      // Prefetch next 2 chunks
      for(let n=1;n<=2;n++){
        if(idx+n<q.paragraphs.length){
          const nk='ep_'+q.speakKey+'_'+(idx+n);
          fetchParaAudio(q.paragraphs[idx+n],q.voiceId,nk).catch(()=>{});
        }
      }
      playAudioUrl(url,audioSpeed,
        ()=>{setAudioLoading(null);setSpeaking(q.speakKey)},
        ()=>{if(!q.cancelled)playParaQueue(idx+1)},
        ()=>{if(!q.cancelled)playParaQueue(idx+1)}
      );
    }catch(e){
      console.log('All TTS APIs failed, falling back to browser TTS:',e.message);
      // Fall back to browser TTS for all remaining chunks
      const remaining=q.paragraphs.slice(idx);
      playBookWithBrowserTTS(remaining,q.speakKey);
    }
  };

  const readBookChapter=(bookId,chIdx)=>{
    if(speaking||speakingAll){stopAudio();return}
    const ld=loadedBooks[bookId];
    if(!ld||!ld.chapters||!ld.chapters[chIdx])return;
    const ch=ld.chapters[chIdx];
    const paras=(lang==='es'&&ch.paragraphsEs&&ch.paragraphsEs.length>0)?ch.paragraphsEs:(lang==='pt'&&ch.paragraphsPt&&ch.paragraphsPt.length>0)?ch.paragraphsPt:ch.paragraphs;
    if(!paras||paras.length===0)return;

    const catalog=[...BOOK_CATALOG.psA,...BOOK_CATALOG.psJane].find(b=>b.id===bookId);
    const speakKey=bookId+'_ch'+chIdx;
    setAudioLoading(speakKey);

    // Group paragraphs into chunks
    const chunks=[];
    let current=[];
    let currentLen=0;
    for(const p of paras){
      current.push(p);
      currentLen+=p.length;
      if(currentLen>800){
        chunks.push(current.join('\n\n'));
        current=[];
        currentLen=0;
      }
    }
    if(current.length)chunks.push(current.join('\n\n'));

    // Set up the queue
    const q=bookAudioQueueRef.current;
    q.active=true;
    q.cancelled=false;
    q.paragraphs=chunks;
    q.voiceId=(catalog&&catalog.voiceId)||'JBFqnCBsd6RMkjVDRZzb';
    q.speakKey=speakKey;
    q.prefetched={};

    // Start — Spanish/Portuguese use Polly (Lucia/Camila), English uses ElevenLabs→Polly→BrowserTTS
    if(lang==='es'||lang==='pt'){playPollyQueue(0)}else{playParaQueue(0)}
  };

  const filteredJournal=journalEntries.filter(e=>{
    if(journalTab==='revelations')return e.type==='revelation';
    return e.type==='verse_note'||e.type==='verse_comment';
  }).filter(e=>!searchTerm||e.text.toLowerCase().includes(searchTerm.toLowerCase())||(e.ref&&e.ref.toLowerCase().includes(searchTerm.toLowerCase())));

  const L=LANG[lang]||LANG.en;

  return(
    <div className="app-container">
      {/* GLOBAL ASK CLAUDE BUTTON */}
      <button className="ai-fixed-btn" onClick={()=>{
        if(showAI){setShowAI(false)}
        else{
          // Set context based on current page
          let ctx=passages.join(', ');
          if(planReading&&planReading.ref)ctx=planReading.ref;
          else if(page==='plans'&&planView){
            const plan=READING_PLANS.find(p=>p.id===planView);
            if(plan)ctx=plan.name;
          }
          setAiContext(ctx);setShowAI(true);setAiMessages([]);gaEvent('open_bible_ai',{context:ctx});
        }
      }}>
        {showAI?L.close:(<><svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" style={{width:16,height:16}}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>{L.askClaude}</>)}
      </button>

      {/* SCREENS */}
      {page==='home'&&(
        <div className="screen">
          <div className="brand-name">{lang==='es'?'Futuros':lang==='pt'?'Futuros':'Futures'}</div>
          <div className="quote-card">
            <div className="date">{dateStr}</div>
            <blockquote>{lang==='es'?(quote.textEs||quote.text):lang==='pt'?(quote.textPt||quote.text):quote.text}</blockquote>
            <div className="author">— {quote.author}</div>
          </div>

          {/* FAITH PATHWAY CARD */}
          {pathwayProgress.enrolled&&pathwayData&&(()=>{
            const completed=pathwayProgress.completedDays.length;
            const currentDay=pathwayProgress.currentDay;
            const today=pathwayData.days.find(d=>d.day===currentDay);
            if(completed>=30)return(
              <div className="pathway-card" style={{background:'linear-gradient(135deg,var(--sage),#6b8c5e)',color:'white',padding:20,borderRadius:16,marginBottom:16,cursor:'pointer'}} onClick={()=>setShowPathway(true)}>
                <div style={{fontSize:12,fontWeight:600,textTransform:'uppercase',letterSpacing:1.5,opacity:0.9,marginBottom:6}}>✨ {L.journeyComplete}</div>
                <div style={{fontSize:14,opacity:0.85}}>{L.journeyCompleteMsg}</div>
              </div>
            );
            return(
              <div className="pathway-card" style={{background:'linear-gradient(135deg,#2c3e50,#34495e)',color:'white',padding:20,borderRadius:16,marginBottom:16,cursor:'pointer'}} onClick={()=>{setPathwayViewDay(currentDay);setShowPathway(true)}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <div style={{fontSize:12,fontWeight:600,textTransform:'uppercase',letterSpacing:1.5,opacity:0.8}}>{L.faithJourney}</div>
                  <div style={{fontSize:11,opacity:0.7}}>{(L.journeyProgress||'').replace('{n}',completed)}</div>
                </div>
                <div style={{fontSize:17,fontWeight:600,marginBottom:4}}>{L.todayLesson}: {today?(lang==='es'?(today.titleEs||today.title):lang==='pt'?(today.titlePt||today.title):today.title):''}</div>
                <div style={{fontSize:13,opacity:0.8,marginBottom:12}}>{today?(lang==='es'?(today.themeEs||today.theme):lang==='pt'?(today.themePt||today.theme):today.theme):''}</div>

                  <div style={{flex:1,height:4,background:'rgba(255,255,255,0.2)',borderRadius:2,overflow:'hidden'}}>
                    <div style={{width:(completed/30*100)+'%',height:'100%',background:'var(--gold)',borderRadius:2,transition:'width 0.3s'}}></div>
                  </div>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--gold)'}}>{L.continueJourney} →</div>
                </div>
              </div>
            );
          })()}

          {/* Scripture Search */}
          <div style={{marginBottom:16,position:'relative'}}>
            <form onSubmit={(e)=>{e.preventDefault();doScriptureSearch(scriptureSearch)}} style={{display:'flex',gap:8}}>
              <input className="search-bar" style={{flex:1,marginBottom:0}} placeholder={lang==='es'?'Buscar Escritura... (ej. "amor", "Juan 3:16")':lang==='pt'?'Pesquisar Escritura... (ex. "amor", "João 3:16")':'Search Scripture... (e.g. "love", "John 3:16")'} value={scriptureSearch} onChange={e=>setScriptureSearch(e.target.value)}/>
              <button type="submit" style={{padding:'10px 16px',background:'var(--sage)',color:'white',border:'none',borderRadius:10,fontSize:14,cursor:'pointer',whiteSpace:'nowrap'}} disabled={searchLoading}>
                {searchLoading?(lang==='es'?'...':'...'):<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width:16,height:16}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>}
              </button>
            </form>
            {searchResults!==null&&(
              <div style={{marginTop:12,padding:16,background:'var(--light)',border:'1.5px solid var(--border)',borderRadius:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <span style={{fontSize:12,fontWeight:600,color:'var(--sage)',textTransform:'uppercase',letterSpacing:1}}>{lang==='es'?'Resultados':lang==='pt'?'Resultados':'Results'}</span>
                  <button style={{background:'none',border:'none',fontSize:16,color:'var(--sage)',cursor:'pointer'}} onClick={()=>{setSearchResults(null);setScriptureSearch('')}}>✕</button>
                </div>
                {searchResults.length===0&&<div style={{fontSize:13,color:'var(--sage)',fontStyle:'italic'}}>{lang==='es'?'No se encontraron resultados. Intenta con otra búsqueda.':lang==='pt'?'Nenhum resultado encontrado. Tente uma busca diferente.':'No results found. Try a different search.'}</div>}
                {searchResults.map((r,ri)=>(
                  <div key={ri} style={{marginBottom:ri<searchResults.length-1?16:0}}>
                    <div style={{fontFamily:'Georgia,serif',fontSize:15,fontWeight:600,color:'var(--gold)',marginBottom:6}}>{r.ref}</div>
                    <div style={{fontFamily:'Georgia,serif',fontSize:14,color:'var(--text)',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{r.text.length>600?r.text.slice(0,600)+'...':r.text}</div>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={{marginBottom:20}}>
            <div className="trans-row" style={{marginBottom:10,alignItems:'center',justifyContent:'center'}}>
              {lang==='es'?(
                <button className="trans-btn active">RVR</button>
              ):TRANSLATIONS.map(t=>(
                <button key={t} className={`trans-btn ${translation===t?'active':''}`} onClick={()=>{setTranslation(t);gaEvent('change_translation',{translation:t})}}>{t}</button>
              ))}
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:12}}>
              <div style={{position:'relative'}}>
                <button className={`audio-btn ${speaking||speakingAll?'playing':''}`} style={{padding:'7px 14px',borderRadius:20}} onClick={()=>{if(speaking||speakingAll){stopAudio();setShowSpeedPicker(false)}else{setShowSpeedPicker(!showSpeedPicker)}}} disabled={!!audioLoading}>
                  {audioLoading?<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width:14,height:14,animation:'spin 1s linear infinite'}}><circle cx="12" cy="12" r="10" strokeDasharray="31.4 31.4" strokeLinecap="round"/></svg>:(speaking||speakingAll)?<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>:<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5v14l11-7z"/></svg>}
                  {audioLoading?'...':(speaking||speakingAll)?(lang==='es'?'Parar':lang==='pt'?'Parar':'Stop'):(lang==='es'?'Escuchar':lang==='pt'?'Ouvir':'Listen')}
                </button>
                {showSpeedPicker&&!speaking&&!speakingAll&&(
                  <React.Fragment>
                  <div className="speed-backdrop" onClick={()=>setShowSpeedPicker(false)}/>
                  <div className="speed-picker">
                    <div className="speed-picker-title">{lang==='es'?'Velocidad':lang==='pt'?'Velocidade':'Speed'}</div>
                    <div className="speed-picker-options">
                      {[0.5,0.75,1,1.25,1.5,1.75,2].map(s=>(
                        <button key={s} className={`speed-opt ${audioSpeed===s?'active':''}`} onClick={()=>{changeAudioSpeed(s);setShowSpeedPicker(false);speakAllPassages(passages)}}>
                          {s===1?'1x':s+'x'}
                        </button>
                      ))}
                    </div>
                  </div>
                  </React.Fragment>
                )}
                {(speaking||speakingAll)&&(
                  <div className="speed-live">
                    {[0.5,0.75,1,1.25,1.5,1.75,2].map(s=>(
                      <button key={s} className={`speed-live-btn ${audioSpeed===s?'active':''}`} onClick={()=>changeAudioSpeed(s)}>
                        {s===1?'1x':s+'x'}
                      </button>
                    ))}
                  </div>
                )}
              </div>
              <div className="font-controls">
                <button className="font-btn" onClick={()=>changeFontSize(-0.1)}>A-</button>
                <span className="font-label">{Math.round(fontScale*100)}%</span>
                <button className="font-btn" onClick={()=>changeFontSize(0.1)}>A+</button>
              </div>
            </div>
          </div>
          {loadingTrans&&<div style={{textAlign:'center',fontSize:13,color:'var(--sage)',marginBottom:12}}>{L.loadingTrans}</div>}
          <div style={{textAlign:'center',marginBottom:16}}>
            <button className="comm-btn" style={{fontSize:12,padding:'6px 16px'}} onClick={()=>setPage('settings')}>
              {L.chaptersPerDay}: {setup.chapters||1} &middot; {L.versesPerPassage}: {setup.versesPerPassage||10}
            </button>
          </div>
          <div className="day-nav">
            <button onClick={()=>{setDayOffset(d=>d-1);gaEvent('day_navigate',{direction:'previous'})}}>{L.prev}</button>
            {dayOffset!==0&&<button onClick={()=>{setDayOffset(0);gaEvent('day_navigate',{direction:'today'})}}>{L.today}</button>}
            <button onClick={()=>{setDayOffset(d=>d+1);gaEvent('day_navigate',{direction:'next'})}}>{L.next}</button>
          </div>
          {passages.map((pName,pi)=>{
            const pData=BIBLE[pName]||parsePassage(pName);
            if(!pData)return null;
            const numV=setup.versesPerPassage||10;
            const sources=setup.chapterSources;
            const allVerses=getVerses(pName);
            const verses=allVerses.slice(0,numV);
            if(verses.length===0)return(
              <React.Fragment key={pi}>
              <div className="passage-section" style={{textAlign:'center',padding:'40px 20px',color:'var(--sage)'}}>
                <h2 style={{marginBottom:12}}>{lang==='es'?passageToEs(pName):lang==='pt'?passageToPt(pName):pName}</h2>
                <div style={{fontSize:14}}>{loadingTrans?(lang==='es'?'Cargando...':lang==='pt'?'Carregando...':'Loading...'):(lang==='es'?'No se pudo cargar este pasaje':lang==='pt'?'Não foi possível carregar esta passagem':'Could not load this passage')}</div>
              </div>
              </React.Fragment>
            );
            // Show section divider for each chapter when sources are set
            const showSectionLabel=sources&&sources.length>0&&(setup.chapters||1)>1;
            const sectionKey=showSectionLabel?sources[pi%sources.length]:null;
            const section=sectionKey?BIBLE_SECTIONS[sectionKey]:null;
            return(
              <React.Fragment key={pi}>
              {section&&(
                <div style={{display:'flex',alignItems:'center',gap:10,margin:'18px 0 8px',paddingBottom:8,borderBottom:'1px solid var(--border)'}}>
                  <span style={{fontSize:18}}>{section.emoji}</span>
                  <span style={{fontSize:14,fontWeight:600,color:'var(--sage)',letterSpacing:'0.5px',textTransform:'uppercase'}}>{lang==='es'?section.labelEs:lang==='pt'?(section.labelPt||section.label):section.label}</span>
                </div>
              )}
              <div key={pi} className={`passage-section ${speaking===pName?'now-playing':''}`}>
                <div className="passage-header">
                  <h2>{lang==='es'?passageToEs(pName):lang==='pt'?passageToPt(pName):pName}</h2>
                  <div style={{display:'flex',gap:6}}>
                    {(()=>{const allHl=verses.every((_,vi)=>highlights[vKey(pName,vi)]);return(
                    <button className="comm-btn" style={{borderColor:'var(--gold)',color:'var(--gold)'}} onClick={()=>selectAllDailyPassages()}>
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style={{width:14,height:14,verticalAlign:'middle',marginRight:3}}><rect x="3" y="3" width="18" height="18" rx="2"/>{allHl&&<path d="M9 11l3 3L22 4"/>}</svg>
                      {allHl?(lang==='es'?'Deseleccionar':lang==='pt'?'Desmarcar':'Deselect'):(lang==='es'?'Seleccionar Todo':lang==='pt'?'Selecionar Tudo':'Select All')}
                    </button>)})()}
                    <button className="comm-btn" onClick={()=>{setCommPassage(pName);setShowComm(true);gaEvent('open_commentary',{passage:pName})}}>{L.commentary}</button>
                  </div>
                </div>
                {verses.map((v,vi)=>{
                  const key=vKey(pName,vi);
                  const hlClass=highlights[key]?`hl-${highlights[key]}`:'';
                  const hasIL=!!ilData[key];
                  const isLoading=!!ilLoading[key];
                  const isDragSelected=dragSelect&&dragSelect.pName===pName&&vi>=Math.min(dragSelect.startIdx,dragSelect.endIdx)&&vi<=Math.max(dragSelect.startIdx,dragSelect.endIdx);
                  return(
                    <div key={vi}>
                      <div className={`verse ${hlClass} ${hasIL?'il-verse':''}`}
                        data-vidx={vi}
                        style={isDragSelected?{background:'rgba(196,169,98,0.25)',borderRadius:8}:undefined}
                        onPointerDown={(e)=>onVersePointerDown(e,pName,vi,verses)}
                        onPointerMove={(e)=>onVersePointerMove(e,pName,vi)}
                        onPointerUp={(e)=>onVersePointerUp(e,pName,vi)}
                        onTouchMove={(e)=>onVerseTouchMove(e,pName,verses)}
                        onClick={(e)=>onVerseClick(e,pName,vi,verses)}>
                        <span className="vnum">{vi+1}</span>
                        {hasIL?renderInterlinearVerse(v,key):renderVerse(v,key,pName,vi)}
                      </div>
                      {isLoading&&<div style={{textAlign:'center',fontSize:11,color:'var(--gold)',padding:'4px 0'}}>{lang==='es'?'Cargando':lang==='pt'?'Carregando':'Loading'} {pData.book==='Psalms'||pData.book==='Proverbs'||pData.book==='Isaiah'||pData.book==='Genesis'?(lang==='es'?'Hebreo':lang==='pt'?'Hebraico':'Hebrew'):(lang==='es'?'Griego':lang==='pt'?'Grego':'Greek')}...</div>}
                    </div>
                  );
                })}
              </div>
              </React.Fragment>
            );
          })}
        </div>
      )}

      {page==='journal'&&(
        <div className="screen">
          <h1 className="section-title">{L.journalTitle}</h1>
          <div className="tab-row">
            <button className={`tab-btn ${journalTab==='revelations'?'active':''}`} onClick={()=>setJournalTab('revelations')}>{L.revelations}</button>
            <button className={`tab-btn ${journalTab==='verse_notes'?'active':''}`} onClick={()=>setJournalTab('verse_notes')}>{L.verseNotes}</button>
            <button className={`tab-btn ${journalTab==='devotions'?'active':''}`} onClick={()=>setJournalTab('devotions')}>{L.devotions}</button>
          </div>

          {journalTab!=='devotions'&&(
            <input className="search-bar" placeholder={L.searchEntries} value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
          )}

          {journalTab==='revelations'&&(
            showJournalForm?(
              <div className="add-form">
                <textarea placeholder={L.writeRevelation} value={newJournalText} onChange={e=>setNewJournalText(e.target.value)}/>
                <div className="form-actions">
                  <button className="btn-cancel" onClick={()=>{setShowJournalForm(false);setNewJournalText('')}}>{L.cancel}</button>
                  <button className="btn-save" onClick={addJournalEntry}>{L.save}</button>
                </div>
              </div>
            ):(
              <button className="add-entry-btn" onClick={()=>setShowJournalForm(true)}>{L.newEntry}</button>
            )
          )}

          {journalTab==='devotions'&&(
            <div>
              <button className="video-record-btn" onClick={openVideoModal}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                {L.recordDevotion}
              </button>
              {videoDevotions.length===0?(
                <div className="empty-state">{L.noDevotions}</div>
              ):(
                videoDevotions.map(v=>(
                  <div key={v.id} className={`video-entry ${v.orientation||'landscape'}`}>
                    <video ref={el=>{if(el)videoPlaybackRefs.current[v.id]=el}} playsInline/>
                    {playingVideo!==v.id&&(
                      <button className="ve-play" onClick={()=>playVideo(v.id)}>
                        <svg viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                      </button>
                    )}
                    <div className="ve-overlay">
                      <div className="ve-date">{new Date(v.date).toLocaleDateString(lang==='es'?'es-ES':lang==='pt'?'pt-BR':'en-US',{month:'short',day:'numeric',year:'numeric'})} — {formatTime(v.duration)}</div>
                    </div>
                    <div className="ve-bar">
                      <button className="ve-bar-btn share" onClick={()=>shareVideo(v.id)}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width:16,height:16}}><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                        {L.shareVideo}
                      </button>
                      <button className="ve-bar-btn save" onClick={()=>downloadVideo(v.id)}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width:16,height:16}}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        {L.downloadVideo}
                      </button>
                      <button className="ve-bar-btn del" onClick={()=>deleteVideoEntry(v.id)}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width:16,height:16}}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                        {L.deleteVideo}
                      </button>
                    </div>
                  </div>
                ))
              )}
            </div>
          )}

          {journalTab!=='devotions'&&(
            filteredJournal.length===0?(
              <div className="empty-state">{journalTab==='revelations'?L.noRevelations:L.tapVerse}</div>
            ):(
              filteredJournal.map(e=>(
                <div key={e.id} className="journal-entry">
                  <button className="je-del" onClick={()=>setJournal(p=>p.filter(x=>x.id!==e.id))}>×</button>
                  <div className="je-date">{new Date(e.date).toLocaleDateString(lang==='es'?'es-ES':lang==='pt'?'pt-BR':'en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
                  {e.ref&&<div className="je-ref">{e.ref}</div>}
                  {e.verse&&<div style={{fontSize:13,fontStyle:'italic',color:'var(--text)',opacity:0.6,lineHeight:1.5,marginBottom:8}}>"{e.verse.length>150?e.verse.slice(0,150)+'...':e.verse}"</div>}
                  <div className="je-text">{e.text}</div>
                </div>
              ))
            )
          )}
        </div>
      )}

      {page==='sermons'&&(
        <div className="screen">
          <h1 className="section-title">{L.messagesTitle}</h1>

          {/* CHURCH MESSAGES - locked Spotify feed */}
          <div className="latest-sermon">
            <div className="ls-label" style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:11,background:'rgba(139,157,131,0.15)',color:'var(--sage)',padding:'2px 8px',borderRadius:10,fontWeight:600}}>⛪ {lang==='es'?'Iglesia':lang==='pt'?'Igreja':'Church'}</span>
              {lang==='es'?'Mensajes de la Iglesia':lang==='pt'?'Mensagens da Igreja':'Church Messages'}
            </div>
            {(()=>{
              const id=CHURCH_SPOTIFY.split('/show/')[1].split('?')[0];
              const embedUrl='https://open.spotify.com/embed/show/'+id+'?utm_source=generator&theme=0';
              return React.createElement('iframe',{src:embedUrl,width:'100%',height:'352',frameBorder:'0',allow:'autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture',loading:'lazy',style:{borderRadius:12}});
            })()}
            <div className="sermon-notes-area">
              <textarea placeholder={L.takeNotes} value={liveNotes} onChange={e=>{setLiveNotes(e.target.value);try{localStorage.setItem('dw_livenotes',e.target.value)}catch(e){}}}/>
              <div className="notes-hint">{L.notesAutoSave}</div>
              {liveNotes.trim()&&(
                <div style={{marginTop:10,textAlign:'center'}}>
                  <button className="primary-btn" style={{padding:'10px 24px',fontSize:13}} onClick={()=>{
                    const today=new Date().toISOString().split('T')[0];
                    setSermons(p=>[{title:L.msgNotesLabel+new Date().toLocaleDateString(lang==='es'?'es-ES':lang==='pt'?'pt-BR':'en-US',{month:'long',day:'numeric',year:'numeric'}),date:today,scripture:'',theme:'',audioUrl:'',notes:liveNotes,id:Date.now()},...p]);
                    setLiveNotes('');try{localStorage.setItem('dw_livenotes','')}catch(e){}
                  }}>{L.saveToArchive}</button>
                </div>
              )}
            </div>
          </div>

          {/* YOUR MEDIA - user's personal Spotify/podcast/video feed */}
          <div className="latest-sermon" style={{marginTop:20}}>
            <div className="ls-label" style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:11,background:'rgba(196,169,98,0.15)',color:'var(--gold)',padding:'2px 8px',borderRadius:10,fontWeight:600}}>🎧 {lang==='es'?'Personal':lang==='pt'?'Pessoal':'Personal'}</span>
              {lang==='es'?'Tu Feed de Medios':lang==='pt'?'Seu Feed de Mídia':'Your Media Feed'}
            </div>
            {userSpotify?(()=>{
              let embedUrl=userSpotify;
              if(userSpotify.includes('/show/')){
                const id=userSpotify.split('/show/')[1].split('?')[0];
                embedUrl='https://open.spotify.com/embed/show/'+id+'?utm_source=generator&theme=0';
              }else if(userSpotify.includes('/episode/')){
                const id=userSpotify.split('/episode/')[1].split('?')[0];
                embedUrl='https://open.spotify.com/embed/episode/'+id+'?utm_source=generator&theme=0';
              }else if(userSpotify.includes('/playlist/')){
                const id=userSpotify.split('/playlist/')[1].split('?')[0];
                embedUrl='https://open.spotify.com/embed/playlist/'+id+'?utm_source=generator&theme=0';
              }
              return React.createElement('iframe',{src:embedUrl,width:'100%',height:'352',frameBorder:'0',allow:'autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture',loading:'lazy',style:{borderRadius:12}});
            })():(
              <div style={{padding:20,background:'var(--light)',borderRadius:12,textAlign:'center'}}>
                <div style={{fontSize:14,color:'var(--sage)',marginBottom:8}}>{lang==='es'?'Agrega tu propio enlace de Spotify, podcast o video en Ajustes':lang==='pt'?'Adicione seu próprio link do Spotify, podcast ou vídeo em Configurações':'Add your own Spotify, podcast or video link in Settings'}</div>
                <button className="comm-btn" onClick={()=>setPage('settings')}>{L.goToSettings}</button>
              </div>
            )}
          </div>

          {/* PAST MESSAGES / ARCHIVE */}
          <div className="past-msgs-divider">{L.archive}</div>

          {showSermonForm?(
            <div className="add-form">
              <input placeholder={L.msgTitle} value={sermonForm.title} onChange={e=>setSermonForm(p=>({...p,title:e.target.value}))}/>
              <input type="date" value={sermonForm.date} onChange={e=>setSermonForm(p=>({...p,date:e.target.value}))} style={{padding:'12px 16px',border:'1.5px solid var(--border)',borderRadius:12,background:'var(--light)',color:'var(--text)',fontSize:15}}/>
              <input placeholder={L.keyScripture} value={sermonForm.scripture} onChange={e=>setSermonForm(p=>({...p,scripture:e.target.value}))}/>
              <input placeholder={L.speakerTheme} value={sermonForm.theme} onChange={e=>setSermonForm(p=>({...p,theme:e.target.value}))}/>
              <input placeholder={L.audioLink} value={sermonForm.audioUrl} onChange={e=>setSermonForm(p=>({...p,audioUrl:e.target.value}))}/>
              <div className="audio-hint">{L.audioHint}</div>
              <textarea placeholder={L.notes} value={sermonForm.notes} onChange={e=>setSermonForm(p=>({...p,notes:e.target.value}))}/>
              <div className="form-actions">
                <button className="btn-cancel" onClick={()=>{setShowSermonForm(false);setSermonForm({title:'',scripture:'',theme:'',notes:'',audioUrl:'',date:''});setEditSermonId(null)}}>{L.cancel}</button>
                <button className="btn-save" onClick={saveSermon}>{editSermonId?L.update:L.save}</button>
              </div>
            </div>
          ):(
            <button className="add-entry-btn" onClick={()=>setShowSermonForm(true)}>{L.addPastMessage}</button>
          )}
          {sermonIdeas.length===0?(
            <div className="empty-state">{L.noArchived}</div>
          ):(
            sermonIdeas.map(s=>(
              <div key={s.id} className="sermon-card">
