know your statutes.", "Let my heart be blameless toward your decrees,\nthat I may not be disappointed.", "My soul faints for your salvation.\nI hope in your word.", "My eyes fail for your word.\nI say, \u201cWhen will you comfort me?\u201d", "For I have become like a wineskin in the smoke.\nI don\u2019t forget your statutes.", "How many are the days of your servant?\nWhen will you execute judgment on those who persecute me?", "The proud have dug pits for me,\ncontrary to your law.", "All of your commandments are faithful.\nThey persecute me wrongfully.\nHelp me!", "They had almost wiped me from the earth,\nbut I didn\u2019t forsake your precepts.", "Preserve my life according to your loving kindness,\nso I will obey the statutes of your mouth.", "Yahweh, your word is settled in heaven forever.", "Your faithfulness is to all generations.\nYou have established the earth, and it remains.", "Your laws remain to this day,\nfor all things serve you.", "Unless your law had been my delight,\nI would have perished in my affliction.", "I will never forget your precepts,\nfor with them, you have revived me.", "I am yours.\nSave me, for I have sought your precepts.", "The wicked have waited for me, to destroy me.\nI will consider your statutes.", "I have seen a limit to all perfection,\nbut your commands are boundless.", "How I love your law!\nIt is my meditation all day.", "Your commandments make me wiser than my enemies,\nfor your commandments are always with me.", "I have more understanding than all my teachers,\nfor your testimonies are my meditation.", "I understand more than the aged,\nbecause I have kept your precepts.", "I have kept my feet from every evil way,\nthat I might observe your word.", "I have not turned away from your ordinances,\nfor you have taught me.", "How sweet are your promises to my taste,\nmore than honey to my mouth!", "Through your precepts, I get understanding;\ntherefore I hate every false way.", "Your word is a lamp to my feet,\nand a light for my path.", "I have sworn, and have confirmed it,\nthat I will obey your righteous ordinances.", "I am afflicted very much.\nRevive me, Yahweh, according to your word.", "Accept, I beg you, the willing offerings of my mouth.\nYahweh, teach me your ordinances.", "My soul is continually in my hand,\nyet I won\u2019t forget your law.", "The wicked have laid a snare for me,\nyet I haven\u2019t gone astray from your precepts.", "I have taken your testimonies as a heritage forever,\nfor they are the joy of my heart.", "I have set my heart to perform your statutes forever,\neven to the end.", "I hate double-minded men,\nbut I love your law.", "You are my hiding place and my shield.\nI hope in your word.", "Depart from me, you evildoers,\nthat I may keep the commandments of my God.", "Uphold me according to your word, that I may live.\nLet me not be ashamed of my hope.", "Hold me up, and I will be safe,\nand will have respect for your statutes continually.", "You reject all those who stray from your statutes,\nfor their deceit is in vain.", "You put away all the wicked of the earth like dross.\nTherefore I love your testimonies.", "My flesh trembles for fear of you.\nI am afraid of your judgments.", "I have done what is just and righteous.\nDon\u2019t leave me to my oppressors.", "Ensure your servant\u2019s well-being.\nDon\u2019t let the proud oppress me.", "My eyes fail looking for your salvation,\nfor your righteous word.", "Deal with your servant according to your loving kindness.\nTeach me your statutes.", "I am your servant. Give me understanding,\nthat I may know your testimonies.", "It is time to act, Yahweh,\nfor they break your law.", "Therefore I love your commandments more than gold,\nyes, more than pure gold.", "Therefore I consider all of your precepts to be right.\nI hate every false way.", "Your testimonies are wonderful,\ntherefore my soul keeps them.", "The entrance of your words gives light.\nIt gives understanding to the simple.", "I opened my mouth wide and panted,\nfor I longed for your commandments.", "Turn to me, and have mercy on me,\nas you always do to those who love your name.", "Establish my footsteps in your word.\nDon\u2019t let any iniquity have dominion over me.", "Redeem me from the oppression of man,\nso I will observe your precepts.", "Make your face shine on your servant.\nTeach me your statutes.", "Streams of tears run down my eyes,\nbecause they don\u2019t observe your law.", "You are righteous, Yahweh.\nYour judgments are upright.", "You have commanded your statutes in righteousness.\nThey are fully trustworthy.", "My zeal wears me out,\nbecause my enemies ignore your words.", "Your promises have been thoroughly tested,\nand your servant loves them.", "I am small and despised.\nI don\u2019t forget your precepts.", "Your righteousness is an everlasting righteousness.\nYour law is truth.", "Trouble and anguish have taken hold of me.\nYour commandments are my delight.", "Your testimonies are righteous forever.\nGive me understanding, that I may live.", "I have called with my whole heart.\nAnswer me, Yahweh!\nI will keep your statutes.", "I have called to you. Save me!\nI will obey your statutes.", "I rise before dawn and cry for help.\nI put my hope in your words.", "My eyes stay open through the night watches,\nthat I might meditate on your word.", "Hear my voice according to your loving kindness.\nRevive me, Yahweh, according to your ordinances.", "They draw near who follow after wickedness.\nThey are far from your law.", "You are near, Yahweh.\nAll your commandments are truth.", "Of old I have known from your testimonies,\nthat you have founded them forever.", "Consider my affliction, and deliver me,\nfor I don\u2019t forget your law.", "Plead my cause, and redeem me!\nRevive me according to your promise.", "Salvation is far from the wicked,\nfor they don\u2019t seek your statutes.", "Great are your tender mercies, Yahweh.\nRevive me according to your ordinances.", "Many are my persecutors and my adversaries.\nI haven\u2019t swerved from your testimonies.", "I look at the faithless with loathing,\nbecause they don\u2019t observe your word.", "Consider how I love your precepts.\nRevive me, Yahweh, according to your loving kindness.", "All of your words are truth.\nEvery one of your righteous ordinances endures forever.", "Princes have persecuted me without a cause,\nbut my heart stands in awe of your words.", "I rejoice at your word,\nas one who finds great plunder.", "I hate and abhor falsehood.\nI love your law.", "Seven times a day, I praise you,\nbecause of your righteous ordinances.", "Those who love your law have great peace.\nNothing causes them to stumble.", "I have hoped for your salvation, Yahweh.\nI have done your commandments.", "My soul has observed your testimonies.\nI love them exceedingly.", "I have obeyed your precepts and your testimonies,\nfor all my ways are before you.", "Let my cry come before you, Yahweh.\nGive me understanding according to your word.", "Let my supplication come before you.\nDeliver me according to your word.", "Let my lips utter praise,\nfor you teach me your statutes.", "Let my tongue sing of your word,\nfor all your commandments are righteousness.", "Let your hand be ready to help me,\nfor I have chosen your precepts.", "I have longed for your salvation, Yahweh.\nYour law is my delight.", "Let my soul live, that I may praise you.\nLet your ordinances help me.", "I have gone astray like a lost sheep.\nSeek your servant, for I don\u2019t forget your commandments."]},
"Proverbs 3":{book:"Proverbs",ch:3,verses:["My son, don\u2019t forget my teaching;\nbut let your heart keep my commandments:", "for length of days, and years of life,\nand peace, will they add to you.", "Don\u2019t let kindness and truth forsake you.\nBind them around your neck.\nWrite them on the tablet of your heart.", "So you will find favor,\nand good understanding in the sight of God and man.", "Trust in Yahweh with all your heart,\nand don\u2019t lean on your own understanding.", "In all your ways acknowledge him,\nand he will make your paths straight.", "Don\u2019t be wise in your own eyes.\nFear Yahweh, and depart from evil.", "It will be health to your body,\nand nourishment to your bones.", "Honor Yahweh with your substance,\nwith the first fruits of all your increase:", "so your barns will be filled with plenty,\nand your vats will overflow with new wine.", "My son, don\u2019t despise Yahweh\u2019s discipline,\nneither be weary of his reproof:", "for whom Yahweh loves, he reproves;\neven as a father reproves the son in whom he delights.", "Happy is the man who finds wisdom,\nthe man who gets understanding.", "For her good profit is better than getting silver,\nand her return is better than fine gold.", "She is more precious than rubies.\nNone of the things you can desire are to be compared to her.", "Length of days is in her right hand.\nIn her left hand are riches and honor.", "Her ways are ways of pleasantness.\nAll her paths are peace.", "She is a tree of life to those who lay hold of her.\nHappy is everyone who retains her.", "By wisdom Yahweh founded the earth.\nBy understanding, he established the heavens.", "By his knowledge, the depths were broken up,\nand the skies drop down the dew.", "My son, let them not depart from your eyes.\nKeep sound wisdom and discretion:", "so they will be life to your soul,\nand grace for your neck.", "Then you shall walk in your way securely.\nYour foot won\u2019t stumble.", "When you lie down, you will not be afraid.\nYes, you will lie down, and your sleep will be sweet.", "Don\u2019t be afraid of sudden fear,\nneither of the desolation of the wicked, when it comes:", "for Yahweh will be your confidence,\nand will keep your foot from being taken.", "Don\u2019t withhold good from those to whom it is due,\nwhen it is in the power of your hand to do it.", "Don\u2019t say to your neighbor, \u201cGo, and come again;\ntomorrow I will give it to you,\u201d\nwhen you have it by you.", "Don\u2019t devise evil against your neighbor,\nsince he dwells securely by you.", "Don\u2019t strive with a man without cause,\nif he has done you no harm.", "Don\u2019t envy the man of violence.\nChoose none of his ways.", "For the perverse is an abomination to Yahweh,\nbut his friendship is with the upright.", "Yahweh\u2019s curse is in the house of the wicked,\nbut he blesses the habitation of the righteous.", "Surely he mocks the mockers,\nbut he gives grace to the humble.", "The wise will inherit glory,\nbut shame will be the promotion of fools."]},
"Isaiah 40":{book:"Isaiah",ch:40,verses:["\u201cComfort, comfort my people,\u201d says your God.", "\u201cSpeak comfortably to Jerusalem; and call out to her that her warfare is accomplished, that her iniquity is pardoned, that she has received of Yahweh\u2019s hand double for all her sins.\u201d", "The voice of one who calls out,\n\u201cPrepare the way of Yahweh in the wilderness!\nMake a level highway in the desert for our God.", "Every valley shall be exalted,\nand every mountain and hill shall be made low.\nThe uneven shall be made level,\nand the rough places a plain.", "Yahweh\u2019s glory shall be revealed,\nand all flesh shall see it together;\nfor the mouth of Yahweh has spoken it.\u201d", "The voice of one saying, \u201cCry!\u201d\nOne said, \u201cWhat shall I cry?\u201d\n\u201cAll flesh is like grass,\nand all its glory is like the flower of the field.", "The grass withers,\nthe flower fades,\nbecause Yahweh\u2019s breath blows on it.\nSurely the people are like grass.", "The grass withers,\nthe flower fades;\nbut the word of our God stands forever.\u201d", "You who tell good news to Zion, go up on a high mountain.\nYou who tell good news to Jerusalem, lift up your voice with strength.\nLift it up. Don\u2019t be afraid.\nSay to the cities of Judah, \u201cBehold, your God!\u201d", "Behold, the Lord Yahweh will come as a mighty one,\nand his arm will rule for him.\nBehold, his reward is with him,\nand his recompense before him.", "He will feed his flock like a shepherd.\nHe will gather the lambs in his arm,\nand carry them in his bosom.\nHe will gently lead those who have their young.", "Who has measured the waters in the hollow of his hand,\nand marked off the sky with his span,\nand calculated the dust of the earth in a measuring basket,\nand weighed the mountains in scales,\nand the hills in a balance?", "Who has directed Yahweh\u2019s Spirit,\nor has taught him as his counselor?", "Who did he take counsel with,\nand who instructed him,\nand taught him in the path of justice,\nand taught him knowledge,\nand showed him the way of understanding?", "Behold, the nations are like a drop in a bucket,\nand are regarded as a speck of dust on a balance.\nBehold, he lifts up the islands like a very little thing.", "Lebanon is not sufficient to burn,\nnor its animals sufficient for a burnt offering.", "All the nations are like nothing before him.\nThey are regarded by him as less than nothing, and vanity.", "To whom then will you liken God?\nOr what likeness will you compare to him?", "A workman has cast an image,\nand the goldsmith overlays it with gold,\nand casts silver chains for it.", "He who is too impoverished for such an offering chooses a tree that will not rot.\nHe seeks a skillful workman to set up a carved image for him that will not be moved.", "Haven\u2019t you known?\nHaven\u2019t you heard?\nHaven\u2019t you been told from the beginning?\nHaven\u2019t you understood from the foundations of the earth?", "It is he who sits above the circle of the earth,\nand its inhabitants are like grasshoppers;\nwho stretches out the heavens like a curtain,\nand spreads them out like a tent to dwell in;", "who brings princes to nothing;\nwho makes the judges of the earth like meaningless.", "They are planted scarcely.\nThey are sown scarcely.\nTheir stock has scarcely taken root in the ground.\nHe merely blows on them, and they wither,\nand the whirlwind takes them away as stubble.", "\u201cTo whom then will you liken me?\nWho is my equal?\u201d says the Holy One.", "Lift up your eyes on high,\nand see who has created these,\nwho brings out their army by number.\nHe calls them all by name.\nby the greatness of his might,\nand because he is strong in power,\nNot one is lacking.", "Why do you say, Jacob,\nand speak, Israel,\n\u201cMy way is hidden from Yahweh,\nand the justice due me is disregarded by my God?\u201d", "Haven\u2019t you known?\nHaven\u2019t you heard?\nThe everlasting God, Yahweh,\nThe Creator of the ends of the earth, doesn\u2019t faint.\nHe isn\u2019t weary.\nHis understanding is unsearchable.", "He gives power to the weak.\nHe increases the strength of him who has no might.", "Even the youths faint and get weary,\nand the young men utterly fall;", "But those who wait for Yahweh will renew their strength.\nThey will mount up with wings like eagles.\nThey will run, and not be weary.\nThey will walk, and not faint."]},
"Isaiah 55":{book:"Isaiah",ch:55,verses:["\u201cHey! Come, everyone who thirsts, to the waters!\nCome, he who has no money, buy, and eat!\nYes, come, buy wine and milk without money and without price.", "Why do you spend money for that which is not bread,\nand your labor for that which doesn\u2019t satisfy?\nListen diligently to me, and eat that which is good,\nand let your soul delight itself in richness.", "Turn your ear, and come to me.\nHear, and your soul will live:\nand I will make an everlasting covenant with you, even the sure mercies of David.", "Behold, I have given him for a witness to the peoples,\na leader and commander to the peoples.", "Behold, you shall call a nation that you don\u2019t know;\nand a nation that didn\u2019t know you shall run to you,\nbecause of Yahweh your God,\nand for the Holy One of Israel;\nfor he has glorified you.\u201d", "Seek Yahweh while he may be found.\nCall on him while he is near.", "Let the wicked forsake his way,\nand the unrighteous man his thoughts.\nLet him return to Yahweh, and he will have mercy on him;\nand to our God, for he will freely pardon.", "\u201cFor my thoughts are not your thoughts,\nand your ways are not my ways,\u201d says Yahweh.", "\u201cFor as the heavens are higher than the earth,\nso are my ways higher than your ways,\nand my thoughts than your thoughts.", "For as the rain comes down and the snow from the sky,\nand doesn\u2019t return there, but waters the earth,\nand makes it grow and bud,\nand gives seed to the sower and bread to the eater;", "so is my word that goes out of my mouth:\nit will not return to me void,\nbut it will accomplish that which I please,\nand it will prosper in the thing I sent it to do.", "For you shall go out with joy,\nand be led out with peace.\nThe mountains and the hills will break out before you into singing;\nand all the trees of the fields will clap their hands.", "Instead of the thorn the cypress tree will come up;\nand instead of the brier the myrtle tree will come up:\nand it will make a name for Yahweh,\nfor an everlasting sign that will not be cut off.\u201d"]},
"Genesis 1":{book:"Genesis",ch:1,verses:["In the beginning, God created the heavens and the earth.", "The earth was formless and empty. Darkness was on the surface of the deep and God\u2019s Spirit was hovering over the surface of the waters.", "God said, \u201cLet there be light,\u201d and there was light.", "God saw the light, and saw that it was good. God divided the light from the darkness.", "God called the light \u201cday\u201d, and the darkness he called \u201cnight\u201d. There was evening and there was morning, the first day.", "God said, \u201cLet there be an expanse in the middle of the waters, and let it divide the waters from the waters.\u201d", "God made the expanse, and divided the waters which were under the expanse from the waters which were above the expanse; and it was so.", "God called the expanse \u201csky\u201d. There was evening and there was morning, a second day.", "God said, \u201cLet the waters under the sky be gathered together to one place, and let the dry land appear\u201d; and it was so.", "God called the dry land \u201cearth\u201d, and the gathering together of the waters he called \u201cseas\u201d. God saw that it was good.", "God said, \u201cLet the earth yield grass, herbs yielding seeds, and fruit trees bearing fruit after their kind, with their seeds in it, on the earth\u201d; and it was so.", "The earth yielded grass, herbs yielding seed after their kind, and trees bearing fruit, with their seeds in it, after their kind; and God saw that it was good.", "There was evening and there was morning, a third day.", "God said, \u201cLet there be lights in the expanse of the sky to divide the day from the night; and let them be for signs to mark seasons, days, and years;", "and let them be for lights in the expanse of the sky to give light on the earth\u201d; and it was so.", "God made the two great lights: the greater light to rule the day, and the lesser light to rule the night. He also made the stars.", "God set them in the expanse of the sky to give light to the earth,", "and to rule over the day and over the night, and to divide the light from the darkness. God saw that it was good.", "There was evening and there was morning, a fourth day.", "God said, \u201cLet the waters abound with living creatures, and let birds fly above the earth in the open expanse of the sky.\u201d", "God created the large sea creatures and every living creature that moves, with which the waters swarmed, after their kind, and every winged bird after its kind. God saw that it was good.", "God blessed them, saying, \u201cBe fruitful, and multiply, and fill the waters in the seas, and let birds multiply on the earth.\u201d", "There was evening and there was morning, a fifth day.", "God said, \u201cLet the earth produce living creatures after their kind, livestock, creeping things, and animals of the earth after their kind\u201d; and it was so.", "God made the animals of the earth after their kind, and the livestock after their kind, and everything that creeps on the ground after its kind. God saw that it was good.", "God said, \u201cLet us make man in our image, after our likeness: and let them have dominion over the fish of the sea, and over the birds of the sky, and over the livestock, and over all the earth, and over every creeping thing that creeps on the earth.\u201d", "God created man in his own image. In God\u2019s image he created him; male and female he created them.", "God blessed them. God said to them, \u201cBe fruitful, multiply, fill the earth, and subdue it. Have dominion over the fish of the sea, over the birds of the sky, and over every living thing that moves on the earth.\u201d", "God said, \u201cBehold, I have given you every herb yielding seed, which is on the surface of all the earth, and every tree, which bears fruit yielding seed. It will be your food.", "To every animal of the earth, and to every bird of the sky, and to everything that creeps on the earth, in which there is life, I have given every green herb for food;\u201d and it was so.", "God saw everything that he had made, and, behold, it was very good. There was evening and there was morning, a sixth day."]},
"Matthew 5":{book:"Matthew",ch:5,verses:["Seeing the multitudes, he went up onto the mountain. When he had sat down, his disciples came to him.", "He opened his mouth and taught them, saying,", "\u201cBlessed are the poor in spirit,\nfor theirs is the Kingdom of Heaven.", "Blessed are those who mourn,\nfor they shall be comforted.", "Blessed are the gentle,\nfor they shall inherit the earth.", "Blessed are those who hunger and thirst after righteousness,\n\nfor they shall be filled.", "Blessed are the merciful,\nfor they shall obtain mercy.", "Blessed are the pure in heart,\nfor they shall see God.", "Blessed are the peacemakers,\nfor they shall be called children of God.", "Blessed are those who have been persecuted for righteousness\u2019 sake,\n\nfor theirs is the Kingdom of Heaven.", "\u201cBlessed are you when people reproach you, persecute you, and say all kinds of evil against you falsely, for my sake.", "Rejoice, and be exceedingly glad, for great is your reward in heaven. For that is how they persecuted the prophets who were before you.", "\u201cYou are the salt of the earth, but if the salt has lost its flavor, with what will it be salted? It is then good for nothing, but to be cast out and trodden under the feet of men.", "You are the light of the world. A city located on a hill can\u2019t be hidden.", "Neither do you light a lamp, and put it under a measuring basket, but on a stand; and it shines to all who are in the house.", "Even so, let your light shine before men; that they may see your good works, and glorify your Father who is in heaven.", "\u201cDon\u2019t think that I came to destroy the law or the prophets. I didn\u2019t come to destroy, but to fulfill.", "For most certainly, I tell you, until heaven and earth pass away, not even one smallest letter\nor one tiny pen stroke\nshall in any way pass away from the law, until all things are accomplished.", "Whoever, therefore, shall break one of these least commandments, and teach others to do so, shall be called least in the Kingdom of Heaven; but whoever shall do and teach them shall be called great in the Kingdom of Heaven.", "For I tell you that unless your righteousness exceeds that of the scribes and Pharisees, there is no way you will enter into the Kingdom of Heaven.", "\u201cYou have heard that it was said to the ancient ones, \u2018You shall not murder;\u2019\nand \u2018Whoever murders will be in danger of the judgment.\u2019", "But I tell you, that everyone who is angry with his brother without a cause\n\n\nwill be in danger of the judgment; and whoever says to his brother, \u2018Raca!\u2019\n\nwill be in danger of the council; and whoever says, \u2018You fool!\u2019 will be in danger of the fire of Gehenna.", "\u201cIf therefore you are offering your gift at the altar, and there remember that your brother has anything against you,", "leave your gift there before the altar, and go your way. First be reconciled to your brother, and then come and offer your gift.", "Agree with your adversary quickly, while you are with him on the way; lest perhaps the prosecutor deliver you to the judge, and the judge deliver you to the officer, and you be cast into prison.", "Most certainly I tell you, you shall by no means get out of there, until you have paid the last penny.", "\u201cYou have heard that it was said,\n\n\u2018You shall not commit adultery;\u2019", "but I tell you that everyone who gazes at a woman to lust after her has committed adultery with her already in his heart.", "If your right eye causes you to stumble, pluck it out and throw it away from you. For it is more profitable for you that one of your members should perish, than for your whole body to be cast into Gehenna.", "If your right hand causes you to stumble, cut it off, and throw it away from you. For it is more profitable for you that one of your members should perish, than for your whole body to be cast into Gehenna.", "\u201cIt was also said, \u2018Whoever shall put away his wife, let him give her a writing of divorce,\u2019", "but I tell you that whoever puts away his wife, except for the cause of sexual immorality, makes her an adulteress; and whoever marries her when she is put away commits adultery.", "\u201cAgain you have heard that it was said to them of old time, \u2018You shall not make false vows, but shall perform to the Lord your vows,\u2019", "but I tell you, don\u2019t swear at all: neither by heaven, for it is the throne of God;", "nor by the earth, for it is the footstool of his feet; nor by Jerusalem, for it is the city of the great King.", "Neither shall you swear by your head, for you can\u2019t make one hair white or black.", "But let your \u2018Yes\u2019 be \u2018Yes\u2019 and your \u2018No\u2019 be \u2018No.\u2019 Whatever is more than these is of the evil one.", "\u201cYou have heard that it was said, \u2018An eye for an eye, and a tooth for a tooth.\u2019", "But I tell you, don\u2019t resist him who is evil; but whoever strikes you on your right cheek, turn to him the other also.", "If anyone sues you to take away your coat, let him have your cloak also.", "Whoever compels you to go one mile, go with him two.", "Give to him who asks you, and don\u2019t turn away him who desires to borrow from you.", "\u201cYou have heard that it was said, \u2018You shall love your neighbor\n\nand hate your enemy.\u2019", "But I tell you, love your enemies, bless those who curse you, do good to those who hate you, and pray for those who mistreat you and persecute you,", "that you may be children of your Father who is in heaven. For he makes his sun to rise on the evil and the good, and sends rain on the just and the unjust.", "For if you love those who love you, what reward do you have? Don\u2019t even the tax collectors do the same?", "If you only greet your friends, what more do you do than others? Don\u2019t even the tax collectors\ndo the same?", "Therefore you shall be perfect, just as your Father in heaven is perfect."]},
"Matthew 6":{book:"Matthew",ch:6,verses:["\u201cBe careful that you don\u2019t do your charitable giving before men, to be seen by them, or else you have no reward from your Father who is in heaven.", "Therefore when you do merciful deeds, don\u2019t sound a trumpet before yourself, as the hypocrites do in the synagogues and in the streets, that they may get glory from men. Most certainly I tell you, they have received their reward.", "But when you do merciful deeds, don\u2019t let your left hand know what your right hand does,", "so that your merciful deeds may be in secret, then your Father who sees in secret will reward you openly.", "\u201cWhen you pray, you shall not be as the hypocrites, for they love to stand and pray in the synagogues and in the corners of the streets, that they may be seen by men. Most certainly, I tell you, they have received their reward.", "But you, when you pray, enter into your inner room, and having shut your door, pray to your Father who is in secret, and your Father who sees in secret will reward you openly.", "In praying, don\u2019t use vain repetitions, as the Gentiles do; for they think that they will be heard for their much speaking.", "Therefore don\u2019t be like them, for your Father knows what things you need, before you ask him.", "Pray like this: \u2018Our Father in heaven, may your name be kept holy.", "Let your Kingdom come. Let your will be done, as in heaven, so on earth.", "Give us today our daily bread.", "Forgive us our debts, as we also forgive our debtors.", "Bring us not into temptation, but deliver us from the evil one. For yours is the Kingdom, the power, and the glory forever. Amen.\u2019", "\u201cFor if you forgive men their trespasses, your heavenly Father will also forgive you.", "But if you don\u2019t forgive men their trespasses, neither will your Father forgive your trespasses.", "\u201cMoreover when you fast, don\u2019t be like the hypocrites, with sad faces. For they disfigure their faces, that they may be seen by men to be fasting. Most certainly I tell you, they have received their reward.", "But you, when you fast, anoint your head, and wash your face;", "so that you are not seen by men to be fasting, but by your Father who is in secret, and your Father, who sees in secret, will reward you.", "\u201cDon\u2019t lay up treasures for yourselves on the earth, where moth and rust consume, and where thieves break through and steal;", "but lay up for yourselves treasures in heaven, where neither moth nor rust consume, and where thieves don\u2019t break through and steal;", "for where your treasure is, there your heart will be also.", "\u201cThe lamp of the body is the eye. If therefore your eye is sound, your whole body will be full of light.", "But if your eye is evil, your whole body will be full of darkness. If therefore the light that is in you is darkness, how great is the darkness!", "\u201cNo one can serve two masters, for either he will hate the one and love the other; or else he will be devoted to one and despise the other. You can\u2019t serve both God and Mammon.", "Therefore I tell you, don\u2019t be anxious for your life: what you will eat, or what you will drink; nor yet for your body, what you will wear. Isn\u2019t life more than food, and the body more than clothing?", "See the birds of the sky, that they don\u2019t sow, neither do they reap, nor gather into barns. Your heavenly Father feeds them. Aren\u2019t you of much more value than they?", "\u201cWhich of you, by being anxious, can add one moment\nto his lifespan?", "Why are you anxious about clothing? Consider the lilies of the field, how they grow. They don\u2019t toil, neither do they spin,", "yet I tell you that even Solomon in all his glory was not dressed like one of these.", "But if God so clothes the grass of the field, which today exists, and tomorrow is thrown into the oven, won\u2019t he much more clothe you, you of little faith?", "\u201cTherefore don\u2019t be anxious, saying, \u2018What will we eat?\u2019, \u2018What will we drink?\u2019 or, \u2018With what will we be clothed?\u2019", "For the Gentiles seek after all these things; for your heavenly Father knows that you need all these things.", "But seek first God\u2019s Kingdom, and his righteousness; and all these things will be given to you as well.", "Therefore don\u2019t be anxious for tomorrow, for tomorrow will be anxious for itself. Each day\u2019s own evil is sufficient."]},
"John 1":{book:"John",ch:1,verses:["In the beginning was the Word, and the Word was with God, and the Word was God.", "The same was in the beginning with God.", "All things were made through him. Without him was not anything made that has been made.", "In him was life, and the life was the light of men.", "The light shines in the darkness, and the darkness hasn\u2019t overcome\n it.", "There came a man, sent from God, whose name was John.", "The same came as a witness, that he might testify about the light, that all might believe through him.", "He was not the light, but was sent that he might testify about the light.", "The true light that enlightens everyone was coming into the world.", "He was in the world, and the world was made through him, and the world didn\u2019t recognize him.", "He came to his own, and those who were his own didn\u2019t receive him.", "But as many as received him, to them he gave the right to become God\u2019s children, to those who believe in his name:", "who were born not of blood, nor of the will of the flesh, nor of the will of man, but of God.", "The Word became flesh, and lived among us. We saw his glory, such glory as of the one and only Son of the Father, full of grace and truth.", "John testified about him. He cried out, saying, \u201cThis was he of whom I said, \u2018He who comes after me has surpassed me, for he was before me.\u2019\u201d", "From his fullness we all received grace upon grace.", "For the law was given through Moses. Grace and truth were realized through Jesus Christ.", "No one has seen God at any time. The one and only Son, who is in the bosom of the Father, he has declared him.", "This is John\u2019s testimony, when the Jews sent priests and Levites from Jerusalem to ask him, \u201cWho are you?\u201d", "He declared, and didn\u2019t deny, but he declared, \u201cI am not the Christ.\u201d", "They asked him, \u201cWhat then? Are you Elijah?\u201d\nHe said, \u201cI am not.\u201d\n\u201cAre you the prophet?\u201d\nHe answered, \u201cNo.\u201d", "They said therefore to him, \u201cWho are you? Give us an answer to take back to those who sent us. What do you say about yourself?\u201d", "He said, \u201cI am the voice of one crying in the wilderness, \u2018Make straight the way of the Lord,\u2019 as Isaiah the prophet said.\u201d", "The ones who had been sent were from the Pharisees.", "They asked him, \u201cWhy then do you baptize, if you are not the Christ, nor Elijah, nor the prophet?\u201d", "John answered them, \u201cI baptize in water, but among you stands one whom you don\u2019t know.", "He is the one who comes after me, who is preferred before me, whose sandal strap I\u2019m not worthy to loosen.\u201d", "These things were done in Bethany beyond the Jordan, where John was baptizing.", "The next day, he saw Jesus coming to him, and said, \u201cBehold, the Lamb of God, who takes away the sin of the world!", "This is he of whom I said, \u2018After me comes a man who is preferred before me, for he was before me.\u2019", "I didn\u2019t know him, but for this reason I came baptizing in water: that he would be revealed to Israel.\u201d", "John testified, saying, \u201cI have seen the Spirit descending like a dove out of heaven, and it remained on him.", "I didn\u2019t recognize him, but he who sent me to baptize in water, he said to me, \u2018On whomever you will see the Spirit descending, and remaining on him, the same is he who baptizes in the Holy Spirit.\u2019", "I have seen, and have testified that this is the Son of God.\u201d", "Again, the next day, John was standing with two of his disciples,", "and he looked at Jesus as he walked, and said, \u201cBehold, the Lamb of God!\u201d", "The two disciples heard him speak, and they followed Jesus.", "Jesus turned, and saw them following, and said to them,\n\u201cWhat are you looking for?\u201d\nThey said to him, \u201cRabbi\u201d (which is to say, being interpreted, Teacher), \u201cwhere are you staying?\u201d", "He said to them,\n\u201cCome, and see.\u201d\nThey came and saw where he was staying, and they stayed with him that day. It was about the tenth hour.", "One of the two who heard John, and followed him, was Andrew, Simon Peter\u2019s brother.", "He first found his own brother, Simon, and said to him, \u201cWe have found the Messiah!\u201d (which is, being interpreted, Christ).", "He brought him to Jesus. Jesus looked at him, and said,\n\u201cYou are Simon the son of Jonah. You shall be called Cephas\u201d (which is by interpretation, Peter).", "On the next day, he was determined to go out into Galilee, and he found Philip. Jesus said to him,\n\u201cFollow me.\u201d", "Now Philip was from Bethsaida, of the city of Andrew and Peter.", "Philip found Nathanael, and said to him, \u201cWe have found him, of whom Moses in the law, and the prophets, wrote: Jesus of Nazareth, the son of Joseph.\u201d", "Nathanael said to him, \u201cCan any good thing come out of Nazareth?\u201d\nPhilip said to him, \u201cCome and see.\u201d", "Jesus saw Nathanael coming to him, and said about him,\n\u201cBehold, an Israelite indeed, in whom is no deceit!\u201d", "Nathanael said to him, \u201cHow do you know me?\u201d\nJesus answered him,\n\u201cBefore Philip called you, when you were under the fig tree, I saw you.\u201d", "Nathanael answered him, \u201cRabbi, you are the Son of God! You are King of Israel!\u201d", "Jesus answered him,\n\u201cBecause I told you, \u2018I saw you underneath the fig tree,\u2019 do you believe? You will see greater things than these!\u201d", "He said to him,\n\u201cMost certainly, I tell you all, hereafter you will see heaven opened, and the angels of God ascending and descending on the Son of Man.\u201d"]},
"John 3":{book:"John",ch:3,verses:["Now there was a man of the Pharisees named Nicodemus, a ruler of the Jews.", "The same came to him by night, and said to him, \u201cRabbi, we know that you are a teacher come from God, for no one can do these signs that you do, unless God is with him.\u201d", "Jesus answered him,\n\u201cMost certainly, I tell you, unless one is born anew,\n\nhe can\u2019t see God\u2019s Kingdom.\u201d", "Nicodemus said to him, \u201cHow can a man be born when he is old? Can he enter a second time into his mother\u2019s womb, and be born?\u201d", "Jesus answered,\n\u201cMost certainly I tell you, unless one is born of water and spirit, he can\u2019t enter into God\u2019s Kingdom.", "That which is born of the flesh is flesh. That which is born of the Spirit is spirit.", "Don\u2019t marvel that I said to you, \u2018You must be born anew.\u2019", "The wind\nblows where it wants to, and you hear its sound, but don\u2019t know where it comes from and where it is going. So is everyone who is born of the Spirit.\u201d", "Nicodemus answered him, \u201cHow can these things be?\u201d", "Jesus answered him,\n\u201cAre you the teacher of Israel, and don\u2019t understand these things?", "Most certainly I tell you, we speak that which we know, and testify of that which we have seen, and you don\u2019t receive our witness.", "If I told you earthly things and you don\u2019t believe, how will you believe if I tell you heavenly things?", "No one has ascended into heaven, but he who descended out of heaven, the Son of Man, who is in heaven.", "As Moses lifted up the serpent in the wilderness, even so must the Son of Man be lifted up,", "that whoever believes in him should not perish, but have eternal life.", "For God so loved the world, that he gave his one and only Son, that whoever believes in him should not perish, but have eternal life.", "For God didn\u2019t send his Son into the world to judge the world, but that the world should be saved through him.", "He who believes in him is not judged. He who doesn\u2019t believe has been judged already, because he has not believed in the name of the one and only Son of God.", "This is the judgment, that the light has come into the world, and men loved the darkness rather than the light; for their works were evil.", "For everyone who does evil hates the light, and doesn\u2019t come to the light, lest his works would be exposed.", "But he who does the truth comes to the light, that his works may be revealed, that they have been done in God.\u201d", "After these things, Jesus came with his disciples into the land of Judea. He stayed there with them, and baptized.", "John also was baptizing in Enon near Salim, because there was much water there. They came, and were baptized.", "For John was not yet thrown into prison.", "There arose therefore a questioning on the part of John\u2019s disciples with some Jews about purification.", "They came to John, and said to him, \u201cRabbi, he who was with you beyond the Jordan, to whom you have testified, behold, the same baptizes, and everyone is coming to him.\u201d", "John answered, \u201cA man can receive nothing, unless it has been given him from heaven.", "You yourselves testify that I said, \u2018I am not the Christ,\u2019 but, \u2018I have been sent before him.\u2019", "He who has the bride is the bridegroom; but the friend of the bridegroom, who stands and hears him, rejoices greatly because of the bridegroom\u2019s voice. This, my joy, therefore is made full.", "He must increase, but I must decrease.", "He who comes from above is above all. He who is from the earth belongs to the earth, and speaks of the earth. He who comes from heaven is above all.", "What he has seen and heard, of that he testifies; and no one receives his witness.", "He who has received his witness has set his seal to this, that God is true.", "For he whom God has sent speaks the words of God; for God gives the Spirit without measure.", "The Father loves the Son, and has given all things into his hand.", "One who believes in the Son has eternal life, but one who disobeys\n the Son won\u2019t see life, but the wrath of God remains on him.\u201d"]},
"John 14":{book:"John",ch:14,verses:["\u201cDon\u2019t let your heart be troubled. Believe in God. Believe also in me.", "In my Father\u2019s house are many homes. If it weren\u2019t so, I would have told you. I am going to prepare a place for you.", "If I go and prepare a place for you, I will come again, and will receive you to myself; that where I am, you may be there also.", "Where I go, you know, and you know the way.\u201d", "Thomas said to him, \u201cLord, we don\u2019t know where you are going. How can we know the way?\u201d", "Jesus said to him,\n\u201cI am the way, the truth, and the life. No one comes to the Father, except through me.", "If you had known me, you would have known my Father also. From now on, you know him, and have seen him.\u201d", "Philip said to him, \u201cLord, show us the Father, and that will be enough for us.\u201d", "Jesus said to him,\n\u201cHave I been with you such a long time, and do you not know me, Philip? He who has seen me has seen the Father. How do you say, \u2018Show us the Father?\u2019", "Don\u2019t you believe that I am in the Father, and the Father in me? The words that I tell you, I speak not from myself; but the Father who lives in me does his works.", "Believe me that I am in the Father, and the Father in me; or else believe me for the very works\u2019 sake.", "Most certainly I tell you, he who believes in me, the works that I do, he will do also; and he will do greater works than these, because I am going to my Father.", "Whatever you will ask in my name, that will I do, that the Father may be glorified in the Son.", "If you will ask anything in my name, I will do it.", "If you love me, keep my commandments.", "I will pray to the Father, and he will give you another Counselor,\n\nthat he may be with you forever,\u2014", "the Spirit of truth, whom the world can\u2019t receive; for it doesn\u2019t see him, neither knows him. You know him, for he lives with you, and will be in you.", "I will not leave you orphans. I will come to you.", "Yet a little while, and the world will see me no more; but you will see me. Because I live, you will live also.", "In that day you will know that I am in my Father, and you in me, and I in you.", "One who has my commandments, and keeps them, that person is one who loves me. One who loves me will be loved by my Father, and I will love him, and will reveal myself to him.\u201d", "Judas (not Iscariot) said to him, \u201cLord, what has happened that you are about to reveal yourself to us, and not to the world?\u201d", "Jesus answered him,\n\u201cIf a man loves me, he will keep my word. My Father will love him, and we will come to him, and make our home with him.", "He who doesn\u2019t love me doesn\u2019t keep my words. The word which you hear isn\u2019t mine, but the Father\u2019s who sent me.", "I have said these things to you, while still living with you.", "But the Counselor, the Holy Spirit, whom the Father will send in my name, he will teach you all things, and will remind you of all that I said to you.", "Peace I leave with you. My peace I give to you; not as the world gives, give I to you. Don\u2019t let your heart be troubled, neither let it be fearful.", "You heard how I told you, \u2018I go away, and I come to you.\u2019 If you loved me, you would have rejoiced, because I said \u2018I am going to my Father;\u2019 for the Father is greater than I.", "Now I have told you before it happens so that, when it happens, you may believe.", "I will no more speak much with you, for the prince of the world comes, and he has nothing in me.", "But that the world may know that I love the Father, and as the Father commanded me, even so I do. Arise, let us go from here."]},
"John 15":{book:"John",ch:15,verses:["\u201cI am the true vine, and my Father is the farmer.", "Every branch in me that doesn\u2019t bear fruit, he takes away. Every branch that bears fruit, he prunes, that it may bear more fruit.", "You are already pruned clean because of the word which I have spoken to you.", "Remain in me, and I in you. As the branch can\u2019t bear fruit by itself, unless it remains in the vine, so neither can you, unless you remain in me.", "I am the vine. You are the branches. He who remains in me, and I in him, the same bears much fruit, for apart from me you can do nothing.", "If a man doesn\u2019t remain in me, he is thrown out as a branch, and is withered; and they gather them, throw them into the fire, and they are burned.", "If you remain in me, and my words remain in you, you will ask whatever you desire, and it will be done for you.", "\u201cIn this is my Father glorified, that you bear much fruit; and so you will be my disciples.", "Even as the Father has loved me, I also have loved you. Remain in my love.", "If you keep my commandments, you will remain in my love; even as I have kept my Father\u2019s commandments, and remain in his love.", "I have spoken these things to you, that my joy may remain in you, and that your joy may be made full.", "\u201cThis is my commandment, that you love one another, even as I have loved you.", "Greater love has no one than this, that someone lay down his life for his friends.", "You are my friends, if you do whatever I command you.", "No longer do I call you servants, for the servant doesn\u2019t know what his lord does. But I have called you friends, for everything that I heard from my Father, I have made known to you.", "You didn\u2019t choose me, but I chose you, and appointed you, that you should go and bear fruit, and that your fruit should remain; that whatever you will ask of the Father in my name, he may give it to you.", "\u201cI command these things to you, that you may love one another.", "If the world hates you, you know that it has hated me before it hated you.", "If you were of the world, the world would love its own. But because you are not of the world, since I chose you out of the world, therefore the world hates you.", "Remember the word that I said to you: \u2018A servant is not greater than his lord.\u2019\nIf they persecuted me, they will also persecute you. If they kept my word, they will also keep yours.", "But all these things will they do to you for my name\u2019s sake, because they don\u2019t know him who sent me.", "If I had not come and spoken to them, they would not have had sin; but now they have no excuse for their sin.", "He who hates me, hates my Father also.", "If I hadn\u2019t done among them the works which no one else did, they wouldn\u2019t have had sin. But now have they seen and also hated both me and my Father.", "But this happened so that the word may be fulfilled which was written in their law, \u2018They hated me without a cause.\u2019", "\u201cWhen the Counselor\nhas come, whom I will send to you from the Father, the Spirit of truth, who proceeds from the Father, he will testify about me.", "You will also testify, because you have been with me from the beginning."]},
"Romans 8":{book:"Romans",ch:8,verses:["There is therefore now no condemnation to those who are in Christ Jesus, who don\u2019t walk according to the flesh, but according to the Spirit.", "For the law of the Spirit of life in Christ Jesus made me free from the law of sin and of death.", "For what the law couldn\u2019t do, in that it was weak through the flesh, God did, sending his own Son in the likeness of sinful flesh and for sin, he condemned sin in the flesh;", "that the ordinance of the law might be fulfilled in us, who walk not after the flesh, but after the Spirit.", "For those who live according to the flesh set their minds on the things of the flesh, but those who live according to the Spirit, the things of the Spirit.", "For the mind of the flesh is death, but the mind of the Spirit is life and peace;", "because the mind of the flesh is hostile towards God; for it is not subject to God\u2019s law, neither indeed can it be.", "Those who are in the flesh can\u2019t please God.", "But you are not in the flesh but in the Spirit, if it is so that the Spirit of God dwells in you. But if any man doesn\u2019t have the Spirit of Christ, he is not his.", "If Christ is in you, the body is dead because of sin, but the spirit is alive because of righteousness.", "But if the Spirit of him who raised up Jesus from the dead dwells in you, he who raised up Christ Jesus from the dead will also give life to your mortal bodies through his Spirit who dwells in you.", "So then, brothers, we are debtors, not to the flesh, to live after the flesh.", "For if you live after the flesh, you must die; but if by the Spirit you put to death the deeds of the body, you will live.", "For as many as are led by the Spirit of God, these are children of God.", "For you didn\u2019t receive the spirit of bondage again to fear, but you received the Spirit of adoption, by whom we cry, \u201cAbba! Father!\u201d", "The Spirit himself testifies with our spirit that we are children of God;", "and if children, then heirs; heirs of God, and joint heirs with Christ; if indeed we suffer with him, that we may also be glorified with him.", "For I consider that the sufferings of this present time are not worthy to be compared with the glory which will be revealed toward us.", "For the creation waits with eager expectation for the children of God to be revealed.", "For the creation was subjected to vanity, not of its own will, but because of him who subjected it, in hope", "that the creation itself also will be delivered from the bondage of decay into the liberty of the glory of the children of God.", "For we know that the whole creation groans and travails in pain together until now.", "Not only so, but ourselves also, who have the first fruits of the Spirit, even we ourselves groan within ourselves, waiting for adoption, the redemption of our body.", "For we were saved in hope, but hope that is seen is not hope. For who hopes for that which he sees?", "But if we hope for that which we don\u2019t see, we wait for it with patience.", "In the same way, the Spirit also helps our weaknesses, for we don\u2019t know how to pray as we ought. But the Spirit himself makes intercession for us with groanings which can\u2019t be uttered.", "He who searches the hearts knows what is on the Spirit\u2019s mind, because he makes intercession for the saints according to God.", "We know that all things work together for good for those who love God, to those who are called according to his purpose.", "For whom he foreknew, he also predestined to be conformed to the image of his Son, that he might be the firstborn among many brothers.", "Whom he predestined, those he also called. Whom he called, those he also justified. Whom he justified, those he also glorified.", "What then shall we say about these things? If God is for us, who can be against us?", "He who didn\u2019t spare his own Son, but delivered him up for us all, how would he not also with him freely give us all things?", "Who could bring a charge against God\u2019s chosen ones? It is God who justifies.", "Who is he who condemns? It is Christ who died, yes rather, who was raised from the dead, who is at the right hand of God, who also makes intercession for us.", "Who shall separate us from the love of Christ? Could oppression, or anguish, or persecution, or famine, or nakedness, or peril, or sword?", "Even as it is written,\n\u201cFor your sake we are killed all day long.\nWe were accounted as sheep for the slaughter.\u201d", "No, in all these things, we are more than conquerors through him who loved us.", "For I am persuaded that neither death, nor life, nor angels, nor principalities, nor things present, nor things to come, nor powers,", "nor height, nor depth, nor any other created thing, will be able to separate us from God\u2019s love, which is in Christ Jesus our Lord."]},
"1 Corinthians 13":{book:"1 Corinthians",ch:13,verses:["If I speak with the languages of men and of angels, but don\u2019t have love, I have become sounding brass, or a clanging cymbal.", "If I have the gift of prophecy, and know all mysteries and all knowledge; and if I have all faith, so as to remove mountains, but don\u2019t have love, I am nothing.", "If I give away all my goods to feed the poor, and if I give my body to be burned, but don\u2019t have love, it profits me nothing.", "Love is patient and is kind; love doesn\u2019t envy. Love doesn\u2019t brag, is not proud,", "doesn\u2019t behave itself inappropriately, doesn\u2019t seek its own way, is not provoked, takes no account of evil;", "doesn\u2019t rejoice in unrighteousness, but rejoices with the truth;", "bears all things, believes all things, hopes all things, endures all things.", "Love never fails. But where there are prophecies, they will be done away with. Where there are various languages, they will cease. Where there is knowledge, it will be done away with.", "For we know in part, and we prophesy in part;", "but when that which is complete has come, then that which is partial will be done away with.", "When I was a child, I spoke as a child, I felt as a child, I thought as a child. Now that I have become a man, I have put away childish things.", "For now we see in a mirror, dimly, but then face to face. Now I know in part, but then I will know fully, even as I was also fully known.", "But now faith, hope, and love remain\u2014these three. The greatest of these is love."]},
"Ephesians 6":{book:"Ephesians",ch:6,verses:["Children, obey your parents in the Lord, for this is right.", "\u201cHonor your father and mother,\u201d which is the first commandment with a promise:", "\u201cthat it may be well with you, and you may live long on the earth.\u201d", "You fathers, don\u2019t provoke your children to wrath, but nurture them in the discipline and instruction of the Lord.", "Servants, be obedient to those who according to the flesh are your masters, with fear and trembling, in singleness of your heart, as to Christ;", "not in the way of service only when eyes are on you, as men pleasers; but as servants of Christ, doing the will of God from the heart;", "with good will doing service, as to the Lord, and not to men;", "knowing that whatever good thing each one does, he will receive the same again from the Lord, whether he is bound or free.", "You masters, do the same things to them, and give up threatening, knowing that he who is both their Master and yours is in heaven, and there is no partiality with him.", "Finally, be strong in the Lord, and in the strength of his might.", "Put on the whole armor of God, that you may be able to stand against the wiles of the devil.", "For our wrestling is not against flesh and blood, but against the principalities, against the powers, against the world\u2019s rulers of the darkness of this age, and against the spiritual forces of wickedness in the heavenly places.", "Therefore put on the whole armor of God, that you may be able to withstand in the evil day, and, having done all, to stand.", "Stand therefore, having the utility belt of truth buckled around your waist, and having put on the breastplate of righteousness,", "and having fitted your feet with the preparation of the Good News of peace;", "above all, taking up the shield of faith, with which you will be able to quench all the fiery darts of the evil one.", "And take the helmet of salvation, and the sword of the Spirit, which is the word of God;", "with all prayer and requests, praying at all times in the Spirit, and being watchful to this end in all perseverance and requests for all the saints:", "on my behalf, that utterance may be given to me in opening my mouth, to make known with boldness the mystery of the Good News,", "for which I am an ambassador in chains; that in it I may speak boldly, as I ought to speak.", "But that you also may know my affairs, how I am doing, Tychicus, the beloved brother and faithful servant in the Lord, will make known to you all things;", "whom I have sent to you for this very purpose, that you may know our state, and that he may comfort your hearts.", "Peace be to the brothers, and love with faith, from God the Father and the Lord Jesus Christ.", "Grace be with all those who love our Lord Jesus Christ with incorruptible love. Amen."]},
"Philippians 4":{book:"Philippians",ch:4,verses:["Therefore, my brothers, beloved and longed for, my joy and crown, so stand firm in the Lord, my beloved.", "I exhort Euodia, and I exhort Syntyche, to think the same way in the Lord.", "Yes, I beg you also, true partner, help these women, for they labored with me in the Good News, with Clement also, and the rest of my fellow workers, whose names are in the book of life.", "Rejoice in the Lord always! Again I will say, \u201cRejoice!\u201d", "Let your gentleness be known to all men. The Lord is at hand.", "In nothing be anxious, but in everything, by prayer and petition with thanksgiving, let your requests be made known to God.", "And the peace of God, which surpasses all understanding, will guard your hearts and your thoughts in Christ Jesus.", "Finally, brothers, whatever things are true, whatever things are honorable, whatever things are just, whatever things are pure, whatever things are lovely, whatever things are of good report; if there is any virtue, and if there is any praise, think about these things.", "The things which you learned, received, heard, and saw in me: do these things, and the God of peace will be with you.", "But I rejoice in the Lord greatly, that now at length you have revived your thought for me; in which you did indeed take thought, but you lacked opportunity.", "Not that I speak because of lack, for I have learned in whatever state I am, to be content in it.", "I know how to be humbled, and I know also how to abound. In everything and in all things I have learned the secret both to be filled and to be hungry, both to abound and to be in need.", "I can do all things through Christ, who strengthens me.", "However you did well that you shared in my affliction.", "You yourselves also know, you Philippians, that in the beginning of the Good News, when I departed from Macedonia, no assembly shared with me in the matter of giving and receiving but you only.", "For even in Thessalonica you sent once and again to my need.", "Not that I seek for the gift, but I seek for the fruit that increases to your account.", "But I have all things, and abound. I am filled, having received from Epaphroditus the things that came from you, a sweet-smelling fragrance, an acceptable and well-pleasing sacrifice to God.", "My God will supply every need of yours according to his riches in glory in Christ Jesus.", "Now to our God and Father be the glory forever and ever! Amen.", "Greet every saint in Christ Jesus. The brothers who are with me greet you.", "All the saints greet you, especially those who are of Caesar\u2019s household.", "The grace of the Lord Jesus Christ be with you all. Amen."]},
"Hebrews 11":{book:"Hebrews",ch:11,verses:["Now faith is assurance of things hoped for, proof of things not seen.", "For by this, the elders obtained testimony.", "By faith, we understand that the universe has been framed by the word of God, so that what is seen has not been made out of things which are visible.", "By faith, Abel offered to God a more excellent sacrifice than Cain, through which he had testimony given to him that he was righteous, God testifying with respect to his gifts; and through it he, being dead, still speaks.", "By faith, Enoch was taken away, so that he wouldn\u2019t see death, and he was not found, because God translated him. For he has had testimony given to him that before his translation he had been well pleasing to God.", "Without faith it is impossible to be well pleasing to him, for he who comes to God must believe that he exists, and that he is a rewarder of those who seek him.", "By faith, Noah, being warned about things not yet seen, moved with godly fear, prepared a ship for the saving of his house, through which he condemned the world, and became heir of the righteousness which is according to faith.", "By faith, Abraham, when he was called, obeyed to go out to the place which he was to receive for an inheritance. He went out, not knowing where he went.", "By faith, he lived as an alien in the land of promise, as in a land not his own, dwelling in tents, with Isaac and Jacob, the heirs with him of the same promise.", "For he looked for the city which has the foundations, whose builder and maker is God.", "By faith, even Sarah herself received power to conceive, and she bore a child when she was past age, since she counted him faithful who had promised.", "Therefore as many as the stars of the sky in multitude, and as innumerable as the sand which is by the sea shore, were fathered by one man, and him as good as dead.", "These all died in faith, not having received the promises, but having seen them and embraced them from afar, and having confessed that they were strangers and pilgrims on the earth.", "For those who say such things make it clear that they are seeking a country of their own.", "If indeed they had been thinking of that country from which they went out, they would have had enough time to return.", "But now they desire a better country, that is, a heavenly one. Therefore God is not ashamed of them, to be called their God, for he has prepared a city for them.", "By faith, Abraham, being tested, offered up Isaac. Yes, he who had gladly received the promises was offering up his one and only son,", "to whom it was said, \u201cyour offspring will be accounted as from Isaac\u201d;", "concluding that God is able to raise up even from the dead. Figuratively speaking, he also did receive him back from the dead.", "By faith, Isaac blessed Jacob and Esau, even concerning things to come.", "By faith, Jacob, when he was dying, blessed each of the sons of Joseph, and worshiped, leaning on the top of his staff.", "By faith, Joseph, when his end was near, made mention of the departure of the children of Israel; and gave instructions concerning his bones.", "By faith, Moses, when he was born, was hidden for three months by his parents, because they saw that he was a beautiful child, and they were not afraid of the king\u2019s commandment.", "By faith, Moses, when he had grown up, refused to be called the son of Pharaoh\u2019s daughter,", "choosing rather to share ill treatment with God\u2019s people, than to enjoy the pleasures of sin for a time;", "accounting the reproach of Christ greater riches than the treasures of Egypt; for he looked to the reward.", "By faith, he left Egypt, not fearing the wrath of the king; for he endured, as seeing him who is invisible.", "By faith, he kept the Passover, and the sprinkling of the blood, that the destroyer of the firstborn should not touch them.", "By faith, they passed through the Red Sea as on dry land. When the Egyptians tried to do so, they were swallowed up.", "By faith, the walls of Jericho fell down, after they had been encircled for seven days.", "By faith, Rahab the prostitute, didn\u2019t perish with those who were disobedient, having received the spies in peace.", "What more shall I say? For the time would fail me if I told of Gideon, Barak, Samson, Jephthah, David, Samuel, and the prophets;", "who, through faith subdued kingdoms, worked out righteousness, obtained promises, stopped the mouths of lions,", "quenched the power of fire, escaped the edge of the sword, from weakness were made strong, grew mighty in war, and caused foreign armies to flee.", "Women received their dead by resurrection. Others were tortured, not accepting their deliverance, that they might obtain a better resurrection.", "Others were tried by mocking and scourging, yes, moreover by bonds and imprisonment.", "They were stoned. They were sawn apart. They were tempted. They were slain with the sword. They went around in sheep skins and in goat skins; being destitute, afflicted, ill-treated", "(of whom the world was not worthy), wandering in deserts, mountains, caves, and the holes of the earth.", "These all, having had testimony given to them through their faith, didn\u2019t receive the promise,", "God having provided some better thing concerning us, so that apart from us they should not be made perfect."]},
"James 1":{book:"James",ch:1,verses:["James, a servant of God and of the Lord Jesus Christ, to the twelve tribes which are in the Dispersion: Greetings.", "Count it all joy, my brothers, when you fall into various temptations,", "knowing that the testing of your faith produces endurance.", "Let endurance have its perfect work, that you may be perfect and complete, lacking in nothing.", "But if any of you lacks wisdom, let him ask of God, who gives to all liberally and without reproach; and it will be given to him.", "But let him ask in faith, without any doubting, for he who doubts is like a wave of the sea, driven by the wind and tossed.", "For that man shouldn\u2019t think that he will receive anything from the Lord.", "He is a double-minded man, unstable in all his ways.", "But let the brother in humble circumstances glory in his high position;", "and the rich, in that he is made humble, because like the flower in the grass, he will pass away.", "For the sun arises with the scorching wind, and withers the grass, and the flower in it falls, and the beauty of its appearance perishes. So also will the rich man fade away in his pursuits.", "Blessed is the man who endures temptation, for when he has been approved, he will receive the crown of life, which the Lord promised to those who love him.", "Let no man say when he is tempted, \u201cI am tempted by God,\u201d for God can\u2019t be tempted by evil, and he himself tempts no one.", "But each one is tempted when he is drawn away by his own lust, and enticed.", "Then the lust, when it has conceived, bears sin; and the sin, when it is full grown, produces death.", "Don\u2019t be deceived, my beloved brothers.", "Every good gift and every perfect gift is from above, coming down from the Father of lights, with whom can be no variation, nor turning shadow.", "Of his own will he gave birth to us by the word of truth, that we should be a kind of first fruits of his creatures.", "So, then, my beloved brothers, let every man be swift to hear, slow to speak, and slow to anger;", "for the anger of man doesn\u2019t produce the righteousness of God.", "Therefore, putting away all filthiness and overflowing of wickedness, receive with humility the implanted word, which is able to save your souls.", "But be doers of the word, and not only hearers, deluding your own selves.", "For if anyone is a hearer of the word and not a doer, he is like a man looking at his natural face in a mirror;", "for he sees himself, and goes away, and immediately forgets what kind of man he was.", "But he who looks into the perfect law of freedom, and continues, not being a hearer who forgets, but a doer of the work, this man will be blessed in what he does.", "If anyone among you thinks himself to be religious while he doesn\u2019t bridle his tongue, but deceives his heart, this man\u2019s religion is worthless.", "Pure religion and undefiled before our God and Father is this: to visit the fatherless and widows in their affliction, and to keep oneself unstained by the world."]},
"Revelation 1":{book:"Revelation",ch:1,verses:["This is the Revelation of Jesus Christ, which God gave him to show to his servants the things which must happen soon, which he sent and made known by his angel to his servant, John,", "who testified to God\u2019s word, and of the testimony of Jesus Christ, about everything that he saw.", "Blessed is he who reads and those who hear the words of the prophecy, and keep the things that are written in it, for the time is at hand.", "John, to the seven assemblies that are in Asia: Grace to you and peace, from God, who is and who was and who is to come; and from the seven Spirits who are before his throne;", "and from Jesus Christ, the faithful witness, the firstborn of the dead, and the ruler of the kings of the earth. To him who loves us, and washed us from our sins by his blood;", "and he made us to be a Kingdom, priests to his God and Father; to him be the glory and the dominion forever and ever. Amen.", "Behold, he is coming with the clouds, and every eye will see him, including those who pierced him. All the tribes of the earth will mourn over him. Even so, Amen.", "\u201cI am the Alpha and the Omega,\u201d says the Lord God,\n\u201cwho is and who was and who is to come, the Almighty.\u201d", "I John, your brother and partner with you in the oppression, Kingdom, and perseverance in Christ Jesus, was on the isle that is called Patmos because of God\u2019s Word and the testimony of Jesus Christ.", "I was in the Spirit on the Lord\u2019s day, and I heard behind me a loud voice, like a trumpet", "saying,\n\u201cWhat you see, write in a book and send to the seven assemblies:\n to Ephesus, Smyrna, Pergamum, Thyatira, Sardis, Philadelphia, and to Laodicea.\u201d", "I turned to see the voice that spoke with me. Having turned, I saw seven golden lamp stands.", "And among the lamp stands was one like a son of man, clothed with a robe reaching down to his feet, and with a golden sash around his chest.", "His head and his hair were white as white wool, like snow. His eyes were like a flame of fire.", "His feet were like burnished brass, as if it had been refined in a furnace. His voice was like the voice of many waters.", "He had seven stars in his right hand. Out of his mouth proceeded a sharp two-edged sword. His face was like the sun shining at its brightest.", "When I saw him, I fell at his feet like a dead man.\nHe laid his right hand on me, saying,\n\u201cDon\u2019t be afraid. I am the first and the last,", "and the Living one. I was dead, and behold, I am alive forever and ever. Amen. I have the keys of Death and of Hades.", "Write therefore the things which you have seen, and the things which are, and the things which will happen hereafter;", "the mystery of the seven stars which you saw in my right hand, and the seven golden lamp stands. The seven stars are the angels\nof the seven assemblies. The seven lamp stands are seven assemblies."]}
};
