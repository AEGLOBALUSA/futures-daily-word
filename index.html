"Salmos 23":{book:"Salmos",ch:23,verses:["Jehov\u00e1 es mi pastor; nada me faltar\u00e1.","En lugares de delicados pastos me har\u00e1 descansar; junto a aguas de reposo me pastorear\u00e1.","Confortar\u00e1 mi alma; me guiar\u00e1 por sendas de justicia por amor de su nombre.","Aunque ande en valle de sombra de muerte, no temer\u00e9 mal alguno, porque t\u00fa estar\u00e1s conmigo; tu vara y tu cayado me infundir\u00e1n aliento.","Aderezas mesa delante de m\u00ed en presencia de mis angustiadores; unges mi cabeza con aceite; mi copa est\u00e1 rebosando.","Ciertamente el bien y la misericordia me seguir\u00e1n todos los d\u00edas de mi vida, y en la casa de Jehov\u00e1 morar\u00e9 por largos d\u00edas."]},
"Salmos 91":{book:"Salmos",ch:91,verses:["El que habita al abrigo del Alt\u00edsimo morar\u00e1 bajo la sombra del Omnipotente.","Dir\u00e9 yo a Jehov\u00e1: Esperanza m\u00eda, y castillo m\u00edo; mi Dios, en quien confiar\u00e9.","El te librar\u00e1 del lazo del cazador, de la peste destructora.","Con sus plumas te cubrir\u00e1, y debajo de sus alas estar\u00e1s seguro; escudo y adarga es su verdad.","No temer\u00e1s el terror nocturno, ni saeta que vuele de d\u00eda,","Ni pestilencia que ande en oscuridad, ni mortandad que en medio del d\u00eda destruya.","Caer\u00e1n a tu lado mil, y diez mil a tu diestra; mas a ti no llegar\u00e1.","Ciertamente con tus ojos mirar\u00e1s y ver\u00e1s la recompensa de los imp\u00edos.","Porque has puesto a Jehov\u00e1, que es mi esperanza, al Alt\u00edsimo por tu habitaci\u00f3n,","No te sobrevendr\u00e1 mal, ni plaga tocar\u00e1 tu morada.","Pues a sus \u00e1ngeles mandar\u00e1 acerca de ti, que te guarden en todos tus caminos.","En las manos te llevar\u00e1n, para que tu pie no tropiece en piedra.","Sobre el le\u00f3n y el \u00e1spid pisar\u00e1s; hollar\u00e1s al cachorro del le\u00f3n y al drag\u00f3n.","Por cuanto en m\u00ed ha puesto su amor, yo tambi\u00e9n lo librar\u00e9; le pondr\u00e9 en alto, por cuanto ha conocido mi nombre.","Me invocar\u00e1, y yo le responder\u00e9; con \u00e9l estar\u00e9 yo en la angustia; lo librar\u00e9 y le glorificar\u00e9.","De larga vida lo saciar\u00e9, y le mostrar\u00e9 mi salvaci\u00f3n."]},
"Salmos 119":{book:"Salmos",ch:119,verses:["Bienaventurados los perfectos de camino, los que andan en la ley de Jehov\u00e1.","Bienaventurados los que guardan sus testimonios, y con todo el coraz\u00f3n le buscan.","Pues no hacen iniquidad los que andan en sus caminos.","T\u00fa encargaste que sean muy guardados tus mandamientos.","Ojal\u00e1 fuesen ordenados mis caminos para guardar tus estatutos.","Entonces no ser\u00eda yo avergonzado, cuando atendiese a todos tus mandamientos.","Te alabar\u00e9 con rectitud de coraz\u00f3n cuando aprendiere tus justos juicios.","Tus estatutos guardar\u00e9; no me dejes enteramente.","Con qu\u00e9 limpiar\u00e1 el joven su camino? Con guardar tu palabra.","Con todo mi coraz\u00f3n te he buscado; no me dejes desviarme de tus mandamientos.","En mi coraz\u00f3n he guardado tus dichos, para no pecar contra ti.","Bendito t\u00fa, oh Jehov\u00e1; ens\u00e9\u00f1ame tus estatutos.","Con mis labios he contado todos los juicios de tu boca.","Me he gozado en el camino de tus testimonios m\u00e1s que de toda riqueza.","En tus mandamientos meditar\u00e9; considerar\u00e9 tus caminos.","Me regocijar\u00e9 en tus estatutos; no me olvidar\u00e9 de tus palabras.","Haz bien a tu siervo; que viva, y guarde tu palabra.","Abre mis ojos, y mirar\u00e9 las maravillas de tu ley.","Forastero soy yo en la tierra; no encubras de m\u00ed tus mandamientos.","Quebrantada est\u00e1 mi alma de desear tus juicios en todo tiempo.","Reprendiste a los soberbios, los malditos, que se desv\u00edan de tus mandamientos.","Aparta de m\u00ed el oprobio y el menosprecio, porque tus testimonios he guardado.","Pr\u00edncipes tambi\u00e9n se sentaron y hablaron contra m\u00ed; mas tu siervo meditaba en tus estatutos.","Pues tus testimonios son mis delicias y mis consejeros.","Abatida hasta el polvo est\u00e1 mi alma; viv\u00edficame seg\u00fan tu palabra.","Te he manifestado mis caminos, y me has respondido; ens\u00e9\u00f1ame tus estatutos.","Hazme entender el camino de tus mandamientos, para que medite en tus maravillas.","Se deshace mi alma de ansiedad; sust\u00e9ntame seg\u00fan tu palabra.","Aparta de m\u00ed el camino de la mentira, y en tu misericordia conc\u00e9deme tu ley.","Escog\u00ed el camino de la verdad; he puesto tus juicios delante de m\u00ed."]},
"Proverbios 3":{book:"Proverbios",ch:3,verses:["Hijo m\u00edo, no te olvides de mi ley, y tu coraz\u00f3n guarde mis mandamientos;","Porque largura de d\u00edas y a\u00f1os de vida y paz te aumentar\u00e1n.","Nunca se aparten de ti la misericordia y la verdad; \u00e1talas a tu cuello, escr\u00edbelas en la tabla de tu coraz\u00f3n;","Y hallar\u00e1s gracia y buena opini\u00f3n ante los ojos de Dios y de los hombres.","F\u00edate de Jehov\u00e1 de todo tu coraz\u00f3n, y no te apoyes en tu propia prudencia.","Recon\u00f3celo en todos tus caminos, y \u00e9l enderezar\u00e1 tus veredas.","No seas sabio en tu propia opini\u00f3n; teme a Jehov\u00e1, y ap\u00e1rtate del mal;","Porque ser\u00e1 medicina a tu cuerpo, y refrigerio para tus huesos.","Honra a Jehov\u00e1 con tus bienes, y con las primicias de todos tus frutos;","Y ser\u00e1n satisfechos tus graneros con abundancia, y tus lagares rebosar\u00e1n de mosto."]},
"Isa\u00edas 40":{book:"Isa\u00edas",ch:40,verses:["Consolaos, consolaos, pueblo m\u00edo, dice vuestro Dios.","Hablad al coraz\u00f3n de Jerusal\u00e9n; decidle a voces que su tiempo es ya cumplido, que su pecado es perdonado.","Voz que clama en el desierto: Preparad camino a Jehov\u00e1; enderezad calzada en la soledad a nuestro Dios.","Todo valle sea alzado, y b\u00e1jese todo monte y collado; y lo torcido se enderece, y lo \u00e1spero se allane.","Y se manifestar\u00e1 la gloria de Jehov\u00e1, y toda carne juntamente la ver\u00e1; porque la boca de Jehov\u00e1 ha hablado.","Voz que dec\u00eda: Da voces. Y yo respond\u00ed: Qu\u00e9 tengo que decir a voces? Que toda carne es hierba, y toda su gloria como flor del campo.","La hierba se seca, y la flor se marchita, porque el viento de Jehov\u00e1 sopl\u00f3 en ella; ciertamente como hierba es el pueblo.","S\u00e9case la hierba, march\u00edtase la flor; mas la palabra del Dios nuestro permanece para siempre.","S\u00fabete sobre un monte alto, anunciadora de Si\u00f3n; levanta fuertemente tu voz, anunciadora de Jerusal\u00e9n.","He aqu\u00ed que Jehov\u00e1 el Se\u00f1or vendr\u00e1 con poder, y su brazo se\u00f1orear\u00e1; he aqu\u00ed que su recompensa viene con \u00e9l.","Como pastor apacentar\u00e1 su reba\u00f1o; en su brazo llevar\u00e1 los corderos, y en su seno los llevar\u00e1.","Qui\u00e9n midi\u00f3 las aguas con el hueco de su mano y los cielos con su palmo, con tres dedos junt\u00f3 el polvo de la tierra?","Qui\u00e9n ense\u00f1\u00f3 al Esp\u00edritu de Jehov\u00e1, o le aconsej\u00f3 ense\u00f1\u00e1ndole?","A qui\u00e9n pidi\u00f3 consejo para ser avisado? Qui\u00e9n le ense\u00f1\u00f3 el camino del juicio?","He aqu\u00ed que las naciones le son como la gota de agua que cae del cubo, y como menudo polvo en las balanzas le son estimadas.","Como nada son todas las naciones delante de \u00e9l; y en su comparaci\u00f3n ser\u00e1n estimadas en menos que nada.","A qu\u00e9, pues, har\u00e9is semejante a Dios, o qu\u00e9 imagen le compondr\u00e9is?","No has sabido, no has o\u00eddo que el Dios eterno es Jehov\u00e1, el cual cre\u00f3 los confines de la tierra? No desfallece, ni se fatiga con cansancio.","Su entendimiento no hay quien lo alcance.","El da esfuerzo al cansado, y multiplica las fuerzas al que no tiene ningunas.","Los muchachos se fatigan y se cansan, los j\u00f3venes flaquean y caen;","Pero los que esperan a Jehov\u00e1 tendr\u00e1n nuevas fuerzas; levantar\u00e1n alas como las \u00e1guilas; correr\u00e1n, y no se cansar\u00e1n; caminar\u00e1n, y no se fatigar\u00e1n."]},
"Isa\u00edas 55":{book:"Isa\u00edas",ch:55,verses:["A todos los sedientos: Venid a las aguas; y los que no tienen dinero, venid, comprad y comed.","Por qu\u00e9 gast\u00e1is el dinero en lo que no es pan, y vuestro trabajo en lo que no sacia?","Inclinad vuestro o\u00eddo, y venid a m\u00ed; o\u00edd, y vivir\u00e1 vuestra alma; y har\u00e9 con vosotros pacto eterno.","He aqu\u00ed que yo lo di por testigo a los pueblos, por jefe y por maestro a las naciones.","He aqu\u00ed, llamar\u00e1s a gente que no conociste, y gentes que no te conocieron correr\u00e1n a ti.","Buscad a Jehov\u00e1 mientras puede ser hallado, llamadle en tanto que est\u00e1 cercano.","Deje el imp\u00edo su camino, y el hombre inicuo sus pensamientos, y vu\u00e9lvase a Jehov\u00e1.","Porque mis pensamientos no son vuestros pensamientos, ni vuestros caminos mis caminos, dijo Jehov\u00e1.","Como son m\u00e1s altos los cielos que la tierra, as\u00ed son mis caminos m\u00e1s altos que vuestros caminos, y mis pensamientos m\u00e1s que vuestros pensamientos.","Porque como desciende de los cielos la lluvia y la nieve, y no vuelve all\u00e1, sino que riega la tierra,","As\u00ed ser\u00e1 mi palabra que sale de mi boca; no volver\u00e1 a m\u00ed vac\u00eda.","Porque con alegr\u00eda saldr\u00e9is, y con paz ser\u00e9is vueltos; los montes y los collados levantar\u00e1n canci\u00f3n delante de vosotros.","En lugar de la zarza crecer\u00e1 cipr\u00e9s, y en lugar de la ortiga crecer\u00e1 arrayn."]},
"G\u00e9nesis 1":{book:"G\u00e9nesis",ch:1,verses:["En el principio cre\u00f3 Dios los cielos y la tierra.","Y la tierra estaba desordenada y vac\u00eda, y las tinieblas estaban sobre la faz del abismo.","Y dijo Dios: Sea la luz; y fue la luz.","Y vio Dios que la luz era buena; y separ\u00f3 Dios la luz de las tinieblas.","Y llam\u00f3 Dios a la luz D\u00eda, y a las tinieblas llam\u00f3 Noche. Y fue la tarde y la ma\u00f1ana un d\u00eda.","Luego dijo Dios: Haya expansi\u00f3n en medio de las aguas, y separe las aguas de las aguas.","E hizo Dios la expansi\u00f3n, y separ\u00f3 las aguas que estaban debajo de la expansi\u00f3n, de las aguas que estaban sobre la expansi\u00f3n.","Y llam\u00f3 Dios a la expansi\u00f3n Cielos. Y fue la tarde y la ma\u00f1ana el d\u00eda segundo.","Dijo tambi\u00e9n Dios: J\u00fantense las aguas que est\u00e1n debajo de los cielos en un lugar, y desc\u00fabrase lo seco.","Y llam\u00f3 Dios a lo seco Tierra, y a la reuni\u00f3n de las aguas llam\u00f3 Mares. Y vio Dios que era bueno."]},
"Mateo 5":{book:"Mateo",ch:5,verses:["Viendo la multitud, subi\u00f3 al monte; y sent\u00e1ndose, vinieron a \u00e9l sus disc\u00edpulos.","Y abriendo su boca les ense\u00f1aba, diciendo:","Bienaventurados los pobres en esp\u00edritu, porque de ellos es el reino de los cielos.","Bienaventurados los que lloran, porque ellos recibir\u00e1n consolaci\u00f3n.","Bienaventurados los mansos, porque ellos recibir\u00e1n la tierra por heredad.","Bienaventurados los que tienen hambre y sed de justicia, porque ellos ser\u00e1n saciados.","Bienaventurados los misericordiosos, porque ellos alcanzar\u00e1n misericordia.","Bienaventurados los de limpio coraz\u00f3n, porque ellos ver\u00e1n a Dios.","Bienaventurados los pacificadores, porque ellos ser\u00e1n llamados hijos de Dios.","Bienaventurados los que padecen persecuci\u00f3n por causa de la justicia, porque de ellos es el reino de los cielos."]},
"Mateo 6":{book:"Mateo",ch:6,verses:["Guardaos de hacer vuestra justicia delante de los hombres, para ser vistos de ellos; de otra manera no tendr\u00e9is recompensa de vuestro Padre que est\u00e1 en los cielos.","Cuando, pues, des limosna, no hagas tocar trompeta delante de ti, como hacen los hip\u00f3critas.","Mas cuando t\u00fa des limosna, no sepa tu izquierda lo que hace tu derecha,","Para que sea tu limosna en secreto; y tu Padre que ve en lo secreto te recompensar\u00e1 en p\u00fablico.","Y cuando ores, no seas como los hip\u00f3critas; porque ellos aman el orar en pie en las sinagogas.","Mas t\u00fa, cuando ores, entra en tu aposento, y cerrada la puerta, ora a tu Padre que est\u00e1 en secreto.","Vosotros, pues, orar\u00e9is as\u00ed: Padre nuestro que est\u00e1s en los cielos, santificado sea tu nombre.","Venga tu reino. H\u00e1gase tu voluntad, como en el cielo, as\u00ed tambi\u00e9n en la tierra.","El pan nuestro de cada d\u00eda, d\u00e1noslo hoy.","Y perd\u00f3nanos nuestras deudas, como tambi\u00e9n nosotros perdonamos a nuestros deudores."]},
"Juan 1":{book:"Juan",ch:1,verses:["En el principio era el Verbo, y el Verbo era con Dios, y el Verbo era Dios.","Este era en el principio con Dios.","Todas las cosas por \u00e9l fueron hechas, y sin \u00e9l nada de lo que ha sido hecho, fue hecho.","En \u00e9l estaba la vida, y la vida era la luz de los hombres.","La luz en las tinieblas resplandece, y las tinieblas no prevalecieron contra ella.","Hubo un hombre enviado de Dios, el cual se llamaba Juan.","Este vino por testimonio, para que diese testimonio de la luz, a fin de que todos creyesen por \u00e9l.","No era \u00e9l la luz, sino para que diese testimonio de la luz.","Aquella luz verdadera, que alumbra a todo hombre, ven\u00eda a este mundo.","En el mundo estaba, y el mundo por \u00e9l fue hecho; pero el mundo no le conoci\u00f3."]},
"Juan 3":{book:"Juan",ch:3,verses:["Hab\u00eda un hombre de los fariseos que se llamaba Nicodemo, un principal entre los jud\u00edos.","Este vino a Jes\u00fas de noche, y le dijo: Rab\u00ed, sabemos que has venido de Dios como maestro.","Respondi\u00f3 Jes\u00fas y le dijo: De cierto, de cierto te digo, que el que no naciere de nuevo, no puede ver el reino de Dios.","Nicodemo le dijo: C\u00f3mo puede un hombre nacer siendo viejo?","Respondi\u00f3 Jes\u00fas: De cierto, de cierto te digo, que el que no naciere de agua y del Esp\u00edritu, no puede entrar en el reino de Dios.","Lo que es nacido de la carne, carne es; y lo que es nacido del Esp\u00edritu, esp\u00edritu es.","No te maravilles de que te dije: Os es necesario nacer de nuevo.","El viento sopla de donde quiere, y oyes su sonido; mas ni sabes de d\u00f3nde viene, ni a d\u00f3nde va.","Porque de tal manera am\u00f3 Dios al mundo, que ha dado a su Hijo unig\u00e9nito, para que todo aquel que en \u00e9l cree, no se pierda, mas tenga vida eterna.","Porque no envi\u00f3 Dios a su Hijo al mundo para condenar al mundo, sino para que el mundo sea salvo por \u00e9l."]},
"Juan 14":{book:"Juan",ch:14,verses:["No se turbe vuestro coraz\u00f3n; cre\u00e9is en Dios, creed tambi\u00e9n en m\u00ed.","En la casa de mi Padre muchas moradas hay; si as\u00ed no fuera, yo os lo hubiera dicho; voy, pues, a preparar lugar para vosotros.","Y si me fuere y os preparare lugar, vendr\u00e9 otra vez, y os tomar\u00e9 a m\u00ed mismo, para que donde yo estoy, vosotros tambi\u00e9n est\u00e9is.","Y sab\u00e9is a d\u00f3nde voy, y sab\u00e9is el camino.","Le dijo Tom\u00e1s: Se\u00f1or, no sabemos a d\u00f3nde vas; c\u00f3mo, pues, podemos saber el camino?","Jes\u00fas le dijo: Yo soy el camino, y la verdad, y la vida; nadie viene al Padre, sino por m\u00ed.","Si me conocieseis, tambi\u00e9n a mi Padre conocer\u00edais; y desde ahora le conoc\u00e9is, y le hab\u00e9is visto.","Felipe le dijo: Se\u00f1or, mu\u00e9stranos el Padre, y nos basta.","Jes\u00fas le dijo: Tanto tiempo hace que estoy con vosotros, y no me has conocido, Felipe?","El que me ha visto a m\u00ed, ha visto al Padre; c\u00f3mo, pues, dices t\u00fa: Mu\u00e9stranos el Padre?"]},
"Juan 15":{book:"Juan",ch:15,verses:["Yo soy la vid verdadera, y mi Padre es el labrador.","Todo p\u00e1mpano que en m\u00ed no lleva fruto, lo quitar\u00e1; y todo aquel que lleva fruto, lo limpiar\u00e1.","Ya vosotros est\u00e1is limpios por la palabra que os he hablado.","Permaneced en m\u00ed, y yo en vosotros. Como el p\u00e1mpano no puede llevar fruto por s\u00ed mismo, si no permanece en la vid, as\u00ed tampoco vosotros, si no permanec\u00e9is en m\u00ed.","Yo soy la vid, vosotros los p\u00e1mpanos; el que permanece en m\u00ed, y yo en \u00e9l, \u00e9ste lleva mucho fruto.","El que en m\u00ed no permanece, ser\u00e1 echado fuera como p\u00e1mpano, y se secar\u00e1.","Si permanec\u00e9is en m\u00ed, y mis palabras permanecen en vosotros, pedid todo lo que quer\u00e9is, y os ser\u00e1 hecho.","En esto es glorificado mi Padre, en que llev\u00e9is mucho fruto, y se\u00e1is as\u00ed mis disc\u00edpulos.","Como el Padre me ha amado, as\u00ed tambi\u00e9n yo os he amado; permaneced en mi amor.","Si guardareis mis mandamientos, permanecer\u00e9is en mi amor; as\u00ed como yo he guardado los mandamientos de mi Padre, y permanezco en su amor."]},
"Romanos 8":{book:"Romanos",ch:8,verses:["Ahora, pues, ninguna condenaci\u00f3n hay para los que est\u00e1n en Cristo Jes\u00fas, los que no andan conforme a la carne, sino conforme al Esp\u00edritu.","Porque la ley del Esp\u00edritu de vida en Cristo Jes\u00fas me ha librado de la ley del pecado y de la muerte.","Porque lo que era imposible para la ley, por cuanto era d\u00e9bil por la carne, Dios, enviando a su Hijo en semejanza de carne de pecado.","Porque los que son de la carne piensan en las cosas de la carne; pero los que son del Esp\u00edritu, en las cosas del Esp\u00edritu.","Porque el ocuparse de la carne es muerte, pero el ocuparse del Esp\u00edritu es vida y paz.","Por cuanto los designios de la carne son enemistad contra Dios; porque no se sujetan a la ley de Dios, ni tampoco pueden.","As\u00ed que, los que viven seg\u00fan la carne no pueden agradar a Dios.","Mas vosotros no viv\u00eds seg\u00fan la carne, sino seg\u00fan el Esp\u00edritu, si es que el Esp\u00edritu de Dios mora en vosotros.","Y si el Esp\u00edritu de aquel que levant\u00f3 de los muertos a Jes\u00fas mora en vosotros, el que levant\u00f3 de los muertos a Cristo Jes\u00fas vivificar\u00e1 tambi\u00e9n vuestros cuerpos mortales.","Y sabemos que a los que aman a Dios, todas las cosas les ayudan a bien, esto es, a los que conforme a su prop\u00f3sito son llamados."]},
"1 Corintios 13":{book:"1 Corintios",ch:13,verses:["Si yo hablase lenguas humanas y ang\u00e9licas, y no tengo amor, vengo a ser como metal que resuena, o c\u00edmbalo que reti\u00f1e.","Y si tuviese profec\u00eda, y entendiese todos los misterios y toda ciencia, y si tuviese toda la fe, de tal manera que trasladase los montes, y no tengo amor, nada soy.","Y si repartiese todos mis bienes para dar de comer a los pobres, y si entregase mi cuerpo para ser quemado, y no tengo amor, de nada me sirve.","El amor es sufrido, es benigno; el amor no tiene envidia, el amor no es jactancioso, no se envanece;","No hace nada indebido, no busca lo suyo, no se irrita, no guarda rencor;","No se goza de la injusticia, mas se goza de la verdad.","Todo lo sufre, todo lo cree, todo lo espera, todo lo soporta.","El amor nunca deja de ser; pero las profec\u00edas se acabar\u00e1n, y cesar\u00e1n las lenguas, y la ciencia acabar\u00e1.","Porque en parte conocemos, y en parte profetizamos;","Mas cuando venga lo perfecto, entonces lo que es en parte se acabar\u00e1.","Cuando yo era ni\u00f1o, hablaba como ni\u00f1o, pensaba como ni\u00f1o, juzgaba como ni\u00f1o; mas cuando ya fui hombre, dej\u00e9 lo que era de ni\u00f1o.","Ahora vemos por espejo, oscuramente; mas entonces veremos cara a cara. Ahora conozco en parte; pero entonces conocer\u00e9 como fui conocido.","Y ahora permanecen la fe, la esperanza y el amor, estos tres; pero el mayor de ellos es el amor."]},
"Efesios 6":{book:"Efesios",ch:6,verses:["Hijos, obedeced en el Se\u00f1or a vuestros padres, porque esto es justo.","Honra a tu padre y a tu madre, que es el primer mandamiento con promesa;","Para que te vaya bien, y seas de larga vida sobre la tierra.","Y vosotros, padres, no provoqu\u00e9is a ira a vuestros hijos, sino criadlos en disciplina y amonestaci\u00f3n del Se\u00f1or.","Siervos, obedeced a vuestros amos terrenales con temor y temblor, con sencillez de vuestro coraz\u00f3n, como a Cristo.","No sirviendo al ojo, como los que quieren agradar a los hombres, sino como siervos de Cristo, de coraz\u00f3n haciendo la voluntad de Dios.","Sirviendo de buena voluntad, como al Se\u00f1or y no a los hombres,","Sabiendo que el bien que cada uno hiciere, \u00e9se recibir\u00e1 del Se\u00f1or.","Y vosotros, amos, haced con ellos lo mismo, dejando las amenazas.","Por lo dem\u00e1s, hermanos m\u00edos, fortaleceos en el Se\u00f1or, y en el poder de su fuerza.","Vest\u00edos de toda la armadura de Dios, para que pod\u00e1is estar firmes contra las asechanzas del diablo.","Porque no tenemos lucha contra sangre y carne, sino contra principados, contra potestades, contra los gobernadores de las tinieblas de este siglo."]},
"Filipenses 4":{book:"Filipenses",ch:4,verses:["As\u00ed que, hermanos m\u00edos amados y deseados, gozo y corona m\u00eda, estad as\u00ed firmes en el Se\u00f1or, amados.","Ruego a Evodia y a S\u00edntique, que sean de un mismo sentir en el Se\u00f1or.","Regocijaos en el Se\u00f1or siempre. Otra vez digo: Regocijaos!","Vuestra gentileza sea conocida de todos los hombres. El Se\u00f1or est\u00e1 cerca.","Por nada est\u00e9is afanosos, sino sean conocidas vuestras peticiones delante de Dios en toda oraci\u00f3n y ruego, con acci\u00f3n de gracias.","Y la paz de Dios, que sobrepasa todo entendimiento, guardar\u00e1 vuestros corazones y vuestros pensamientos en Cristo Jes\u00fas.","Por lo dem\u00e1s, hermanos, todo lo que es verdadero, todo lo honesto, todo lo justo, todo lo puro, todo lo amable, todo lo que es de buen nombre; si hay virtud alguna, si algo digno de alabanza, en esto pensad.","Lo que aprendisteis y recibisteis y o\u00edsteis y visteis en m\u00ed, esto haced; y el Dios de paz estar\u00e1 con vosotros.","En gran manera me goc\u00e9 en el Se\u00f1or de que ya al fin hab\u00e9is revivido vuestro cuidado de m\u00ed.","No lo digo porque tenga escasez, pues he aprendido a contentarme, cualquiera que sea mi situaci\u00f3n.","Todo lo puedo en Cristo que me fortalece.","Sin embargo, bien hicisteis en participar conmigo en mi tribulaci\u00f3n.","Mi Dios, pues, suplir\u00e1 todo lo que os falta conforme a sus riquezas en gloria en Cristo Jes\u00fas."]},
"Hebreos 11":{book:"Hebreos",ch:11,verses:["Es, pues, la fe la certeza de lo que se espera, la convicci\u00f3n de lo que no se ve.","Porque por ella alcanzaron buen testimonio los antiguos.","Por la fe entendemos haber sido constituido el universo por la palabra de Dios, de modo que lo que se ve fue hecho de lo que no se ve\u00eda.","Por la fe Abel ofreci\u00f3 a Dios m\u00e1s excelente sacrificio que Ca\u00edn, por lo cual alcanz\u00f3 testimonio de que era justo.","Por la fe Enoc fue traspuesto para no ver muerte, y no fue hallado, porque lo traspuso Dios.","Pero sin fe es imposible agradar a Dios; porque es necesario que el que se acerca a Dios crea que le hay, y que es galardonador de los que le buscan.","Por la fe No\u00e9, cuando fue advertido por Dios acerca de cosas que a\u00fan no se ve\u00edan, con temor prepar\u00f3 el arca en que su casa se salvase.","Por la fe Abraham, siendo llamado, obedeci\u00f3 para salir al lugar que hab\u00eda de recibir como herencia.","Por la fe tambi\u00e9n la misma Sara, siendo est\u00e9ril, recibi\u00f3 fuerza para concebir; y dio a luz aun fuera del tiempo de la edad.","Por lo cual tambi\u00e9n, de uno, y \u00e9se ya casi muerto, salieron como las estrellas del cielo en multitud."]},
"Santiago 1":{book:"Santiago",ch:1,verses:["Santiago, siervo de Dios y del Se\u00f1or Jesucristo, a las doce tribus que est\u00e1n en la dispersi\u00f3n: Salud.","Hermanos m\u00edos, tened por sumo gozo cuando os hall\u00e9is en diversas pruebas,","Sabiendo que la prueba de vuestra fe produce paciencia.","Mas tenga la paciencia su obra completa, para que se\u00e1is perfectos y cabales, sin que os falte cosa alguna.","Y si alguno de vosotros tiene falta de sabidur\u00eda, p\u00eddala a Dios, el cual da a todos abundantemente y sin reproche, y le ser\u00e1 dada.","Pero pida con fe, no dudando nada; porque el que duda es semejante a la onda del mar, que es arrastrada por el viento y echada de una parte a otra.","No piense, pues, quien tal haga, que recibir\u00e1 cosa alguna del Se\u00f1or.","El hombre de doble \u00e1nimo es inconstante en todos sus caminos.","El hermano que es de humilde condici\u00f3n, glor\u00edese en su exaltaci\u00f3n;","Pero el que es rico, en su humillaci\u00f3n; porque \u00e9l pasar\u00e1 como la flor de la hierba."]},
"Apocalipsis 1":{book:"Apocalipsis",ch:1,verses:["La revelaci\u00f3n de Jesucristo, que Dios le dio, para manifestar a sus siervos las cosas que deben suceder pronto.","Bienaventurado el que lee, y los que oyen las palabras de esta profec\u00eda, y guardan las cosas en ella escritas.","Juan, a las siete iglesias que est\u00e1n en Asia: Gracia y paz a vosotros, del que es y que era y que ha de venir.","Y de Jesucristo el testigo fiel, el primog\u00e9nito de los muertos, y el soberano de los reyes de la tierra.","Y nos hizo reyes y sacerdotes para Dios, su Padre; a \u00e9l sea gloria e imperio por los siglos de los siglos.","He aqu\u00ed que viene con las nubes, y todo ojo le ver\u00e1, y los que le traspasaron; y todos los linajes de la tierra har\u00e1n lamentaci\u00f3n por \u00e9l.","Yo soy el Alfa y la Omega, principio y fin, dice el Se\u00f1or, el que es y que era y que ha de venir, el Todopoderoso.","Yo Juan, vuestro hermano, y copart\u00edcipe vuestro en la tribulaci\u00f3n, en el reino y en la paciencia de Jesucristo.","Yo estaba en el Esp\u00edritu en el d\u00eda del Se\u00f1or, y o\u00ed detr\u00e1s de m\u00ed una gran voz como de trompeta.","Y cuando le vi, ca\u00ed como muerto a sus pies. Y \u00e9l puso su diestra sobre m\u00ed, dici\u00e9ndome: No temas; yo soy el primero y el \u00faltimo."]}
};

const COMMENTARY = {
"Matthew Henry":{
"Psalms 23":"David, as a shepherd himself, understood the tender care a shepherd gives his flock. In this psalm he teaches us that the Lord provides for all our needs, leads us in right paths, and protects us even in death's shadow. The table prepared before enemies shows God's provision is not hidden but displayed openly. The overflowing cup speaks of abundance beyond mere sufficiency.",
"Psalms 91":"This psalm is a covenant of protection for those who dwell in God's presence. The secret place is not a physical location but a state of communion with the Almighty. Every form of danger is addressed: pestilence, terror, arrows, destruction. Angels are commissioned for our safety. God Himself promises to answer, deliver, and satisfy with long life.",
"Psalms 119":"The longest psalm is entirely devoted to the excellency of God's Word. Every verse references Scripture in some form. The psalmist finds in the Word cleansing for the young, light for the path, comfort in affliction, and delight surpassing riches. This teaches us to hide the Word in our hearts as our greatest treasure.",
"Proverbs 3":"Solomon instructs his son to trust God completely rather than relying on human reasoning. The promise is that God will direct our paths when we acknowledge Him in all our ways. Honoring God with our firstfruits brings abundance. Even divine discipline should be received as evidence of God's fatherly love toward His children.",
"Isaiah 40":"After thirty-nine chapters of judgment, Isaiah now speaks comfort to God's people. Their warfare is accomplished, their sin is pardoned. The prophet contrasts the frailty of humanity with the eternal power of God. The crescendo comes in the final verses: those who wait on the Lord will mount up with wings like eagles, finding supernatural strength.",
"Isaiah 55":"God extends a gracious invitation to every thirsty soul. The offer is free, without money and without price. God reminds us that His thoughts and ways are infinitely higher than ours. His Word goes forth with purpose and always accomplishes what He intends. The chapter closes with creation itself rejoicing as God's people walk in freedom.",
"Genesis 1":"The creation account establishes God as sovereign over all that exists. Each day builds upon the previous, revealing order, design, and purpose. The repeated phrase 'And God said' shows creation came by divine command. Humanity is the crown of creation, made in God's own image, given dominion and responsibility over all the earth.",
"Matthew 5":"The Sermon on the Mount opens with the Beatitudes, which reverse worldly values entirely. Those the world considers weak, Christ calls blessed. The poor in spirit inherit the kingdom, the mourners receive comfort, the meek inherit the earth. Christ raises the standard from outward behavior to the condition of the heart itself.",
"Matthew 6":"Christ teaches that true righteousness is not performed for human applause but directed toward God alone. Giving, prayer, and fasting should be done in secret. The Lord's Prayer provides the model for all prayer. The command to seek first God's kingdom promises that all earthly needs will be supplied when our priorities are rightly ordered.",
"John 1":"John begins his Gospel with the highest Christology in Scripture. The Word was with God and was God from the beginning. All creation came through Him. The incarnation is the central miracle: the eternal Word became flesh and dwelt among us. John the Baptist bore witness that all might believe through Him.",
"John 3":"Nicodemus came to Jesus by night, perhaps out of caution, and received the most important teaching on spiritual rebirth. To enter the kingdom one must be born of water and Spirit. The wind blows where it wills, and so the Spirit moves sovereignly. God's love for the world is summarized in the giving of His only Son.",
"John 14":"On the eve of His crucifixion, Christ comforts His disciples with the promise of heavenly mansions, the assurance that He is the only way to the Father, and the coming of the Holy Spirit as Comforter. He leaves them His peace, which is unlike anything the world offers. Their troubled hearts can rest in His sovereign care.",
"John 15":"The vine and branches metaphor teaches the absolute necessity of abiding in Christ. Apart from Him we can do nothing of spiritual value. The Father prunes fruitful branches to increase their yield. Obedience to Christ's commandments is the proof of our love for Him, and the result is joy made complete.",
"Romans 8":"This chapter spans from no condemnation to no separation. The Spirit dwelling in believers gives life, leads them as children of God, and intercedes with groanings too deep for words. Present sufferings cannot compare with coming glory. Nothing in all creation can separate us from the love of God in Christ Jesus our Lord.",
"1 Corinthians 13":"Paul declares that without love, even the most spectacular gifts are worthless. Love is defined not by emotion but by action: patience, kindness, endurance. It bears all things and never fails. Faith and hope are essential, but love is the greatest virtue because it alone endures into eternity when all else passes away.",
"Ephesians 6":"Paul concludes his letter with the call to spiritual warfare. The armor of God is not optional but necessary against spiritual forces of wickedness. Each piece corresponds to a divine provision: truth as a belt, righteousness as a breastplate, the gospel as shoes, faith as a shield, salvation as a helmet, and the Word as a sword.",
"Philippians 4":"Writing from prison, Paul demonstrates that joy is not dependent on circumstances. He commands believers to rejoice always and to replace anxiety with prayer accompanied by thanksgiving. The peace of God then guards our hearts and minds. The secret of contentment is found not in having enough but in Christ who strengthens us.",
"Hebrews 11":"Faith is defined as the substance of things hoped for and the evidence of things not seen. The chapter proceeds to catalog the heroes of faith from Abel to the prophets. Each one acted on what they could not yet see, trusting God's promises. Their examples encourage us to persevere in faith despite present difficulties.",
"James 1":"James opens with the surprising command to count trials as joy, because testing produces patience and maturity. If we lack wisdom, God gives it generously without reproach. Temptation does not come from God but from our own desires. We must be doers of the Word, not merely hearers who deceive themselves.",
"Revelation 1":"John receives a vision of the glorified Christ on the island of Patmos. Jesus appears with hair white as wool, eyes like flames, feet like burnished bronze, and a voice like many waters. He holds seven stars in His right hand and declares Himself the First and the Last, the Living One who holds the keys of death and Hades."
},
"Thayer's":{
"Psalms 23":"Key Hebrew — רָעָה (ra'ah, H7462): 'to shepherd, tend, pasture.' Implies active, personal care — not passive ownership. נֶפֶשׁ (nephesh, H5315): 'soul, life, breath.' When God 'restores my soul,' He renews the entire being. צַלְמָוֶת (tsalmaveth, H6757): 'deep shadow, death-shadow.' A compound of tsel (shadow) and maveth (death). גַּם (gam, H1571): 'also, even' — intensifying that even in death's shadow, God is present.",
"Psalms 91":"Key Hebrew — סֵתֶר (sether, H5643): 'covering, hiding place, secret place.' From sathar, to hide. Indicates intimate, protected communion. צֵל (tsel, H6738): 'shadow' — being so close to God that you are in His shadow. פַּחַד (pachad, H6343): 'dread, terror' — what the one dwelling in God's presence is freed from. שָׂבַע (saba, H7646): 'to satisfy, fill.' God's promise: 'With long life I will satisfy him.'",
"Psalms 119":"Key Hebrew — תּוֹרָה (torah, H8451): 'instruction, law, teaching.' From yarah, to throw or shoot — God's Word aims straight. עֵדוּת (eduth, H5715): 'testimony, witness.' פִּקּוּדִים (piqqudim, H6490): 'precepts, mandates.' From paqad, to attend to. חֻקִּים (chuqqim, H2706): 'statutes, decrees.' From chaqaq, to engrave — permanent law. מִשְׁפָּטִים (mishpatim, H4941): 'judgments, ordinances.' Righteous rulings.",
"Proverbs 3":"Key Hebrew — בָּטַח (batach, H982): 'to trust, rely on.' Implies leaning your full weight on something. לֵב (lev, H3820): 'heart, mind, inner man.' The seat of will and intellect, not just emotion. יָשַׁר (yashar, H3474): 'to make straight, direct.' When God 'directs your paths,' He removes crookedness. רְפוּאָה (rephuah, H7500): 'healing, remedy.' Fearing the Lord brings healing to your body.",
"Isaiah 40":"Key Hebrew — נָחַם (nacham, H5162): 'to comfort, console.' The opening word — God Himself takes the initiative to comfort. קוֹל (qol, H6963): 'voice, sound.' The voice crying in the wilderness. עוּף (uph, H5774): 'to fly, mount up.' Those who wait on God will mount up with wings. קָוָה (qavah, H6960): 'to wait, look eagerly.' Not passive waiting but active, expectant hope — literally to bind together, like twisting a rope.",
"Isaiah 55":"Key Hebrew — צָמֵא (tsame, H6771): 'thirsty, parched.' God invites every thirsty soul. חִנָּם (chinnam, H2600): 'freely, without cost.' Grace is free — without money, without price. מַחֲשָׁבָה (machashavah, H4284): 'thought, plan, purpose.' God's thoughts are higher than ours. דָּבָר (dabar, H1697): 'word, matter, thing.' God's Word never returns empty — it accomplishes its purpose.",
"Genesis 1":"Key Hebrew — בָּרָא (bara, H1254): 'to create.' Used exclusively of divine creation — making something fundamentally new. רוּחַ (ruach, H7307): 'spirit, wind, breath.' The Spirit of God hovered over the waters. צֶלֶם (tselem, H6754): 'image, likeness.' Humanity made in God's image. רָדָה (radah, H7287): 'to rule, have dominion.' Stewardship over creation. טוֹב (tov, H2896): 'good.' God declared each day's work 'good' — and humanity 'very good.'",
"Matthew 5":"Key Greek — μακάριος (makarios, G3107): 'blessed, happy, fortunate.' Not circumstantial happiness but divine blessedness. πτωχός (ptochos, G4434): 'poor, destitute.' In spirit — completely dependent on God. πραΰς (praus, G4239): 'meek, gentle.' Not weakness but strength under control. δικαιοσύνη (dikaiosyne, G1343): 'righteousness.' To hunger and thirst for right standing with God. εἰρηνοποιός (eirenopoios, G1518): 'peacemaker.' One who actively creates peace.",
"Matthew 6":"Key Greek — ὑποκριτής (hypokrites, G5273): 'hypocrite, play-actor.' One who performs religion for an audience. ταμεῖον (tameion, G5009): 'inner room, storeroom.' Pray in your secret room — intimacy with God. ἐπιούσιος (epiousios, G1967): 'daily.' Give us this day our daily bread — a word found nowhere else in Greek literature. μαμωνᾶς (mamonas, G3126): 'mammon, riches.' You cannot serve both God and mammon. μεριμνάω (merimnao, G3309): 'to be anxious, distracted.' Do not worry about tomorrow.",
"John 1":"Key Greek — λόγος (logos, G3056): 'word, reason, divine principle.' In the beginning was the Word — Christ as the eternal expression of God. σάρξ (sarx, G4561): 'flesh.' The Word became flesh — the mystery of incarnation. σκηνόω (skenoo, G4637): 'to tabernacle, dwell.' Literally 'pitched His tent among us.' χάρις (charis, G5485): 'grace.' Full of grace and truth. μονογενής (monogenes, G3439): 'only-begotten, unique.' The only-begotten Son.",
"John 3":"Key Greek — ἄνωθεν (anothen, G509): 'from above, again.' Born again — or born from above. Both meanings are intended. γεννάω (gennao, G1080): 'to beget, give birth to.' Spiritual rebirth by the Spirit. πνεῦμα (pneuma, G4151): 'spirit, wind.' The Spirit blows where He wills — same word for wind and spirit. ὑψόω (hypsoo, G5312): 'to lift up, exalt.' As Moses lifted the serpent, so the Son of Man must be lifted up. ζωή αἰώνιος (zoe aionios, G2222+G166): 'eternal life.' Not just endless duration but divine quality of life.",
"John 14":"Key Greek — μονή (mone, G3438): 'dwelling place, mansion.' In my Father's house are many dwelling places. ὁδός (hodos, G3598): 'way, road, path.' I am the Way. παράκλητος (parakletos, G3875): 'advocate, helper, comforter.' The Holy Spirit as one called alongside to help. ἀλήθεια (aletheia, G225): 'truth, reality.' I am the Truth. εἰρήνη (eirene, G1515): 'peace.' My peace I give you — not as the world gives.",
"John 15":"Key Greek — ἄμπελος (ampelos, G288): 'vine, grapevine.' I am the true vine. κλῆμα (klema, G2814): 'branch.' You are the branches. μένω (meno, G3306): 'to abide, remain, dwell.' Abide in me — continuous, ongoing connection. καθαίρω (kathairo, G2508): 'to prune, cleanse.' The Father prunes every fruitful branch. καρπός (karpos, G2590): 'fruit.' Apart from me you can bear no fruit. ἐντολή (entole, G1785): 'commandment.' If you keep my commandments, you abide in my love.",
"Romans 8":"Key Greek — κατάκριμα (katakrima, G2631): 'condemnation, sentence.' No condemnation for those in Christ. σάρξ (sarx, G4561): 'flesh.' The law of the Spirit vs. the law of the flesh. υἱοθεσία (huiothesia, G5206): 'adoption.' We have received the Spirit of adoption. στεναγμός (stenagmos, G4726): 'groaning.' The Spirit intercedes with groanings too deep for words. χωρίζω (chorizo, G5563): 'to separate.' Nothing can separate us from God's love.",
"1 Corinthians 13":"Key Greek — ἀγάπη (agape, G26): 'love.' The highest, self-giving love. μακροθυμέω (makrothymeo, G3114): 'to be patient, long-suffering.' Love is patient. χρηστεύομαι (chresteuomai, G5541): 'to be kind.' Love is kind. περπερεύομαι (perpereuomai, G4068): 'to boast, brag.' Love does not boast. τέλειος (teleios, G5046): 'complete, perfect, mature.' When the perfect comes, the partial passes away. The greatest of these is agape.",
"Ephesians 6":"Key Greek — πανοπλία (panoplia, G3833): 'full armor.' Put on the whole armor of God. πάλη (pale, G3823): 'wrestling.' Our struggle is not against flesh and blood. ἀλήθεια (aletheia, G225): 'truth.' Belt of truth. θώραξ (thorax, G2382): 'breastplate.' Breastplate of righteousness. θυρεός (thyreos, G2375): 'shield.' Shield of faith. μάχαιρα (machaira, G3162): 'sword.' The sword of the Spirit — the Word of God. προσευχή (proseuche, G4335): 'prayer.' Praying at all times in the Spirit.",
"Philippians 4":"Key Greek — χαίρω (chairo, G5463): 'to rejoice, be glad.' Rejoice in the Lord always. ἐπιεικής (epieikes, G1933): 'gentle, gracious, forbearing.' Let your gentleness be known to all. μεριμνάω (merimnao, G3309): 'to be anxious.' Be anxious for nothing. εὐχαριστία (eucharistia, G2169): 'thanksgiving.' With thanksgiving let your requests be known. αὐτάρκης (autarkes, G842): 'content, self-sufficient.' I have learned to be content — a sufficiency found in Christ, not circumstances.",
"Hebrews 11":"Key Greek — πίστις (pistis, G4102): 'faith, trust, conviction.' Faith is the substance of things hoped for. ὑπόστασις (hypostasis, G5287): 'substance, confidence, assurance.' The reality beneath what is hoped for. ἔλεγχος (elegchos, G1650): 'evidence, conviction, proof.' The evidence of things not seen. μαρτυρέω (martyreo, G3140): 'to testify, bear witness.' By faith the elders received their testimony. The cloud of witnesses.",
"James 1":"Key Greek — πειρασμός (peirasmos, G3986): 'trial, testing, temptation.' Count it joy when you face trials. δοκίμιον (dokimion, G1383): 'testing, proving.' The testing of your faith. ὑπομονή (hypomone, G5281): 'endurance, patience, perseverance.' Testing produces endurance. τέλειος (teleios, G5046): 'complete, mature, perfect.' That you may be perfect and complete. δίψυχος (dipsychos, G1374): 'double-minded.' The double-minded man is unstable.",
"Revelation 1":"Key Greek — ἀποκάλυψις (apokalypsis, G602): 'revelation, unveiling.' The apocalypse — an uncovering of what is hidden. μάρτυς (martys, G3144): 'witness.' Jesus the faithful witness — from which we get 'martyr.' πρωτότοκος (prototokos, G4416): 'firstborn.' The firstborn from the dead. Ἄλφα/Ὦμέγα (Alpha/Omega): The first and last letters of the Greek alphabet — Christ is the beginning and the end. κλείς (kleis, G2807): 'key.' He holds the keys of death and Hades."

"A.W. Tozer":{
"Psalms 23":"The shepherd psalm is not merely poetry — it is the testimony of a soul that has discovered the sufficiency of God. When David says the Lord is his shepherd, he is not expressing a theological proposition; he is declaring a lived reality. The green pastures and still waters are not rewards for good behavior but the natural provision of a God who delights in His children. The valley of death's shadow holds no terror for the one who has cultivated the habit of God's presence. The prepared table is worship in the face of opposition. The overflowing cup is the abundant life that flows from intimacy with the living God.",
"Psalms 91":"The secret place of the Most High is not a location but a condition of the soul. It is the inner sanctuary where the worshiper meets God in spirit and in truth. Those who dwell there — not merely visit — find themselves under the shadow of the Almighty. This is the great privilege of the Spirit-filled life: to abide so closely to God that His very shadow covers you. The dangers listed here are real, but they cannot penetrate the shelter of divine communion. The angels are sent to serve those who are heirs of salvation, and the final promise is God's own voice speaking directly to the beloved soul.",
"Psalms 119":"Here is a man intoxicated with the Word of God. He does not merely study it — he loves it, delights in it, meditates on it day and night. The modern church has largely lost this consuming passion for Scripture. We read the Bible as we read a textbook, extracting information rather than encountering the living God who speaks through its pages. The psalmist understood that the Word is not merely words about God — it is God speaking. When he says 'Open my eyes,' he acknowledges that without the illumination of the Holy Spirit, even the most diligent reader remains blind to divine truth.",
"Proverbs 3":"To trust the Lord with all the heart is to make a complete surrender of the understanding to God. The great obstacle to spiritual progress is the habit of leaning on our own intelligence. We are willing to trust God with our eternal destiny but not with our daily decisions. The man who acknowledges God in all his ways has learned the secret of the guided life. He does not demand to see the whole road — he takes the next step in faith. The promise of straight paths is not a guarantee of easy paths, but of right paths. And the discipline of God is the highest expression of His love.",
"Isaiah 40":"This chapter is the great corrective for every small thought we have ever had about God. The prophet asks: to whom will you compare God? He sits above the circle of the earth. He stretches out the heavens like a curtain. He calls each star by name. The tragedy of the modern church is that we have domesticated this God, made Him manageable, reduced Him to a concept we can fit into our theology. But God will not be contained. He is wholly other, infinitely above us. And yet — this same God bends down to give power to the faint and strength to those who wait upon Him in worship and prayer.",
"Isaiah 55":"The invitation of God is to every thirsty soul. But the deeper question is: are we thirsty? The great curse of our age is satisfaction with things that cannot satisfy. We have filled our lives with substitutes for God and then wonder why we feel empty. God's thoughts are higher than ours — infinitely, eternally higher. We cannot reach them by climbing; we can only receive them by descending into humility. His Word goes forth with power and purpose, never returning empty. But we must come to it with reverence, expecting to hear the voice of the living God, not merely reading words on a page.",
"Genesis 1":"In the beginning, God. Before anything else existed, God was. He did not emerge from chaos — He created order out of nothing by the sheer force of His will expressed through His Word. The Spirit brooded over the deep, and when God spoke, creation obeyed. This is the fundamental fact of existence: everything that is, is because God said so. When He created humanity in His image, He stamped us with a dignity that nothing in all creation possesses. We are made for fellowship with the infinite God. The fall shattered that fellowship, but it did not destroy the image. Christ came to restore what was broken.",
"Matthew 5":"The Beatitudes are not advice for living a better life. They are a description of the character that the Holy Spirit produces in those who have surrendered to Christ. The poor in spirit have come to the end of themselves — and that is exactly where God begins His work. The meek are not the timid but those who have submitted their strength to God. Those who hunger and thirst for righteousness are consumed with a desire that the world cannot understand and cannot satisfy. Only God can fill that void. The pure in heart see God because they have removed every idol that once stood between them and the Almighty.",
"Matthew 6":"The great indictment of the Pharisees was not that they did wrong things but that they did right things for wrong reasons. The act of worship performed for human approval is not worship at all — it is theater. True prayer is communion with the Father in the secret place, away from the eyes of men. The Lord's Prayer teaches us to begin where God begins: with His name, His kingdom, His will. Our needs come after. The command not to worry is a call to trust the God who feeds the birds and clothes the flowers. If He cares for them, how much more for His children who bear His image?",
"John 1":"In these opening verses we stand on the highest ground in all of Scripture. The Word was God. Not like God, not similar to God — was God. And this Word, this eternal Logos, became flesh and dwelt among us. The Creator entered His own creation. The infinite became finite. The immortal put on mortality. This is the central mystery of the Christian faith, and we must never allow familiarity to rob it of its wonder. He came to His own, and His own did not receive Him. But to those who did receive Him, He gave the right to become children of God — born not of blood, nor of the will of man, but of God.",
"John 3":"Nicodemus came to Jesus with knowledge but without life. He knew about God but did not know God. Jesus cuts through all his theology with one devastating statement: you must be born again. This is not reformation, education, or improvement — it is regeneration. The old nature cannot be repaired; it must be replaced. The Spirit moves like the wind — sovereign, unpredictable, beyond human control. We cannot manufacture the new birth any more than we can manufacture the wind. But we can position ourselves to receive it through faith. And the motive behind it all is the incomprehensible love of God for a world that does not deserve it.",
"John 14":"On the eve of the cross, Jesus speaks words of eternal comfort. Let not your hearts be troubled. He is going to prepare a place. He is the Way — the only way — to the Father. The Holy Spirit, the Comforter, is coming to dwell not with them but in them. This is the great promise of the new covenant: God's presence not in a temple made with hands but within the believer's own spirit. The peace Jesus offers is not the absence of trouble but the presence of God in the middle of trouble. It is wholly different from anything the world can offer or understand.",
"John 15":"The vine and branches is not an illustration of effort but of dependence. The branch does not strain to produce fruit — it simply remains connected to the vine. All the life, all the nourishment, all the fruitfulness flows from the vine to the branch. Our only task is to abide. And yet this is the hardest thing for the self-reliant human heart to do: to stop striving and simply rest in Christ. The pruning is the Father's work, painful but purposeful. He cuts away everything that hinders deeper communion and greater fruitfulness. The result is joy — the deep, settled joy that comes from union with Christ.",
"Romans 8":"No condemnation. The believer stands before God with no accusation that can stick. The Spirit of life has broken the power of sin and death. Those who walk in the Spirit — who set their minds on the things above — experience life and peace. The Spirit Himself testifies with our spirits that we are children of God. We are not servants; we are sons and daughters. Present sufferings cannot be compared with the glory to come. The whole creation groans, waiting for the full manifestation of the sons of God. And nothing — no power in heaven, earth, or hell — can separate the redeemed soul from the love of God in Christ Jesus.",
"1 Corinthians 13":"Paul's hymn to love is placed strategically between two chapters on spiritual gifts. The message is unmistakable: without love, the most spectacular gift is an empty display. You may speak in the tongues of angels, but without love it is noise. You may have prophetic insight, mountain-moving faith, sacrificial generosity — but without love, you gain nothing. Love is patient when everything within you wants to react. It is kind when cruelty would be easier. It does not envy, boast, or keep accounts of wrongs. When all the gifts have served their purpose and passed away, three things remain: faith, hope, and love. And the greatest is love.",
"Ephesians 6":"The Christian life is lived on a battlefield, not a playground. Paul pulls back the curtain to reveal the true nature of our conflict: not against flesh and blood but against spiritual powers of wickedness in the heavenly places. The armor of God is essential, not optional. Truth protects against the father of lies. Righteousness guards the heart against accusation. The gospel gives firm footing on shifting ground. Faith extinguishes the enemy's flaming arrows. The helmet of salvation guards the mind. And the sword of the Spirit — the living Word of God — is our only offensive weapon. All of this is activated and sustained through prayer in the Spirit.",
"Philippians 4":"Joy written from a prison cell. This alone tells us that Paul had discovered something the world desperately needs: that joy is not dependent on circumstances but on the unchanging character of God. Rejoice always — not sometimes, always. When anxiety comes, the remedy is not willpower but prayer saturated with thanksgiving. The peace that follows is supernatural — it surpasses human understanding and stands guard over the heart and mind. The secret of contentment is not having what you want but wanting what you have in Christ. I can do all things through Him who pours His strength into me.",
"Hebrews 11":"Faith is the assurance of things hoped for, the conviction of things not seen. It is not wishful thinking but rock-solid confidence in the character of God. Every hero in this chapter took God at His Word and acted before seeing the result. Abel offered. Noah built. Abraham journeyed. Moses refused the pleasures of Egypt. They were all looking beyond the visible to the invisible, beyond the temporal to the eternal. They did not receive the fulfillment of the promises in their lifetime, but they never stopped believing. They were strangers and pilgrims, seeking a homeland — a city whose architect and builder is God Himself.",
"James 1":"Count it all joy when trials come. Not some joy — all joy. James understood something that the comfortable church often misses: trials are not obstacles to faith; they are the proving ground of faith. The testing produces endurance, and endurance produces maturity. If you lack wisdom in the furnace of affliction, ask God — and He gives generously without shaming you for asking. But you must ask in faith, without the double-mindedness that tries to trust God and lean on human wisdom at the same time. Every good gift descends from the Father of lights, in whom there is no shadow of turning.",
"Revelation 1":"The Revelation is exactly that — an unveiling. Not of coming events primarily, but of Jesus Christ Himself in His risen, glorified, triumphant majesty. John was in the Spirit — caught up in divine communion — when he heard the voice like a trumpet. He turned and saw Christ standing among the lampstands, which are the churches. His eyes like fire see everything. His voice like many waters carries absolute authority. The sword from His mouth is His Word that judges and divides. When John fell as dead, Jesus laid His hand on him and spoke: Do not fear. I am the First and the Last, the Living One who conquered death itself."

"Wigglesworth":{
"Psalms 23":"God is not stingy with His provision. The Lord is your Shepherd — that settles the matter. He makes you lie down in green pastures because He knows you need rest even when you think you do not. He restores your soul — spirit, mind, and body — because He is a God of complete restoration. I have seen God restore bodies that doctors gave up on, minds that were tormented, and spirits that were crushed. The valley of death's shadow holds no fear for the Spirit-filled believer. A shadow never killed anyone. Walk through it boldly. God has prepared a table for you, and the enemy has to watch you feast.",
"Psalms 91":"I have lived in this psalm. When you make the Most High your dwelling place — not just a Sunday visit but your permanent address — you come under protection that no devil in hell can penetrate. I have walked into rooms where people were dying of plague, and the plague could not touch me because I was hidden in the secret place. A thousand may fall at your side, but it will not come near you. This is not theory — this is the covenant promise of God to those who dwell in His presence. Angels are real, their protection is real, and God's promise to deliver is real.",
"Psalms 119":"The Word of God is not a dead book. It is alive with the power of the Holy Spirit. When you take the Word into your spirit, it becomes life and health and strength. The psalmist loved God's Word more than gold, more than food — and that is the kind of hunger that moves heaven. I have seen God's Word heal the sick, cast out demons, and set captives free. Not because of clever theology, but because the Word carries the very power and authority of God. Hide it in your heart. Speak it with your mouth. The Word of God in the mouth of a believing man or woman is the most powerful force on earth.",
"Psalms 91":"I have lived in this psalm. When you make the Most High your dwelling place — not just a Sunday visit but your permanent address — you come under protection that no devil in hell can penetrate. I have walked into rooms where people were dying of plague, and the plague could not touch me because I was hidden in the secret place. A thousand may fall at your side, but it will not come near you. This is not theory — this is the covenant promise of God to those who dwell in His presence. Angels are real, their protection is real, and God's promise to deliver is real.",
"Proverbs 3":"Trust in the Lord — not in your feelings, not in your circumstances, not in what people tell you. Trust Him with everything. When God says He will direct your paths, He means it. I have seen God open doors that no man could open and close doors that no man could close. He knows the way you should go even when you cannot see two steps ahead. The fear of the Lord is the beginning of all wisdom, and honoring God with your substance releases a river of provision. God is no man's debtor. Give to Him and watch what He does in return.",
"Isaiah 40":"Have you not known? Have you not heard? The everlasting God does not faint or grow weary. If that is true of God, then it can be true of you when His Spirit fills you. I have preached when my body was exhausted, and the Holy Spirit gave me strength I did not have in the natural. Those who wait on the Lord renew their strength. They mount up with wings like eagles. This is not poetry — this is a description of what happens when a Spirit-filled believer connects with the power of the Almighty. You will run and not be weary. You will walk and not faint. God's strength is made perfect in your weakness.",
"Isaiah 55":"Come, everyone who is thirsty. God does not say come when you are worthy — He says come when you are thirsty. The invitation is to those who know they need something they cannot provide for themselves. God's Word will not return empty. I have spoken God's Word over the sick and watched diseases leave. I have declared God's promises over impossible situations and seen them turn around. The Word of God is creative power. When God speaks, things happen. And when you speak His Word in faith, by the power of the Holy Spirit, the same creative force is released through you.",
"Genesis 1":"God created everything by His Word, and the Spirit of God was moving over the face of the waters. Word and Spirit together — that is how God works, and that is how He works through us. When God said let there be light, light came. When He made man in His own image, He breathed His own life into him. That breath is the same Holy Spirit who raised Christ from the dead and now lives in every born-again believer. You are not just a creation — you are a carrier of divine life. The same Spirit that hovered over the chaos at creation hovers over your situation right now, ready to bring order and life.",
"Matthew 5":"Blessed are the poor in spirit — those who know they have nothing without God. That is the starting place for everything the Holy Spirit wants to do in your life. The meek are not the weak — they are those whose strength is submitted to God. I have seen the meekest saints exercise the greatest power because they had nothing to prove and everything to give. The pure in heart see God — not with physical eyes but with the eyes of the Spirit. When your heart is clean, the Holy Spirit moves through you without hindrance. You become a channel of His power, His love, His miracles.",
"Matthew 6":"Do not do your works to be seen by men. God sees in secret, and He rewards in secret. I have found that the most powerful prayers are not the longest or the loudest — they are the ones prayed in the secret place where only God can hear. The Lord's Prayer teaches us to put God's kingdom first. When you seek His kingdom and His righteousness above everything else, He takes care of the rest. Do not worry — worry is faith in the wrong direction. It is believing that the problem is bigger than God. Cast your care on Him. He is well able to handle whatever you are facing.",
"John 1":"The Word was God. This is the foundation of everything. Jesus is not just a teacher or a prophet — He is God in the flesh. Everything that was made was made through Him. And when the Word became flesh, heaven invaded earth. The power that created the universe walked among us. I have seen that same power heal the blind, raise the crippled, and deliver the tormented. It is the same Word, the same Jesus, the same power. He is full of grace and truth. Not grace alone and not truth alone — both together. That is the balance of the Spirit-filled life: tender in mercy and uncompromising in truth.",
"John 3":"You must be born again. Not educated again, not reformed again — born again. The Spirit gives birth to spirit. This is a supernatural work that no human effort can produce. The wind blows where it wills — you hear its sound but cannot tell where it comes from or where it is going. The Holy Spirit moves the same way. You cannot control Him, but you can yield to Him. When Nicodemus struggled to understand, Jesus pointed him to the cross: as Moses lifted up the serpent, so the Son of Man must be lifted up. Look to Jesus and live. That is the simplest and most powerful message in the world.",
"John 14":"Let not your heart be troubled. Jesus speaks these words to frightened disciples, and He speaks them to you today. He has gone to prepare a place for you — and He is coming back. He is the Way, the Truth, and the Life. There is no other way to the Father. But here is the word that sets the Spirit-filled believer on fire: greater works than these shall you do, because I go to the Father. The Holy Spirit — the Comforter, the Helper, the Spirit of Truth — is coming to live inside you. Not just with you, but in you. That changes everything. His peace is not like the world's peace. It is supernatural, unshakeable, and alive.",
"John 15":"Abide in Me. Stay connected. Do not go wandering off on your own. The branch that stays connected to the vine bears fruit naturally — it does not have to strain or struggle. Your job is to stay close to Jesus through prayer, through His Word, and through obedience. The Father prunes the fruitful branch — and pruning hurts. But it is always for the purpose of greater fruitfulness. I have been pruned many times, and every time God cut something away, He released more of His power through me. Apart from Him you can do nothing. But connected to Him, there is nothing you cannot do.",
"Romans 8":"There is no condemnation for those who are in Christ Jesus. The law of the Spirit of life has set you free. Do you understand what this means? You are free. Free from sin's dominion, free from death's grip, free from the enemy's accusations. The Spirit of God lives in you — the same Spirit that raised Jesus from the dead. If that Spirit dwells in you, He will give life to your mortal body. You are not a slave to fear — you are a child of God. The Spirit bears witness with your spirit. Present sufferings are nothing compared to the glory coming. And nothing — nothing — can separate you from His love.",
"1 Corinthians 13":"I have seen every gift of the Spirit in operation. I have spoken in tongues, interpreted, prophesied, seen words of knowledge and wisdom, witnessed miracles and healings. But Paul says all of it is nothing without love. Nothing. You can have the most spectacular gifts and be bankrupt without love. Love is patient when everything in you wants to fight. Love is kind when cruelty would be easier. Love does not keep score. Love never fails. The gifts will pass away when we see Him face to face. But love endures forever because God is love, and those who abide in love abide in God.",
"Ephesians 6":"We wrestle not against flesh and blood. The devil is real, demons are real, and the spiritual battle is real. But so is the armor of God. Put it on — all of it. Truth as your belt, righteousness as your breastplate, the gospel of peace on your feet, faith as your shield, salvation as your helmet, and the Word of God as your sword. I have faced down demons with the Word of God and watched them flee. The enemy has no defense against a Spirit-filled believer who knows the Word and wields it in faith. And pray — pray in the Spirit at all times. Prayer is the atmosphere of victory.",
"Philippians 4":"Rejoice in the Lord always. Paul wrote this from prison. He was not in comfortable circumstances — he was in chains. But his joy was not in his circumstances; it was in his God. When anxiety comes, pray. Not just any prayer — pray with thanksgiving. Thank God in the middle of the problem, and watch what happens. The peace of God will guard your heart like a soldier on duty. I can do all things through Christ who strengthens me. This is not positive thinking — this is Holy Spirit power. Paul had learned that in any situation — abundance or need, freedom or prison — Christ was enough.",
"Hebrews 11":"Faith is the substance of things hoped for. Not a wish, not a feeling — substance. Real, tangible, spiritual substance. By faith Abel offered. By faith Noah built. By faith Abraham left everything he knew. By faith Sarah conceived when it was physically impossible. These men and women took God at His Word and acted before they saw the result. That is faith. I have prayed for the dead and seen them raised because I believed God's Word more than I believed what my eyes told me. The heroes of faith did not receive the promise in their lifetime, but they never stopped believing. That is the faith that pleases God.",
"James 1":"Count it all joy. All joy. Not some joy when things go well — all joy when trials come. Because trials test your faith, and tested faith produces endurance, and endurance produces completeness. You cannot be made complete without being tested. If you lack wisdom, ask God. He gives it freely, generously, without shaming you for needing it. But ask in faith. Do not be double-minded — half believing, half doubting. A double-minded man receives nothing from God. Every good gift comes from above, from the Father who does not change. He is the same yesterday, today, and forever. Trust Him completely.",
"Revelation 1":"This is the revelation of Jesus Christ — not the revelation of coming doom, but the revelation of who Jesus really is. John was in the Spirit. That is the key to seeing Jesus as He truly is — you must be in the Spirit. When John turned, he saw the glorified Christ: eyes like fire, voice like many waters, a sharp sword from His mouth. This is not the gentle Jesus of the Sunday school pictures — this is the King of Kings and Lord of Lords in His full glory and power. When John fell as dead, Jesus touched him and said: Do not be afraid. I hold the keys of death and hell. Every enemy is defeated."
