const {useState,useEffect,useRef,useCallback} = React;

function App(){
  const [page,setPage]=useState('home');
  const [setup,setSetup]=useState(null);
  const [dayOffset,setDayOffset]=useState(0);
  const [dateKey,setDateKey]=useState(()=>new Date().toDateString());
  const [highlights,setHighlights]=useState({});
  const [journalEntries,setJournal]=useState([]);
  const [sermonIdeas,setSermons]=useState([]);
  const [selectedVerse,setSelectedVerse]=useState(null);
  const [showActions,setShowActions]=useState(false);
  const [showNote,setShowNote]=useState(false);
  const [noteText,setNoteText]=useState('');
  const [wordData,setWordData]=useState(null);
  const [showWord,setShowWord]=useState(false);
  const [commPassage,setCommPassage]=useState(null);
  const [showComm,setShowComm]=useState(false);
  const [interlinear,setInterlinear]=useState({});

  const [ilPopup,setIlPopup]=useState(null);
  const [commSource,setCommSource]=useState('Matthew Henry');
  const [dragSelect,setDragSelect]=useState(null); // {pName, startIdx, endIdx, verses}
  const dragRef=React.useRef(null);
  const [dark,setDark]=useState(false);
  const [journalTab,setJournalTab]=useState('revelations');
  const [showJournalForm,setShowJournalForm]=useState(false);
  const [newJournalText,setNewJournalText]=useState('');
  const [showSermonForm,setShowSermonForm]=useState(false);
  const [sermonForm,setSermonForm]=useState({title:'',scripture:'',theme:'',notes:'',audioUrl:'',date:''});
  const [editSermonId,setEditSermonId]=useState(null);
  const [searchTerm,setSearchTerm]=useState('');
  const [translation,setTranslation]=useState('NKJV');
  const [apiVerses,setApiVerses]=useState({});
  const [loadingTrans,setLoadingTrans]=useState(false);
  const [showAI,setShowAI]=useState(false);
  const [aiMessages,setAiMessages]=useState([]);
  const [aiInput,setAiInput]=useState('');
  const [aiLoading,setAiLoading]=useState(false);
  const [aiContext,setAiContext]=useState('');
  const CHURCH_SPOTIFY='https://open.spotify.com/show/4VAheYuUhsIqjRvvrDJkiQ';
  const [spotifyShow,setSpotifyShow]=useState(CHURCH_SPOTIFY);
  const [userSpotify,setUserSpotify]=useState('');
  const [settingsSaved,setSettingsSaved]=useState(false);
  const [showSourcePicker,setShowSourcePicker]=useState(false);
  const [sourcePickerContext,setSourcePickerContext]=useState(null); // 'settings' or 'onboard'
  const [lang,setLang]=useState('en');

  const [readDays,setReadDays]=useState({});
  const [fontScale,setFontScale]=useState(1);
  const [calMonth,setCalMonth]=useState(new Date().getMonth());
  const [calYear,setCalYear]=useState(new Date().getFullYear());
  const [activePlans,setActivePlans]=useState({}); // {planId: {startDate, completedDays:[]}}
  const [planView,setPlanView]=useState(null); // null=browse, planId=detail view
  const [planTab,setPlanTab]=useState('browse'); // 'my', 'browse', or 'progress'
  const [planReading,setPlanReading]=useState(null); // {planId, dayIdx, ref, text, loading}
  const [planPicker,setPlanPicker]=useState(null); // null or [{planId,planName,icon,dayIdx,reading}]
  const [charProfile,setCharProfile]=useState(null); // character key
  const [locProfile,setLocProfile]=useState(null); // location key
  const [showProfile,setShowProfile]=useState(false);
  const [profileType,setProfileType]=useState(null); // 'char' or 'loc'
  const [speaking,setSpeaking]=useState(null); // passageName currently being read
  const [audioLoading,setAudioLoading]=useState(null); // passageName loading audio
  const [speakingAll,setSpeakingAll]=useState(false); // true when reading all passages in sequence
  const [audioSpeed,setAudioSpeed]=useState(()=>{try{return parseFloat(localStorage.getItem('dw_audiospeed'))||1}catch(e){return 1}});
  const [showSpeedPicker,setShowSpeedPicker]=useState(false);
  const [pushEnabled,setPushEnabled]=useState(false);
  const [pushLoading,setPushLoading]=useState(false);
  const [showNotifPrompt,setShowNotifPrompt]=useState(false);
  const [notifHour,setNotifHour]=useState(()=>{try{return parseInt(localStorage.getItem('dw_notif_hour'))||7}catch(e){return 7}});
  const [kjvDownloaded,setKjvDownloaded]=useState(()=>{try{return localStorage.getItem('dw_kjv_downloaded')==='1'}catch(e){return false}});
  const [kjvDownloading,setKjvDownloading]=useState(false);
  const [kjvProgress,setKjvProgress]=useState(null); // {done, total}
  const pushSubRef=useRef(null);
  const audioRef=useRef(null);
  const audioQueueRef=useRef([]); // queue of passage names to read next
  const audioPassagesRef=useRef([]); // all passages being read (for clearing highlights)
  const bookAudioQueueRef=useRef({active:false,cancelled:false,paragraphs:[],voiceId:'',speakKey:'',prefetched:{}});
  // In-flight request deduplication — prevents duplicate API calls for same passage
  const inflightRef=useRef({});
  const [scriptureSearch,setScriptureSearch]=useState('');
  const [searchResults,setSearchResults]=useState(null); // {ref, text} array
  const [searchLoading,setSearchLoading]=useState(false);
  const aiEndRef=useRef(null);
  const wordTapRef=useRef(false);
  const lastDragWasMove=useRef(false);

  // Word-level highlighting
  const [wordHighlights,setWordHighlights]=useState({}); // {"Psalms 23:1": [{start:2, end:5, color:'yellow'}]}
  const [wordSelection,setWordSelection]=useState(null); // {verseKey, pName, vi, startWord, endWord, verseText}
  const wordDragRef=useRef(null); // {verseKey, pName, vi, startWord, verseText, engaged, timer}

  // ===== FAITH PATHWAY =====
  const [pathwayData,setPathwayData]=useState(null);
  const [pathwayProgress,setPathwayProgress]=useState(()=>{try{return JSON.parse(localStorage.getItem('dw_pathway_progress'))||{completedDays:[],currentDay:1,enrolled:false}}catch(e){return{completedDays:[],currentDay:1,enrolled:false}}});
  const [pathwayViewDay,setPathwayViewDay]=useState(null); // which day is being viewed
  const [showPathway,setShowPathway]=useState(false); // show pathway overlay on home

  const savePathwayProgress=(p)=>{setPathwayProgress(p);try{localStorage.setItem('dw_pathway_progress',JSON.stringify(p))}catch(e){}};

  // ===== OFFLINE KJV BIBLE =====
  // Parse a Bible reference like "Genesis 1" or "Genesis 1:5-10" or "Genesis 1-3"
  const parseKjvRef=(ref)=>{
    const m=ref.trim().match(/^(\d?\s*\w[\w\s]*?)\s+(\d+)(?::(\d+)(?:-(\d+))?|-(\d+))?$/i);
    if(!m)return null;
    const book=m[1].trim();
    const ch=parseInt(m[2]);
    const startVerse=m[3]?parseInt(m[3]):null;
    const endVerse=m[4]?parseInt(m[4]):null;
    const endChapter=m[5]?parseInt(m[5]):null;
    return{book,ch,startVerse,endVerse,endChapter};
  };

  // Fetch with timeout utility for external APIs
  // Claude API rate limiter — max 10 requests per 5 minutes
  const claudeRateRef=useRef([]);
  const checkClaudeRate=()=>{
    const now=Date.now();
    claudeRateRef.current=claudeRateRef.current.filter(t=>now-t<300000);
    if(claudeRateRef.current.length>=10)return false;
    claudeRateRef.current.push(now);
    return true;
  };

  // Input sanitizer — strips HTML tags and limits length
  const sanitize=(str,maxLen=5000)=>{
    if(!str)return'';
    return str.replace(/<[^>]*>/g,'').substring(0,maxLen);
  };

  const fetchWithTimeout=(url,opts={},ms=15000)=>{
    const controller=new AbortController();
    const timer=setTimeout(()=>controller.abort(),ms);
    return fetch(url,{...opts,signal:controller.signal}).finally(()=>clearTimeout(timer));
  };
  // Deduplicated fetch — if same GET URL is already in-flight, reuse the promise
  const fetchDedup=(url,opts={},ms=15000)=>{
    if(opts.method&&opts.method!=='GET')return fetchWithTimeout(url,opts,ms);
    const key=url;
    if(inflightRef.current[key])return inflightRef.current[key];
    const p=fetchWithTimeout(url,opts,ms).finally(()=>{delete inflightRef.current[key]});
    inflightRef.current[key]=p;
    return p;
  };

  // Fetch KJV verses from local static files
  const fetchKjvOffline=async(ref)=>{
    try{
      // Load the KJV index to map book names to folders
      const idxResp=await fetch('/bible/kjv/index.json');
      if(!idxResp.ok)return null;
      const idx=await idxResp.json();
      const bookMap={};
      for(const b of idx){
        bookMap[b.name.toLowerCase()]=b;
        // Also map common variations
        if(b.name==='Psalms')bookMap['psalm']=b;
        if(b.name==='Song of Solomon'){bookMap['song of songs']=b;bookMap['song of solomon']=b}
      }
      // Handle compound references (semicolons)
      const parts=ref.split(';').map(s=>s.trim()).filter(Boolean);
      let allVerses=[];
      let canonical=ref;
      for(const part of parts){
        const parsed=parseKjvRef(part);
        if(!parsed)continue;
        const entry=bookMap[parsed.book.toLowerCase()];
        if(!entry)continue;
        const startCh=parsed.ch;
        const endCh=parsed.endChapter||parsed.ch;
        for(let c=startCh;c<=endCh;c++){
          try{
            const chResp=await fetch(`/bible/kjv/${entry.folder}/${c}.json`);
            if(!chResp.ok)throw new Error('KJV chapter '+chResp.status);
            const chData=await chResp.json();
            let verses=chData.verses;
            // Apply verse range only for single-chapter refs
            if(c===startCh&&parsed.startVerse&&!parsed.endChapter){
              const end=parsed.endVerse||parsed.startVerse;
              verses=verses.slice(parsed.startVerse-1,end);
            }
            // Number each verse
            const startNum=(c===startCh&&parsed.startVerse)?parsed.startVerse:1;
            verses.forEach((v,i)=>{
              allVerses.push({num:startNum+i,ch:c,text:v});
            });
          }catch(e){console.log('KJV fetch failed for',entry.folder,c)}
        }
        canonical=`${entry.name} ${startCh}${endCh>startCh?'-'+endCh:''}${parsed.startVerse?':'+parsed.startVerse+(parsed.endVerse?'-'+parsed.endVerse:''):''}`;
      }
      if(allVerses.length===0)return null;
      // Format as text with verse numbers
      const text=allVerses.map(v=>`[${v.ch>1||parts.length>1?v.ch+':':''}${v.num}] ${v.text}`).join(' ');
      const verseTexts=allVerses.map(v=>v.text);
      return{canonical,text,verses:verseTexts};
    }catch(e){
      console.log('KJV offline fetch error:',e);
      return null;
    }
  };

  // Download entire KJV for offline use
  const downloadKjvForOffline=async()=>{
    setKjvDownloading(true);setKjvProgress({done:0,total:1190});
    try{
      const idxResp=await fetch('/bible/kjv/index.json');
      if(!idxResp.ok)throw new Error('Index '+idxResp.status);
      const idx=await idxResp.json();
      // Send to service worker for background caching
      if(navigator.serviceWorker&&navigator.serviceWorker.controller){
        navigator.serviceWorker.controller.postMessage({type:'PRECACHE_KJV',index:idx});
      }
    }catch(e){
      setKjvDownloading(false);
      alert(lang==='es'?'Error al descargar. Verifica tu conexión.':lang==='pt'?'Falha no download. Verifique sua conexão.':'Download failed. Check your connection.');
    }
  };

  // Listen for KJV download progress from service worker
  useEffect(()=>{
    const handler=(e)=>{
      if(e.data?.type==='KJV_PROGRESS'){
        setKjvProgress({done:e.data.done,total:e.data.total});
      }else if(e.data?.type==='KJV_COMPLETE'){
        setKjvDownloaded(true);setKjvDownloading(false);setKjvProgress(null);
        try{localStorage.setItem('dw_kjv_downloaded','1')}catch(e){}
      }
    };
    navigator.serviceWorker?.addEventListener('message',handler);
    return()=>navigator.serviceWorker?.removeEventListener('message',handler);
  },[]);

  const loadPathway=async()=>{
    if(pathwayData)return;
    try{
      const resp=await fetch('books/faith-pathway.json');
      if(!resp.ok)throw new Error('Pathway '+resp.status);
      const data=await resp.json();
      setPathwayData(data);
    }catch(e){console.error('Failed to load pathway:',e)}
  };

  // Auto-load pathway for new_believer or returning personas
  useEffect(()=>{
    if(setup&&(setup.persona==='new_believer'||setup.persona==='returning')){
      if(!pathwayProgress.enrolled){
        savePathwayProgress({...pathwayProgress,enrolled:true});
      }
      loadPathway();
    }
  },[setup]);

  const completePathwayDay=(dayNum)=>{
    const completed=pathwayProgress.completedDays.includes(dayNum)?pathwayProgress.completedDays:([...pathwayProgress.completedDays,dayNum]);
    const nextDay=Math.min(30,Math.max(...completed,dayNum)+1);
    savePathwayProgress({...pathwayProgress,completedDays:completed,currentDay:nextDay});
  };

  // ===== LIBRARY / BOOKS =====
  const [moreSection,setMoreSection]=useState(null); // null=hub, 'plans', 'psA', 'psJane'
  const [selectedBook,setSelectedBook]=useState(null); // book id
  const [selectedChapter,setSelectedChapter]=useState(null); // chapter index
  const [bookHighlights,setBookHighlights]=useState({}); // {bookId_chIdx_pIdx: 'yellow'|'green'|'blue'|'pink'}
  const [selectedBookPara,setSelectedBookPara]=useState(null); // {bookId, chIdx, pIdx, text}
  const [showBookActions,setShowBookActions]=useState(false);

  // Book catalog — metadata only, chapters loaded on demand from JSON
  const BOOK_CATALOG = {
    psA: [
      {
        id: 'scarcity',
        title: 'From Scarcity to Supernatural Supply',
        titleEs: 'De la Escasez al Suministro Sobrenatural',
        titlePt: 'Da Escassez ao Suprimento Sobrenatural',
        author: 'Ps A',
        description: "Living in the Overflow of God's Grace and Favor — a powerful exploration of grace-empowered living.",
        descriptionEs: "Viviendo en el Desborde de la Gracia y el Favor de Dios — una poderosa exploración de la vida empoderada por la gracia.",
        descriptionPt: "Vivendo no Transbordamento da Graça e do Favor de Deus — uma poderosa exploração da vida capacitada pela graça.",
        icon: '✨',
        chapterCount: 23,
        bookDir: 'books/scarcity',
        voiceId: 'JBFqnCBsd6RMkjVDRZzb'
      },
      {
        id: 'church',
        title: "What's Wrong With The Church",
        titleEs: "¿Qué Está Mal Con La Iglesia?",
        titlePt: "O Que Há de Errado Com a Igreja",
        author: 'Ps A',
        description: "A bold look at what's broken in the modern church — and a passionate call to rediscover God's original design.",
        descriptionEs: "Una mirada audaz a lo que está roto en la iglesia moderna — y un llamado apasionado a redescubrir el diseño original de Dios.",
        descriptionPt: "Um olhar ousado sobre o que está quebrado na igreja moderna — e um chamado apaixonado para redescobrir o design original de Deus.",
        icon: '⛪',
        chapterCount: 19,
        bookDir: 'books/church',
        voiceId: 'onwK4e9ZLuTAKqWW03F9'
      },
      {
        id: 'no_more_fear',
        title: 'No More Fear',
        author: 'Ashley Evans',
        description: 'Break the Power of Intimidation in 40 Days — a 40-day journey through the truth about fear, authority, God\'s plan, and the path to breakthrough.',
        icon: '🦁',
        chapterCount: 41,
        bookDir: 'books/no_more_fear_chapters',
        voiceId: 'JBFqnCBsd6RMkjVDRZzb'
      }
    ],
    psJane: [
    ]
  };
  const [loadedBooks,setLoadedBooks]=useState({}); // {bookId: {toc:[{title,paragraphCount}], chapters:{0:{title,paragraphs}}}}
  const [bookLoading,setBookLoading]=useState(null);
  const [chapterLoading,setChapterLoading]=useState(null);

  const getBook=(section,bookId)=>{
    const catalog=(BOOK_CATALOG[section]||[]).find(b=>b.id===bookId);
    if(!catalog)return null;
    const loaded=loadedBooks[bookId];
    if(loaded&&loaded.toc){
      // Build chapters array from TOC + any loaded chapter data
      const chapters=loaded.toc.map((t,i)=>{
        const ch=loaded.chapters&&loaded.chapters[i];
        return ch?{title:t.title,titleEs:ch.titleEs||t.titleEs,titlePt:ch.titlePt||t.titlePt,paragraphs:ch.paragraphs,paragraphsEs:ch.paragraphsEs,paragraphsPt:ch.paragraphsPt}:{title:t.title,titleEs:t.titleEs,titlePt:t.titlePt,paragraphs:null};
      });
      return{...catalog,chapters};
    }
    return{...catalog,chapters:[]};
  };

  const [bookError,setBookError]=useState(null);

  const loadBookData=async(bookId)=>{
    if(loadedBooks[bookId])return;
    const catalog=[...BOOK_CATALOG.psA,...BOOK_CATALOG.psJane].find(b=>b.id===bookId);
    if(!catalog||!catalog.bookDir)return;
    setBookLoading(bookId);
    setBookError(null);
    try{
      // Try per-chapter TOC first (small ~1.5KB file)
      const resp=await fetch(catalog.bookDir+'/toc.json?v=5');
      if(!resp.ok)throw new Error('TOC HTTP '+resp.status);
      const data=await resp.json();
      if(data&&data.chapters&&Array.isArray(data.chapters)){
        setLoadedBooks(prev=>({...prev,[bookId]:{toc:data.chapters,chapters:{}}}));
        trackActivity('book_open',catalog.title||bookId);
      }else{throw new Error('Bad TOC format')}
    }catch(e){
      console.warn('Per-chapter TOC failed, trying full book:',e.message);
      // Fallback: load the full book JSON
      try{
        const resp2=await fetch('books/'+bookId+'.json?v=5');
        if(!resp2.ok)throw new Error('Full book HTTP '+resp2.status);
        const data2=await resp2.json();
        if(data2&&data2.chapters&&Array.isArray(data2.chapters)){
          const toc=data2.chapters.map(ch=>({title:ch.title,titleEs:ch.titleEs,paragraphCount:ch.paragraphs?ch.paragraphs.length:0}));
          const chapters={};

  // Fetch verses — always loads local KJV first as guaranteed fallback, then tries requested translation via API
  const fetchTranslation=async(passageName,trans)=>{
    const cacheKey=`${passageName}_${trans}`;
    if(apiVerses[cacheKey])return;
    setLoadingTrans(true);
    const pData=BIBLE[passageName];
    const parsed=parsePassage(passageName);
    const book=pData?pData.book:(parsed?parsed.book:null);
    const ch=pData?pData.ch:(parsed?parsed.ch:null);
    if(!book||!ch){setLoadingTrans(false);return}
    const numVerses=(pData&&pData.verses)?pData.verses.length:200;
    // ALWAYS pre-load local KJV as safety net (fast, no external API)
    const kjvKey=`${passageName}_KJV`;
    if(!apiVerses[kjvKey]&&!BIBLE[passageName]?.verses&&!BIBLE_WEB[passageName]?.verses){
      try{
        const ref=`${book} ${ch}:1-${numVerses}`;
        const kjv=await fetchKjvOffline(ref);
        if(kjv&&kjv.verses.length>0){
          setApiVerses(p=>({...p,[kjvKey]:kjv.verses}));
        }
      }catch(e){console.log('KJV offline prefetch failed',e)}
    }
    // If KJV was the requested translation, we're done
    if(trans==='KJV'){setLoadingTrans(false);return}
    // WEB is served from static cache — no API needed
    if(trans==='WEB'){
      if(BIBLE_WEB[passageName]?.verses){
        setApiVerses(p=>({...p,[cacheKey]:BIBLE_WEB[passageName].verses}));
      }
      setLoadingTrans(false);return;
    }
    // Try the requested translation via API, with KJV already loaded as fallback
    try{
      const BOLLS_TRANS=['NKJV','NIV','AMP','NASB','RVR','ARA'];
      const BOLLS_CODE={NKJV:'NKJV',NIV:'NIV2011',AMP:'AMP',NASB:'NASB',RVR:'RV1960',ARA:'ARA'};
      const PROXY_TRANS=['ESV','NLT',...BOLLS_TRANS];
      if(PROXY_TRANS.includes(trans)){
        const query=`${book} ${ch}`;
        let url;
        if(trans==='NLT') url=`/.netlify/functions/nlt?q=${encodeURIComponent(query)}&v=NLT`;
        else if(BOLLS_TRANS.includes(trans)) url=`/.netlify/functions/bolls?q=${encodeURIComponent(query)}&v=${BOLLS_CODE[trans]||trans}`;
        else url=`/.netlify/functions/esv?q=${encodeURIComponent(query)}`;
        const resp=await fetchDedup(url,{},12000);
        if(resp.ok){
          const data=await resp.json();
          if(data.passages&&data.passages[0]){
            const text=data.passages[0];
            const vs=text.split(/\[(\d+)\]/).filter(s=>s.trim()).filter(s=>!/^\d+$/.test(s)).map(s=>s.trim());
            setApiVerses(p=>({...p,[cacheKey]:vs}));
          }
        }
      }else{
        const bookStr=book.toLowerCase().replace(/\s+/g,'+');
        const apiTrans=trans.toLowerCase();
        const resp=await fetchWithTimeout(`https://bible-api.com/${bookStr}+${ch}?translation=${apiTrans}`);
        if(resp.ok){
          const data=await resp.json();
          if(data.verses){
            const vs=data.verses.map(v=>v.text.trim());
            setApiVerses(p=>({...p,[cacheKey]:vs}));
          }
        }
      }
    }catch(e){console.log('Translation fetch failed for '+trans+', KJV fallback available',e)}
    setLoadingTrans(false);
  };

    const cached=apiVerses[`${passageName}_${translation}`];

    const file=e.target.files&&e.target.files[0];

    const reader=new FileReader();
    reader.onload=(ev)=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const size=200;
        canvas.width=size;canvas.height=size;
        const ctx=canvas.getContext('2d');
        const min=Math.min(img.width,img.height);
        const sx=(img.width-min)/2,sy=(img.height-min)/2;
        ctx.drawImage(img,sx,sy,min,min,0,0,size,size);
        const dataUrl=canvas.toDataURL('image/jpeg',0.8);
        setProfilePic(dataUrl);
        try{localStorage.setItem('dw_profile_pic',dataUrl)}catch(e){}

      img.src=ev.target.result;
    };

  // Auto-refresh at midnight: schedule timer + multiple resume detectors

  useEffect(()=>{

    const msUntilMidnight=Math.max(1000,midnight-now);

    const pattern=new RegExp('\\b('+allNames.map(n=>n.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')\\b','g');
    const parts=[];
    let lastIdx=0;
    let match;

      const isChar=CHARACTERS[matched];
      const isLoc=LOCATIONS[matched];
      parts.push({text:matched,type:isChar?'char':'loc',key:matched,idx:m.index});
      lastIdx=regex.lastIndex;

    if(lastIdx<text.length)parts.push(text.slice(lastIdx));
    if(parts.length<=1&&typeof parts[0]==='string')return text;
    return parts.map((p,i)=>{

    if(!query.trim())return;

    trackActivity('search',query.trim());
    setSearchLoading(true);setSearchResults(null);
    try{
      // First try direct ESV lookup (handles "John 3:16", "Romans 8", etc.)
      const esvRes=await fetchDedup('/.netlify/functions/esv?q='+encodeURIComponent(query),{},12000);
      const esvData=await esvRes.json();
      if(esvData.passages&&esvData.passages.length>0&&esvData.passages[0].trim()){
        const text=esvData.passages[0].trim();
        const ref=esvData.canonical||query;
        setSearchResults([{ref,text}]);
        setSearchLoading(false);return;
      }
      // If direct lookup fails, use Claude to interpret the semantic query
      if(!checkClaudeRate()){setSearchResults([{ref:'Rate Limited',text:'Too many requests. Please wait a few minutes.'}]);setSearchLoading(false);return}
      const claudeRes=await fetchWithTimeout('/.netlify/functions/claude',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:[{role:'user',content:`The user searched for: "${query}". Return ONLY a JSON array of 1-3 relevant Bible passage references that match this query. Examples of valid references: "John 3:16-17", "Psalm 23:1-6", "Romans 8:28-39". Return ONLY the JSON array, nothing else. Example: ["John 3:16-17","Romans 8:28"]`}],model:'claude-sonnet-4-20250514',max_tokens:200})
      },25000);
      const claudeData=await claudeRes.json();
      const content=claudeData.content?.[0]?.text||'';
      const match=content.match(/\[[\s\S]*?\]/);
      if(match){
        let refs;try{refs=JSON.parse(match[0])}catch(e){console.log('AI JSON parse error',e);refs=[]}
        const results=[];
        for(const r of refs.slice(0,3)){
          try{
            const res=await fetchDedup('/.netlify/functions/esv?q='+encodeURIComponent(r),{},12000);
            const d=await res.json();
            if(d.passages&&d.passages[0]&&d.passages[0].trim()){
              results.push({ref:d.canonical||r,text:d.passages[0].trim()});
            }
          }catch(e){}
        }
        if(results.length>0){setSearchResults(results);setSearchLoading(false);return}
      }
      setSearchResults([]);
    }catch(e){setSearchResults([]);}
    setSearchLoading(false);
  };

          result.push(pool[(dayOfYear*(ch+1))%pool.length]);
        }
      }

    const start=(dayOfYear*numCh)%pool.length;

  const startRecording=()=>{
    if(!streamRef.current)return;
    chunksRef.current=[];
    // Prefer MP4 first — produces H.264+AAC which iMessage/WhatsApp/all apps accept
    // Safari/iOS supports mp4 natively. Chrome/Android falls back to webm.
    const mimeType=MediaRecorder.isTypeSupported('video/mp4;codecs=avc1,mp4a.40.2')?'video/mp4;codecs=avc1,mp4a.40.2':
      MediaRecorder.isTypeSupported('video/mp4')?'video/mp4':
      MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')?'video/webm;codecs=vp9,opus':
      MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')?'video/webm;codecs=vp8,opus':'video/webm';
    const recorder=new MediaRecorder(streamRef.current,{mimeType,videoBitsPerSecond:2000000});
    recorder.ondataavailable=(e)=>{if(e.data.size>0)chunksRef.current.push(e.data)};
    recorder.onstop=()=>{
      const blob=new Blob(chunksRef.current,{type:mimeType});
      setRecordedBlob(blob);
      // Stop camera preview
      if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null}
    };
    recorder.start(1000); // collect data every second
    mediaRecorderRef.current=recorder;
    setIsRecording(true);
    setRecordTime(0);
    recordTimerRef.current=setInterval(()=>{
      setRecordTime(prev=>{
        if(prev>=MAX_RECORD_SECS-1){
          stopRecording();
          return MAX_RECORD_SECS;
        }
        return prev+1;
      });
    },1000);
  };

  const shareVideo=async(id)=>{
    try{
      const record=await VideoDB.get(id);
      if(!record){setCopyMsg('Video not found');setTimeout(()=>setCopyMsg(''),2000);return}
      setCopyMsg('Preparing...');
      const dateStr=new Date().toISOString().split('T')[0];
      // CRITICAL: extension MUST match actual container or apps reject/fail to deliver
      const realType=record.blob.type||'video/webm';
      const isRealMp4=realType.includes('mp4');
      const ext=isRealMp4?'mp4':'webm';
      const fileName='Daily-Word-Devotion-'+dateStr+'.'+ext;
      // Strategy 1: Share with file (mobile)
      if(navigator.share){
        const file=new File([record.blob],fileName,{type:realType});
        // Check if this browser can share files
        let canShareFiles=false;
        try{canShareFiles=navigator.canShare&&navigator.canShare({files:[file]})}catch(e){}
        if(canShareFiles){
          try{
            await navigator.share({files:[file],title:lang==='es'?'Mi Video Devocional':lang==='pt'?'Meu Vídeo Devocional':'My Video Devotion',text:lang==='es'?'¡Mira mi video devocional de Palabra Diaria!':lang==='pt'?'Assista meu vídeo devocional do Daily Word!':'Watch my video devotion from Daily Word!'});
            setCopyMsg(lang==='es'?'¡Compartido!':lang==='pt'?'Compartilhado!':'Shared!');setTimeout(()=>setCopyMsg(''),2000);
            return;
          }catch(shareErr){
            if(shareErr.name==='AbortError'){setCopyMsg('');return}
            // File share failed — try text-only share below
          }
        }
        // Strategy 2: Share text with link (fallback for browsers that don't support file sharing)
        try{
          // Save to a temp blob URL user can share
          await navigator.share({title:lang==='es'?'Mi Video Devocional':lang==='pt'?'Meu Vídeo Devocional':'My Video Devotion',text:lang==='es'?'¡Mira mi video devocional grabado en Palabra Diaria! https://futures-daily-word.netlify.app':lang==='pt'?'Confira meu vídeo devocional gravado no Daily Word! https://futures-daily-word.netlify.app':'Check out my video devotion recorded on Daily Word! https://futures-daily-word.netlify.app'});
          // Also auto-download the file so they can attach it
          triggerVideoDownload(record.blob,fileName);
          setCopyMsg(lang==='es'?'Video guardado — adjúntalo a tu mensaje!':lang==='pt'?'Vídeo salvo — anexe à sua mensagem!':'Video saved — attach it to your message!');setTimeout(()=>setCopyMsg(''),3000);
          return;
        }catch(e2){
          if(e2.name==='AbortError'){setCopyMsg('');return}
        }
      }
      // Strategy 3: No share API at all (desktop) — just download
      triggerVideoDownload(record.blob,fileName);
      setCopyMsg(lang==='es'?'¡Video guardado en el dispositivo!':lang==='pt'?'Vídeo salvo no dispositivo!':'Video saved to device!');setTimeout(()=>setCopyMsg(''),2000);
    }catch(err){
      console.error('Share error:',err);
      setCopyMsg('');
      // Last resort: try a plain download
      try{
        const record=await VideoDB.get(id);
        if(record)triggerVideoDownload(record.blob,'devotion.webm');
        setCopyMsg(lang==='es'?'¡Video guardado!':lang==='pt'?'Vídeo salvo!':'Video saved!');setTimeout(()=>setCopyMsg(''),2000);
      }catch(e){alert(lang==='es'?'No se pudo compartir o guardar el video. Intenta de nuevo.':lang==='pt'?'Não foi possível compartilhar ou salvar o vídeo. Tente novamente.':'Could not share or save video. Please try again.')}

  const renderAudioPlayer=(url)=>{

  // ===== ONBOARDING =====

  // Render word-tappable verse text
  const renderVerse=(text,verseKey,pName,vi)=>{
    const allNames=[...charNames,...locNames];
    let wordIdx=0;
    const wrapWord=(word,ki)=>{
      const wi=wordIdx++;
      const hlColor=getWordHlColor(verseKey,wi);
      const isSel=isWordSelected(verseKey,wi);
      const cls=['word-tap'];
      if(hlColor)cls.push('whl-'+hlColor);
      if(isSel)cls.push('word-selected');
      return <span key={ki} className={cls.join(' ')}
        data-widx={wi} data-vkey={verseKey}
        onClick={(e)=>{
          if(wordDragRef.current&&wordDragRef.current.engaged)return;
          wordTapRef.current=true;
          if(wordSelection&&wordSelection.verseKey===verseKey){
            onWordTapExtend(e,verseKey,wi);
          }else{
            lookupWord(word);
          }
        }}
        onDoubleClick={(e)=>onWordDoubleTap(e,verseKey,wi,pName,vi,text)}
        onTouchStart={(e)=>onWordTouchStart(e,verseKey,wi,pName,vi,text)}
        onTouchMove={(e)=>onWordTouchMove(e)}
        onTouchEnd={(e)=>onWordTouchEnd(e)}
      >{word}</span>;
    };

    if(allNames.length===0){
      return text.split(/(\s+)/).map((w,i)=>{
        if(/^\s+$/.test(w))return <span key={i}>{w}</span>;
        return wrapWord(w,i);
      });
    }
    const regex=new RegExp('\\b('+allNames.map(n=>n.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')\\b','g');
    const parts=[];let lastIdx=0;let m;
    while((m=regex.exec(text))!==null){
      if(m.index>lastIdx)parts.push({type:'text',val:text.slice(lastIdx,m.index)});
      const matched=m[1];
      parts.push({type:CHARACTERS[matched]?'char':'loc',val:matched});
      lastIdx=regex.lastIndex;
    }
    if(lastIdx<text.length)parts.push({type:'text',val:text.slice(lastIdx)});
    let ki=0;
    return parts.map((p,pi)=>{
      if(p.type==='char'){wordIdx++;return <span key={ki++} className="char-name" onClick={(e)=>{wordTapRef.current=true;openCharProfile(p.val)}}>{p.val}</span>}
      if(p.type==='loc'){wordIdx++;return <span key={ki++} className="loc-name" onClick={(e)=>{wordTapRef.current=true;openLocProfile(p.val)}}>{p.val}</span>}
      return p.val.split(/(\s+)/).map((w)=>{
        if(/^\s+$/.test(w))return <span key={ki++}>{w}</span>;
        return wrapWord(w,ki++);
      });
    });
  };

  // ===== WORD-LEVEL HIGHLIGHTING =====
  const hlWords=(color)=>{
    if(!wordSelection)return;
    const {verseKey,startWord,endWord}=wordSelection;
    setWordHighlights(p=>{
      const existing=(p[verseKey]||[]).filter(h=>!(h.start<=endWord&&h.end>=startWord)); // remove overlapping
      return {...p,[verseKey]:[...existing,{start:startWord,end:endWord,color}]};
    });
    setWordSelection(null);setShowActions(false);setSelectedVerse(null);
  };

  const clearWordHl=()=>{
    if(!wordSelection)return;
    const {verseKey,startWord,endWord}=wordSelection;
    setWordHighlights(p=>{
      const existing=(p[verseKey]||[]).filter(h=>!(h.start<=endWord&&h.end>=startWord));
      if(existing.length===0){const n={...p};delete n[verseKey];return n}
      return {...p,[verseKey]:existing};
    });
    setWordSelection(null);setShowActions(false);setSelectedVerse(null);
  };

  const getWordHlColor=(verseKey,wordIdx)=>{
    const ranges=wordHighlights[verseKey];
    if(!ranges)return null;
    for(const r of ranges){
      if(wordIdx>=r.start&&wordIdx<=r.end)return r.color;
    }
    return null;
  };

  const isWordSelected=(verseKey,wordIdx)=>{
    if(!wordSelection||wordSelection.verseKey!==verseKey)return false;
    const lo=Math.min(wordSelection.startWord,wordSelection.endWord);
    const hi=Math.max(wordSelection.startWord,wordSelection.endWord);
    return wordIdx>=lo&&wordIdx<=hi;
  };

  const onWordDoubleTap=(e,verseKey,wordIdx,pName,vi,verseText)=>{
    e.stopPropagation();
    wordTapRef.current=true;
    const words=verseText.split(/\s+/).filter(w=>w.length>0);
    const selectedText=words[wordIdx]||'';
    setWordSelection({verseKey,pName,vi,startWord:wordIdx,endWord:wordIdx,verseText});
    setSelectedVerse({key:verseKey,ref:`${pName}:${vi+1}`,text:selectedText,isWordLevel:true});
    setShowActions(true);setShowNote(false);setShowComment(false);
  };

  const onWordTapExtend=(e,verseKey,wordIdx)=>{
    e.stopPropagation();
    wordTapRef.current=true;
    if(!wordSelection||wordSelection.verseKey!==verseKey)return false;
    const words=wordSelection.verseText.split(/\s+/).filter(w=>w.length>0);
    const lo=Math.min(wordSelection.startWord,wordIdx);
    const hi=Math.max(wordSelection.startWord,wordIdx);
    const selectedWords=words.slice(lo,hi+1).join(' ');
    setWordSelection(p=>({...p,endWord:wordIdx}));
    setSelectedVerse(p=>({...p,text:selectedWords}));
    return true;
  };

  // Touch-drag word selection: press-hold a word, slide finger across to select range
  const onWordTouchStart=(e,verseKey,wordIdx,pName,vi,verseText)=>{
    // Start a hold timer — if held 300ms, enter word-drag mode
    const timer=setTimeout(()=>{
      if(!wordDragRef.current)return;
      wordDragRef.current.engaged=true;
      wordTapRef.current=true;
      // Prevent verse-level drag
      if(dragRef.current){clearTimeout(dragRef.current.timer);dragRef.current=null}
      const words=verseText.split(/\s+/).filter(w=>w.length>0);
      const selectedText=words[wordIdx]||'';
      setWordSelection({verseKey,pName,vi,startWord:wordIdx,endWord:wordIdx,verseText});
      setSelectedVerse({key:verseKey,ref:`${pName}:${vi+1}`,text:selectedText,isWordLevel:true});
      // Vibrate for haptic feedback if available
      if(navigator.vibrate)navigator.vibrate(30);
    },300);
    wordDragRef.current={verseKey,pName,vi,startWord:wordIdx,verseText,engaged:false,timer};

  const onWordTouchMove=(e)=>{
    if(!wordDragRef.current||!wordDragRef.current.engaged)return;
    e.preventDefault(); // prevent scroll while dragging words
    const touch=e.touches[0];
    const el=document.elementFromPoint(touch.clientX,touch.clientY);
    if(!el)return;
    const wordEl=el.closest('[data-widx]');
    if(!wordEl)return;
    const wi=parseInt(wordEl.getAttribute('data-widx'));
    if(isNaN(wi))return;
    // Only extend within same verse
    const vk=wordEl.getAttribute('data-vkey');
    if(vk&&vk!==wordDragRef.current.verseKey)return;
    const d=wordDragRef.current;

    const lo=Math.min(d.startWord,wi);
    const hi=Math.max(d.startWord,wi);
    const selectedWords=words.slice(lo,hi+1).join(' ');
    setWordSelection(p=>p?{...p,endWord:wi}:{verseKey:d.verseKey,pName:d.pName,vi:d.vi,startWord:d.startWord,endWord:wi,verseText:d.verseText});
    setSelectedVerse(p=>p?{...p,text:selectedWords}:{key:d.verseKey,ref:`${d.pName}:${d.vi+1}`,text:selectedWords,isWordLevel:true});
  };

  // ===== BOOK CHAPTER AUDIO =====

  // Fetch Spanish/Portuguese audio via Amazon Polly (with caching)
  const fetchPollyAudio=async(text,cacheKey)=>{

  // Read book chapter aloud — tries ElevenLabs first, falls back to Polly, then browser TTS
  const fetchParaAudio=async(text,voiceId,cacheKey)=>{
    if(bookAudioQueueRef.current.prefetched[cacheKey]){
      return bookAudioQueueRef.current.prefetched[cacheKey];
    }
    // Try ElevenLabs first
    try{
      const url=await getElevenLabsAudio(text,voiceId);
      bookAudioQueueRef.current.prefetched[cacheKey]=url;
      return url;
    }catch(e){
      console.log('ElevenLabs failed, trying Polly:',e.message);
      // Fall back to Polly (Matthew for English)
      const url=await getPollyAudio(text,'Matthew');
      bookAudioQueueRef.current.prefetched[cacheKey]=url;

  // Browser TTS fallback — reads paragraphs one by one using SpeechSynthesis
  const playBookWithBrowserTTS=(chunks,speakKey)=>{
    const q=bookAudioQueueRef.current;
    let idx=0;
    const speakNext=()=>{
      if(q.cancelled||idx>=chunks.length){
        setSpeaking(null);setAudioLoading(null);audioRef.current=null;
        q.active=false;
        if(!q.cancelled&&idx>=chunks.length)autoAdvanceNextChapter();
        return;
      }
      const utter=new SpeechSynthesisUtterance(chunks[idx]);
      utter.lang=lang==='es'?'es-ES':lang==='pt'?'pt-BR':'en-GB';
      utter.rate=audioSpeed;
      // Try to pick a good voice
      const voices=window.speechSynthesis.getVoices();
      if(lang==='es'){
        const v=voices.find(v=>v.lang.startsWith('es')&&v.name.toLowerCase().includes('mónica'))||
                voices.find(v=>v.lang.startsWith('es'))||null;
        if(v)utter.voice=v;
      }else if(lang==='pt'){
        const v=voices.find(v=>v.lang.startsWith('pt')&&v.name.toLowerCase().includes('vitória'))||
                voices.find(v=>v.lang.startsWith('pt'))||null;
        if(v)utter.voice=v;
      }else{
        const v=voices.find(v=>v.lang.startsWith('en')&&v.name.toLowerCase().includes('daniel'))||
                voices.find(v=>v.lang.startsWith('en-GB'))||
                voices.find(v=>v.lang.startsWith('en')&&!v.name.toLowerCase().includes('google'))||
                voices.find(v=>v.lang.startsWith('en'))||null;
        if(v)utter.voice=v;
      }
      utter.onstart=()=>{setAudioLoading(null);setSpeaking(speakKey)};
      utter.onend=()=>{idx++;speakNext()};
      utter.onerror=()=>{idx++;speakNext()};
      utter._isTTS=true;
      audioRef.current=utter;
      window.speechSynthesis.speak(utter);
    };
    speakNext();
  };

  // Polly queue for Spanish/Portuguese — tries Polly first, falls back to browser TTS
  const playPollyQueue=async(idx)=>{
    const q=bookAudioQueueRef.current;
    if(q.cancelled||idx>=q.paragraphs.length){
      setSpeaking(null);setAudioLoading(null);audioRef.current=null;
      q.active=false;
      Object.values(q.prefetched).forEach(u=>{try{URL.revokeObjectURL(u)}catch(e){}});
      q.prefetched={};
      if(!q.cancelled&&idx>=q.paragraphs.length)autoAdvanceNextChapter();
      return;
    }
    const para=q.paragraphs[idx];
    const cacheKey='polly_'+q.speakKey+'_'+idx;
    try{
      const url=await fetchPollyAudio(para,cacheKey);
      if(q.cancelled)return;
      // Prefetch next 2 chunks
      for(let n=1;n<=2;n++){
        if(idx+n<q.paragraphs.length){
          const nk='polly_'+q.speakKey+'_'+(idx+n);
          fetchPollyAudio(q.paragraphs[idx+n],nk).catch(()=>{});
        }
      }
      playAudioUrl(url,audioSpeed,
        ()=>{setAudioLoading(null);setSpeaking(q.speakKey)},
        ()=>{if(!q.cancelled)playPollyQueue(idx+1)},
        ()=>{if(!q.cancelled)playPollyQueue(idx+1)}
      );
    }catch(e){
      console.log('Polly unavailable, falling back to browser TTS:',e.message);
      const remaining=q.paragraphs.slice(idx);
      playBookWithBrowserTTS(remaining,q.speakKey);
    }
  };

  // ElevenLabs queue for English — tries ElevenLabs → Polly → browser TTS
  const playParaQueue=async(idx)=>{
    const q=bookAudioQueueRef.current;
    if(q.cancelled||idx>=q.paragraphs.length){
      setSpeaking(null);setAudioLoading(null);audioRef.current=null;
      q.active=false;
      Object.values(q.prefetched).forEach(u=>{try{URL.revokeObjectURL(u)}catch(e){}});
      q.prefetched={};
      if(!q.cancelled&&idx>=q.paragraphs.length)autoAdvanceNextChapter();
      return;
    }
    const para=q.paragraphs[idx];
    const cacheKey='ep_'+q.speakKey+'_'+idx;
    try{
      const url=await fetchParaAudio(para,q.voiceId,cacheKey);
      if(q.cancelled)return;
      // Prefetch next 2 chunks
      for(let n=1;n<=2;n++){
        if(idx+n<q.paragraphs.length){
          const nk='ep_'+q.speakKey+'_'+(idx+n);
          fetchParaAudio(q.paragraphs[idx+n],q.voiceId,nk).catch(()=>{});
        }
      }
      playAudioUrl(url,audioSpeed,
        ()=>{setAudioLoading(null);setSpeaking(q.speakKey)},
        ()=>{if(!q.cancelled)playParaQueue(idx+1)},
        ()=>{if(!q.cancelled)playParaQueue(idx+1)}
      );
    }catch(e){
      console.log('All TTS APIs failed, falling back to browser TTS:',e.message);
      // Fall back to browser TTS for all remaining chunks
      const remaining=q.paragraphs.slice(idx);
      playBookWithBrowserTTS(remaining,q.speakKey);
    }
  };

  const readBookChapter=(bookId,chIdx)=>{
    if(speaking||speakingAll){stopAudio();return}
    const ld=loadedBooks[bookId];
    if(!ld||!ld.chapters||!ld.chapters[chIdx])return;
    const ch=ld.chapters[chIdx];
    const paras=(lang==='es'&&ch.paragraphsEs&&ch.paragraphsEs.length>0)?ch.paragraphsEs:(lang==='pt'&&ch.paragraphsPt&&ch.paragraphsPt.length>0)?ch.paragraphsPt:ch.paragraphs;
    if(!paras||paras.length===0)return;

    const catalog=[...BOOK_CATALOG.psA,...BOOK_CATALOG.psJane].find(b=>b.id===bookId);
    const speakKey=bookId+'_ch'+chIdx;
    setAudioLoading(speakKey);

    // Group paragraphs into chunks
    const chunks=[];
    let current=[];
    let currentLen=0;
    for(const p of paras){
      current.push(p);
      currentLen+=p.length;
      if(currentLen>800){
        chunks.push(current.join('\n\n'));
        current=[];
        currentLen=0;
      }
    }
    if(current.length)chunks.push(current.join('\n\n'));

    // Set up the queue
    const q=bookAudioQueueRef.current;
    q.active=true;
    q.cancelled=false;
    q.paragraphs=chunks;
    q.voiceId=(catalog&&catalog.voiceId)||'JBFqnCBsd6RMkjVDRZzb';
    q.speakKey=speakKey;
    q.prefetched={};
    q.bookId=bookId;
    q.chIdx=chIdx;
    q.totalChapters=(catalog&&catalog.chapterCount)||0;

    // Start — Spanish/Portuguese use Polly (Lucia/Camila), English uses ElevenLabs→Polly→BrowserTTS
    if(lang==='es'||lang==='pt'){playPollyQueue(0)}else{playParaQueue(0)}
  };

  // Auto-advance to next chapter when current chapter finishes naturally
  const autoAdvanceNextChapter=()=>{
    const q=bookAudioQueueRef.current;
    if(!q.bookId||q.cancelled)return;
    const nextCh=q.chIdx+1;
    if(nextCh>=q.totalChapters)return; // No more chapters
    console.log('Auto-advancing to chapter',nextCh+1,'of',q.totalChapters);
    setSelectedChapter(nextCh);
    // Load next chapter data, then start playing it
    loadChapter(q.bookId,nextCh).then(()=>{
      setTimeout(()=>readBookChapter(q.bookId,nextCh),300);
    });
  };

  const filteredJournal=journalEntries.filter(e=>{
    if(journalTab==='revelations')return e.type==='revelation';
    return e.type==='verse_note'||e.type==='verse_comment';
  }).filter(e=>!searchTerm||e.text.toLowerCase().includes(searchTerm.toLowerCase())||(e.ref&&e.ref.toLowerCase().includes(searchTerm.toLowerCase())));

  const L=LANG[lang]||LANG.en;

  return(
    <div className="app-container">
      {/* APP UPDATE BANNER */}
      {/* EMAIL GATE — appears when accessing books/resources without email */}
      {showEmailGate&&(
        <div className="profile-modal-overlay" onClick={e=>{if(e.target===e.currentTarget&&!emailGateSaving){setShowEmailGate(false)}}}>
          <div className="profile-modal" style={{maxWidth:360,padding:'28px 24px'}}>
            {emailGateDone?(
              <div className="pm-success">
                <div className="pm-check">✓</div>
                <h3>{lang==='es'?'¡Acceso concedido!':lang==='pt'?'Acesso liberado!':'You\'re in!'}</h3>
              </div>
            ):(
              <>
                <h3 style={{fontSize:20}}>{lang==='es'?'Accede a Libros y Recursos':lang==='pt'?'Acesse Livros e Recursos':'Unlock Books & Resources'}</h3>
                <div className="pm-sub">{lang==='es'?'Ingresa tu correo para acceso completo':lang==='pt'?'Digite seu email para acesso completo':'Enter your email for full access'}</div>
                {emailGateError&&<div className="pm-error">{emailGateError}</div>}
                <div className="pm-field"><input type="email" value={emailGateInput} onChange={e=>setEmailGateInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')submitEmailGate()}} placeholder="you@example.com" autoFocus style={{fontSize:16,padding:'12px 16px'}}/></div>
                <div className="pm-privacy">{lang==='es'?'Solo devocionales y actualizaciones. Nunca compartimos tu info.':lang==='pt'?'Apenas devocionais e atualizações. Nunca compartilhamos.':'Just devotionals & updates. We never share your info.'}</div>
                <div className="pm-actions">
                  <button className="pm-btn-primary" disabled={emailGateSaving} onClick={submitEmailGate}>{emailGateSaving?'...':'Continue'}</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
      {/* FULL PROFILE MODAL — Settings edit only */}
      {showProfileModal&&(
        <div className="profile-modal-overlay" onClick={e=>{if(e.target===e.currentTarget&&!profileSaving){setShowProfileModal(false)}}}>
          <div className="profile-modal">
            {profileSuccess?(
              <div className="pm-success">
                <div className="pm-check">✓</div>
                <h3>{lang==='es'?'Perfil guardado':lang==='pt'?'Perfil salvo':'Profile saved'}</h3>
              </div>
            ):(
              <>
                <h3>{lang==='es'?'Editar Perfil':lang==='pt'?'Editar Perfil':'Edit Profile'}</h3>
                {profileError&&<div className="pm-error">{profileError}</div>}
                <div className="pm-pic-area" onClick={()=>profilePicInputRef.current&&profilePicInputRef.current.click()}>
                  {profilePic?(
                    <img src={profilePic} alt="Profile" className="pm-pic-img"/>
                  ):(
                    <div className="pm-pic-placeholder">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style={{width:32,height:32,opacity:0.4}}><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                  )}
                  <div className="pm-pic-label">{profilePic?(lang==='es'?'Cambiar Foto':lang==='pt'?'Mudar Foto':'Change Photo'):(lang==='es'?'Agregar Foto':lang==='pt'?'Adicionar Foto':'Add Photo')}</div>
                  <input ref={profilePicInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleProfilePic}/>
                </div>
                <div className="pm-row">
                  <div className="pm-field"><label>First Name</label><input value={profileForm.firstName} onChange={e=>setProfileForm(p=>({...p,firstName:e.target.value}))} placeholder="First name"/></div>
                  <div className="pm-field"><label>Last Name</label><input value={profileForm.lastName} onChange={e=>setProfileForm(p=>({...p,lastName:e.target.value}))} placeholder="Last name"/></div>
                </div>
                <div className="pm-field"><label>Email</label><input type="email" value={profileForm.email} readOnly style={{opacity:0.6}}/></div>
                <div className="pm-field"><label>Phone</label><input type="tel" value={profileForm.phone} onChange={e=>setProfileForm(p=>({...p,phone:e.target.value}))} placeholder="Optional"/></div>
                <div className="pm-row">
                  <div className="pm-field"><label>Church</label><input value={profileForm.church} onChange={e=>setProfileForm(p=>({...p,church:e.target.value}))} placeholder="Optional"/></div>
                  <div className="pm-field"><label>City</label><input value={profileForm.city} onChange={e=>setProfileForm(p=>({...p,city:e.target.value}))} placeholder="Optional"/></div>
                </div>
                <div className="pm-actions" style={{marginTop:16}}>
                  <button className="pm-btn-primary" disabled={profileSaving} onClick={()=>submitProfile(true)}>{profileSaving?'Saving...':'Save Changes'}</button>
                  <button className="pm-btn-secondary" onClick={()=>setShowProfileModal(false)}>Cancel</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
      {showUpdateBanner&&(
        <div className="update-banner">
          <span>A new version is available</span>
          <button onClick={()=>window.location.reload()}>Update</button>
        </div>
      )}
      {/* INSTALL PROMPT BANNER */}
      {showInstallBanner&&(
        <div className="install-banner">
          <div className="install-banner-icon">DW</div>
          <div className="install-banner-text">
            <strong>Install Daily Word</strong>
            <span>Add to your home screen for quick access</span>
          </div>
          <button className="install-banner-btn" onClick={handleInstall}>Install</button>
          <button className="install-banner-close" onClick={dismissInstall}>&times;</button>
        </div>
      )}
      {/* GLOBAL ASK CLAUDE BUTTON */}
      <button className="ai-fixed-btn" aria-label="Ask Bible AI" onClick={()=>{
        if(showAI){setShowAI(false)}
        else{
          // Set context based on current page
          let ctx=passages.join(', ');
          if(planReading&&planReading.ref)ctx=planReading.ref;
          else if(page==='plans'&&planView){
            const plan=READING_PLANS.find(p=>p.id===planView);
            if(plan)ctx=plan.name;
          }
          setAiContext(ctx);setShowAI(true);setAiMessages([]);gaEvent('open_bible_ai',{context:ctx});
        }
      }}>
        {showAI?L.close:(<><svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" style={{width:16,height:16}}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>{L.askClaude}</>)}
      </button>

      {/* SCREENS */}
      {page==='home'&&(
        <div className="screen">
          <div className="brand-name">{lang==='es'?'Futuros':lang==='pt'?'Futuros':'Futures'}</div>
          <div className="quote-card">
            <div className="date">{dateStr}</div>
            <blockquote>{lang==='es'?(quote.textEs||quote.text):lang==='pt'?(quote.textPt||quote.text):quote.text}</blockquote>
            <div className="author">— {quote.author}</div>
          </div>

          {/* FAITH PATHWAY CARD */}
          {pathwayProgress.enrolled&&pathwayData&&(()=>{
            const completed=pathwayProgress.completedDays.length;
            const currentDay=pathwayProgress.currentDay;
            const today=pathwayData.days.find(d=>d.day===currentDay);
            if(completed>=30)return(
              <div className="pathway-card" style={{background:'linear-gradient(135deg,var(--sage),#6b8c5e)',color:'white',padding:20,borderRadius:16,marginBottom:16,cursor:'pointer'}} onClick={()=>setShowPathway(true)}>
                <div style={{fontSize:12,fontWeight:600,textTransform:'uppercase',letterSpacing:1.5,opacity:0.9,marginBottom:6}}>✨ {L.journeyComplete}</div>
                <div style={{fontSize:14,opacity:0.85}}>{L.journeyCompleteMsg}</div>
              </div>
            );
            return(
              <div className="pathway-card" style={{background:'linear-gradient(135deg,#2c3e50,#34495e)',color:'white',padding:20,borderRadius:16,marginBottom:16,cursor:'pointer'}} onClick={()=>{setPathwayViewDay(currentDay);setShowPathway(true)}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <div style={{fontSize:12,fontWeight:600,textTransform:'uppercase',letterSpacing:1.5,opacity:0.8}}>{L.faithJourney}</div>
                  <div style={{fontSize:11,opacity:0.7}}>{(L.journeyProgress||'').replace('{n}',completed)}</div>
                </div>
                <div style={{fontSize:17,fontWeight:600,marginBottom:4}}>{L.todayLesson}: {today?(lang==='es'?(today.titleEs||today.title):lang==='pt'?(today.titlePt||today.title):today.title):''}</div>
                <div style={{fontSize:13,opacity:0.8,marginBottom:12}}>{today?(lang==='es'?(today.themeEs||today.theme):lang==='pt'?(today.themePt||today.theme):today.theme):''}</div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <div style={{flex:1,height:4,background:'rgba(255,255,255,0.2)',borderRadius:2,overflow:'hidden'}}>
                    <div style={{width:(completed/30*100)+'%',height:'100%',background:'var(--gold)',borderRadius:2,transition:'width 0.3s'}}></div>
                  </div>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--gold)'}}>{L.continueJourney} →</div>
                </div>
              </div>
            );
          })()}

          {/* Scripture Search */}
          <div style={{marginBottom:16,position:'relative'}}>
            <form onSubmit={(e)=>{e.preventDefault();doScriptureSearch(scriptureSearch)}} style={{display:'flex',gap:8}}>
              <input className="search-bar" style={{flex:1,marginBottom:0}} placeholder={lang==='es'?'Buscar Escritura... (ej. "amor", "Juan 3:16")':lang==='pt'?'Pesquisar Escritura... (ex. "amor", "João 3:16")':'Search Scripture... (e.g. "love", "John 3:16")'} value={scriptureSearch} onChange={e=>setScriptureSearch(e.target.value)}/>
              <button type="submit" style={{padding:'10px 16px',background:'var(--sage)',color:'white',border:'none',borderRadius:10,fontSize:14,cursor:'pointer',whiteSpace:'nowrap'}} disabled={searchLoading}>
                {searchLoading?(lang==='es'?'...':'...'):<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width:16,height:16}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>}
              </button>
            </form>
            {searchResults!==null&&(
              <div style={{marginTop:12,padding:16,background:'var(--light)',border:'1.5px solid var(--border)',borderRadius:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <span style={{fontSize:12,fontWeight:600,color:'var(--sage)',textTransform:'uppercase',letterSpacing:1}}>{lang==='es'?'Resultados':lang==='pt'?'Resultados':'Results'}</span>
                  <button style={{background:'none',border:'none',fontSize:16,color:'var(--sage)',cursor:'pointer'}} onClick={()=>{setSearchResults(null);setScriptureSearch('')}}>✕</button>
                </div>
                {searchResults.length===0&&<div style={{fontSize:13,color:'var(--sage)',fontStyle:'italic'}}>{lang==='es'?'No se encontraron resultados. Intenta con otra búsqueda.':lang==='pt'?'Nenhum resultado encontrado. Tente uma busca diferente.':'No results found. Try a different search.'}</div>}
                {searchResults.map((r,ri)=>(
                  <div key={ri} style={{marginBottom:ri<searchResults.length-1?16:0}}>
                    <div style={{fontFamily:'Georgia,serif',fontSize:15,fontWeight:600,color:'var(--gold)',marginBottom:6}}>{r.ref}</div>
                    <div style={{fontFamily:'Georgia,serif',fontSize:14,color:'var(--text)',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{r.text.length>600?r.text.slice(0,600)+'...':r.text}</div>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div style={{marginBottom:20}}>
            <div className="trans-row" style={{marginBottom:10,alignItems:'center',justifyContent:'center'}}>
              {lang==='es'?(
                <button className="trans-btn active">RVR</button>
              ):TRANSLATIONS.map(t=>(
                <button key={t} className={`trans-btn ${translation===t?'active':''}`} onClick={()=>{setTranslation(t);gaEvent('change_translation',{translation:t})}}>{t}</button>
              ))}
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:12}}>
              <div style={{position:'relative'}}>
                <button className={`audio-btn ${speaking||speakingAll?'playing':''}`} style={{padding:'7px 14px',borderRadius:20}} onClick={()=>{if(speaking||speakingAll){stopAudio();setShowSpeedPicker(false)}else{setShowSpeedPicker(!showSpeedPicker)}}} disabled={!!audioLoading}>
                  {audioLoading?<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width:14,height:14,animation:'spin 1s linear infinite'}}><circle cx="12" cy="12" r="10" strokeDasharray="31.4 31.4" strokeLinecap="round"/></svg>:(speaking||speakingAll)?<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>:<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5v14l11-7z"/></svg>}
                  {audioLoading?'...':(speaking||speakingAll)?(lang==='es'?'Parar':lang==='pt'?'Parar':'Stop'):(lang==='es'?'Escuchar':lang==='pt'?'Ouvir':'Listen')}
                </button>
                {showSpeedPicker&&!speaking&&!speakingAll&&(
                  <React.Fragment>
                  <div className="speed-backdrop" onClick={()=>setShowSpeedPicker(false)}/>
                  <div className="speed-picker">
                    <div className="speed-picker-title">{lang==='es'?'Velocidad':lang==='pt'?'Velocidade':'Speed'}</div>
                    <div className="speed-picker-options">
                      {[0.5,0.75,1,1.25,1.5,1.75,2].map(s=>(
                        <button key={s} className={`speed-opt ${audioSpeed===s?'active':''}`} onClick={()=>{changeAudioSpeed(s);setShowSpeedPicker(false);speakAllPassages(passages)}}>
                          {s===1?'1x':s+'x'}
                        </button>
                      ))}
                    </div>
                  </div>
                  </React.Fragment>
                )}
                {(speaking||speakingAll)&&(
                  <div className="speed-live">
                    {[0.5,0.75,1,1.25,1.5,1.75,2].map(s=>(
                      <button key={s} className={`speed-live-btn ${audioSpeed===s?'active':''}`} onClick={()=>changeAudioSpeed(s)}>
                        {s===1?'1x':s+'x'}
                      </button>
                    ))}
                  </div>
                )}
              </div>
              <div className="font-controls">
                <button className="font-btn" onClick={()=>changeFontSize(-0.1)}>A-</button>
                <span className="font-label">{Math.round(fontScale*100)}%</span>
                <button className="font-btn" onClick={()=>changeFontSize(0.1)}>A+</button>
              </div>
            </div>
          </div>
          {loadingTrans&&<div style={{textAlign:'center',fontSize:13,color:'var(--sage)',marginBottom:12}}>{L.loadingTrans}</div>}
          <div style={{textAlign:'center',marginBottom:16}}>
            <button className="comm-btn" style={{fontSize:12,padding:'6px 16px'}} onClick={()=>setPage('settings')}>
              {L.chaptersPerDay}: {setup.chapters||1} &middot; {L.versesPerPassage}: {setup.versesPerPassage||10}
            </button>
          </div>
          <div className="day-nav">
            <button onClick={()=>{setDayOffset(d=>d-1);gaEvent('day_navigate',{direction:'previous'})}}>{L.prev}</button>
            {dayOffset!==0&&<button onClick={()=>{setDayOffset(0);gaEvent('day_navigate',{direction:'today'})}}>{L.today}</button>}
            <button onClick={()=>{setDayOffset(d=>d+1);gaEvent('day_navigate',{direction:'next'})}}>{L.next}</button>
          </div>
          {passages.map((pName,pi)=>{
            const pData=BIBLE[pName]||parsePassage(pName);
            if(!pData)return null;
            const numV=setup.versesPerPassage||10;
            const sources=setup.chapterSources;
            const allVerses=getVerses(pName);
            const verses=allVerses.slice(0,numV);
            if(verses.length===0)return(
              <React.Fragment key={pi}>
              <div className="passage-section" style={{textAlign:'center',padding:'40px 20px',color:'var(--sage)'}}>
                <h2 style={{marginBottom:12}}>{lang==='es'?passageToEs(pName):lang==='pt'?passageToPt(pName):pName}</h2>
                <div style={{fontSize:14}}>{loadingTrans?(lang==='es'?'Cargando...':lang==='pt'?'Carregando...':'Loading...'):(lang==='es'?'No se pudo cargar este pasaje':lang==='pt'?'Não foi possível carregar esta passagem':'Could not load this passage')}</div>
              </div>
              </React.Fragment>
            );
            // Show section divider for each chapter when sources are set
            const showSectionLabel=sources&&sources.length>0&&(setup.chapters||1)>1;
            const sectionKey=showSectionLabel?sources[pi%sources.length]:null;
            const section=sectionKey?BIBLE_SECTIONS[sectionKey]:null;
            return(
              <React.Fragment key={pi}>
              {section&&(

                    const todayStr=new Date().toISOString().split('T')[0];
                    let checkDate=new Date();
                    while(true){
                      const key=checkDate.toISOString().split('T')[0];
                      if(readDays[key]){streak++;checkDate.setDate(checkDate.getDate()-1)}
                      else break;
                    }
                    let longest=0;let cur=0;
                    if(allDays.length>0){
                      cur=1;longest=1;
                      for(let i=1;i<allDays.length;i++){

                            const dateObj=new Date(calYear,calMonth,day);
                            const key=dateObj.toISOString().split('T')[0];
                            const isToday=dateObj.toDateString()===todayObj.toDateString();
                            const isFuture=dateObj>todayObj;
                            const wasRead=readDays[key];
                            const isPast=dateObj<todayObj&&!isToday;
                            let cls='cal-day';
                            if(isFuture)cls+=' future';

                            else if(isPast)cls+=' missed';

                            return <div key={day} className={cls}>{day}</div>;
