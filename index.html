  const [aiInput,setAiInput]=useState('');
  const [aiLoading,setAiLoading]=useState(false);
  const [aiContext,setAiContext]=useState('');
  const CHURCH_SPOTIFY='https://open.spotify.com/show/4VAheYuUhsIqjRvvrDJkiQ';
  const [spotifyShow,setSpotifyShow]=useState(CHURCH_SPOTIFY);
  const [userSpotify,setUserSpotify]=useState('');
  const [settingsSaved,setSettingsSaved]=useState(false);
  const [showSourcePicker,setShowSourcePicker]=useState(false);
  const [sourcePickerContext,setSourcePickerContext]=useState(null); // 'settings' or 'onboard'

  // Auto-detect language from campus ID

  const [liveNotes,setLiveNotes]=useState('');
  const [readDays,setReadDays]=useState({});
  const [fontScale,setFontScale]=useState(1);
  const [calMonth,setCalMonth]=useState(new Date().getMonth());
  const [calYear,setCalYear]=useState(new Date().getFullYear());
  const [activePlans,setActivePlans]=useState({}); // {planId: {startDate, completedDays:[]}}
  const [planView,setPlanView]=useState(null); // null=browse, planId=detail view
  const [planTab,setPlanTab]=useState('browse'); // 'my', 'browse', or 'progress'
  const [planReading,setPlanReading]=useState(null); // {planId, dayIdx, ref, text, loading}
  const [planPicker,setPlanPicker]=useState(null); // null or [{planId,planName,icon,dayIdx,reading}]
  const [charProfile,setCharProfile]=useState(null); // character key
  const [locProfile,setLocProfile]=useState(null); // location key
  const [showProfile,setShowProfile]=useState(false);
  const [profileType,setProfileType]=useState(null); // 'char' or 'loc'
  const [speaking,setSpeaking]=useState(null); // passageName currently being read
  const [audioLoading,setAudioLoading]=useState(null); // passageName loading audio
  const [speakingAll,setSpeakingAll]=useState(false); // true when reading all passages in sequence
  const [audioSpeed,setAudioSpeed]=useState(()=>{try{return parseFloat(localStorage.getItem('dw_audiospeed'))||1}catch(e){return 1}});
  const [showSpeedPicker,setShowSpeedPicker]=useState(false);
  const [pushEnabled,setPushEnabled]=useState(false);
  const [pushLoading,setPushLoading]=useState(false);
  const [showNotifPrompt,setShowNotifPrompt]=useState(false);
  const [notifHour,setNotifHour]=useState(()=>{try{return parseInt(localStorage.getItem('dw_notif_hour'))||7}catch(e){return 7}});
  const [kjvDownloaded,setKjvDownloaded]=useState(()=>{try{return localStorage.getItem('dw_kjv_downloaded')==='1'}catch(e){return false}});
  const [kjvDownloading,setKjvDownloading]=useState(false);
  const [kjvProgress,setKjvProgress]=useState(null); // {done, total}
  const pushSubRef=useRef(null);
  const audioRef=useRef(null);
  const audioQueueRef=useRef([]); // queue of passage names to read next
  const audioPassagesRef=useRef([]); // all passages being read (for clearing highlights)
  const bookAudioQueueRef=useRef({active:false,cancelled:false,paragraphs:[],voiceId:'',speakKey:'',prefetched:{}});
  // In-flight request deduplication — prevents duplicate API calls for same passage
  const inflightRef=useRef({});
  const [scriptureSearch,setScriptureSearch]=useState('');
  const [searchResults,setSearchResults]=useState(null); // {ref, text} array
  const [searchLoading,setSearchLoading]=useState(false);
  const aiEndRef=useRef(null);
  const wordTapRef=useRef(false);
  const lastDragWasMove=useRef(false);

  // Word-level highlighting
  const [wordHighlights,setWordHighlights]=useState({}); // {"Psalms 23:1": [{start:2, end:5, color:'yellow'}]}
  const [wordSelection,setWordSelection]=useState(null); // {verseKey, pName, vi, startWord, endWord, verseText}
  const wordDragRef=useRef(null); // {verseKey, pName, vi, startWord, verseText, engaged, timer}

  // ===== FAITH PATHWAY =====
  const [pathwayData,setPathwayData]=useState(null);
  const [pathwayProgress,setPathwayProgress]=useState(()=>{try{return JSON.parse(localStorage.getItem('dw_pathway_progress'))||{completedDays:[],currentDay:1,enrolled:false}}catch(e){return{completedDays:[],currentDay:1,enrolled:false}}});
  const [pathwayViewDay,setPathwayViewDay]=useState(null); // which day is being viewed
  const [showPathway,setShowPathway]=useState(false); // show pathway overlay on home

  // ===== CAMPUS COMMUNITY =====
  const [campusContent,setCampusContent]=useState([]);
  const [campusContentLoading,setCampusContentLoading]=useState(false);
  const [prayers,setPrayers]=useState([]);
  const [prayerLoading,setPrayerLoading]=useState(false);
  const [prayerInput,setPrayerInput]=useState('');
  const [prayerFilter,setPrayerFilter]=useState('my-campus');
  const [prayerSubmitting,setPrayerSubmitting]=useState(false);
  const [campusTab,setCampusTab]=useState('corner');
  const [campusVideoUrl,setCampusVideoUrl]=useState('');
  // Pastor admin
  const [pastorCode,setPastorCode]=useState(()=>{try{return localStorage.getItem('dw_pastor_code')||''}catch(e){return ''}});
  const [pastorCampusId,setPastorCampusId]=useState(()=>{try{return localStorage.getItem('dw_pastor_campus')||''}catch(e){return ''}});
  const [pastorVerified,setPastorVerified]=useState(false);
  const [pastorEditsLeft,setPastorEditsLeft]=useState(()=>{try{return parseInt(localStorage.getItem('dw_pastor_edits')||'0',10)}catch(e){return 0}});
  const [pastorMode,setPastorMode]=useState(false); // show pastor admin panel
  const [pastorPostType,setPastorPostType]=useState('sermon_note');
  const [pastorPostTitle,setPastorPostTitle]=useState('');
  const [pastorPostContent,setPastorPostContent]=useState('');
  const [pastorPostAuthor,setPastorPostAuthor]=useState('');
  const [pastorPosting,setPastorPosting]=useState(false);
  const [pastorVideoUrl,setPastorVideoUrl]=useState('');
  const [pastorVideoFile,setPastorVideoFile]=useState(null);
  const [pastorVideoUploading,setPastorVideoUploading]=useState(false);
  const [pastorVideoProgress,setPastorVideoProgress]=useState('');

  const savePathwayProgress=(p)=>{setPathwayProgress(p);try{localStorage.setItem('dw_pathway_progress',JSON.stringify(p))}catch(e){}};

  // ===== OFFLINE KJV BIBLE =====
  // Parse a Bible reference like "Genesis 1" or "Genesis 1:5-10" or "Genesis 1-3"
  const parseKjvRef=(ref)=>{
    const m=ref.trim().match(/^(\d?\s*\w[\w\s]*?)\s+(\d+)(?::(\d+)(?:-(\d+))?|-(\d+))?$/i);
    if(!m)return null;
    const book=m[1].trim();
    const ch=parseInt(m[2]);
    const startVerse=m[3]?parseInt(m[3]):null;
    const endVerse=m[4]?parseInt(m[4]):null;
    const endChapter=m[5]?parseInt(m[5]):null;
    return{book,ch,startVerse,endVerse,endChapter};
  };

  // Fetch with timeout utility for external APIs
  // Claude API rate limiter — max 10 requests per 5 minutes
  const claudeRateRef=useRef([]);
  const checkClaudeRate=()=>{
    const now=Date.now();
    claudeRateRef.current=claudeRateRef.current.filter(t=>now-t<300000);
    if(claudeRateRef.current.length>=10)return false;
    claudeRateRef.current.push(now);
    return true;
  };

  // Input sanitizer — strips HTML tags and limits length
  const sanitize=(str,maxLen=5000)=>{
    if(!str)return'';
    return str.replace(/<[^>]*>/g,'').substring(0,maxLen);
  };

  const fetchWithTimeout=(url,opts={},ms=15000)=>{
    const controller=new AbortController();
    const timer=setTimeout(()=>controller.abort(),ms);
    return fetch(url,{...opts,signal:controller.signal}).finally(()=>clearTimeout(timer));
  };
  // Deduplicated fetch — if same GET URL is already in-flight, reuse the promise
  const fetchDedup=(url,opts={},ms=15000)=>{
    if(opts.method&&opts.method!=='GET')return fetchWithTimeout(url,opts,ms);
    const key=url;
    if(inflightRef.current[key])return inflightRef.current[key];
    const p=fetchWithTimeout(url,opts,ms).finally(()=>{delete inflightRef.current[key]});
    inflightRef.current[key]=p;
    return p;
  };

  // Fetch KJV verses from local static files
  const fetchKjvOffline=async(ref)=>{
    try{
      // Load the KJV index to map book names to folders
      const idxResp=await fetch('/bible/kjv/index.json');
      if(!idxResp.ok)return null;
      const idx=await idxResp.json();
      const bookMap={};
      for(const b of idx){
        bookMap[b.name.toLowerCase()]=b;
        // Also map common variations
        if(b.name==='Psalms')bookMap['psalm']=b;
        if(b.name==='Song of Solomon'){bookMap['song of songs']=b;bookMap['song of solomon']=b}
      }
      // Handle compound references (semicolons)
      const parts=ref.split(';').map(s=>s.trim()).filter(Boolean);
      let allVerses=[];
      let canonical=ref;
      for(const part of parts){
        const parsed=parseKjvRef(part);
        if(!parsed)continue;
        const entry=bookMap[parsed.book.toLowerCase()];
        if(!entry)continue;
        const startCh=parsed.ch;
        const endCh=parsed.endChapter||parsed.ch;
        for(let c=startCh;c<=endCh;c++){
          try{
            const chResp=await fetch(`/bible/kjv/${entry.folder}/${c}.json`);
            if(!chResp.ok)throw new Error('KJV chapter '+chResp.status);
            const chData=await chResp.json();
            let verses=chData.verses;
            // Apply verse range only for single-chapter refs
            if(c===startCh&&parsed.startVerse&&!parsed.endChapter){
              const end=parsed.endVerse||parsed.startVerse;
              verses=verses.slice(parsed.startVerse-1,end);
            }
            // Number each verse
            const startNum=(c===startCh&&parsed.startVerse)?parsed.startVerse:1;
            verses.forEach((v,i)=>{
              allVerses.push({num:startNum+i,ch:c,text:v});
            });
          }catch(e){console.log('KJV fetch failed for',entry.folder,c)}
        }
        canonical=`${entry.name} ${startCh}${endCh>startCh?'-'+endCh:''}${parsed.startVerse?':'+parsed.startVerse+(parsed.endVerse?'-'+parsed.endVerse:''):''}`;
      }
      if(allVerses.length===0)return null;
      // Format as text with verse numbers
      const text=allVerses.map(v=>`[${v.ch>1||parts.length>1?v.ch+':':''}${v.num}] ${v.text}`).join(' ');
      const verseTexts=allVerses.map(v=>v.text);
      return{canonical,text,verses:verseTexts};
    }catch(e){
      console.log('KJV offline fetch error:',e);
      return null;
    }
  };

  // Download entire KJV for offline use
  const downloadKjvForOffline=async()=>{
    setKjvDownloading(true);setKjvProgress({done:0,total:1190});
    try{
      const idxResp=await fetch('/bible/kjv/index.json');
      if(!idxResp.ok)throw new Error('Index '+idxResp.status);
      const idx=await idxResp.json();
      // Send to service worker for background caching
      if(navigator.serviceWorker&&navigator.serviceWorker.controller){
        navigator.serviceWorker.controller.postMessage({type:'PRECACHE_KJV',index:idx});
      }
    }catch(e){
      setKjvDownloading(false);
      alert(lang==='es'?'Error al descargar. Verifica tu conexión.':lang==='pt'?'Falha no download. Verifique sua conexão.':lang==='id'?'Gagal mengunduh. Periksa koneksi Anda.':'Download failed. Check your connection.');
    }
  };

  // Listen for KJV download progress from service worker
  useEffect(()=>{
    const handler=(e)=>{
      if(e.data?.type==='KJV_PROGRESS'){
        setKjvProgress({done:e.data.done,total:e.data.total});
      }else if(e.data?.type==='KJV_COMPLETE'){
        setKjvDownloaded(true);setKjvDownloading(false);setKjvProgress(null);
        try{localStorage.setItem('dw_kjv_downloaded','1')}catch(e){}
      }

  const handleProfilePic=(e)=>{
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    if(file.size>2*1024*1024){setProfileError('Image must be under 2MB');return;}
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const size=200;
        canvas.width=size;canvas.height=size;
        const ctx=canvas.getContext('2d');
        const min=Math.min(img.width,img.height);
        const sx=(img.width-min)/2,sy=(img.height-min)/2;
        ctx.drawImage(img,sx,sy,min,min,0,0,size,size);
        const dataUrl=canvas.toDataURL('image/jpeg',0.8);
        setProfilePic(dataUrl);
        try{localStorage.setItem('dw_profile_pic',dataUrl)}catch(e){}
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const parseVideoUrl=(url)=>{
    if(!url)return null;
    // YouTube
    let m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
    if(m)return{type:'youtube',id:m[1],embed:'https://www.youtube.com/embed/'+m[1]};
    // Vimeo
    m=url.match(/(?:vimeo\.com\/)(\d+)/);
    if(m)return{type:'vimeo',id:m[1],embed:'https://player.vimeo.com/video/'+m[1]};
    // Direct video URL (mp4, webm, etc.)
    if(url.match(/\.(mp4|webm|mov|m4v|avi|mkv)(\?|$)/i))return{type:'direct',url:url};
    // Generic URL — treat as iframe embed
    if(url.startsWith('http'))return{type:'iframe',url:url};
    return null;
  };

  // Auto-refresh at midnight: schedule timer + multiple resume detectors
  // Ensures the app always shows today's reading when opened from home screen
  useEffect(()=>{
    const checkDate=()=>{const d=new Date().toDateString();if(d!==dateKey){setDateKey(d);setDayOffset(0)}};
    // Set timer for next midnight
    const now=new Date();
    const midnight=new Date(now);midnight.setDate(midnight.getDate()+1);midnight.setHours(0,0,5,0);
    const msUntilMidnight=Math.max(1000,midnight-now);
    const timer=setTimeout(()=>{checkDate();},msUntilMidnight);
    // Check when app becomes visible (user opens phone/tab)
    const onVisible=()=>{if(document.visibilityState==='visible')checkDate()};
    document.addEventListener('visibilitychange',onVisible);
    // iOS PWA fallbacks — visibilitychange doesn't always fire on home screen launch
    const onFocus=()=>checkDate();
    const onPageShow=(e)=>{if(e.persisted)checkDate();else checkDate()};
    window.addEventListener('focus',onFocus);
    window.addEventListener('pageshow',onPageShow);
    // Any user interaction triggers a date check — catches stale PWA state instantly
    const onInteract=()=>checkDate();
    document.addEventListener('pointerdown',onInteract,{passive:true});
    // Safety net — check every 60s in case all events missed (e.g. iOS frozen resume)
    const interval=setInterval(checkDate,60000);
    return()=>{clearTimeout(timer);clearInterval(interval);document.removeEventListener('visibilitychange',onVisible);window.removeEventListener('focus',onFocus);window.removeEventListener('pageshow',onPageShow);document.removeEventListener('pointerdown',onInteract)};
  },[dateKey]);

  // When the date rolls over at midnight, auto-advance any open plan reading to today's passage

    const start=new Date(ap.startDate);start.setHours(0,0,0,0);

        return;

      setPushLoading(false);
      setShowNotifPrompt(false);

      setCopyMsg(lang==='es'?'¡Notificaciones activadas!':lang==='pt'?'Notificações ativadas!':lang==='id'?'Notifikasi diaktifkan!':'Notifications enabled!');

  // Semantic Scripture search — uses ESV API for lookup
  const doScriptureSearch=async(query)=>{
    if(!query.trim())return;
    gaEvent('scripture_search',{query:query.trim(),translation});
    trackActivity('search',query.trim());
    setSearchLoading(true);setSearchResults(null);
    try{
      // Try fetching with user's selected translation first
      let text='',ref='';
      const q=query.trim();
      const t=translation||'ESV';
      if(t==='ESV'){
        const res=await fetchDedup('/.netlify/functions/esv?q='+encodeURIComponent(q),{},12000);
        const d=await res.json();
        if(d.passages&&d.passages[0]&&d.passages[0].trim()){text=d.passages[0].trim();ref=d.canonical||q;}
      }else if(t==='NLT'){
        const res=await fetchDedup('/.netlify/functions/nlt?q='+encodeURIComponent(q),{},12000);
        const d=await res.json();
        if(d.passages&&d.passages[0]&&d.passages[0].trim()){text=d.passages[0].trim();ref=d.canonical||q;}
      }else if(t==='KJV'&&kjvDownloaded){
        // KJV offline handled separately — fall through to ESV for search
        const res=await fetchDedup('/.netlify/functions/esv?q='+encodeURIComponent(q),{},12000);
        const d=await res.json();
        if(d.passages&&d.passages[0]&&d.passages[0].trim()){text=d.passages[0].trim();ref=(d.canonical||q)+' (ESV)';}
      }else{
        // NKJV, NIV, AMP, NASB, RVR, ARA, etc. → bolls
        const res=await fetchDedup('/.netlify/functions/bolls?q='+encodeURIComponent(q)+'&v='+encodeURIComponent(t),{},12000);
        const d=await res.json();
        if(d.passages&&d.passages[0]&&d.passages[0].trim()){text=d.passages[0].trim();ref=d.canonical||q;}
      }
      // Fallback to ESV if selected translation returned nothing
      if(!text){
        const esvRes=await fetchDedup('/.netlify/functions/esv?q='+encodeURIComponent(q),{},12000);
        const esvData=await esvRes.json();
        if(esvData.passages&&esvData.passages[0]&&esvData.passages[0].trim()){text=esvData.passages[0].trim();ref=(esvData.canonical||q)+' (ESV)';}
      }
      if(text){
        setSearchResults([{ref:ref+' ('+t+')',text}]);
        setSearchLoading(false);return;
      }
      // If direct lookup fails, use Claude to interpret the semantic query
      if(!checkClaudeRate()){setSearchResults([{ref:'Rate Limited',text:'Too many requests. Please wait a few minutes.'}]);setSearchLoading(false);return}
      const claudeRes=await fetchWithTimeout('/.netlify/functions/claude',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:[{role:'user',content:`The user searched for: "${query}". Return ONLY a JSON array of 1-3 relevant Bible passage references that match this query. Examples of valid references: "John 3:16-17", "Psalm 23:1-6", "Romans 8:28-39". Return ONLY the JSON array, nothing else. Example: ["John 3:16-17","Romans 8:28"]`}],model:'claude-sonnet-4-20250514',max_tokens:200})
      },25000);
      const claudeData=await claudeRes.json();
      const content=claudeData.content?.[0]?.text||'';
      const match=content.match(/\[[\s\S]*?\]/);
      if(match){
        let refs;try{refs=JSON.parse(match[0])}catch(e){console.log('AI JSON parse error',e);refs=[]}
        const results=[];
        for(const r of refs.slice(0,3)){
          try{
            const res=await fetchDedup('/.netlify/functions/esv?q='+encodeURIComponent(r),{},12000);
            const d=await res.json();
            if(d.passages&&d.passages[0]&&d.passages[0].trim()){
              results.push({ref:d.canonical||r,text:d.passages[0].trim()});
            }
          }catch(e){}
        }
        if(results.length>0){setSearchResults(results);setSearchLoading(false);return}
      }
      setSearchResults([]);
    }catch(e){setSearchResults([]);}
    setSearchLoading(false);
  };

  const getPassages=()=>{
    if(!setup)return[];
    const pool=PERSONA_MAP[setup.persona]||PERSONA_MAP.new_believer;
    const numCh=setup.chapters||1;
    const sources=setup.chapterSources;

    // If chapter sources are set, pull one passage per chapter from each source
    if(sources&&sources.length>0&&numCh>1){
      const result=[];
      for(let ch=0;ch<numCh;ch++){
        const sectionKey=sources[ch%sources.length];
        const section=BIBLE_SECTIONS[sectionKey];
        if(section&&section.passages.length>0){
          const sPool=section.passages;
          result.push(sPool[(dayOfYear+ch*7)%sPool.length]);
        }else{
          result.push(pool[(dayOfYear+ch*7)%pool.length]);
        }
      }
      return result;
    }

    // Default: pull from persona pool
    const start=dayOfYear%pool.length;
    const result=[];
    for(let i=0;i<numCh;i++){result.push(pool[(start+i*7)%pool.length])}
    return result;

  // Show interlinear for selected verse(s)
  const showInterlinearForVerse=()=>{gaEvent('interlinear',{ref:selectedVerse?cleanRef(selectedVerse.ref):''});
    if(!selectedVerse)return;

    const pName=(selectedVerse.allKeys||[selectedVerse.key])[0].split(':').slice(0,-1).join(':');
    keys.forEach((vk,i)=>{

  // Select entire passage — toggle highlight on/off, then open actions panel
  const selectPassage=(pName,verses)=>{
    const keys=verses.map((_,vi)=>vKey(pName,vi));
    const allHighlighted=keys.every(k=>highlights[k]);
    if(allHighlighted){

  const selectAllDailyPassages = () => {
    const numV = setup.versesPerPassage || 30;
    let allKeys = [];

    passages.forEach(pN => {
      const av = getVerses(pN);
      const vs = av.slice(0, numV);
      vs.forEach((_, vi) => allKeys.push(vKey(pN, vi)));
      allTexts.push(...vs);
      allFullText.push(pN + ": " + vs.map((v, vi) => (vi + 1) + " " + v).join(' '));
    });
    const allHighlighted = allKeys.every(k => highlights[k]);
    if (allHighlighted) {
      setHighlights(p => { const n = {...p}; allKeys.forEach(k => delete n[k]); return n; });
    } else {

      setSelectedVerse({ key: allKeys[0], ref: passages.join(', '), text: allFullText.join(' | '), allKeys: allKeys, allTexts: allTexts });

  const onVersePointerDown=(e,pName,vi,verses)=>{

    lastDragWasMove.current=false;
    dragRef.current={pName,startIdx:vi,endIdx:vi,verses,moved:false,timer:null};

      }

  const onVersePointerMove=(e,pName,vi)=>{
    if(!dragRef.current||dragRef.current.pName!==pName)return;
    if(vi!==dragRef.current.endIdx){
      dragRef.current.moved=true;
      dragRef.current.endIdx=vi;

      if(!dragRef.current.engaged){

      const isOT=OT_BOOKS.includes(pData.book);

      const resp=await fetchWithTimeout('/.netlify/functions/claude',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2048,system:sysPrompt,messages:[{role:'user',content:`${verseKey} (${lang==='es'?'Reina Valera':lang==='pt'?'João Ferreira':translation}):\n${verseText}`}]})
      },25000);
      if(resp.ok){

          let parsed;try{parsed=JSON.parse(jsonMatch[0])}catch(e){console.log('Interlinear JSON parse error',e);parsed=null}

      // Detect orientation from actual video track dimensions
      const vTrack=stream.getVideoTracks()[0];
      if(vTrack){
        const settings=vTrack.getSettings();
        const w=settings.width||1280;
        const h=settings.height||720;
        setVideoOrientation(h>w?'portrait':'landscape');

  const startRecording=()=>{
    if(!streamRef.current)return;
    chunksRef.current=[];
    // Prefer MP4 first — produces H.264+AAC which iMessage/WhatsApp/all apps accept
    // Safari/iOS supports mp4 natively. Chrome/Android falls back to webm.
    const mimeType=MediaRecorder.isTypeSupported('video/mp4;codecs=avc1,mp4a.40.2')?'video/mp4;codecs=avc1,mp4a.40.2':
      MediaRecorder.isTypeSupported('video/mp4')?'video/mp4':
      MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')?'video/webm;codecs=vp9,opus':
      MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')?'video/webm;codecs=vp8,opus':'video/webm';
    const recorder=new MediaRecorder(streamRef.current,{mimeType,videoBitsPerSecond:2000000});
    recorder.ondataavailable=(e)=>{if(e.data.size>0)chunksRef.current.push(e.data)};
    recorder.onstop=()=>{
      const blob=new Blob(chunksRef.current,{type:mimeType});
      setRecordedBlob(blob);
      // Stop camera preview
      if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null}
    };
    recorder.start(1000); // collect data every second
    mediaRecorderRef.current=recorder;
    setIsRecording(true);
    setRecordTime(0);
    recordTimerRef.current=setInterval(()=>{
      setRecordTime(prev=>{
        if(prev>=MAX_RECORD_SECS-1){
          stopRecording();
          return MAX_RECORD_SECS;
        }
        return prev+1;
      });
    },1000);
  };

  const shareVideo=async(id)=>{

        try{canShareFiles=navigator.canShare&&navigator.canShare({files:[file]})}catch(e){}

          await navigator.share({title:lang==='es'?'Mi Video Devocional':lang==='pt'?'Meu Vídeo Devocional':lang==='id'?'Video Renungan Saya':'My Video Devotion',text:lang==='es'?'¡Mira mi video devocional grabado en Palabra Diaria! https://futures-daily-word.netlify.app':lang==='pt'?'Confira meu vídeo devocional gravado no Daily Word! https://futures-daily-word.netlify.app':lang==='id'?'Tonton video renungan saya dari Daily Word! https://futures-daily-word.netlify.app':'Check out my video devotion recorded on Daily Word! https://futures-daily-word.netlify.app'});
          // Also auto-download the file so they can attach it

          return;

          if(e2.name==='AbortError'){setCopyMsg('');return}

      }
      // Strategy 3: No share API at all (desktop) — just download
      triggerVideoDownload(record.blob,fileName);
      setCopyMsg(lang==='es'?'¡Video guardado en el dispositivo!':lang==='pt'?'Vídeo salvo no dispositivo!':lang==='id'?'Video tersimpan di perangkat!':'Video saved to device!');setTimeout(()=>setCopyMsg(''),2000);
    }catch(err){
      console.error('Share error:',err);
      setCopyMsg('');
      // Last resort: try a plain download
      try{
        const record=await VideoDB.get(id);
        if(record)triggerVideoDownload(record.blob,'devotion.webm');
        setCopyMsg(lang==='es'?'¡Video guardado!':lang==='pt'?'Vídeo salvo!':lang==='id'?'Video tersimpan!':'Video saved!');setTimeout(()=>setCopyMsg(''),2000);
      }catch(e){alert(lang==='es'?'No se pudo compartir o guardar el video. Intenta de nuevo.':lang==='pt'?'Não foi possível compartilhar ou salvar o vídeo. Tente novamente.':lang==='id'?'Tidak dapat membagikan atau menyimpan video. Silakan coba lagi.':'Could not share or save video. Please try again.')}

  // Request persistent storage to prevent browser from evicting IndexedDB/localStorage data

  useEffect(()=>{

  const renderAudioPlayer=(url)=>{

  // ===== ONBOARDING =====
  if(!setup){

  // Render word-tappable verse text
  const renderVerse=(text,verseKey,pName,vi)=>{
    const allNames=[...charNames,...locNames];
    let wordIdx=0;
    const wrapWord=(word,ki)=>{
      const wi=wordIdx++;
      const hlColor=getWordHlColor(verseKey,wi);
      const isSel=isWordSelected(verseKey,wi);
      const cls=['word-tap'];
      if(hlColor)cls.push('whl-'+hlColor);
      if(isSel)cls.push('word-selected');
      return <span key={ki} className={cls.join(' ')}
        data-widx={wi} data-vkey={verseKey}
        onClick={(e)=>{
          if(wordDragRef.current&&wordDragRef.current.engaged)return;
          wordTapRef.current=true;
          if(wordSelection&&wordSelection.verseKey===verseKey){
            onWordTapExtend(e,verseKey,wi);
          }else{
            lookupWord(word);
          }
        }}
        onDoubleClick={(e)=>onWordDoubleTap(e,verseKey,wi,pName,vi,text)}
        onTouchStart={(e)=>onWordTouchStart(e,verseKey,wi,pName,vi,text)}
        onTouchMove={(e)=>onWordTouchMove(e)}
        onTouchEnd={(e)=>onWordTouchEnd(e)}
      >{word}</span>;
    };

    if(allNames.length===0){
      return text.split(/(\s+)/).map((w,i)=>{
        if(/^\s+$/.test(w))return <span key={i}>{w}</span>;
        return wrapWord(w,i);
      });
    }
    const regex=new RegExp('\\b('+allNames.map(n=>n.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')\\b','g');
    const parts=[];let lastIdx=0;let m;
    while((m=regex.exec(text))!==null){
      if(m.index>lastIdx)parts.push({type:'text',val:text.slice(lastIdx,m.index)});
      const matched=m[1];
      parts.push({type:CHARACTERS[matched]?'char':'loc',val:matched});
      lastIdx=regex.lastIndex;
    }
    if(lastIdx<text.length)parts.push({type:'text',val:text.slice(lastIdx)});
    let ki=0;
    return parts.map((p,pi)=>{
      if(p.type==='char'){wordIdx++;return <span key={ki++} className="char-name" onClick={(e)=>{wordTapRef.current=true;openCharProfile(p.val)}}>{p.val}</span>}
      if(p.type==='loc'){wordIdx++;return <span key={ki++} className="loc-name" onClick={(e)=>{wordTapRef.current=true;openLocProfile(p.val)}}>{p.val}</span>}
      return p.val.split(/(\s+)/).map((w)=>{
        if(/^\s+$/.test(w))return <span key={ki++}>{w}</span>;
        return wrapWord(w,ki++);
      });
    });
  };

  // ===== WORD-LEVEL HIGHLIGHTING =====
  const hlWords=(color)=>{
    if(!wordSelection)return;
    const {verseKey,startWord,endWord}=wordSelection;
    setWordHighlights(p=>{
      const existing=(p[verseKey]||[]).filter(h=>!(h.start<=endWord&&h.end>=startWord)); // remove overlapping
      return {...p,[verseKey]:[...existing,{start:startWord,end:endWord,color}]};
    });
    setWordSelection(null);setShowActions(false);setSelectedVerse(null);
  };

  const clearWordHl=()=>{
    if(!wordSelection)return;
    const {verseKey,startWord,endWord}=wordSelection;
    setWordHighlights(p=>{
      const existing=(p[verseKey]||[]).filter(h=>!(h.start<=endWord&&h.end>=startWord));
      if(existing.length===0){const n={...p};delete n[verseKey];return n}
      return {...p,[verseKey]:existing};
    });
    setWordSelection(null);setShowActions(false);setSelectedVerse(null);
  };

  const getWordHlColor=(verseKey,wordIdx)=>{
    const ranges=wordHighlights[verseKey];
    if(!ranges)return null;
    for(const r of ranges){
      if(wordIdx>=r.start&&wordIdx<=r.end)return r.color;
    }
    return null;
  };

  const isWordSelected=(verseKey,wordIdx)=>{
    if(!wordSelection||wordSelection.verseKey!==verseKey)return false;
    const lo=Math.min(wordSelection.startWord,wordSelection.endWord);
    const hi=Math.max(wordSelection.startWord,wordSelection.endWord);
    return wordIdx>=lo&&wordIdx<=hi;
  };

  const onWordDoubleTap=(e,verseKey,wordIdx,pName,vi,verseText)=>{
    e.stopPropagation();
    wordTapRef.current=true;
    const words=verseText.split(/\s+/).filter(w=>w.length>0);
    const selectedText=words[wordIdx]||'';
    setWordSelection({verseKey,pName,vi,startWord:wordIdx,endWord:wordIdx,verseText});
    setSelectedVerse({key:verseKey,ref:`${pName}:${vi+1}`,text:selectedText,isWordLevel:true});
    setShowActions(true);setShowNote(false);setShowComment(false);
  };

  const onWordTapExtend=(e,verseKey,wordIdx)=>{
    e.stopPropagation();
    wordTapRef.current=true;
    if(!wordSelection||wordSelection.verseKey!==verseKey)return false;
    const words=wordSelection.verseText.split(/\s+/).filter(w=>w.length>0);
    const lo=Math.min(wordSelection.startWord,wordIdx);
    const hi=Math.max(wordSelection.startWord,wordIdx);
    const selectedWords=words.slice(lo,hi+1).join(' ');
    setWordSelection(p=>({...p,endWord:wordIdx}));
    setSelectedVerse(p=>({...p,text:selectedWords}));
    return true;
  };

  // Touch-drag word selection: press-hold a word, slide finger across to select range
  const onWordTouchStart=(e,verseKey,wordIdx,pName,vi,verseText)=>{
    // Start a hold timer — if held 300ms, enter word-drag mode
    const timer=setTimeout(()=>{
      if(!wordDragRef.current)return;
      wordDragRef.current.engaged=true;
      wordTapRef.current=true;
      // Prevent verse-level drag
      if(dragRef.current){clearTimeout(dragRef.current.timer);dragRef.current=null}
      const words=verseText.split(/\s+/).filter(w=>w.length>0);
      const selectedText=words[wordIdx]||'';
      setWordSelection({verseKey,pName,vi,startWord:wordIdx,endWord:wordIdx,verseText});
      setSelectedVerse({key:verseKey,ref:`${pName}:${vi+1}`,text:selectedText,isWordLevel:true});
      // Vibrate for haptic feedback if available
      if(navigator.vibrate)navigator.vibrate(30);
    },300);
    wordDragRef.current={verseKey,pName,vi,startWord:wordIdx,verseText,engaged:false,timer};
  };

  const onWordTouchMove=(e)=>{
    if(!wordDragRef.current||!wordDragRef.current.engaged)return;
    e.preventDefault(); // prevent scroll while dragging words
    const touch=e.touches[0];
    const el=document.elementFromPoint(touch.clientX,touch.clientY);
    if(!el)return;
    const wordEl=el.closest('[data-widx]');
    if(!wordEl)return;
    const wi=parseInt(wordEl.getAttribute('data-widx'));
    if(isNaN(wi))return;
    // Only extend within same verse
    const vk=wordEl.getAttribute('data-vkey');
    if(vk&&vk!==wordDragRef.current.verseKey)return;
    const d=wordDragRef.current;
    const words=d.verseText.split(/\s+/).filter(w=>w.length>0);
    const lo=Math.min(d.startWord,wi);
    const hi=Math.max(d.startWord,wi);
    const selectedWords=words.slice(lo,hi+1).join(' ');
    setWordSelection(p=>p?{...p,endWord:wi}:{verseKey:d.verseKey,pName:d.pName,vi:d.vi,startWord:d.startWord,endWord:wi,verseText:d.verseText});
    setSelectedVerse(p=>p?{...p,text:selectedWords}:{key:d.verseKey,ref:`${d.pName}:${d.vi+1}`,text:selectedWords,isWordLevel:true});
  };

  const onWordTouchEnd=(e)=>{

      e.stopPropagation();

      lastDragWasMove.current=true;

      setShowActions(true);setShowNote(false);setShowComment(false);

  // ===== BOOK PARAGRAPH ACTIONS =====
  const bookParaKey=(bookId,chIdx,pIdx)=>`${bookId}_${chIdx}_${pIdx}`;

  const hlBookPara=(color)=>{
    if(!selectedBookPara)return;
    const key=bookParaKey(selectedBookPara.bookId,selectedBookPara.chIdx,selectedBookPara.pIdx);
    setBookHighlights(p=>({...p,[key]:color}));

  };

  const clearBookHl=()=>{

    setBookHighlights(p=>{const n={...p};delete n[key];return n});

  const copyBookPara=()=>{

      setCopyMsg(L.copied);setTimeout(()=>setCopyMsg(''),2000);

  };

  const shareBookPara=()=>{
    if(!selectedBookPara)return;
    const book=selectedBookPara.bookTitle||'';
    const ch=selectedBookPara.chTitle||'';
    const text=`"${selectedBookPara.text}"\n\n— ${book}, ${ch}\n${lang==='es'?'Compartido desde Daily Word':lang==='pt'?'Compartilhado do Palavra Diária':lang==='id'?'Dibagikan dari Daily Word':'Shared from Daily Word'}`;
    if(navigator.share){navigator.share({text}).catch(()=>{})}
    else{navigator.clipboard.writeText(text).then(()=>{setCopyMsg(L.copied);setTimeout(()=>setCopyMsg(''),2000)}).catch(()=>{})}
  };

  const saveBookNote=()=>{
    if(!selectedBookPara||!noteText.trim())return;
    const entry={id:Date.now(),type:'verse_note',ref:`${selectedBookPara.bookTitle} — ${selectedBookPara.chTitle}`,text:noteText,date:new Date().toISOString()};
    setJournal(p=>[entry,...p]);
    setNoteText('');setShowNote(false);setShowBookActions(false);setSelectedBookPara(null);
    setCopyMsg(L.savedToJournal);setTimeout(()=>setCopyMsg(''),2000);
  };

  const saveBookComment=()=>{
    if(!selectedBookPara||!noteText.trim())return;
    const entry={id:Date.now(),type:'verse_comment',ref:`${selectedBookPara.bookTitle} — ${selectedBookPara.chTitle}`,text:noteText,date:new Date().toISOString()};
    setJournal(p=>[entry,...p]);
    setNoteText('');setShowComment(false);setShowBookActions(false);setSelectedBookPara(null);
    setCopyMsg(L.savedToJournal);setTimeout(()=>setCopyMsg(''),2000);
  };


  // ===== BOOK CHAPTER AUDIO =====

  // Fetch Spanish/Portuguese audio via Amazon Polly (with caching)
  const fetchPollyAudio=async(text,cacheKey)=>{
    if(bookAudioQueueRef.current.prefetched[cacheKey]){
      return bookAudioQueueRef.current.prefetched[cacheKey];
    }
    const url=await getPollyAudio(text);
    bookAudioQueueRef.current.prefetched[cacheKey]=url;
    return url;
  };

  // Read book chapter aloud — tries ElevenLabs first, falls back to Polly, then browser TTS
  const fetchParaAudio=async(text,voiceId,cacheKey)=>{
    if(bookAudioQueueRef.current.prefetched[cacheKey]){
      return bookAudioQueueRef.current.prefetched[cacheKey];
    }
    // Try ElevenLabs first
    try{
      const url=await getElevenLabsAudio(text,voiceId);
      bookAudioQueueRef.current.prefetched[cacheKey]=url;
      return url;
    }catch(e){
      console.log('ElevenLabs failed, trying Polly:',e.message);
      // Fall back to Polly (Matthew for English)
      const url=await getPollyAudio(text,'Matthew');
      bookAudioQueueRef.current.prefetched[cacheKey]=url;
      return url;
    }
  };

  // Browser TTS fallback — reads paragraphs one by one using SpeechSynthesis
  const playBookWithBrowserTTS=(chunks,speakKey)=>{
    const q=bookAudioQueueRef.current;
    let idx=0;
    const speakNext=()=>{
      if(q.cancelled||idx>=chunks.length){
        setSpeaking(null);setAudioLoading(null);audioRef.current=null;
        q.active=false;
        if(!q.cancelled&&idx>=chunks.length)autoAdvanceNextChapter();
        return;
      }
      const utter=new SpeechSynthesisUtterance(chunks[idx]);
      utter.lang=lang==='es'?'es-ES':lang==='pt'?'pt-BR':lang==='id'?'en-GB':'en-GB';
      utter.rate=audioSpeed;
      // Try to pick a good voice
      const voices=window.speechSynthesis.getVoices();
      if(lang==='es'||lang==='id'){
        const v=voices.find(v=>v.lang.startsWith('es')&&v.name.toLowerCase().includes('mónica'))||
                voices.find(v=>v.lang.startsWith('es'))||null;
        if(v)utter.voice=v;
      }else if(lang==='pt'){
        const v=voices.find(v=>v.lang.startsWith('pt')&&v.name.toLowerCase().includes('vitória'))||
                voices.find(v=>v.lang.startsWith('pt'))||null;
        if(v)utter.voice=v;
      }else{
        const v=voices.find(v=>v.lang.startsWith('en')&&v.name.toLowerCase().includes('daniel'))||
                voices.find(v=>v.lang.startsWith('en-GB'))||
                voices.find(v=>v.lang.startsWith('en')&&!v.name.toLowerCase().includes('google'))||
                voices.find(v=>v.lang.startsWith('en'))||null;
        if(v)utter.voice=v;
      }
      utter.onstart=()=>{setAudioLoading(null);setSpeaking(speakKey)};
      utter.onend=()=>{idx++;speakNext()};
      utter.onerror=()=>{idx++;speakNext()};
      utter._isTTS=true;
      audioRef.current=utter;
      window.speechSynthesis.speak(utter);
    };
    speakNext();
  };

  // Polly queue for Spanish/Portuguese — tries Polly first, falls back to browser TTS
  const playPollyQueue=async(idx)=>{
    const q=bookAudioQueueRef.current;
    if(q.cancelled||idx>=q.paragraphs.length){
      setSpeaking(null);setAudioLoading(null);audioRef.current=null;
      q.active=false;
      Object.values(q.prefetched).forEach(u=>{try{URL.revokeObjectURL(u)}catch(e){}});
      q.prefetched={};
      if(!q.cancelled&&idx>=q.paragraphs.length)autoAdvanceNextChapter();
      return;
    }
    const para=q.paragraphs[idx];
    const cacheKey='polly_'+q.speakKey+'_'+idx;
    try{
      const url=await fetchPollyAudio(para,cacheKey);
      if(q.cancelled)return;
      // Prefetch next 2 chunks
      for(let n=1;n<=2;n++){
        if(idx+n<q.paragraphs.length){
          const nk='polly_'+q.speakKey+'_'+(idx+n);
          fetchPollyAudio(q.paragraphs[idx+n],nk).catch(()=>{});
        }
      }
      playAudioUrl(url,audioSpeed,
        ()=>{setAudioLoading(null);setSpeaking(q.speakKey)},
        ()=>{if(!q.cancelled)playPollyQueue(idx+1)},
        ()=>{if(!q.cancelled)playPollyQueue(idx+1)}
      );
    }catch(e){
      console.log('Polly unavailable, falling back to browser TTS:',e.message);
      const remaining=q.paragraphs.slice(idx);
      playBookWithBrowserTTS(remaining,q.speakKey);
    }
  };

  // ElevenLabs queue for English — tries ElevenLabs → Polly → browser TTS
  const playParaQueue=async(idx)=>{
    const q=bookAudioQueueRef.current;
    if(q.cancelled||idx>=q.paragraphs.length){
      setSpeaking(null);setAudioLoading(null);audioRef.current=null;
      q.active=false;
      Object.values(q.prefetched).forEach(u=>{try{URL.revokeObjectURL(u)}catch(e){}});
      q.prefetched={};
      if(!q.cancelled&&idx>=q.paragraphs.length)autoAdvanceNextChapter();
      return;
    }
    const para=q.paragraphs[idx];
    const cacheKey='ep_'+q.speakKey+'_'+idx;
    try{
      const url=await fetchParaAudio(para,q.voiceId,cacheKey);
      if(q.cancelled)return;
      // Prefetch next 2 chunks
      for(let n=1;n<=2;n++){
        if(idx+n<q.paragraphs.length){
          const nk='ep_'+q.speakKey+'_'+(idx+n);
          fetchParaAudio(q.paragraphs[idx+n],q.voiceId,nk).catch(()=>{});
        }
      }
      playAudioUrl(url,audioSpeed,
        ()=>{setAudioLoading(null);setSpeaking(q.speakKey)},
        ()=>{if(!q.cancelled)playParaQueue(idx+1)},
        ()=>{if(!q.cancelled)playParaQueue(idx+1)}
      );
    }catch(e){
      console.log('All TTS APIs failed, falling back to browser TTS:',e.message);
      // Fall back to browser TTS for all remaining chunks
      const remaining=q.paragraphs.slice(idx);
      playBookWithBrowserTTS(remaining,q.speakKey);

  const readBookChapter=(bookId,chIdx)=>{
    if(speaking||speakingAll){stopAudio();return}
    const ld=loadedBooks[bookId];
    if(!ld||!ld.chapters||!ld.chapters[chIdx])return;
    const ch=ld.chapters[chIdx];
    const paras=(lang==='es'&&ch.paragraphsEs&&ch.paragraphsEs.length>0)?ch.paragraphsEs:(lang==='pt'&&ch.paragraphsPt&&ch.paragraphsPt.length>0)?ch.paragraphsPt:ch.paragraphs;
    if(!paras||paras.length===0)return;

    const catalog=[...BOOK_CATALOG.psA,...BOOK_CATALOG.psJane].find(b=>b.id===bookId);
    const speakKey=bookId+'_ch'+chIdx;
    setAudioLoading(speakKey);

    // Group paragraphs into chunks
    const chunks=[];
    let current=[];
    let currentLen=0;
    for(const p of paras){
      current.push(p);
      currentLen+=p.length;
      if(currentLen>800){
        chunks.push(current.join('\n\n'));
        current=[];
        currentLen=0;
      }
    }
    if(current.length)chunks.push(current.join('\n\n'));

    // Set up the queue
    const q=bookAudioQueueRef.current;
    q.active=true;
    q.cancelled=false;
    q.paragraphs=chunks;
    q.voiceId=(catalog&&catalog.voiceId)||'JBFqnCBsd6RMkjVDRZzb';
    q.speakKey=speakKey;
    q.prefetched={};
    q.bookId=bookId;
    q.chIdx=chIdx;
    q.totalChapters=(catalog&&catalog.chapterCount)||0;

    // Start — Spanish/Portuguese use Polly (Lucia/Camila), English uses ElevenLabs→Polly→BrowserTTS
    if(lang==='es'||lang==='pt'||lang==='id'){playPollyQueue(0)}else{playParaQueue(0)}
  };

  // Auto-advance to next chapter when current chapter finishes naturally
  const autoAdvanceNextChapter=()=>{
    const q=bookAudioQueueRef.current;
    if(!q.bookId||q.cancelled)return;
    const nextCh=q.chIdx+1;
    if(nextCh>=q.totalChapters)return; // No more chapters
    console.log('Auto-advancing to chapter',nextCh+1,'of',q.totalChapters);
    setSelectedChapter(nextCh);
    // Load next chapter data, then start playing it
    loadChapter(q.bookId,nextCh).then(()=>{
      setTimeout(()=>readBookChapter(q.bookId,nextCh),300);
    });
  };

  const filteredJournal=journalEntries.filter(e=>{
    if(journalTab==='revelations')return e.type==='revelation';
    return e.type==='verse_note'||e.type==='verse_comment';
  }).filter(e=>!searchTerm||e.text.toLowerCase().includes(searchTerm.toLowerCase())||(e.ref&&e.ref.toLowerCase().includes(searchTerm.toLowerCase())));

  const L=LANG[lang]||LANG.en;

  return(
    <div className="app-container">
      {/* APP UPDATE BANNER */}
      {/* LOGIN GATE — appears after onboarding or when accessing gated features */}
      {showEmailGate&&(()=>{

        // Opens 1-3: no skip at all. Opens 4-7: small "skip" text after delay. Opens 8-10: normal skip button.
        const canSkip=isWelcome?gateOpenCount>=4:true;
        const easySkip=isWelcome?gateOpenCount>=8:true;
        return(
        <div className="profile-modal-overlay" onClick={e=>{if(e.target===e.currentTarget&&!emailGateSaving&&(canSkip||!isWelcome)){setShowEmailGate(false)}}}>
          <div className="profile-modal" style={{maxWidth:380,padding:'28px 24px'}}>
            {emailGateDone?(
              <div className="pm-success">
                <div className="pm-check">✓</div>
                <h3>{userProfile&&userProfile.firstName
                  ?(lang==='es'?`¡Bienvenido, ${userProfile.firstName}!`:lang==='pt'?`Bem-vindo, ${userProfile.firstName}!`:lang==='id'?`Welcome, ${userProfile.firstName}!`:`Welcome, ${userProfile.firstName}!`)
                  :(lang==='es'?'¡Acceso concedido!':lang==='pt'?'Acesso liberado!':lang==='id'?'Anda berhasil masuk!':'You\'re in!')}</h3>
                {userProfile&&userProfile.campus&&userProfile.campus!=='other'&&(
                  <div style={{fontSize:13,color:'var(--sage)',marginTop:4}}>{(CAMPUSES.find(c=>c.id===userProfile.campus)||{}).name||''}</div>
                )}
              </div>
            ):(
              <>
                {(()=>{
                  const returning=emailGateInput&&emailGateInput.includes('@');
                  return(<>
                <h3 style={{fontSize:20}}>{isWelcome
                  ?(returning
                    ?(lang==='es'?'¡Bienvenido de nuevo!':lang==='pt'?'Bem-vindo de volta!':lang==='id'?'Selamat datang kembali!':'Welcome back!')
                    :(lang==='es'?'¡Bienvenido!':lang==='pt'?'Bem-vindo!':lang==='id'?'Selamat datang!':'Welcome!'))
                  :(lang==='es'?'Accede a Libros y Recursos':lang==='pt'?'Acesse Livros e Recursos':lang==='id'?'Buka Buku & Sumber Daya':'Unlock Books & Resources')}</h3>
                <div className="pm-sub" style={{marginBottom:12}}>{isWelcome
                  ?(returning
                    ?(lang==='es'?'Confirma o cambia tu campus':lang==='pt'?'Confirme ou mude seu campus':lang==='id'?'Konfirmasi atau ubah kampus Anda':'Confirm or change your campus')
                    :(lang==='es'?'Completa tu perfil para comenzar':lang==='pt'?'Complete seu perfil para começar':lang==='id'?'Lengkapi profil Anda untuk memulai':'Complete your profile to get started'))
                  :(lang==='es'?'Ingresa tu correo para acceso completo':lang==='pt'?'Digite seu email para acesso completo':lang==='id'?'Masukkan email untuk akses penuh':'Enter your email for full access')}</div>
                {!returning&&<div style={{background:'rgba(74,99,64,0.08)',borderRadius:10,padding:'12px 14px',marginBottom:14,fontSize:13,lineHeight:1.5,color:'var(--text)'}}>
                  {lang==='es'?'Tu perfil te conecta con tu campus, guarda tu progreso en todos tus dispositivos y te da acceso a la muro de oración y recursos de tu pastor.'
                   :lang==='pt'?'Seu perfil conecta você ao seu campus, salva seu progresso em todos os dispositivos e dá acesso ao mural de oração e recursos do seu pastor.'
                   :lang==='id'?'Profil Anda menghubungkan Anda dengan kampus, menyimpan progres di semua perangkat, dan memberi akses ke tembok doa dan sumber daya pendeta.'
                   :'Your profile connects you to your campus, saves your progress across all your devices, and gives you access to the prayer wall and your pastor\'s resources.'}
                </div>}
                {emailGateError&&<div className="pm-error">{emailGateError}</div>}
                {isWelcome&&<div style={{display:'flex',gap:8,marginBottom:0}}><div className="pm-field" style={{flex:1}}><input type="text" value={emailGateFirstName} onChange={e=>setEmailGateFirstName(e.target.value)} placeholder={lang==='es'?'Nombre':lang==='pt'?'Nome':lang==='id'?'Nama depan':'First name'} style={{fontSize:15,padding:'12px 16px'}}/></div><div className="pm-field" style={{flex:1}}><input type="text" value={emailGateLastName} onChange={e=>setEmailGateLastName(e.target.value)} placeholder={lang==='es'?'Apellido':lang==='pt'?'Sobrenome':lang==='id'?'Nama belakang':'Last name'} style={{fontSize:15,padding:'12px 16px'}}/></div></div>}
                <div className="pm-field"><input type="email" value={emailGateInput} onChange={e=>setEmailGateInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')submitEmailGate()}} placeholder="you@example.com" autoFocus={!returning} style={{fontSize:16,padding:'12px 16px'}}/></div>
                {isWelcome&&<div className="pm-field" style={{marginTop:8}}><select value={emailGateCampus} onChange={e=>setEmailGateCampus(e.target.value)} style={{width:'100%',padding:'12px 16px',borderRadius:10,border:'1.5px solid var(--border)',fontSize:14,color:emailGateCampus?'var(--text)':'var(--sage)',background:'var(--light)',fontFamily:'inherit',fontWeight:emailGateCampus?400:600}}><option value="">{lang==='es'?'Selecciona tu campus...':lang==='pt'?'Selecione seu campus...':lang==='id'?'Pilih kampus Anda...':'Select your campus...'}</option>{CAMPUSES.map(c=><option key={c.id} value={c.id}>{c.name}{c.city?' — '+c.city:''}</option>)}</select></div>}
                {!returning&&<div className="pm-privacy">{lang==='es'?'Solo devocionales y actualizaciones. Nunca compartimos tu info.':lang==='pt'?'Apenas devocionais e atualizações. Nunca compartilhamos.':lang==='id'?'Hanya renungan & pembaruan. Kami tidak pernah membagikan info Anda.':'Just devotionals & updates. We never share your info.'}</div>}
                <div className="pm-actions" style={{display:'flex',flexDirection:'column',gap:10,alignItems:'center'}}>
                  <button className="pm-btn-primary" style={{width:'100%'}} disabled={emailGateSaving} onClick={submitEmailGate}>{emailGateSaving?'...':(returning?(lang==='es'?'Continuar':lang==='pt'?'Continuar':lang==='id'?'Lanjutkan':'Continue'):'Continue')}</button>
                  {isWelcome&&returning&&<button onClick={()=>setShowEmailGate(false)} style={{padding:'10px 0',background:'none',color:'var(--text)',border:'none',fontSize:13,cursor:'pointer',opacity:0.5}}>{lang==='es'?'Saltar':lang==='pt'?'Pular':lang==='id'?'Lewati':'Skip'}</button>}
                  {isWelcome&&!returning&&canSkip&&<div style={{fontSize:11,color:'var(--text)',opacity:0.35,cursor:'pointer',marginTop:4}} onClick={()=>setShowEmailGate(false)}>{lang==='es'?'omitir por ahora':lang==='pt'?'pular por agora':lang==='id'?'lewati untuk saat ini':'skip for now'}</div>}
                  {!isWelcome&&<button onClick={()=>setShowEmailGate(false)} style={{padding:'10px 0',background:'none',color:'var(--text)',border:'none',fontSize:13,cursor:'pointer',opacity:0.5}}>{lang==='es'?'Cancelar':lang==='pt'?'Cancelar':lang==='id'?'Batal':'Cancel'}</button>}
                </div>
                </>)})()}
              </>
            )}
          </div>
        </div>);
      })()}
      {/* FULL PROFILE MODAL — Settings edit only */}
      {showProfileModal&&(
        <div className="profile-modal-overlay" onClick={e=>{if(e.target===e.currentTarget&&!profileSaving){setShowProfileModal(false)}}}>
          <div className="profile-modal">
            {profileSuccess?(
              <div className="pm-success">
                <div className="pm-check">✓</div>
                <h3>{lang==='es'?'Perfil guardado':lang==='pt'?'Perfil salvo':lang==='id'?'Profil tersimpan':'Profile saved'}</h3>
              </div>
            ):(
              <>
                <h3>{lang==='es'?'Editar Perfil':lang==='pt'?'Editar Perfil':lang==='id'?'Edit Profil':'Edit Profile'}</h3>
                {profileError&&<div className="pm-error">{profileError}</div>}
                <div className="pm-pic-area" onClick={()=>profilePicInputRef.current&&profilePicInputRef.current.click()}>
                  {profilePic?(
                    <img src={profilePic} alt="Profile" className="pm-pic-img"/>

                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style={{width:32,height:32,opacity:0.4}}><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                  )}
                  <div className="pm-pic-label">{profilePic?(lang==='es'?'Cambiar Foto':lang==='pt'?'Mudar Foto':lang==='id'?'Ganti Foto':'Change Photo'):(lang==='es'?'Agregar Foto':lang==='pt'?'Adicionar Foto':lang==='id'?'Tambah Foto':'Add Photo')}</div>

                <div className="pm-actions" style={{marginTop:16}}>
                  <button className="pm-btn-primary" disabled={profileSaving} onClick={()=>submitProfile(true)}>{profileSaving?'Saving...':'Save Changes'}</button>

                </div>
              </>

      </button>

      {page==='home'&&(

          {/* Scripture Search */}


          <div style={{marginBottom:16,position:'relative'}}>

                </div>
                {searchResults.length===0&&<div style={{fontSize:13,color:'var(--sage)',fontStyle:'italic'}}>{lang==='es'?'No se encontraron resultados. Intenta con otra búsqueda.':lang==='pt'?'Nenhum resultado encontrado. Tente uma busca diferente.':lang==='id'?'Tidak ada hasil. Coba pencarian lain.':'No results found. Try a different search.'}</div>}

            const allVerses=getVerses(pName);

                        onPointerDown={(e)=>onVersePointerDown(e,pName,vi,verses)}

                        onPointerUp={(e)=>onVersePointerUp(e,pName,vi)}
                        onTouchMove={(e)=>onVerseTouchMove(e,pName,verses)}
                        onClick={(e)=>onVerseClick(e,pName,vi,verses)}>
                        <span className="vnum">{vi+1}</span>
                        {hasIL?renderInterlinearVerse(v,key):renderVerse(v,key,pName,vi)}
                      </div>
                      {isLoading&&<div style={{textAlign:'center',fontSize:11,color:'var(--gold)',padding:'4px 0'}}>{lang==='es'?'Cargando':lang==='pt'?'Carregando':lang==='id'?'Memuat':'Loading'} {pData.book==='Psalms'||pData.book==='Proverbs'||pData.book==='Isaiah'||pData.book==='Genesis'?(lang==='es'?'Hebreo':lang==='pt'?'Hebraico':lang==='id'?'Ibrani':'Hebrew'):(lang==='es'?'Griego':lang==='pt'?'Grego':lang==='id'?'Yunani':'Greek')}...</div>}
                    </div>

      {page==='sermons'&&(

              <input type="text" inputMode="numeric" pattern="[0-9]*" value={setup.versesPerPassage===''?'':setup.versesPerPassage||30} onFocus={e=>e.target.select()} onChange={e=>{setSettingsSaved(false);const v=e.target.value;if(v==='')setSetup(p=>({...p,versesPerPassage:''}));else{const n=parseInt(v);if(!isNaN(n))setSetup(p=>({...p,versesPerPassage:Math.min(200,Math.max(1,n))}));}}} onBlur={()=>{if(setup.versesPerPassage===''||!setup.versesPerPassage)setSetup(p=>({...p,versesPerPassage:30}))}}/>

            <div className="profile-section">
              <h4>{lang==='es'?'Versículos Clave':lang==='pt'?'Versículos Chave':lang==='id'?'Ayat Kunci':'Key Verses'}</h4>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>{c.keyVerses.map((v,i)=><span key={i} className="profile-verse">{v}</span>)}</div>
            </div>
          </>);
        })()}
        {profileType==='loc'&&locProfile&&LOCATIONS[locProfile]&&(()=>{
          const l=LOCATIONS[locProfile];
          return(<>
            <h2>{l.name}</h2>
            <div className="profile-meaning">{l.modernName}</div>
            <div className="profile-region">{l.region}</div>
            <div className="profile-desc">{l.description}</div>
            <div className="profile-section">
              <h4>{lang==='es'?'Eventos Clave':lang==='pt'?'Eventos Chave':lang==='id'?'Peristiwa Penting':'Key Events'}</h4>
              {l.keyEvents.map((ev,i)=><div key={i} className="profile-event">{ev}</div>)}
            </div>
            <div className="profile-section">
              <h4>{lang==='es'?'Versículos Clave':lang==='pt'?'Versículos Chave':lang==='id'?'Ayat Kunci':'Key Verses'}</h4>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>{l.keyVerses.map((v,i)=><span key={i} className="profile-verse">{v}</span>)}</div>
            </div>
          </>);
        })()}
      </div>

      {/* PLAN PICKER OVERLAY */}
      {planPicker&&(
        <div className="plan-picker-overlay" onClick={()=>setPlanPicker(null)}>
          <div className="plan-picker" onClick={e=>e.stopPropagation()}>
            <h2>{lang==='es'?'¿Qué plan hoy?':lang==='pt'?'Continuar Lendo':lang==='id'?'Lanjutkan Membaca':'Continue Reading'}</h2>
            <div className="pp-sub">{lang==='es'?'Elige el plan para hoy':lang==='pt'?'Continue de onde parou':lang==='id'?'Lanjutkan dari terakhir':'Pick up where you left off'}</div>
            {planPicker.map(p=>(
              <div key={p.planId} className="plan-picker-item" onClick={()=>{
                setPlanPicker(null);
                setMoreSection('plans');
                openPlanReading(p.planId,p.dayIdx,p.reading);
              }}>
                <div className="pp-icon">{p.icon}</div>
                <div className="pp-info">
                  <div className="pp-name">{p.planName}</div>
                  <div className="pp-reading">{lang==='es'?'Día':lang==='pt'?'Dia':lang==='id'?'Hari':'Day'} {p.dayIdx+1}: {p.reading}</div>
                </div>
                <div className="pp-pct">{p.pct}%</div>
              </div>
            ))}
            <button className="plan-picker-skip" onClick={()=>setPlanPicker(null)}>{lang==='es'?'Ir al inicio':lang==='pt'?'Ir para o início':lang==='id'?'Langsung ke Beranda':'Skip to Home'}</button>
          </div>
        </div>
      )}

      {/* AI CHAT PANEL */}
      <div className={`ai-chat ${showAI?'show':''}`}>
        <div className="ai-chat-header">
          <div>
            <h3>{L.askClaude}</h3>
            {aiContext&&<span>{aiContext}</span>}
          </div>
          <button className="ai-chat-close" onClick={()=>setShowAI(false)}>×</button>
        </div>
        <div className="ai-chat-body">
          {aiMessages.length===0&&!aiLoading&&(
            <div className="ai-suggest">
              <button onClick={()=>askClaude(L.aiExplain.replace('{ctx}',aiContext||"today's passages"))}>{L.explainPassage}</button>
              <button onClick={()=>askClaude(L.aiCrossRef.replace('{ctx}',aiContext||"today's passages"))}>{L.crossRef}</button>
              <button onClick={()=>askClaude(L.aiHistory.replace('{ctx}',aiContext||"today's passages"))}>{L.histContext}</button>
              <button onClick={()=>askClaude(L.aiGreek.replace('{ctx}',aiContext||"today's passages"))}>{L.greekHebrew}</button>
              <button onClick={()=>askClaude(L.aiDevotional.replace('{ctx}',aiContext||"today's passages"))}>{L.devotional}</button>
              <button onClick={()=>askClaude(L.aiMemorize.replace('{ctx}',aiContext||"today's passages"))}>{L.memorize}</button>
            </div>
          )}
          {aiMessages.map((m,i)=>(
            <div key={i} className={`ai-bubble ${m.role}`}>
              {m.role==='assistant'?m.content.split('\n\n').map((para,pi)=><p key={pi}>{para}</p>):m.content}
            </div>
          ))}
          {aiLoading&&<div className="ai-typing">{L.thinking}</div>}
          <div ref={aiEndRef}/>
        </div>
        <div className="ai-chat-input">
          <textarea rows="1" placeholder={L.askAnything} value={aiInput} onChange={e=>setAiInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();askClaude(aiInput)}}}/>
          <button disabled={aiLoading||!aiInput.trim()} onClick={()=>askClaude(aiInput)}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white" stroke="none"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>

      {/* FAITH PATHWAY OVERLAY */}
      {showPathway&&pathwayData&&(
        <div style={{position:'fixed',inset:0,background:'var(--bg)',zIndex:600,overflowY:'auto',paddingBottom:'calc(80px + env(safe-area-inset-bottom))'}}>
          <div style={{padding:'20px 16px',maxWidth:480,margin:'0 auto'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <h1 style={{fontSize:22,fontFamily:'Georgia,serif',margin:0}}>{lang==='es'?(pathwayData.titleEs||pathwayData.title):lang==='pt'?(pathwayData.titlePt||pathwayData.title):lang==='id'?(pathwayData.titleId||pathwayData.title):pathwayData.title}</h1>
              <button onClick={()=>{setShowPathway(false);setPathwayViewDay(null)}} style={{background:'none',border:'none',fontSize:24,color:'var(--sage)',cursor:'pointer'}}>×</button>
            </div>

            {/* Progress bar */}
            <div style={{marginBottom:20}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--sage)',marginBottom:6}}>
                <span>{(L.journeyProgress||'').replace('{n}',pathwayProgress.completedDays.length)}</span>
                <span>{Math.round(pathwayProgress.completedDays.length/30*100)}%</span>
              </div>
              <div style={{height:6,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
                <div style={{width:(pathwayProgress.completedDays.length/30*100)+'%',height:'100%',background:'var(--sage)',borderRadius:3,transition:'width 0.3s'}}></div>
              </div>
            </div>

            {pathwayViewDay===null?(
              /* DAY LIST */
              <div>
                {pathwayData.days.map(day=>{
                  const done=pathwayProgress.completedDays.includes(day.day);
                  const isCurrent=day.day===pathwayProgress.currentDay;
                  const locked=day.day>pathwayProgress.currentDay&&!done;
                  return(
                    <div key={day.day} onClick={()=>{if(!locked)setPathwayViewDay(day.day)}} style={{
                      display:'flex',alignItems:'center',gap:12,padding:'14px 16px',marginBottom:8,
                      background:isCurrent?'rgba(139,157,131,0.1)':done?'rgba(139,157,131,0.05)':'var(--light)',
                      border:isCurrent?'2px solid var(--sage)':'1.5px solid var(--border)',
                      borderRadius:12,cursor:locked?'default':'pointer',opacity:locked?0.4:1
                    }}>
                      <div style={{
                        width:32,height:32,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:600,
                        background:done?'var(--sage)':isCurrent?'var(--gold)':'var(--border)',
                        color:done||isCurrent?'white':'var(--sage)'
                      }}>{done?'✓':day.day}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{lang==='es'?(day.titleEs||day.title):lang==='pt'?(day.titlePt||day.title):lang==='id'?(day.titleId||day.title):day.title}</div>
                        <div style={{fontSize:12,color:'var(--sage)'}}>{lang==='es'?(day.themeEs||day.theme):lang==='pt'?(day.themePt||day.theme):lang==='id'?(day.themeId||day.theme):day.theme} • {day.reading.ref}</div>
                      </div>
                      {!locked&&<div style={{fontSize:18,color:'var(--sage)'}}>›</div>}
                    </div>
                  );
                })}
              </div>
            ):(()=>{
              /* DAY DETAIL VIEW */
              const day=pathwayData.days.find(d=>d.day===pathwayViewDay);
              if(!day)return null;
              const done=pathwayProgress.completedDays.includes(day.day);
              return(
                <div>
                  <button onClick={()=>setPathwayViewDay(null)} style={{background:'none',border:'none',fontSize:14,color:'var(--sage)',cursor:'pointer',marginBottom:12,padding:0}}>{lang==='es'?'← Volver a todos los días':lang==='pt'?'← Voltar para todos os dias':lang==='id'?'← Kembali ke semua hari':'← Back to all days'}</button>
                  <div style={{fontSize:12,fontWeight:600,textTransform:'uppercase',letterSpacing:1.5,color:'var(--sage)',marginBottom:6}}>{(L.dayOfJourney||'').replace('{d}',day.day)}</div>
                  <h2 style={{fontSize:22,fontFamily:'Georgia,serif',margin:'0 0 4px',color:'var(--text)'}}>{lang==='es'?(day.titleEs||day.title):lang==='pt'?(day.titlePt||day.title):lang==='id'?(day.titleId||day.title):day.title}</h2>
                  <div style={{fontSize:14,color:'var(--gold)',fontWeight:500,marginBottom:20}}>{lang==='es'?(day.themeEs||day.theme):lang==='pt'?(day.themePt||day.theme):lang==='id'?(day.themeId||day.theme):day.theme}</div>

                  {/* Scripture Reading */}
                  <div style={{background:'var(--light)',border:'1.5px solid var(--border)',borderRadius:14,padding:16,marginBottom:20}}>
                    <div style={{fontSize:12,fontWeight:600,textTransform:'uppercase',letterSpacing:1,color:'var(--sage)',marginBottom:8}}>{L.readScripture}</div>
                    <div style={{fontSize:16,fontWeight:600,color:'var(--text)',marginBottom:4}}>{day.reading.ref}</div>
                    <div style={{fontSize:13,color:'var(--sage)'}}>{day.reading.book} {day.reading.chapter}{day.reading.verses?':'+day.reading.verses:''}</div>
                  </div>

                  {/* Lesson */}
                  <div style={{marginBottom:24}}>
                    <div style={{fontSize:12,fontWeight:600,textTransform:'uppercase',letterSpacing:1,color:'var(--sage)',marginBottom:12}}>{L.todayLesson}</div>
                    {(lang==='es'?(day.lessonEs||day.lesson):lang==='pt'?(day.lessonPt||day.lesson):lang==='id'?(day.lessonId||day.lesson):day.lesson).split('\n\n').map((para,pi)=>(
                      <p key={pi} style={{fontSize:15,lineHeight:1.7,color:'var(--text)',margin:'0 0 14px'}}>{para}</p>
                    ))}
                  </div>

                  {/* Complete button */}
                  <button onClick={()=>{if(!done)completePathwayDay(day.day)}} disabled={done} style={{
                    width:'100%',padding:'14px',background:done?'var(--border)':'var(--sage)',color:done?'var(--sage)':'white',
                    border:'none',borderRadius:12,fontSize:15,fontWeight:600,cursor:done?'default':'pointer'
                  }}>{done?(L.dayComplete||'Completed ✓'):(L.markDayComplete||'Complete Day')}</button>

                  {/* Nav buttons */}
                  <div style={{display:'flex',justifyContent:'space-between',marginTop:16}}>
                    <button disabled={day.day<=1} onClick={()=>setPathwayViewDay(day.day-1)} style={{background:'none',border:'none',color:day.day<=1?'var(--border)':'var(--sage)',fontSize:14,cursor:'pointer'}}>{lang==='es'?'← Día Anterior':lang==='pt'?'← Dia Anterior':lang==='id'?'← Hari Sebelumnya':'← Previous Day'}</button>
                    <button disabled={day.day>=30} onClick={()=>setPathwayViewDay(day.day+1)} style={{background:'none',border:'none',color:day.day>=30?'var(--border)':'var(--sage)',fontSize:14,cursor:'pointer'}}>{lang==='es'?'Día Siguiente →':lang==='pt'?'Próximo Dia →':lang==='id'?'Hari Berikutnya →':'Next Day →'}</button>
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      )}

      {/* SHARE PICKER */}
      {showSharePicker&&selectedVerse&&(
        <div className="share-picker-overlay" onClick={()=>setShowSharePicker(false)}>
          <div className="share-picker" onClick={e=>e.stopPropagation()}>
            <div className="sp-handle"/>
            <div className="sp-title">{lang==='es'?'Compartir':lang==='pt'?'Compartilhar':lang==='id'?'Bagikan':'Share'}</div>
            <div className="sp-preview">"{selectedVerse.text.length>80?selectedVerse.text.slice(0,80)+'...':selectedVerse.text}"</div>
            <div className="sp-grid">
              <button className="sp-btn" onClick={shareToWhatsApp}>
                <div className="sp-icon" style={{background:'#25D366'}}><svg viewBox="0 0 24 24" fill="white" style={{width:26,height:26}}><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></div>
                <div className="sp-label">WhatsApp</div>
              </button>
              <button className="sp-btn" onClick={shareToSMS}>
                <div className="sp-icon" style={{background:'#34C759'}}><svg viewBox="0 0 24 24" fill="white" style={{width:24,height:24}}><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/><path d="M7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg></div>
                <div className="sp-label">iMessage</div>
              </button>
              <button className="sp-btn" onClick={shareToEmail}>
                <div className="sp-icon" style={{background:'#007AFF'}}><svg viewBox="0 0 24 24" fill="white" style={{width:24,height:24}}><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></div>
                <div className="sp-label">Email</div>
              </button>
              <button className="sp-btn" onClick={shareToTelegram}>
                <div className="sp-icon" style={{background:'#0088cc'}}><svg viewBox="0 0 24 24" fill="white" style={{width:24,height:24}}><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg></div>
                <div className="sp-label">Telegram</div>
              </button>
            </div>
            <div className="sp-grid" style={{marginBottom:8}}>
              <button className="sp-btn" onClick={shareCopyLink}>
                <div className="sp-icon" style={{background:'var(--sage)'}}><svg viewBox="0 0 24 24" fill="white" style={{width:22,height:22}}><rect x="9" y="9" width="13" height="13" rx="2" fill="none" stroke="white" strokeWidth="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" fill="none" stroke="white" strokeWidth="2"/></svg></div>
                <div className="sp-label">{L.copy}</div>
              </button>
              {navigator.share&&(
                <button className="sp-btn" onClick={shareNative}>
                  <div className="sp-icon" style={{background:'var(--gold)'}}><svg viewBox="0 0 24 24" fill="white" style={{width:22,height:22}}><circle cx="18" cy="5" r="3" fill="none" stroke="white" strokeWidth="2"/><circle cx="6" cy="12" r="3" fill="none" stroke="white" strokeWidth="2"/><circle cx="18" cy="19" r="3" fill="none" stroke="white" strokeWidth="2"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49" stroke="white" strokeWidth="2"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49" stroke="white" strokeWidth="2"/></svg></div>
                  <div className="sp-label">{lang==='es'?'Más':lang==='pt'?'Mais':lang==='id'?'Lainnya':'More'}</div>
                </button>
              )}
            </div>
            <button className="sp-cancel" onClick={()=>setShowSharePicker(false)}>{L.cancel}</button>
          </div>
        </div>
      )}

      {/* CHAPTER SOURCE PICKER */}
      {showSourcePicker&&(
        <div className="source-picker-overlay" onClick={()=>setShowSourcePicker(false)}>
          <div className="source-picker" onClick={e=>e.stopPropagation()}>
            <h2>{lang==='es'?'Fuentes de los Capítulos':lang==='pt'?'Fontes dos Capítulos':lang==='id'?'Sumber Pasal':'Chapter Sources'}</h2>
            <p className="sp-sub">{lang==='es'?`Selecciona de dónde quieres tus ${setup?.chapters||2} capítulos`:lang==='pt'?`Escolha de onde você quer seus ${setup?.chapters||2} capítulos`:lang==='id'?`Pilih dari mana Anda ingin ${setup?.chapters||2} pasal Anda`:`Pick where you want your ${setup?.chapters||2} chapters from`}</p>
            {Object.entries(BIBLE_SECTIONS).map(([key,sec])=>{
              const sources=setup?.chapterSources||[];
              const isSelected=sources.includes(key);
              return(
                <div key={key} className={`sp-section ${isSelected?'selected':''}`} onClick={()=>{
                  const cur=setup?.chapterSources||[];
                  const numCh=setup?.chapters||2;
                  if(isSelected){
                    setSetup(p=>({...p,chapterSources:cur.filter(s=>s!==key)}));
                  }else{
                    if(cur.length<numCh){
                      setSetup(p=>({...p,chapterSources:[...cur,key]}));
                    }else{
                      // Replace last one
                      setSetup(p=>({...p,chapterSources:[...cur.slice(0,-1),key]}));
                    }
                  }
                  setSettingsSaved(false);
                }}>
                  <div className="sp-emoji">{sec.emoji}</div>
                  <div className="sp-info">
                    <div className="sp-name">{lang==='es'?sec.labelEs:lang==='pt'?(sec.labelPt||sec.label):sec.label}</div>
                    <div className="sp-count">{sec.passages.length} {lang==='es'?'pasajes':lang==='pt'?'passagens':lang==='id'?'bacaan':'passages'}</div>
                  </div>
                  <div className="sp-check">
                    {isSelected&&<svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" style={{width:14,height:14}}><path d="M5 13l4 4L19 7"/></svg>}
                  </div>
                </div>
              );
            })}
            <div style={{textAlign:'center',fontSize:13,color:'var(--sage)',margin:'12px 0'}}>
              {lang==='es'?`${(setup?.chapterSources||[]).length} de ${setup?.chapters||2} seleccionados`:lang==='pt'?`${(setup?.chapterSources||[]).length} de ${setup?.chapters||2} selecionados`:lang==='id'?`${(setup?.chapterSources||[]).length} dari ${setup?.chapters||2} terpilih`:`${(setup?.chapterSources||[]).length} of ${setup?.chapters||2} selected`}
            </div>
            <button onClick={()=>setShowSourcePicker(false)} style={{width:'100%',padding:'14px 0',background:'var(--sage)',color:'white',border:'none',borderRadius:12,fontSize:16,fontWeight:600,cursor:'pointer',marginTop:4}}>
              {lang==='es'?'Listo':lang==='pt'?'Pronto':lang==='id'?'Selesai':'Done'}
            </button>
          </div>
        </div>
      )}

      {/* NOTIFICATION OPT-IN PROMPT */}
      {showNotifPrompt&&!pushEnabled&&(
        <div className="notif-prompt-overlay" onClick={()=>{setShowNotifPrompt(false);try{localStorage.setItem('dw_notif_dismissed','later')}catch(e){}}}>
          <div className="notif-prompt" onClick={e=>e.stopPropagation()}>
            <button className="notif-prompt-close" onClick={()=>{setShowNotifPrompt(false);try{localStorage.setItem('dw_notif_dismissed','later')}catch(e){}}}>×</button>
            <div className="notif-prompt-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="var(--sage)" strokeWidth="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            </div>
            <h3>{lang==='es'?'Recordatorio Diario':lang==='pt'?'Lembrete de Leitura Diária':lang==='id'?'Pengingat Bacaan Harian':'Daily Reading Reminder'}</h3>
            <p>{lang==='es'?'Recibe un mensaje tranquilo cada mañana con la lectura del día. Una notificación al día, nada más.':lang==='pt'?'Nunca perca sua leitura diária. Definiremos um lembrete suave.':lang==='id'?'Dapatkan pengingat pagi yang tenang dengan bacaan harian Anda. Satu notifikasi per hari, tidak lebih.':'Get a quiet morning reminder with your daily reading. One notification per day, nothing more.'}</p>
            <div className="notif-prompt-time">
              <label>{lang==='es'?'Hora del recordatorio':lang==='pt'?'Hora do lembrete':lang==='id'?'Waktu pengingat':'Reminder time'}</label>
              <select value={notifHour} onChange={e=>setNotifHour(parseInt(e.target.value))}>
                {Array.from({length:24},(_,i)=>i).map(h=>(
                  <option key={h} value={h}>{h===0?'12:00 AM':h<12?h+':00 AM':h===12?'12:00 PM':(h-12)+':00 PM'}</option>
                ))}
              </select>
            </div>
            <button className="notif-prompt-yes" onClick={subscribePush} disabled={pushLoading}>
              {pushLoading?(lang==='es'?'Activando...':lang==='pt'?'Ativando...':lang==='id'?'Mengaktifkan...':'Enabling...'):(lang==='es'?'Sí, recuérdame':lang==='pt'?'Sim, me lembre':lang==='id'?'Ya, ingatkan saya':'Yes, remind me')}
            </button>
            <button className="notif-prompt-no" onClick={()=>{setShowNotifPrompt(false);try{localStorage.setItem('dw_notif_dismissed','later')}catch(e){}}}>
              {lang==='es'?'Quizás después':lang==='pt'?'Talvez depois':lang==='id'?'Mungkin nanti':'Maybe later'}
            </button>
          </div>
        </div>
      )}

      {/* REPORT ISSUE MODAL */}

                            </div>);

                    </div>
                    {/* Teleprompter tab bar */}
                    <div style={{display:'flex',borderTop:'1px solid rgba(255,255,255,0.15)',background:'rgba(0,0,0,0.4)'}}>
                      {[['notes',lang==='es'?'Notas':lang==='pt'?'Notas':lang==='id'?'Catatan':'Notes'],['journal',lang==='es'?'Diario':lang==='pt'?'Diário':lang==='id'?'Jurnal':'Journal'],['passages',lang==='es'?'Pasajes':lang==='pt'?'Passagens':lang==='id'?'Bacaan':'Passages']].map(([tab,label])=>(
                        <button key={tab} onClick={()=>setTeleprompterTab(tab)} style={{flex:1,padding:'8px 0',background:'none',border:'none',color:teleprompterTab===tab?'#C4A962':'rgba(255,255,255,0.5)',fontSize:11,fontWeight:teleprompterTab===tab?700:400,cursor:'pointer'}}>{label}</button>
                      ))}
                    </div>
                    {/* Font size control */}
                    <div style={{display:'flex',justifyContent:'center',gap:12,padding:'6px 0',background:'rgba(0,0,0,0.4)'}}>
                      <button onClick={()=>setTeleprompterSize(s=>Math.max(0.7,s-0.1))} style={{background:'rgba(255,255,255,0.15)',border:'none',color:'white',width:28,height:28,borderRadius:14,fontSize:16,cursor:'pointer'}}>A-</button>
                      <button onClick={()=>setTeleprompterSize(s=>Math.min(1.6,s+0.1))} style={{background:'rgba(255,255,255,0.15)',border:'none',color:'white',width:28,height:28,borderRadius:14,fontSize:16,cursor:'pointer'}}>A+</button>
