              </div>
              {/* Teleprompter toggle + timer row */}
              <div style={{display:'flex',alignItems:'center',gap:12,marginTop:8}}>
                <button onClick={()=>{setShowTeleprompter(t=>!t);gaEvent('teleprompter_toggle',{enabled:!showTeleprompter})}} style={{background:showTeleprompter?'rgba(196,169,98,0.3)':'rgba(255,255,255,0.12)',border:showTeleprompter?'1.5px solid rgba(196,169,98,0.6)':'1.5px solid rgba(255,255,255,0.2)',borderRadius:20,padding:'6px 14px',color:'white',fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width:14,height:14}}><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                  {lang==='es'?'Notas':lang==='pt'?'Notas':lang==='id'?'Catatan':'Notes'}
                </button>
                <div className={`vm-timer ${isRecording?'recording':''}`} style={{margin:0}}>{formatTime(recordTime)}</div>
              </div>
              <div className="vm-limit">{L.maxDuration}</div>
              <div className="vm-controls">
                <button className={`vm-record-btn ${isRecording?'is-recording':''}`} onClick={isRecording?stopRecording:startRecording}>
                  <div className="vm-rec-inner"/>
                </button>
              </div>
            </React.Fragment>
          ):(
            <React.Fragment>
              <div className={`vm-preview ${videoOrientation}`}>
                <video src={URL.createObjectURL(recordedBlob)} controls playsInline style={{width:'100%',height:'100%',objectFit:'contain'}}/>
              </div>
              <div className="vm-timer">{formatTime(recordTime)}</div>
              <div className="vm-controls">
                <button className="vm-secondary-btn" onClick={()=>{setRecordedBlob(null);setRecordTime(0);chunksRef.current=[];startCamera(facingMode)}}>{L.retake}</button>
                <button className="vm-secondary-btn save" onClick={saveVideoDevotion}>{L.saveDevotion}</button>
              </div>
            </React.Fragment>
          )}
        </div>
      )}

      {/* NAV */}
      <nav className="nav" role="navigation" aria-label="Main navigation">
        <button aria-label="Home" aria-current={page==='home'?'page':undefined} className={page==='home'?'active':''} onClick={()=>{setPage('home');gaEvent('navigate',{page:'home'})}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          {L.home}
        </button>
        <button aria-label="Journal" aria-current={page==='journal'?'page':undefined} className={page==='journal'?'active':''} onClick={()=>{setPage('journal');gaEvent('navigate',{page:'journal'})}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" aria-hidden="true"><path d="M15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707A1 1 0 0112 5v14a1 1 0 01-1.707.707L5.586 15z"/></svg>
          {L.messages}
        </button>
        <button aria-label="Plans and More" aria-current={page==='plans'?'page':undefined} className={page==='plans'?'active':''} onClick={()=>{
          setPage('plans');setMoreSection(null);setSelectedBook(null);setSelectedChapter(null);gaEvent('navigate',{page:'plans'});
        }}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" aria-hidden="true"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12l2 2 4-4"/></svg>

// ===== ONBOARDING COMPONENT =====
function Onboarding({onComplete,lang,setLang}){
  const L=LANG[lang]||LANG.en;
  const [persona,setPersona]=useState('');
  const [custom,setCustom]=useState('');
  const [chapters,setChapters]=useState(1);
  const [versesPerPassage,setVPP]=useState(30);
  const [chapterSources,setChapterSources]=useState([]);
  const [step,setStep]=useState(1);

  const personas=[
    {id:'new_believer',label:"I'm new to faith or returning"},
    {id:'pastor',label:"I'm a pastor / minister"},
    {id:'difficult',label:"I'm going through a difficult season"},
    {id:'deeper',label:"I'm studying for deeper understanding"}
  ];

  if(step===1)return(
    <div className="onboard">
      <div className="lang-toggle" style={{justifyContent:'center',marginBottom:20}}>
        <button className={`lang-btn ${lang==='en'?'active':''}`} onClick={()=>{setLang('en');try{localStorage.setItem('dw_lang','en')}catch(e){}gaEvent('change_language',{language:'en'})}}>English</button>
        <button className={`lang-btn ${lang==='es'?'active':''}`} onClick={()=>{setLang('es');try{localStorage.setItem('dw_lang','es')}catch(e){}gaEvent('change_language',{language:'es'})}}>Español</button>
        <button className={`lang-btn ${lang==='pt'?'active':''}`} onClick={()=>{setLang('pt');try{localStorage.setItem('dw_lang','pt')}catch(e){}gaEvent('change_language',{language:'pt'})}}>Português</button>
        <button className={`lang-btn ${lang==='id'?'active':''}`} onClick={()=>{setLang('id');try{localStorage.setItem('dw_lang','id')}catch(e){}gaEvent('change_language',{language:'id'})}}>Bahasa</button>
      </div>
      <div style={{textAlign:'center',marginBottom:8}}>
        <img src="/icons/futures-church-logo-sage.png" alt="Futures Church" style={{width:200,height:'auto'}}/>
      </div>
      <h1>{L.dailyWord}</h1>
      <p>{L.welcome}</p>
      {personas.map(p=>(
        <button key={p.id} className={`persona-btn ${persona===p.id?'selected':''}`} onClick={()=>{setPersona(p.id);setCustom('')}}>{p.id==='new_believer'?L.imNewBeliever:p.id==='returning'?L.imReturning:p.id==='pastor'?L.imPastor:p.id==='difficult'?L.imDifficult:p.id==='deeper'?L.imDeeper:p.id==='worship'?L.imWorship:''}</button>
      ))}
      <textarea className="custom-input" rows="2" placeholder={L.orDescribe} value={custom} onChange={e=>{setCustom(e.target.value);setPersona('')}}/>
      <button className="primary-btn" disabled={!persona&&!custom} onClick={()=>setStep(2)} style={{opacity:persona||custom?1:0.4}}>{L.continue}</button>
    </div>
  );

  return(
    <div className="onboard">
      <h1>{L.customizeReading}</h1>
      <p>{L.howMuch}</p>
      <div className="pref-card">
        <div><div className="pref-label">{L.chaptersPerDay}</div><div className="pref-desc">{L.chaptersDesc}</div></div>
        <input type="text" inputMode="numeric" pattern="[0-9]*" value={chapters===''?'':chapters} onFocus={e=>e.target.select()} onChange={e=>{const v=e.target.value;if(v==='')setChapters('');else{const n=parseInt(v);if(!isNaN(n))setChapters(Math.min(10,Math.max(1,n)));}}} onBlur={()=>{if(chapters===''||!chapters)setChapters(1)}}/>
      </div>
      {chapters>1&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:14,fontWeight:600,color:'var(--text)',marginBottom:8}}>{lang==='es'?'Elige de dónde':lang==='pt'?'Escolha de onde':lang==='id'?'Pilih dari mana':'Choose where from'}:</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {Object.entries(BIBLE_SECTIONS).map(([key,sec])=>{
              const isSelected=chapterSources.includes(key);
              return(
                <button key={key} onClick={()=>{
                  if(isSelected){setChapterSources(cs=>cs.filter(s=>s!==key))}
                  else if(chapterSources.length<chapters){setChapterSources(cs=>[...cs,key])}
                  else{setChapterSources(cs=>[...cs.slice(0,-1),key])}
                }} style={{padding:'8px 14px',borderRadius:20,border:isSelected?'2px solid var(--gold)':'2px solid var(--border)',background:isSelected?'rgba(196,169,98,0.1)':'var(--light)',color:isSelected?'var(--gold)':'var(--text)',fontSize:13,fontWeight:isSelected?600:400,cursor:'pointer',display:'flex',alignItems:'center',gap:6,transition:'all 0.2s'}}>
                  <span>{sec.emoji}</span>
                  <span>{lang==='es'?sec.labelEs:lang==='pt'?(sec.labelPt||sec.label):sec.label}</span>
                </button>
              );
            })}
          </div>
          <div style={{fontSize:12,color:'var(--sage)',marginTop:6}}>{lang==='es'?`${chapterSources.length} de ${chapters} seleccionados`:lang==='pt'?`${chapterSources.length} de ${chapters} selecionados`:lang==='id'?`${chapterSources.length} dari ${chapters} terpilih`:`${chapterSources.length} of ${chapters} selected`}</div>
        </div>
      )}
      <div className="pref-card">
        <div><div className="pref-label">{L.versesPerPassage}</div><div className="pref-desc">{L.versesDesc}</div></div>
        <input type="text" inputMode="numeric" pattern="[0-9]*" value={versesPerPassage===''?'':versesPerPassage} onFocus={e=>e.target.select()} onChange={e=>{const v=e.target.value;if(v==='')setVPP('');else{const n=parseInt(v);if(!isNaN(n))setVPP(Math.min(200,Math.max(1,n)));}}} onBlur={()=>{if(versesPerPassage===''||!versesPerPassage)setVPP(30)}}/>
      </div>
      <button className="primary-btn" onClick={()=>onComplete({persona:persona||custom||'new_believer',chapters,versesPerPassage,chapterSources:chapterSources.length>0?chapterSources:undefined})}>{L.begin}</button>
    </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null}}
  static getDerivedStateFromError(error){return{hasError:true,error}}
  componentDidCatch(error,info){console.error('App crash:',error,info)}
  render(){
    if(this.state.hasError){
      return React.createElement('div',{style:{padding:'40px',textAlign:'center',fontFamily:'Georgia,serif'}},
        React.createElement('h2',null,'Something went wrong'),
        React.createElement('p',{style:{color:'#666',margin:'16px 0'}},'The app hit an unexpected error.'),
        React.createElement('button',{onClick:()=>window.location.reload(),style:{padding:'12px 32px',fontSize:'16px',background:'#5a7a3a',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer'}},'Reload App')
      )
    }
    return this.props.children
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ErrorBoundary,null,React.createElement(App)));
</script>
<script>
// Global error safety net — prevent silent failures + log to GA
window.addEventListener('unhandledrejection', function(e) {
  console.warn('Unhandled promise rejection:', e.reason);
  if(window.gaEvent)gaEvent('js_error',{type:'unhandled_rejection',message:String(e.reason).slice(0,200)});
  e.preventDefault();
});
window.onerror = function(msg, src, line, col, err) {
  console.warn('Global error caught:', msg, 'at', src, line);
  if(window.gaEvent)gaEvent('js_error',{type:'global',message:String(msg).slice(0,200),source:src,line:line});
  return true;
};
// Track Core Web Vitals if supported
if(window.PerformanceObserver){
  try{
    new PerformanceObserver(function(list){
      list.getEntries().forEach(function(entry){
        if(window.gaEvent)gaEvent('web_vital',{name:entry.name,value:Math.round(entry.startTime),metric:entry.entryType});
      });
    }).observe({type:'largest-contentful-paint',buffered:true});
  }catch(e){}
}
</script>
<script>
// Service Worker Registration
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>{
    console.log('Service Worker registered, scope:',reg.scope);
    reg.update().catch(()=>{});
    // Check for updates every 30 minutes
    setInterval(()=>{reg.update().catch(()=>{})},30*60*1000);
  }).catch(err=>console.log('SW registration failed:',err));
}
</script>
